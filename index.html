<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>LV Intelligence – Ultimate Engine</title>

<style>
body { font-family: Arial; margin:0; background:#eef2f7; }
.header { background:#0f172a; color:#fff; padding:15px; font-size:22px; }
.container { padding:20px; }

textarea { width:100%; height:120px; margin-bottom:10px; }

button {
  padding:8px 12px;
  background:#2563eb;
  color:#fff;
  border:none;
  cursor:pointer;
}

.card { background:#fff; padding:15px; border-radius:6px; margin-bottom:12px; }

.high { color:#dc2626; }
.mid { color:#f59e0b; }

.section {
  background:#fff;
  padding:15px;
  margin-top:12px;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="header">LV Intelligence – Ultimate Analyse Tool</div>

<div class="container">

<input type="file" id="pdfFile" accept=".pdf"><br><br>

<textarea id="lvText" placeholder="Plak LV tekst of upload PDF"></textarea>

<button onclick="analyse()">Analyse</button>

<div id="out"></div>

</div>

<script>

// ===== PDF =====
function loadScript(url){
  return new Promise(res=>{
    let s=document.createElement("script");
    s.src=url;
    s.onload=res;
    document.body.appendChild(s);
  });
}

async function handlePDF(file){
  if(typeof pdfjsLib==="undefined"){
    await loadScript("https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js");
  }

  let reader=new FileReader();

  reader.onload=async function(){
    let pdf=await pdfjsLib.getDocument(new Uint8Array(this.result)).promise;
    let text="";

    for(let i=1;i<=pdf.numPages;i++){
      let page=await pdf.getPage(i);
      let c=await page.getTextContent();
      text+=c.items.map(i=>i.str).join(" ")+"\n";
    }

    lvText.value=text;
  };

  reader.readAsArrayBuffer(file);
}

pdfFile.onchange=e=>{
  if(e.target.files[0]) handlePDF(e.target.files[0]);
};

// ===== PLANSTRASSE =====
function detectPlanstrassen(t){
  let m = t.match(/planstraße\s*[a-z]/gi) || [];
  return [...new Set(m.map(x=>x.toUpperCase()))];
}

// ===== BESTELLIJST =====
function extractMaterials(t){

  let matches = t.match(/dn\s*\d+/gi) || [];

  let map = {};

  matches.forEach(m=>{
    let key = m.toUpperCase();
    map[key] = (map[key] || 0) + 1;
  });

  return map;
}

// ===== RISICO =====
function getRisico(t){

  let r=[], k=[];

  if(t.includes("nicht parallel")){
    r.push("Geen parallel uitvoering mogelijk");
    k.push("Fases blokkeren elkaar → vertraging");
  }

  if(t.includes("unterbrechung")){
    r.push("Onderbreking mogelijk");
    k.push("Stilstand tussen fases");
  }

  if(t.includes("drittfirmen")){
    r.push("Afhankelijkheid derden");
    k.push("Planning afhankelijk van nutsbedrijven");
  }

  if(t.includes("nicht vergütet")){
    r.push("Niet vergoede werkzaamheden");
    k.push("Kosten liggen bij aannemer");
  }

  return {r,k};
}

// ===== GROTE SAMENVATTING =====
function bigSummary(t){

  return `
  Dit project betreft een gefaseerde uitvoering waarbij meerdere Planstraßen in volgorde worden gerealiseerd. 
  De uitvoeringsstrategie is afhankelijk van een strakke fasering waarbij werkzaamheden niet gelijktijdig kunnen plaatsvinden.

  Binnen het contract zijn bepalingen opgenomen die invloed hebben op zowel planning als financiële risico’s. 
  Met name het ontbreken van parallelle uitvoering en mogelijke onderbrekingen zorgen voor een verhoogde druk op de doorlooptijd.

  Daarnaast is er sprake van afhankelijkheid van externe partijen, zoals nutsbedrijven, 
  wat extra coördinatie vereist en een verhoogd risico op vertraging met zich meebrengt.

  Vanuit uitvoeringsperspectief vraagt dit project om een gedetailleerde voorbereiding, 
  strakke planning en continue afstemming tussen alle betrokken partijen.

  Conclusie: het project is uitvoerbaar, maar kent duidelijke risico’s die actief gemanaged moeten worden 
  om vertraging en extra kosten te voorkomen.
  `;
}

// ===== MAIN =====
function analyse(){

  let t = lvText.value.toLowerCase();
  if(!t) return;

  let plans = detectPlanstrassen(t);
  let mat = extractMaterials(t);
  let risico = getRisico(t);

  out.innerHTML = `

  <div class="section">
    <h3>Projectanalyse</h3>
    <p>${bigSummary(t)}</p>
  </div>

  <div class="section">
    <h3>Planstraßen</h3>
    ${plans.map(p=>`<div class="card"><b>${p}</b></div>`).join("")}
  </div>

  <div class="section">
    <h3>Risico’s</h3>
    <ul>${risico.r.map(x=>`<li class="high">${x}</li>`).join("")}</ul>

    <h3>Knelpunten</h3>
    <ul>${risico.k.map(x=>`<li class="mid">${x}</li>`).join("")}</ul>
  </div>

  <div class="section">
    <h3>Bestellijst (indicatief)</h3>

    ${Object.entries(mat).map(([k,v])=>`
      <div class="card">
        ${k} → ${v}x
      </div>
    `).join("")}

  </div>

  `;
}

</script>

</body>
</html>
