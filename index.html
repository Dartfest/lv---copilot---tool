<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>LV Analyse PRO++</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body { font-family: Arial; padding:20px; background:#f4f6f8; }
textarea { width:100%; height:200px; font-family:monospace; }
button { padding:8px 14px; margin:6px; }
.box { background:#fff; padding:15px; margin-bottom:15px; border-radius:6px; }
.section { background:#fff; border-left:5px solid #2563eb; padding:15px; margin:10px 0; }
.risk { color:#b91c1c; font-weight:bold; }
</style>
</head>

<body>

<h1>LV Analyse PRO++</h1>

<div class="box">
<input type="file" id="file" accept=".pdf">
<button onclick="leesLV()">Lees PDF</button>
<button onclick="analyse()">Analyse</button>
<button onclick="exportPDF()">Export PDF</button>
<textarea id="lvText"></textarea>
</div>

<div id="result"></div>

<script>

// ===== CONFIG (optioneel AI) =====
// zet hier je OpenAI key als je wil upgraden
const OPENAI_API_KEY = ""; 

// ===== PDF =====
async function leesLV(){
  const f = document.getElementById("file").files[0];
  if(!f) return alert("Kies PDF");

  const buffer = await f.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({data:buffer}).promise;

  let text="";
  for(let i=1;i<=pdf.numPages;i++){
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    content.items.forEach(it => text += it.str + " ");
  }

  document.getElementById("lvText").value = text;
}

// ===== ANALYSE DATA =====
let analyseData = {};

// ===== BASIS ANALYSE =====
function baseAnalyse(text){

  text = text.toLowerCase();

  const werk = [];
  if(text.includes("kanal")) werk.push("Riolering");
  if(text.includes("kabel") || text.includes("leitung")) werk.push("Kabels/leidingen");
  if(text.includes("straße")) werk.push("Infrastructuur");
  if(text.includes("versorgung")) werk.push("Nutsvoorzieningen");

  const beperkingen = [];
  if(text.includes("nicht parallel")) beperkingen.push("Geen parallel werk");
  if(text.includes("ohne unterbrechung")) beperkingen.push("Continu uitvoeren");
  if(text.includes("zeitvorgaben")) beperkingen.push("Strikte planning");

  const afhankelijk = [];
  if(text.includes("drittfirmen")) afhankelijk.push("Derden (nutsbedrijven)");

  const planning = text.match(/(januar|februar|märz|april|mai|juni|juli|august|september|oktober|november|dezember)\s+\d{4}/gi) || [];

  return { werk, beperkingen, afhankelijk, planning };
}

// ===== RISICO ENGINE =====
function buildRisico(data){

  let r=[];

  if(data.beperkingen.length)
    r.push("Beperkingen verhogen planningsdruk en kans op vertraging");

  if(data.afhankelijk.length)
    r.push("Afhankelijkheid van derden vormt grootste uitvoeringsrisico");

  if(data.planning.length > 2)
    r.push("Langlopende planning verhoogt faalkans en afstemmingscomplexiteit");

  if(r.length===0)
    r.push("Algemene uitvoeringsrisico's aanwezig");

  return r;
}

// ===== AI SAMENVATTING =====
async function aiSamenvatting(text){

  if(!OPENAI_API_KEY) return null;

  const res = await fetch("https://api.openai.com/v1/chat/completions",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer "+OPENAI_API_KEY
    },
    body:JSON.stringify({
      model:"gpt-4o-mini",
      messages:[
        {
          role:"system",
          content:"Je bent een civieltechnisch werkvoorbereider. Analyseer dit LV professioneel."
        },
        {
          role:"user",
          content:`Geef een professionele samenvatting + risico analyse:\n\n${text}`
        }
      ]
    })
  });

  const json = await res.json();
  return json.choices[0].message.content;
}

// ===== HOOFD ANALYSE =====
async function analyse(){

  const raw = document.getElementById("lvText").value;
  const out = document.getElementById("result");
  out.innerHTML="Analyseren...";

  const base = baseAnalyse(raw);
  const risico = buildRisico(base);

  let samenvatting = await aiSamenvatting(raw);

  // fallback zonder AI
  if(!samenvatting){
    samenvatting = `
    Dit project omvat werkzaamheden zoals ${base.werk.join(", ")}.
    De uitvoering kent beperkingen (${base.beperkingen.join(", ") || "geen expliciete"}) 
    en afhankelijkheden (${base.afhankelijk.join(", ") || "beperkt"}).
    De planning bevat elementen zoals ${base.planning.join(", ") || "onduidelijk"}.
    Dit vraagt om strakke coördinatie en planning.
    `;
  }

  analyseData = { samenvatting, risico };

  out.innerHTML = `
  <div class="section">
    <h3>Uitgebreide samenvatting</h3>
    <p>${samenvatting}</p>
  </div>

  <div class="section">
    <h3>Risico analyse</h3>
    <ul class="risk">
      ${risico.map(r=>`<li>${r}</li>`).join("")}
    </ul>
  </div>
  `;
}

// ===== PDF =====
function exportPDF(){

  if(!analyseData.samenvatting){
    alert("Eerst analyseren");
    return;
  }

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  let y=15;

  doc.setFontSize(16);
  doc.text("LV Analyse Rapport",10,y);
  y+=10;

  doc.setFontSize(12);
  doc.text("Samenvatting",10,y);
  y+=6;

  const sam = doc.splitTextToSize(analyseData.samenvatting,180);
  doc.text(sam,10,y);
  y += sam.length*5 + 5;

  doc.setTextColor(200,0,0);
  doc.text("Risico's",10,y);
  y+=6;

  analyseData.risico.forEach(r=>{
    doc.text("- "+r,10,y);
    y+=5;
  });

  doc.save("LV_Analyse_Pro.pdf");
}

</script>

</body>
</html>
