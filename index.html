<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>LV Intelligence – Pro Phase Engine</title>

<style>
body { font-family: Arial; margin:0; background:#eef2f7; }
.header { background:#0f172a; color:#fff; padding:15px; font-size:22px; }
.container { padding:20px; }

textarea { width:100%; height:120px; margin-bottom:10px; }

button {
  padding:8px 12px;
  background:#2563eb;
  color:#fff;
  border:none;
  cursor:pointer;
}

.card { background:#fff; padding:12px; border-radius:6px; margin-bottom:10px; }

.high { color:#dc2626; }
.mid { color:#f59e0b; }

.section {
  background:#fff;
  padding:15px;
  margin-top:12px;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="header">LV Intelligence – Pro Phase Engine</div>

<div class="container">

<input type="file" id="pdfFile" accept=".pdf"><br><br>

<textarea id="lvText" placeholder="Plak LV tekst of upload PDF"></textarea>

<button onclick="analyse()">Analyse</button>

<div id="out"></div>

</div>

<script>

// ===== PDF =====
function loadScript(url){
  return new Promise(res=>{
    let s=document.createElement("script");
    s.src=url;
    s.onload=res;
    document.body.appendChild(s);
  });
}

async function handlePDF(file){
  if(typeof pdfjsLib==="undefined"){
    await loadScript("https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js");
  }

  let reader=new FileReader();

  reader.onload=async function(){
    let pdf=await pdfjsLib.getDocument(new Uint8Array(this.result)).promise;
    let text="";

    for(let i=1;i<=pdf.numPages;i++){
      let page=await pdf.getPage(i);
      let c=await page.getTextContent();
      text+=c.items.map(i=>i.str).join(" ")+"\n";
    }

    lvText.value=text;
  };

  reader.readAsArrayBuffer(file);
}

pdfFile.onchange=e=>{
  if(e.target.files[0]) handlePDF(e.target.files[0]);
};

// ===== DATUM =====
const months = {juni:6,juli:7,august:8,mai:5};

function extractDates(t){
  let r=[], m;
  let regex=/(juni|juli|august|mai)\s+(20\d{2})/gi;

  while((m=regex.exec(t))){
    r.push(parseInt(m[2])*12 + months[m[1]]);
  }

  return r;
}

// ===== STRAKKE FASE DETECTIE =====
function detectPlanstrassen(t){

  let matches = t.match(/planstraße\s*[a-z]/gi) || [];

  // uniek maken
  let unique = [...new Set(matches.map(m=>m.toLowerCase()))];

  return unique.map(p=>p.toUpperCase());
}

// ===== TEIL DETECTIE =====
function detectTeil(t, plan){

  let teil = t.match(new RegExp(plan.toLowerCase() + ".*?teil\\s*\\d","gi"));

  if(!teil) return [plan];

  return teil.map((x,i)=>`${plan} - TEIL ${i+1}`);
}

// ===== FASE BOUW =====
function buildPhases(t){

  let plans = detectPlanstrassen(t);
  let phases=[];

  plans.forEach(p=>{
    let delen = detectTeil(t,p);

    delen.forEach(d=>{
      phases.push({ name:d });
    });
  });

  return phases;
}

// ===== DATUM KOPPELING =====
function attachDates(phases,t){

  let dates = extractDates(t);

  return phases.map((p,i)=>{

    let start = dates[i] || dates[0] || 0;
    let end = dates[i+1] || start + 6;

    return {
      ...p,
      start,
      end,
      duur: end - start
    };
  });
}

// ===== RISICO =====
function addRisk(p,t){

  let risico=[];
  let aandacht=[];

  if(t.includes("nicht parallel")){
    risico.push("Gefaseerde uitvoering zonder overlap → langere doorlooptijd");
  }

  if(t.includes("unterbrechung")){
    risico.push("Mogelijke onderbrekingen tussen fases zonder vergoeding");
  }

  if(t.includes("drittfirmen")){
    risico.push("Afhankelijkheid van nutsbedrijven / derden");
    aandacht.push("Strakke coördinatie noodzakelijk met externe partijen");
  }

  if(t.includes("nicht vergütet")){
    risico.push("Werkzaamheden niet afzonderlijk vergoed → financieel risico");
  }

  return {risico,aandacht};
}

// ===== PRO SAMENVATTING =====
function buildSummary(p,t){

  let txt=[];

  txt.push("Deze fase vormt een onderdeel van de gefaseerde uitvoering binnen het project.");

  txt.push("De werkzaamheden zijn gekoppeld aan de voortgang van voorgaande fases en moeten in logische volgorde worden uitgevoerd.");

  if(t.includes("nicht parallel")){
    txt.push("Parallelle uitvoering is contractueel uitgesloten, waardoor deze fase direct invloed heeft op de totale projectduur.");
  }

  if(t.includes("drittfirmen")){
    txt.push("De uitvoering is afhankelijk van derden, wat extra afstemming en risico op vertraging met zich meebrengt.");
  }

  if(t.includes("nicht vergütet")){
    txt.push("Binnen deze fase kunnen werkzaamheden vallen die niet afzonderlijk worden vergoed.");
  }

  txt.push("Succesvolle uitvoering vereist strakke planning, voorbereiding en coördinatie.");

  return txt;
}

// ===== SCORE =====
function calcScore(phases){

  let risico = phases.reduce((a,p)=>a+p.risico.length,0);
  let roi = 100 - (risico * 5);

  let advies="GO", cls="good";
  if(roi<50){advies="NO-GO";cls="high";}
  else if(roi<70){advies="GO MET RISICO";cls="mid";}

  return {risico,roi,advies,cls};
}

// ===== MAIN =====
function analyse(){

  let t = lvText.value.toLowerCase();
  if(!t) return;

  let phases = buildPhases(t);
  phases = attachDates(phases,t);

  phases = phases.map(p=>{
    let r = addRisk(p,t);
    return {...p, ...r};
  });

  let score = calcScore(phases);

  out.innerHTML = `

  <div class="card">
    Risico: <span class="high">${score.risico}</span><br>
    ROI: ${score.roi}%<br>
    Advies: <span class="${score.cls}">${score.advies}</span>
  </div>

  <div class="section">
    <h3>Fase Analyse (Planstraße)</h3>

    ${phases.map(p=>`
      <div class="card">

        <b>${p.name}</b><br>
        Periode: ${p.start} → ${p.end}<br>
        Duur: ${p.duur} mnd

        <br><br>

        <b>Samenvatting</b>
        <ul>
          ${buildSummary(p,t).map(x=>`<li>${x}</li>`).join("")}
        </ul>

        <b>Risico’s</b>
        <ul>
          ${p.risico.map(r=>`<li class="high">${r}</li>`).join("")}
        </ul>

        <b>Aandachtspunten</b>
        <ul>
          ${p.aandacht.map(a=>`<li class="mid">${a}</li>`).join("")}
        </ul>

      </div>
    `).join("")}

  </div>

  `;
}

</script>

</body>
</html>
