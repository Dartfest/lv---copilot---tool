<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LV Copilot Tool – Werkende PDF & Positie‑splitsing</title>

  <!-- PDF.js (CORRECT geladen) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

  <style>
    body { font-family: Arial, sans-serif; background:#f5f7fa; margin:0; padding:16px; }
    h1,h2 { margin-top:0; }
    textarea { width:100%; min-height:180px; padding:10px; font-family:monospace; }
    button { padding:8px 14px; margin:6px 4px; background:#2563eb; color:white; border:none; border-radius:4px; cursor:pointer; }
    button.secondary { background:#6b7280; }
    .box { background:white; padding:14px; border-radius:6px; margin-bottom:16px; }
    .risk-red { background:#fee2e2; border-left:6px solid #dc2626; padding:8px; margin-bottom:6px; }
    .risk-orange { background:#ffedd5; border-left:6px solid #ea580c; padding:8px; margin-bottom:6px; }
    .risk-green { background:#dcfce7; border-left:6px solid #16a34a; padding:8px; margin-bottom:6px; }
    .small { font-size:12px; color:#555; }
  </style>
</head>
<body>

<h1>LV Copilot Tool</h1>
<p class="small">PDF lezen ✅ | Positie‑splitsing ✅ | Risico per positie ✅</p>

<!-- 1. PDF upload -->
<div class="box">
  <h2>1. LV PDF</h2>
  <input type="file" id="fileInput" accept=".pdf" />
  <button class="secondary" onclick="readPDF()">PDF lezen</button>
</div>

<!-- 2. LV tekst -->
<div class="box">
  <h2>2. LV‑tekst</h2>
  <textarea id="lvtext" placeholder="LV‑tekst verschijnt hier..."></textarea>
  <br/>
  <button class="secondary" onclick="splitPerPositie()">Splits per positie</button>
</div>

<!-- 3. Risico per positie -->
<div class="box">
  <h2>3. Risico’s per positie</h2>
  <div id="riskOutput"></div>
  <button class="secondary" onclick="detectRisksPerPositie()">Risico’s analyseren</button>
</div>

<script>
  // PDF.js worker
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  const fileInput = document.getElementById('fileInput');
  const lvtext = document.getElementById('lvtext');
  const riskOutput = document.getElementById('riskOutput');

  async function readPDF() {
    if (!fileInput.files[0]) {
      alert('Geen PDF gekozen');
      return;
    }

    const reader = new FileReader();
    reader.onload = async () => {
      const pdf = await pdfjsLib
        .getDocument(new Uint8Array(reader.result)).promise;

      let text = '';
      for (let i = 1; i <= pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const content = await page.getTextContent();
        text += '\n=== PAGINA ' + i + ' ===\n' +
                content.items.map(item => item.str).join(' ');
      }
      lvtext.value = text;
    };

    reader.readAsArrayBuffer(fileInput.files[0]);
  }

  /* POSITIE SPLITSING (stabiel) */
  function splitPerPositie() {
    const regex = /(Pos\.?\s*\d+(?:\.\d+)*)\s*([\s\S]*?)(?=Pos\.?\s*\d+(?:\.\d+)*|$)/gi;
    let result = '';
    let match;

    while ((match = regex.exec(lvtext.value)) !== null) {
      result += '\n--- ' + match[1] + ' ---\n' + match[2].trim() + '\n';
    }

    if (!result) {
      alert('Geen posities gevonden');
      return;
    }

    lvtext.value = result.trim();
  }

  function detectRisksPerPositie() {
    riskOutput.innerHTML = '';
    const blocks = lvtext.value.split(/---\s*Pos/).filter(Boolean);

    blocks.forEach(block => {
      const lines = block.split('\n');
      const pos = 'Pos' + lines[0];
      const t = block.toLowerCase();

      let risks = [];
      let css = 'risk-green';

      if (t.includes('freigabe') || t.includes('sonder')) {
        risks.push('AG‑freigabe / Sonderpositie');
        css = 'risk-red';
      } else if (t.includes('statik') || t.includes('nachweis')) {
        risks.push('Technische eisen / documentatie');
        css = 'risk-orange';
      } else {
        risks.push('Geen bijzonder risico');
      }

      const div = document.createElement('div');
      div.className = css;
      div.innerHTML = `<strong>${pos}</strong><br>${risks.join('<br>')}`;
      riskOutput.appendChild(div);
    });
  }
</script>

</body>
</html>
