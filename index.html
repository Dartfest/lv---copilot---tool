<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>LV AI Contract Expert (VOB)</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>
body { font-family: Arial; padding:20px; background:#f4f6f8; }
textarea { width:100%; height:180px; }
button { padding:8px 12px; margin:6px; }

.section { background:#fff; padding:15px; margin:10px 0; border-left:5px solid #2563eb; }

.risk { color:#b91c1c; font-weight:bold; }
.warn { color:#f59e0b; }
</style>
</head>

<body>

<h1>LV AI Contract Expert (VOB)</h1>

<input type="file" id="file">
<button onclick="leesLV()">Lees PDF</button>
<button onclick="analyse()">Analyse</button>

<br><br>
<label>API Key:</label>
<input type="password" id="apiKey" placeholder="OpenAI API key">

<textarea id="lvText"></textarea>

<div id="result"></div>

<script>

// ===== PDF =====
async function leesLV(){
  const f = document.getElementById("file").files[0];
  if(!f) return alert("Kies PDF");

  const buffer = await f.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({data:buffer}).promise;

  let text="";
  for(let i=1;i<=pdf.numPages;i++){
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    content.items.forEach(it => text += it.str + " ");
  }

  document.getElementById("lvText").value = text;
}

// ===== FALLBACK (zonder AI) =====
function fallbackAnalyse(text){

  let risico=[];

  const t=text.toLowerCase();

  if(t.includes("nicht vergütet"))
    risico.push("Kosten niet vergoed (mogelijk §2 VOB/B risico)");

  if(t.includes("nicht parallel"))
    risico.push("Geen parallel werk → planning risico");

  if(t.includes("drittfirmen"))
    risico.push("Afhankelijkheid derden → §6 VOB/B risico");

  return `
  <h3>Fallback analyse (zonder AI)</h3>
  <ul class="risk">${risico.map(r=>`<li>${r}</li>`).join("")}</ul>
  `;
}

// ===== AI ANALYSE =====
async function aiAnalyse(text, apiKey){

  const prompt = `
Analyseer onderstaande LV tekst als juridisch expert conform VOB/B.

BELANGRIJK:
- Geen aannames maken
- Alleen analyseren wat expliciet of logisch volgt uit tekst
- Benoem onzekerheden expliciet

STRUCTUUR:

1. Samenvatting (uitgebreid)
2. Contractanalyse (VOB):
   - §2 Vergoeding / meerwerk
   - §4 Uitvoering
   - §6 Hinder / vertraging
   - §8 Beëindiging (indien relevant)
3. Risico's:
   - contractueel
   - planning
   - uitvoering
   - omgeving
4. Aandachtspunten aannemer
5. Conclusie

TEKST:
${text}
`;

  const res = await fetch("https://api.openai.com/v1/chat/completions",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer " + apiKey
    },
    body: JSON.stringify({
      model:"gpt-4o-mini",
      messages:[{role:"user", content:prompt}],
      temperature:0.2
    })
  });

  const data = await res.json();

  return data.choices[0].message.content;
}

// ===== MAIN =====
async function analyse(){

  const text = document.getElementById("lvText").value;
  const apiKey = document.getElementById("apiKey").value;

  if(!apiKey){
    document.getElementById("result").innerHTML = fallbackAnalyse(text);
    return;
  }

  document.getElementById("result").innerHTML = "AI analyse bezig...";

  try{
    const result = await aiAnalyse(text, apiKey);

    document.getElementById("result").innerHTML = `
    <div class="section">${result.replace(/\n/g,"<br>")}</div>
    `;

  }catch(e){
    document.getElementById("result").innerHTML = "Fout bij AI analyse.";
  }
}

</script>

</body>
</html>
