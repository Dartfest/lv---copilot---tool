<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>LV – Planstraße analyse</title>

  <!-- pdf.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      padding: 20px;
    }
    textarea {
      width: 100%;
      min-height: 240px;
      font-family: monospace;
      white-space: pre-wrap;
    }
    button {
      padding: 6px 12px;
      margin: 6px 0;
    }
    .box {
      background: #ffffff;
      padding: 16px;
      border-radius: 6px;
      margin-bottom: 16px;
    }
    .plan {
      border-left: 4px solid #2563eb;
      background: #eff6ff;
      padding: 10px;
      margin: 10px 0;
    }
    .muted {
      color: #666;
      font-size: 0.9em;
    }
  </style>
</head>

<body>

<h1>LV – Planstraße analyse</h1>

<div class="box">
  <input type="file" id="file" accept=".pdf"><br>
  <button onclick="leesLV()">Lees LV</button>
  <textarea id="lvText" placeholder="LV-tekst verschijnt hier..."></textarea>
</div>

<div class="box">
  <button onclick="analyse()">Analyseer Planstraßen</button>
  <div id="result"></div>
</div>

<script>
async function leesLV() {
  const f = document.getElementById("file").files[0];
  if (!f) {
    alert("Kies eerst een PDF");
    return;
  }

  const buffer = await f.arrayBuffer();

  const pdf = await pdfjsLib.getDocument({
    data: buffer,
    disableWorker: true
  }).promise;

  let text = "";
  for (let i = 1; i <= pdf.numPages; i++) {
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    for (const item of content.items) {
      text += item.str + "\n";
    }
    text += "\n";
  }

  document.getElementById("lvText").value =
    text || "[Geen leesbare tekst gevonden]";
}

function analyse() {
  const text = document.getElementById("lvText").value;
  const out = document.getElementById("result");
  out.innerHTML = "";

  if (!text.trim()) {
    out.textContent = "Geen LV‑tekst beschikbaar.";
    return;
  }

  const planRegex = /Planstra(ß|ss)e[\s\u00A0]+([A-Z])/gi;
  const periodeRegex =
    /(\d{1,2}[.\-]\d{1,2}[.\-]\d{4}).*?(bis|–|-|t\/m).*?(\d{1,2}[.\-]\d{1,2}[.\-]\d{4})/gi;

  const data = {};
  let m;

  while ((m = planRegex.exec(text)) !== null) {
    const plan = "Planstraße " + m[2];
    if (!data[plan]) {
      data[plan] = { periodes: [], start: null, end: null };
    }

    const fragment = text.substring(m.index, m.index + 1200);
    let p;
    while ((p = periodeRegex.exec(fragment)) !== null) {
      data[plan].periodes.push(p[0]);

      const s = new Date(p[1].split(/[.\-]/).reverse().join("-"));
      const e = new Date(p[3].split(/[.\-]/).reverse().join("-"));

      if (!data[plan].start || s < data[plan].start) data[plan].start = s;
      if (!data[plan].end || e > data[plan].end) data[plan].end = e;
    }
  }

  Object.keys(data).forEach((p, i) => {
    const d = data[p];
    const div = document.createElement("div");
    div.className = "plan";

    const periode =
      d.start && d.end
        ? `<p><strong>Periode:</strong> ${d.start.toLocaleDateString()} t/m ${d.end.toLocaleDateString()}</p>`
        : `<p class="muted">Geen exact tijdvak in LV vermeld</p>`;

    div.innerHTML = `
      <strong>${i + 1}. ${p}</strong>
      ${periode}
      ${d.periodes.length ? `<ul>${d.periodes.map(x => `<li>${x}</li>`).join("")}</ul>` : ""}
    `;

    out.appendChild(div);
  });
}
</script>

</body>
</html>
