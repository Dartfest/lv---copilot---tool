<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>LV Planning Engine</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>
body { font-family: Arial; padding:20px; background:#f4f6f8; }
textarea { width:100%; height:180px; }
button { padding:8px 14px; margin:6px; }
.box { background:#fff; padding:15px; margin-bottom:15px; border-radius:6px; }

.gantt { margin-top:20px; }
.row { margin:8px 0; }
.bar {
  height:20px;
  background:#2563eb;
  display:inline-block;
  border-radius:4px;
}
.critical {
  background:#b91c1c;
}
.label { display:inline-block; width:220px; }

</style>
</head>

<body>

<h1>LV Planning Engine (Datum + Kritieke Pad)</h1>

<div class="box">
<input type="file" id="file" accept=".pdf">
<button onclick="leesLV()">Lees PDF</button>
<button onclick="analyse()">Analyse Planning</button>
<textarea id="lvText"></textarea>
</div>

<div id="result"></div>

<script>

// ===== PDF =====
async function leesLV(){
  const f = document.getElementById("file").files[0];
  if(!f) return alert("Kies PDF");

  const buffer = await f.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({data:buffer}).promise;

  let text="";
  for(let i=1;i<=pdf.numPages;i++){
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    content.items.forEach(it => text += it.str + " ");
  }

  document.getElementById("lvText").value = text;
}

// ===== DATUM PARSE =====
const maandMap = {
  januar:0,februar:1,märz:2,april:3,mai:4,juni:5,
  juli:6,august:7,september:8,oktober:9,november:10,dezember:11
};

function parseMaand(match){
  return new Date(match[2], maandMap[match[1]], 1);
}

// ===== ANALYSE =====
function analyse(){

  const text = document.getElementById("lvText").value.toLowerCase();

  // ===== FASES =====
  let fases = [];
  let regex = /(\d+)\.\s*bauabschnitt/gi;
  let m;

  while((m = regex.exec(text))){
    fases.push({
      naam: "Fase " + m[1],
      start:null,
      end:null
    });
  }

  if(fases.length === 0){
    fases.push({naam:"Project", start:null, end:null});
  }

  // ===== DATUMS =====
  let maandRegex = /(januar|februar|märz|april|mai|juni|juli|august|september|oktober|november|dezember)\s+(20\d{2})/gi;
  let dates = [];
  let d;

  while((d = maandRegex.exec(text))){
    dates.push(parseMaand(d));
  }

  dates.sort((a,b)=>a-b);

  // ===== VERDELEN OVER FASES =====
  fases.forEach((f,i)=>{
    f.start = dates[i] || null;
    f.end = dates[i+1] || null;
  });

  // ===== MIN/MAX =====
  const validDates = dates.filter(d=>d);
  const minDate = validDates[0];
  const maxDate = validDates[validDates.length-1];

  const totalDays = (maxDate - minDate) / (1000*60*60*24);

  // ===== CRITICAL PATH =====
  const sequential = text.includes("nicht parallel");

  // ===== GANTT =====
  let html = "<div class='gantt'>";

  fases.forEach(f=>{

    if(!f.start || !f.end) return;

    const startOffset = (f.start - minDate) / (1000*60*60*24);
    const duration = (f.end - f.start) / (1000*60*60*24);

    const left = (startOffset / totalDays) * 100;
    const width = (duration / totalDays) * 100;

    html += `
    <div class="row">
      <span class="label">${f.naam}</span>
      <div class="bar ${sequential ? 'critical' : ''}"
           style="margin-left:${left}%; width:${width}%"></div>
    </div>
    `;
  });

  html += "</div>";

  // ===== OUTPUT =====
  document.getElementById("result").innerHTML = `
  <h3>Planning (Gantt)</h3>
  ${html}
  <p><b>Kritieke pad:</b> ${sequential ? "Ja (lineair project)" : "Onbekend / parallel mogelijk"}</p>
  `;
}

</script>

</body>
</html>
