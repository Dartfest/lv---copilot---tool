<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>LV – Planstraße volgorde & tijdvakken</title>

  <!-- ✅ PDF.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
  </script>

  <style>
    body { font-family: Arial, sans-serif; background:#f4f6f8; padding:20px; }
    textarea { width:100%; min-height:220px; font-family:monospace; white-space:pre-wrap; }
    button { padding:6px 12px; margin:6px 0; }
    .box { background:#fff; padding:16px; border-radius:6px; margin-bottom:16px; }
    .plan {
      border-left:4px solid #2563eb;
      background:#eff6ff;
      padding:10px;
      margin:10px 0;
    }
    .muted { color:#666; }
  </style>
</head>

<body>

<h1>LV – Planstraße volgorde & tijdvakken</h1>

<div class="box">
  <h2>1. LV lezen</h2>
  <input type="file" id="file" accept=".pdf"><br>
  <button onclick="leesLV()">Lees LV</button>
  <textarea id="lvText" placeholder="LV‑tekst verschijnt hier..."></textarea>
</div>

<div class="box">
  <h2>2. Analyse & volgorde</h2>
  <button onclick="analyse()">Analyseer Planstraßen</button>
  <div id="resultaat"></div>
</div>

<script>
/* -------- LV LEZEN -------- */
async function leesLV() {
  const f = document.getElementById("file").files[0];
  if (!f) { alert("Kies eerst een PDF"); return; }

  const buf = await f.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: buf }).promise;

  let text = "";
  for (let p = 1; p <= pdf.numPages; p++) {
    const page = await pdf.getPage(p);
    const content = await page.getTextContent();
    for (const item of content.items) {
      text += item.str + "\n";
    }
    text += "\n";
  }
  document.getElementById("lvText").value = text;
}

/* -------- HULPFUNCTIE: datum parsen -------- */
function parseDatum(str) {
  // verwacht: dd.mm.jjjj of dd-mm-jjjj
  const m = str.match(/(\d{1,2})[.\-](\d{1,2})[.\-](\d{4})/);
  if (!m) return null;
  return new Date(m[3], m[2] - 1, m[1]);
}

/* -------- ANALYSE -------- */
function analyse() {
  const text = document.getElementById("lvText").value;
  const out = document.getElementById("resultaat");
  out.innerHTML = "";

  if (!text.trim()) {
    out.textContent = "Geen LV‑tekst beschikbaar.";
    return;
  }

  // Planstraße (ß en ss + PDF‑spaties)
  const planRegex = /Planstra(ß|ss)e[\s\u00A0]+([A-Z])/gi;

  // Tijdvakken
  const dateRangeRegex =
    /(\d{1,2}[.\-]\d{1,2}[.\-]\d{4}).*?(bis|t\/m|-).*?(\d{1,2}[.\-]\d{1,2}[.\-]\d{4})/gi;

  const data = {};
  let m;

  while ((m = planRegex.exec(text)) !== null) {
    const plan = "Planstraße " + m[2];
    if (!data[plan]) {
      data[plan] = {
        ranges: [],
        start: null,
        end: null
      };
    }

    const frag = text.substring(m.index, m.index + 1500);
    let d;
    while ((d = dateRangeRegex.exec(frag)) !== null) {
      const start = parseDatum(d[1]);
      const end   = parseDatum(d[3]);
      if (start && end) {
        data[plan].ranges.push(`${d[1]} t/m ${d[3]}`);
        if (!data[plan].start || start < data[plan].start) data[plan].start = start;
        if (!data[plan].end   || end   > data[plan].end)   data[plan].end   = end;
      }
    }
  }

  // sorteren
  const sorted = Object.keys(data).sort((a,b) => {
    if (!data[a].start && !data[b].start) return a.localeCompare(b);
    if (!data[a].start) return 1;
    if (!data[b].start) return -1;
    return data[a].start - data[b].start;
  });

  if (!sorted.length) {
    out.textContent = "Geen Planstraßen gevonden.";
    return;
  }

  sorted.forEach((p, i) => {
    const d = data[p];
    const div = document.createElement("div");
    div.className = "plan";

    const periode = d.ranges.length
      ? d.ranges.map(r => `<li>${r}</li>`).join("")
      : `<li class="muted">Geen tijdvak in LV vermeld</li>`;

    div.innerHTML = `
      <strong>${i+1}. ${p}</strong>
      <ul>${periode}</ul>
    `;
    out.appendChild(div);
  });
}
</script>

</body>
</html>
