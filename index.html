<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Machine-uren Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .dashboard {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,.1);
    }

    canvas {
      max-height: 350px;
    }

    footer {
      text-align: center;
      margin-top: 40px;
      color: #666;
      font-size: 14px;
    }
  </style>
</head>

<body>

<h1>📊 Machine-uren Dashboard</h1>

<div class="dashboard">

  <div class="card">
    <h2>Uren per kostenplaats</h2>
    <canvas id="kostenplaatsChart"></canvas>
  </div>

  <div class="card">
    <h2>Uren per Geräteart</h2>
    <canvas id="geraeteartChart"></canvas>
  </div>

  <div class="card">
    <h2>Uren & kosten per kalenderweek</h2>
    <canvas id="weekChart"></canvas>
  </div>

</div>

<footer>
  Automatisch gegenereerd via GitHub Actions
</footer>

<script>
fetch('output/dashboard_data.json')
  .then(response => response.json())
  .then(data => {

    /* ===== Uren per Kostenplaats ===== */
    new Chart(document.getElementById('kostenplaatsChart'), {
      type: 'bar',
      data: {
        labels: data.uren_per_kostenplaats.map(d => d.Kostenplaats),
        datasets: [{
          label: 'Uren',
          data: data.uren_per_kostenplaats.map(d => d.Tijd),
          backgroundColor: '#4e79a7'
        }]
      }
    });

    /* ===== Uren per Geräteart ===== */
    new Chart(document.getElementById('geraeteartChart'), {
      type: 'bar',
      data: {
        labels: data.uren_per_geraeteart.map(d => d.Geräteart),
        datasets: [{
          label: 'Uren',
          data: data.uren_per_geraeteart.map(d => d.Tijd),
          backgroundColor: '#59a14f'
        }]
      }
    });

    /* ===== Uren & Kosten per Week ===== */
    new Chart(document.getElementById('weekChart'), {
      type: 'line',
      data: {
        labels: data.per_kalenderweek.map(d => d.Kalenderweek),
        datasets: [
          {
            label: 'Uren',
            data: data.per_kalenderweek.map(d => d.Tijd),
            borderColor: '#e15759',
            yAxisID: 'y'
          },
          {
            label: 'Kosten',
            data: data.per_kalenderweek.map(d => d.Kosten),
            borderColor: '#76b7b2',
            yAxisID: 'y1'
          }
        ]
      },
      options: {
        scales: {
          y: {
            position: 'left',
            title: { display: true, text: 'Uren' }
          },
          y1: {
            position: 'right',
            title: { display: true, text: 'Kosten (€)' },
            grid: { drawOnChartArea: false }
          }
        }
      }
    });

  });
</script>

</body>
</html>
