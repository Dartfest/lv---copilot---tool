<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>LV Analyse PRO MAX</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body { font-family: Arial; padding:20px; background:#f4f6f8; }
textarea { width:100%; height:200px; font-family:monospace; }
button { padding:8px 14px; margin:6px; }
.box { background:#fff; padding:15px; margin-bottom:15px; border-radius:6px; }
.section { background:#fff; border-left:5px solid #2563eb; padding:15px; margin:10px 0; }
.risk { color:#b91c1c; font-weight:bold; }
</style>
</head>

<body>

<h1>LV Analyse PRO MAX</h1>

<div class="box">
<input type="file" id="file" accept=".pdf">
<button onclick="leesLV()">Lees PDF</button>
<button onclick="analyse()">Analyse</button>
<button onclick="exportPDF()">Export PDF</button>
<textarea id="lvText"></textarea>
</div>

<div id="result"></div>

<script>

// ================= PDF =================
async function leesLV(){
  const f = document.getElementById("file").files[0];
  if(!f) return alert("Kies PDF");

  const buffer = await f.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({data:buffer}).promise;

  let text="";
  for(let i=1;i<=pdf.numPages;i++){
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    content.items.forEach(it => text += it.str + " ");
  }

  document.getElementById("lvText").value = text;
}

// ================= ANALYSE =================
let analyseData = {};

function analyse(){

  const raw = document.getElementById("lvText").value;
  const text = raw.toLowerCase();

  const out = document.getElementById("result");

  // ===== WERK =====
  let werk = [];
  if(text.includes("kanal")) werk.push("riolering");
  if(text.includes("kabel") || text.includes("leitung")) werk.push("kabels en leidingen");
  if(text.includes("straße")) werk.push("infrastructuur en bouwwegen");
  if(text.includes("versorgung")) werk.push("nutsvoorzieningen");

  // ===== FASERING =====
  let fases = [];
  let regex = /(\d+)\.\s*bauabschnitt.*?planstraße\s+([a-z])/gi;
  let m;
  while((m=regex.exec(text))){
    fases.push(`fase ${m[1]} (${m[2].toUpperCase()})`);
  }

  // ===== PLANNING =====
  let planning = text.match(/(juni|juli|august|mai|april|märz|februar|januar)\s+\d{4}/gi) || [];

  // ===== BEPERKINGEN =====
  let beperkingen = [];
  if(text.includes("nicht parallel")) beperkingen.push("geen parallel werk toegestaan");
  if(text.includes("ohne unterbrechung")) beperkingen.push("continue uitvoering vereist");
  if(text.includes("zeitvorgaben")) beperkingen.push("strikte tijdseisen");

  // ===== AFHANKELIJK =====
  let afhankelijk = [];
  if(text.includes("drittfirmen")) afhankelijk.push("nutsbedrijven / derden");
  if(text.includes("koord") || text.includes("abstimmung")) afhankelijk.push("coördinatie tussen partijen");

  // ===== CONTRACT =====
  let contract = [];

  if(text.includes("nicht vergütet"))
    contract.push("kosten voor onderbrekingen of extra werkzaamheden worden niet vergoed");

  if(text.includes("einzuplanen"))
    contract.push("aannemer verantwoordelijk voor planning en middelen");

  if(text.includes("verbindlich"))
    contract.push("bindende planning vereist");

  if(text.includes("abstimmung"))
    contract.push("verplichte afstemming met opdrachtgever en derden");

  // ===== RISICO =====
  let risico = {
    planning: [],
    contract: [],
    uitvoering: [],
    omgeving: []
  };

  if(beperkingen.length)
    risico.planning.push("beperkingen zorgen voor verhoogde planningsdruk");

  if(planning.length > 2)
    risico.planning.push("lange doorlooptijd verhoogt risico op vertraging");

  if(contract.length)
    risico.contract.push("contract legt risico’s grotendeels bij aannemer");

  if(contract.some(c=>c.includes("niet")))
    risico.contract.push("kostenrisico door niet-vergoede posten");

  if(afhankelijk.length)
    risico.omgeving.push("afhankelijkheid van derden kan planning verstoren");

  if(beperkingen.includes("geen parallel werk toegestaan"))
    risico.uitvoering.push("fasering verlengt uitvoeringstijd");

  if(afhankelijk.length)
    risico.uitvoering.push("intensieve coördinatie vereist op bouwplaats");

  // ===== SAMENVATTING (UITGEBREID!) =====
  let samenvatting = `
  Het voorliggende bestek betreft civieltechnische werkzaamheden bestaande uit ${werk.join(", ") || "diverse infrastructurele werkzaamheden"}.

  De uitvoering ${fases.length ? "is opgeknipt in meerdere fasen (" + fases.join(", ") + ")" : "kent geen expliciet benoemde fasering"}, wat directe invloed heeft op de uitvoeringsstrategie en planning.

  De in het bestek genoemde planning bevat referenties naar ${planning.join(", ") || "geen duidelijke tijdsaanduidingen"}, hetgeen duidt op ${planning.length ? "een gefaseerde en tijdsgebonden uitvoering" : "een globaal beschreven uitvoeringsperiode"}.

  Binnen het project gelden belangrijke randvoorwaarden zoals ${beperkingen.join(", ") || "beperkte expliciete beperkingen"}, waardoor de uitvoeringsvrijheid van de aannemer wordt ingeperkt.

  Tevens is sprake van afhankelijkheden ten aanzien van ${afhankelijk.join(", ") || "beperkte externe partijen"}, wat betekent dat de voortgang mede wordt bepaald door derden en externe invloeden.

  Vanuit contractueel perspectief wordt duidelijk dat ${contract.length ? contract.join(", ") : "de verantwoordelijkheid grotendeels bij de aannemer ligt"}, hetgeen impliceert dat risico’s op het gebied van planning, kosten en uitvoering niet of slechts beperkt worden gecompenseerd.

  De combinatie van fasering, afhankelijkheden en contractuele verplichtingen maakt dat het project een hoge mate van coördinatie, planning en risicobeheersing vereist. De aannemer dient rekening te houden met beperkte flexibiliteit in uitvoering en verhoogde kans op verstoringen.
  `;

  analyseData = { samenvatting, risico };

  // ===== OUTPUT =====
  out.innerHTML = `
  <div class="section">
    <h3>Uitgebreide samenvatting</h3>
    <p>${samenvatting}</p>
  </div>

  <div class="section">
    <h3>Risico analyse</h3>

    <b>Planning</b>
    <ul class="risk">${risico.planning.map(r=>`<li>${r}</li>`).join("")}</ul>

    <b>Contract</b>
    <ul class="risk">${risico.contract.map(r=>`<li>${r}</li>`).join("")}</ul>

    <b>Uitvoering</b>
    <ul class="risk">${risico.uitvoering.map(r=>`<li>${r}</li>`).join("")}</ul>

    <b>Omgeving</b>
    <ul class="risk">${risico.omgeving.map(r=>`<li>${r}</li>`).join("")}</ul>

  </div>
  `;
}

// ================= PDF =================
function exportPDF(){

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  let y=15;

  doc.setFontSize(16);
  doc.text("LV Analyse Rapport",10,y);
  y+=10;

  doc.setFontSize(10);
  const lines = doc.splitTextToSize(analyseData.samenvatting,180);
  doc.text(lines,10,y);
  y += lines.length*5 + 10;

  doc.setTextColor(200,0,0);
  doc.text("Risico's",10,y);
  y+=6;

  Object.values(analyseData.risico).forEach(arr=>{
    arr.forEach(r=>{
      doc.text("- "+r,10,y);
      y+=5;
    });
  });

  doc.save("LV_Analyse_MAX.pdf");
}

</script>

</body>
</html>
