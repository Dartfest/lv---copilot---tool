<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>LV Intelligence – Multi Project Dashboard</title>

<style>
body { font-family: Arial; margin:0; background:#eef2f7; }
.header { background:#0f172a; color:#fff; padding:15px; font-size:22px; }
.container { padding:20px; }

textarea { width:100%; height:120px; margin-bottom:10px; }

button {
  padding:8px 12px;
  background:#2563eb;
  color:#fff;
  border:none;
  cursor:pointer;
  margin:3px;
}

.card { background:#fff; padding:10px; border-radius:6px; margin-bottom:8px; }

.high { color:#dc2626; }
.mid { color:#f59e0b; }
.good { color:#16a34a; }

.section {
  background:#fff;
  padding:15px;
  margin-top:12px;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="header">LV Intelligence – Multi Project</div>

<div class="container">

<input type="text" id="projectName" placeholder="Project naam">
<textarea id="lvText" placeholder="Plak LV tekst"></textarea>

<button onclick="analyse()">Analyse</button>
<button onclick="saveProject()">Opslaan</button>

<div id="out"></div>

<div class="section">
  <h3>Opgeslagen projecten</h3>
  <div id="projectList"></div>
</div>

<div class="section">
  <h3>Vergelijking</h3>
  <div id="compare"></div>
</div>

</div>

<script>

// ===== STORAGE =====
function getProjects(){
  return JSON.parse(localStorage.getItem("projects") || "[]");
}

function saveProjects(p){
  localStorage.setItem("projects", JSON.stringify(p));
}

// ===== ANALYSE CORE =====
function analyseCore(text){

  let risicoCount = 0;

  if(text.includes("nicht vergütet")) risicoCount+=2;
  if(text.includes("unterbrechung")) risicoCount+=2;
  if(text.includes("nicht parallel")) risicoCount+=1;
  if(text.includes("drittfirmen")) risicoCount+=1;

  let fases = (text.match(/bauabschnitt/gi) || []).length;

  let roi = 100 - (risicoCount * 10);

  let advies = "GO";
  let cls="good";

  if(roi < 50){ advies="NO-GO"; cls="high"; }
  else if(roi < 70){ advies="GO MET RISICO"; cls="mid"; }

  return {
    fases,
    risico:risicoCount,
    roi,
    advies,
    cls
  };
}

// ===== UI ANALYSE =====
let lastAnalysis = null;

function analyse(){

  let text = lvText.value.toLowerCase();
  if(!text) return;

  let res = analyseCore(text);
  lastAnalysis = res;

  out.innerHTML = `
    <div class="card">
      Fases: ${res.fases}<br>
      Risico: <span class="high">${res.risico}</span><br>
      ROI: ${res.roi}%<br>
      Advies: <span class="${res.cls}">${res.advies}</span>
    </div>
  `;
}

// ===== OPSLAAN =====
function saveProject(){

  if(!lastAnalysis){
    alert("Eerst analyseren");
    return;
  }

  let name = projectName.value || "Project";

  let projects = getProjects();

  projects.push({
    name,
    ...lastAnalysis
  });

  saveProjects(projects);

  renderProjects();
}

// ===== LIJST =====
function renderProjects(){

  let projects = getProjects();

  projectList.innerHTML = projects.map((p,i)=>`
    <div class="card">
      <b>${p.name}</b><br>
      ROI: ${p.roi}% |
      <span class="${p.cls}">${p.advies}</span>
      <br>
      <button onclick="addCompare(${i})">Vergelijk</button>
    </div>
  `).join("");
}

// ===== VERGELIJK =====
let compareList = [];

function addCompare(i){
  compareList.push(getProjects()[i]);
  renderCompare();
}

function renderCompare(){

  if(compareList.length===0){
    compare.innerHTML="Geen selectie";
    return;
  }

  compare.innerHTML = `
  <table border="1" cellpadding="5">
    <tr>
      <th>Project</th>
      <th>Fases</th>
      <th>Risico</th>
      <th>ROI</th>
      <th>Advies</th>
    </tr>

    ${compareList.map(p=>`
      <tr>
        <td>${p.name}</td>
        <td>${p.fases}</td>
        <td class="high">${p.risico}</td>
        <td>${p.roi}%</td>
        <td class="${p.cls}">${p.advies}</td>
      </tr>
    `).join("")}

  </table>
  `;
}

// INIT
renderProjects();

</script>

</body>
</html>
