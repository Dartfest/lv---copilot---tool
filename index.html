<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>LV Analyse PRO (Tender Tool)</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body { font-family: Arial; padding:20px; background:#f4f6f8; }
textarea { width:100%; height:200px; font-family:monospace; }
button { padding:8px 14px; margin:6px; }
.box { background:#fff; padding:15px; margin-bottom:15px; border-radius:6px; }
.section { background:#fff; border-left:5px solid #2563eb; padding:15px; margin:10px 0; }
.risk { color:#b91c1c; font-weight:bold; }
h3 { margin-top:0; }
</style>
</head>

<body>

<h1>LV Analyse PRO (Tenderniveau)</h1>

<div class="box">
<input type="file" id="file" accept=".pdf">
<button onclick="leesLV()">Lees PDF</button>
<button onclick="analyse()">Analyse</button>
<button onclick="exportPDF()">Export PDF</button>
<textarea id="lvText"></textarea>
</div>

<div id="result"></div>

<script>

// ===== OPTIONELE AI =====
const OPENAI_API_KEY = ""; // optioneel

// ===== PDF INLEZEN =====
async function leesLV(){
  const f = document.getElementById("file").files[0];
  if(!f) return alert("Kies PDF");

  const buffer = await f.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({data:buffer}).promise;

  let text="";
  for(let i=1;i<=pdf.numPages;i++){
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    content.items.forEach(it => text += it.str + " ");
  }

  document.getElementById("lvText").value = text;
}

// ===== ANALYSE DATA =====
let analyseData = {};

// ===== BASIS DETECTIE =====
function analyseTekst(text){

  text = text.toLowerCase();

  const werk = [];
  if(text.includes("kanal")) werk.push("Riolering");
  if(text.includes("kabel") || text.includes("leitung")) werk.push("Kabels en leidingen");
  if(text.includes("straße")) werk.push("Infrastructuur / bouwwegen");
  if(text.includes("versorgung")) werk.push("Nutsvoorzieningen");

  const planning = text.match(/(januar|februar|märz|april|mai|juni|juli|august|september|oktober|november|dezember)\s+\d{4}/gi) || [];

  const fasering = [];
  const faseRegex = /(\d+)\.\s*bauabschnitt.*?planstraße\s+([a-z])/gi;
  let m;
  while((m=faseRegex.exec(text))){
    fasering.push(`Fase ${m[1]} - Planstraße ${m[2].toUpperCase()}`);
  }

  const beperkingen = [];
  if(text.includes("nicht parallel")) beperkingen.push("Geen parallel werk toegestaan");
  if(text.includes("ohne unterbrechung")) beperkingen.push("Continu uitvoeren verplicht");
  if(text.includes("zeitvorgaben")) beperkingen.push("Strikte tijdseisen");

  const afhankelijk = [];
  if(text.includes("drittfirmen")) afhankelijk.push("Derden (nutsbedrijven)");
  if(text.includes("koord") || text.includes("abstimmung")) afhankelijk.push("Coördinatie tussen partijen vereist");

  const contract = [];
  if(text.includes("nicht vergütet")) contract.push("Kosten niet apart vergoed");
  if(text.includes("einzuplanen")) contract.push("Aannemer draagt planningsverantwoordelijkheid");
  if(text.includes("verbindlich")) contract.push("Bindende planning vereist");

  return { werk, planning, fasering, beperkingen, afhankelijk, contract };
}

// ===== RISICO ENGINE =====
function analyseRisico(data){

  let r = {
    planning: [],
    contract: [],
    uitvoering: [],
    omgeving: []
  };

  if(data.beperkingen.length)
    r.planning.push("Beperkingen zorgen voor verhoogde planningsdruk");

  if(data.planning.length > 2)
    r.planning.push("Langdurige planning verhoogt kans op vertraging");

  if(data.contract.length)
    r.contract.push("Contract legt risico’s bij aannemer");

  if(data.contract.some(c => c.includes("niet")))
    r.contract.push("Kostenrisico door niet-vergoede werkzaamheden");

  if(data.afhankelijk.length)
    r.omgeving.push("Afhankelijk van derden (nutsbedrijven)");

  if(data.afhankelijk.length)
    r.uitvoering.push("Afstemming tussen partijen kritisch");

  if(data.beperkingen.includes("Geen parallel werk toegestaan"))
    r.uitvoering.push("Fasering verlengt doorlooptijd");

  return r;
}

// ===== SAMENVATTING =====
function buildSamenvatting(data){

  return `
  Het project omvat ${data.werk.join(", ") || "diverse civiele werkzaamheden"}.
  
  De werkzaamheden worden uitgevoerd ${data.fasering.length ? "in meerdere fasen" : "zonder expliciete fasering"}.
  
  De planning bevat referenties naar ${data.planning.join(", ") || "geen duidelijke periode"}.
  
  Er gelden belangrijke randvoorwaarden zoals ${data.beperkingen.join(", ") || "beperkte beperkingen"}.
  
  Daarnaast is er sprake van afhankelijkheden (${data.afhankelijk.join(", ") || "beperkt"}), wat directe invloed heeft op de uitvoerbaarheid.
  
  Contractueel ligt een belangrijk deel van de verantwoordelijkheid bij de aannemer, met name ten aanzien van planning en kostenbeheersing.
  
  De uitvoering vereist daarom een strakke planning, intensieve coördinatie en risicobeheersing.
  `;
}

// ===== AI (OPTIONEEL) =====
async function aiAnalyse(text){

  if(!OPENAI_API_KEY) return null;

  const res = await fetch("https://api.openai.com/v1/chat/completions",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer "+OPENAI_API_KEY
    },
    body:JSON.stringify({
      model:"gpt-4o-mini",
      messages:[
        {
          role:"system",
          content:"Je bent een senior werkvoorbereider. Analyseer dit LV volledig."
        },
        {
          role:"user",
          content:`Maak een uitgebreide samenvatting + risicoanalyse:\n\n${text}`
        }
      ]
    })
  });

  const json = await res.json();
  return json.choices[0].message.content;
}

// ===== HOOFD ANALYSE =====
async function analyse(){

  const raw = document.getElementById("lvText").value;
  const out = document.getElementById("result");
  out.innerHTML="Analyseren...";

  const data = analyseTekst(raw);
  const risico = analyseRisico(data);

  let samenvatting = await aiAnalyse(raw);
  if(!samenvatting) samenvatting = buildSamenvatting(data);

  analyseData = { samenvatting, risico };

  out.innerHTML = `

  <div class="section">
    <h3>Samenvatting</h3>
    <p>${samenvatting}</p>
  </div>

  <div class="section">
    <h3>Risico Analyse</h3>

    <b>Planning</b>
    <ul class="risk">${risico.planning.map(r=>`<li>${r}</li>`).join("")}</ul>

    <b>Contract</b>
    <ul class="risk">${risico.contract.map(r=>`<li>${r}</li>`).join("")}</ul>

    <b>Uitvoering</b>
    <ul class="risk">${risico.uitvoering.map(r=>`<li>${r}</li>`).join("")}</ul>

    <b>Omgeving / derden</b>
    <ul class="risk">${risico.omgeving.map(r=>`<li>${r}</li>`).join("")}</ul>

  </div>

  `;
}

// ===== PDF =====
function exportPDF(){

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  let y=15;

  doc.setFontSize(16);
  doc.text("LV Analyse Rapport",10,y);
  y+=10;

  doc.setFontSize(12);
  doc.text("Samenvatting",10,y);
  y+=6;

  const sam = doc.splitTextToSize(analyseData.samenvatting,180);
  doc.text(sam,10,y);
  y += sam.length*5 + 5;

  doc.setTextColor(200,0,0);
  doc.text("Risico's",10,y);
  y+=6;

  Object.values(analyseData.risico).forEach(arr=>{
    arr.forEach(r=>{
      doc.text("- "+r,10,y);
      y+=5;
    });
  });

  doc.save("LV_Analyse_Tender.pdf");
}

</script>

</body>
</html>
