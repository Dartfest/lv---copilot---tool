<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kanalbau AI v3 PRO</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body{display:flex;height:100vh;background:#eef2f7;}

.sidebar{
width:240px;
background:#0f172a;
color:white;
padding:20px;
}

.logo{text-align:center;font-size:24px;font-weight:bold;margin-bottom:30px;}

.main{flex:1;padding:20px;overflow:auto;}

textarea{width:100%;height:150px;margin-top:10px;padding:10px;}

button{
margin-top:10px;
padding:10px 20px;
background:#2563eb;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

.project{
background:white;
padding:15px;
margin-top:15px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,.1);
cursor:pointer;
}

.project:hover{background:#eef5ff;}

.green{color:green;font-weight:bold;}
.orange{color:orange;font-weight:bold;}
.red{color:red;font-weight:bold;}

</style>
</head>

<body>

<div class="sidebar">
<div class="logo">KANALBAU AI</div>
<p>Multi Project Analyse</p>
</div>

<div class="main">

<h2>📧 Plak email</h2>

<textarea id="mail"></textarea>

<button onclick="runAnalyse()">Analyseer alles</button>

<h2 style="margin-top:20px;">📊 Gevonden projecten</h2>
<div id="projectList"></div>

<h2 style="margin-top:20px;">🔍 Detail</h2>
<div id="detail">Nog geen selectie</div>

</div>

<script>

// ===== KEYWORDS =====
let keywords = [
{ woord:"kanalbau", score:40 },
{ woord:"tiefbau", score:30 },
{ woord:"erschließung", score:25 },
{ woord:"druckrohr", score:25 },
{ woord:"schmutzwasser", score:20 },
{ woord:"regenwasser", score:15 },
{ woord:"straßenbau", score:15 },
{ woord:"sanitär", score:-70 },
{ woord:"elektro", score:-60 },
{ woord:"dach", score:-60 }
];

// ===== PROJECT SPLIT =====
function splitProjecten(text){
return text.split(/(?=projekt|maßnahme|ausschreibung)/gi);
}

// ===== WOORD TELLEN =====
function telWoord(text, woord){
let regex = new RegExp(woord, "gi");
let m = text.match(regex);
return m ? m.length : 0;
}

// ===== ANALYSE =====
function analyseTekst(text){

let score = 0;
let redenen = [];

keywords.forEach(k=>{
let count = telWoord(text, k.woord);

if(count>0){
score += count * k.score;
redenen.push((k.score>0?"✔ ":"✖ ") + k.woord + " ("+count+"x)");
}
});

let status="Niet interessant";
let kleur="red";

if(score>=80){status="🔥 TOP PROJECT"; kleur="green";}
else if(score>=60){status="Zeer interessant"; kleur="green";}
else if(score>=40){status="Mogelijk"; kleur="orange";}

return {score,redenen,status,kleur,text};
}

// ===== RUN =====
function runAnalyse(){

let input = document.getElementById("mail").value;

let delen = splitProjecten(input);

let resultaten = [];

delen.forEach(d=>{
let analyse = analyseTekst(d.toLowerCase());
if(analyse.score !== 0){ // alleen relevante tonen
resultaten.push(analyse);
}
});

// sorteer op score
resultaten.sort((a,b)=>b.score-a.score);

// render lijst
let html="";
resultaten.forEach((r,i)=>{
html += `
<div class="project" onclick="toonDetail(${i})">
<b>${r.status}</b><br>
Score: ${r.score}
</div>
`;
});

document.getElementById("projectList").innerHTML =
resultaten.length ? html : "Geen projecten gevonden";

// opslaan voor gebruik
window.currentResultaten = resultaten;

}

// ===== DETAIL =====
function toonDetail(i){

let p = window.currentResultaten[i];

document.getElementById("detail").innerHTML = `
<b>Status:</b> <span class="${p.kleur}">${p.status}</span><br>
<b>Score:</b> ${p.score}<br><br>

<b>Waarom:</b><br><br>
${p.redenen.join("<br>")}
`;

}

</script>

</body>
</html>
``
