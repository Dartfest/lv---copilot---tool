<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>LV Intelligence – Pro Engine</title>

<style>
body { font-family: Arial; margin:0; background:#eef2f7; }
.header { background:#0f172a; color:#fff; padding:15px; font-size:22px; }
.container { padding:20px; }

textarea { width:100%; height:120px; margin-bottom:10px; }

button {
  padding:8px 12px;
  background:#2563eb;
  color:#fff;
  border:none;
  cursor:pointer;
  margin:3px;
}

.card { background:#fff; padding:12px; border-radius:6px; margin-bottom:10px; }

.high { color:#dc2626; }
.mid { color:#f59e0b; }
.good { color:#16a34a; }

.section {
  background:#fff;
  padding:15px;
  margin-top:12px;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="header">LV Intelligence – Pro Engine</div>

<div class="container">

<input type="file" id="pdfFile" accept=".pdf"><br><br>

<input type="text" id="projectName" placeholder="Project naam">

<textarea id="lvText" placeholder="Plak LV tekst of upload PDF"></textarea>

<button onclick="analyse()">Analyse</button>
<button onclick="saveProject()">Opslaan</button>

<div id="out"></div>

<div class="section">
<h3>Projecten</h3>
<div id="projectList"></div>
</div>

<div class="section">
<h3>Vergelijking</h3>
<div id="compare"></div>
</div>

</div>

<script>

// ===== PDF =====
function loadScript(url){
  return new Promise(res=>{
    let s=document.createElement("script");
    s.src=url;
    s.onload=res;
    document.body.appendChild(s);
  });
}

async function handlePDF(file){
  if(typeof pdfjsLib==="undefined"){
    await loadScript("https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js");
  }

  let reader=new FileReader();
  reader.onload=async function(){
    let pdf=await pdfjsLib.getDocument(new Uint8Array(this.result)).promise;
    let text="";

    for(let i=1;i<=pdf.numPages;i++){
      let page=await pdf.getPage(i);
      let c=await page.getTextContent();
      text+=c.items.map(i=>i.str).join(" ")+"\n";
    }

    lvText.value=text;
  };

  reader.readAsArrayBuffer(file);
}

pdfFile.onchange=e=>{
  if(e.target.files[0]) handlePDF(e.target.files[0]);
};

// ===== DATUM =====
const months = {juni:6,juli:7,august:8,mai:5};

function extractDates(t){
  let r=[], m;
  let regex=/(juni|juli|august|mai)\s+(20\d{2})/gi;

  while((m=regex.exec(t))){
    r.push(parseInt(m[2])*12 + months[m[1]]);
  }

  return r;
}

// ===== FASE =====
function extractPhases(t){
  let r=[], m;
  let regex=/(\d)\.\s*bauabschnitt.*?planstraße\s*([a-z])/gi;

  while((m=regex.exec(t))){
    r.push({
      id:parseInt(m[1]),
      letter:m[2].toUpperCase(),
      name:`Fase ${m[1]} - ${m[2].toUpperCase()}`
    });
  }

  return r;
}

// ===== FASE + PLANNING + RISICO =====
function analysePhases(t){

  let phases=extractPhases(t);
  let dates=extractDates(t);

  return phases.map((p,i)=>{

    let start=dates[i] || 0;
    let end=dates[i+1] || start+6;
    let duur=end-start;

    let risico=[];
    let aandacht=[];

    if(i>0){
      aandacht.push("Afhankelijk van vorige fase");
    }

    if(t.includes("nicht parallel")){
      risico.push("Geen parallel uitvoering mogelijk");
    }

    if(t.includes("unterbrechung")){
      risico.push("Onderbreking mogelijk tussen fases");
    }

    if(t.includes("drittfirmen")){
      risico.push("Afhankelijk van derden");
    }

    if(t.includes("nicht vergütet")){
      risico.push("Niet vergoede werkzaamheden");
    }

    let kritisch = duur > 6 || risico.length > 2;

    return {
      ...p,
      duur,
      afhankelijk: i>0 ? phases[i-1].name : "Start",
      risico,
      aandacht,
      kritisch
    };
  });
}

// ===== PROJECT ANALYSE =====
function projectAnalyse(phases){

  let tekst=[];

  tekst.push("Het project bestaat uit meerdere gefaseerde Bauabschnitte.");

  if(phases.some(p=>p.kritisch)){
    tekst.push("Er zijn kritieke fases aanwezig met verhoogd risico.");
  }

  if(phases.length>2){
    tekst.push("De planning is afhankelijk van opvolgende fasen zonder overlap.");
  }

  tekst.push("Succesfactor ligt in strakke planning en coördinatie.");

  return tekst;
}

// ===== SCORE =====
function calcScore(phases){

  let risico = phases.reduce((a,p)=>a+p.risico.length,0);
  let roi = 100 - (risico * 5);

  let advies="GO", cls="good";

  if(roi<50){advies="NO-GO";cls="high";}
  else if(roi<70){advies="GO MET RISICO";cls="mid";}

  return {risico,roi,advies,cls};
}

// ===== MAIN =====
let lastData=null;

function analyse(){

  let t=lvText.value.toLowerCase();
  if(!t) return;

  let phases=analysePhases(t);
  let analyseTxt=projectAnalyse(phases);
  let score=calcScore(phases);

  lastData={phases,...score};

  out.innerHTML=`

  <div class="card">
  Risico: <span class="high">${score.risico}</span><br>
  ROI: ${score.roi}%<br>
  Advies: <span class="${score.cls}">${score.advies}</span>
  </div>

  <div class="section">
  <h3>Integrale Analyse</h3>
  <ul>${analyseTxt.map(x=>`<li>${x}</li>`).join("")}</ul>
  </div>

  <div class="section">
  <h3>Fase Analyse</h3>

  ${phases.map(p=>`
    <div class="card">
      <b>${p.name}</b><br>
      Duur: ${p.duur} mnd<br>
      Afhankelijk: ${p.afhankelijk}<br>
      ${p.kritisch ? '<span class="high">Kritieke fase</span>' : ''}

      <br><br>
      <b>Risico</b>
      <ul>${p.risico.map(r=>`<li class="high">${r}</li>`).join("")}</ul>

      <b>Aandacht</b>
      <ul>${p.aandacht.map(a=>`<li class="mid">${a}</li>`).join("")}</ul>

    </div>
  `).join("")}

  </div>
  `;
}

// ===== STORAGE =====
function getProjects(){
  return JSON.parse(localStorage.getItem("projects")||"[]");
}

function saveProject(){
  if(!lastData) return;

  let name=projectName.value||"Project";
  let p=getProjects();

  p.push({name,...lastData});
  localStorage.setItem("projects",JSON.stringify(p));

  renderProjects();
}

function renderProjects(){

  let p=getProjects();

  projectList.innerHTML=p.map((x,i)=>`
    <div class="card">
      <b>${x.name}</b><br>
      ROI: ${x.roi}% |
      <span class="${x.cls}">${x.advies}</span>
      <br>
      <button onclick="addCompare(${i})">Vergelijk</button>
    </div>
  `).join("");
}

// ===== COMPARE =====
let compareList=[];

function addCompare(i){
  compareList.push(getProjects()[i]);
  renderCompare();
}

function renderCompare(){

  compare.innerHTML=`
  <table border="1">
    <tr><th>Project</th><th>Risico</th><th>ROI</th><th>Advies</th></tr>
    ${compareList.map(p=>`
      <tr>
        <td>${p.name}</td>
        <td class="high">${p.risico}</td>
        <td>${p.roi}%</td>
        <td class="${p.cls}">${p.advies}</td>
      </tr>
    `).join("")}
  `;
}

renderProjects();

</script>

</body>
</html>
