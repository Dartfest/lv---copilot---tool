<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>LV Intelligence – Stabiel</title>

<style>
body { font-family: Arial; margin:0; background:#eef2f7; }
.header { background:#0f172a; color:#fff; padding:15px; font-size:22px; }
.container { padding:20px; }
textarea { width:100%; height:140px; margin-bottom:10px; }

button {
  padding:10px 15px;
  background:#2563eb;
  color:#fff;
  border:none;
  cursor:pointer;
}

.section { background:#fff; padding:20px; margin-top:15px; border-radius:10px; }
.high { color:#dc2626; }
.mid { color:#f59e0b; }
</style>
</head>

<body>

<div class="header">LV Intelligence – Analyse</div>

<div class="container">

<input type="file" id="pdfFile" accept=".pdf"><br><br>

<textarea id="lvText"></textarea>

<button onclick="analyse()">Analyse</button>

<div id="out"></div>

</div>

<script>

// ===== PDF =====
function loadScript(url){
  return new Promise(res=>{
    let s=document.createElement("script");
    s.src=url;
    s.onload=res;
    document.body.appendChild(s);
  });
}

async function handlePDF(file){
  try {
    if(typeof pdfjsLib==="undefined"){
      await loadScript("https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js");
    }

    let reader=new FileReader();

    reader.onload=async function(){
      let pdf=await pdfjsLib.getDocument(new Uint8Array(this.result)).promise;
      let text="";

      for(let i=1;i<=pdf.numPages;i++){
        let page=await pdf.getPage(i);
        let c=await page.getTextContent();
        text+=c.items.map(i=>i.str).join(" ")+"\n";
      }

      document.getElementById("lvText").value=text;
    };

    reader.readAsArrayBuffer(file);

  } catch(e){
    alert("PDF fout: " + e);
  }
}

document.getElementById("pdfFile").onchange = function(e){
  if(e.target.files[0]) handlePDF(e.target.files[0]);
};

// ===== JOUW ECHTE PLANNING =====
const fases = [
  {name:"Bauabschnitt 1", plan:"Planstraße C", start:"06/2026", end:"07/2027"},
  {name:"Bauabschnitt 2", plan:"Planstraße E", start:"na BA1", end:"07/2027"},
  {name:"Bauabschnitt 3", plan:"Planstraße D Teil 1", start:"08/2027", end:"05/2028"},
  {name:"Bauabschnitt 4", plan:"Planstraße D Teil 2", start:"na BA3", end:"05/2028"}
];

// ===== VEILIGE TEKST MATCH =====
function getPhaseText(text, plan){
  let idx = text.indexOf(plan.toLowerCase());
  if(idx === -1) return "";
  return text.substring(idx, idx + 1500);
}

// ===== WERKZAAMHEDEN =====
function extractWork(text){

  if(!text) return "<li>Complete civiele uitvoering (riolering, nuts, bouwwegen)</li>";

  let parts = text.split(".");
  let res = [];

  for(let i=0;i<parts.length;i++){
    let l = parts[i];

    if(
      l.includes("kanal") ||
      l.includes("erschließ") ||
      l.includes("versorgung") ||
      l.includes("baustra")
    ){
      res.push("<li>"+l.trim()+"</li>");
    }
  }

  if(res.length === 0){
    return "<li>Complete civiele uitvoering (riolering, nuts, bouwwegen)</li>";
  }

  return res.slice(0,5).join("");
}

// ===== RISICO =====
function risico(f){
  return `
  <ul>
    <li class="high">Geen parallel uitvoering toegestaan</li>
    <li class="high">Strikte einddatum (${f.end})</li>
    <li class="high">Volledig afhankelijk van vorige fase</li>
    <li class="mid">Continu doorwerken vereist</li>
  </ul>
  `;
}

// ===== SAMENVATTING =====
function summary(f){
  return `
  <p>
  ${f.name} (${f.plan}) is een kritische uitvoeringsfase binnen het project.
  De werkzaamheden omvatten volledige civiele aanleg inclusief riolering,
  nutsvoorzieningen en bouwwegen.
  </p>

  <p>
  De uitvoering moet zonder onderbreking plaatsvinden en is volledig afhankelijk
  van de voorgaande fase. Hierdoor ontstaat een lineaire planning zonder buffer.
  </p>

  <p class="high">
  Conclusie: vertraging = directe projectvertraging.
  </p>
  `;
}

// ===== KRITIEKE PAD =====
function criticalBlock(){
  return `
  <div class="section">
    <h2>Kritieke Pad</h2>
    <p>BA1 → BA2 → BA3 → BA4</p>
    <p class="high">Geen buffer – alles kritisch</p>
  </div>
  `;
}

// ===== MAIN =====
function analyse(){

  try {

    let text = document.getElementById("lvText").value.toLowerCase();

    let html = criticalBlock();

    for(let i=0;i<fases.length;i++){

      let f = fases[i];
      let t = getPhaseText(text, f.plan);
      let work = extractWork(t);

      html += `
      <div class="section">

        <h2>${f.name} – ${f.plan}</h2>

        <h3>Periode</h3>
        <p><b>${f.start} → ${f.end}</b></p>

        ${summary(f)}

        <h3>Werkzaamheden</h3>
        <ul>${work}</ul>

        <h3>Risico’s</h3>
        ${risico(f)}

      </div>
      `;
    }

    document.getElementById("out").innerHTML = html;

  } catch(e){
    document.getElementById("out").innerHTML = "<div class='section high'>Fout: "+e+"</div>";
  }
}

</script>

</body>
</html>
