<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>LV Analyse PRO + PDF</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body { font-family: Arial; padding:20px; background:#f4f6f8; }
textarea { width:100%; height:200px; font-family:monospace; }
button { padding:8px 14px; margin:8px 5px 8px 0; }
.box { background:#fff; padding:15px; margin-bottom:15px; border-radius:6px; }
.plan { background:#eef6ff; border-left:5px solid #2563eb; padding:12px; margin:12px 0; }
.risk { background:#ffe4e6; padding:8px; margin-top:8px; }
.summary { background:#e8f7ee; padding:8px; margin-top:8px; }
</style>
</head>

<body>

<h1>LV Analyse PRO</h1>

<div class="box">
<input type="file" id="file" accept=".pdf">
<button onclick="leesLV()">Lees PDF</button>
<button onclick="exportPDF()">Export PDF</button>
<textarea id="lvText"></textarea>
</div>

<div class="box">
<button onclick="analyse()">Analyse</button>
<div id="result"></div>
</div>

<script>

// ================= PDF LEZEN =================
async function leesLV(){
  const f = document.getElementById("file").files[0];
  if(!f) return alert("Kies PDF");

  const buffer = await f.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({data:buffer}).promise;

  let text="";
  for(let i=1;i<=pdf.numPages;i++){
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    content.items.forEach(it => text += it.str + " ");
  }

  document.getElementById("lvText").value = text;
}

// ================= CLEAN =================
function cleanText(t){
  return t.replace(/([A-Za-z])\s([A-Za-z])/g, "$1$2").replace(/\s+/g," ");
}

// ================= SAMENVATTING (UITVOERDER) =================
function maakSamenvatting(f){

  return `
Uit te voeren werkzaamheden:
- Aanleg riolering en drainage
- Aanbrengen kabels en leidingen (nutsvoorzieningen)
- Realisatie bouwwegen en tijdelijke verharding

Aandachtspunten:
- Afstemming met nutsbedrijven noodzakelijk
- Werkvolgorde strikt aanhouden
- Bereikbaarheid bouwterrein borgen

Fase specifieke aandacht:
${f.naam.includes("3") ? "- Start pas toegestaan vanaf augustus 2027\n" : ""}
${f.afhankelijk ? "- Start afhankelijk van vorige fase\n" : ""}
`;
}

// ================= RISICO =================
function risico(f){

  let r=[];

  if(f.afhankelijk) r.push("Afhankelijkheid vorige fase → kans op vertraging");
  if(f.geenParallel) r.push("Geen parallel werk → kritische planning");
  if(f.verplichteWacht) r.push("Onderbreking → extra kosten en logistiek");

  return r.length ? r : ["Geen bijzonderheden"];
}

// ================= DATA =================
let fasesGlobaal = [];

// ================= ANALYSE =================
function analyse(){

  let text = cleanText(document.getElementById("lvText").value);

  const out = document.getElementById("result");
  out.innerHTML="";

  fasesGlobaal = [

    {naam:"1. Bauabschnitt", plan:"Planstraße C", start:new Date(2026,5,1), eind:null, geenParallel:true},
    {naam:"2. Bauabschnitt", plan:"Planstraße E", start:null, eind:new Date(2027,6,31), afhankelijk:1, geenParallel:true},
    {naam:"3. Bauabschnitt", plan:"Planstraße D - Teil 1", start:new Date(2027,7,1), eind:null, verplichteWacht:true, geenParallel:true},
    {naam:"4. Bauabschnitt", plan:"Planstraße D - Teil 2", start:null, eind:new Date(2028,4,31), afhankelijk:3, geenParallel:true}

  ];

  // afhankelijkheden berekenen
  fasesGlobaal.forEach((f,i)=>{
    if(f.afhankelijk){
      f.start = fasesGlobaal[f.afhankelijk-1].eind;
    }
    if(!f.eind && i < fasesGlobaal.length-1){
      f.eind = fasesGlobaal[i+1].start;
    }
  });

  // output
  fasesGlobaal.forEach(f=>{

    const div = document.createElement("div");
    div.className="plan";

    div.innerHTML = `
    <strong>${f.naam}: ${f.plan}</strong>

    <p><b>Periode:</b> 
    ${f.start?.toLocaleDateString() || "onbekend"} → 
    ${f.eind?.toLocaleDateString() || "onbekend"}
    </p>

    <div class="summary">
    <b>Samenvatting uitvoering:</b><br>
    ${maakSamenvatting(f).replace(/\n/g,"<br>")}
    </div>

    <div class="risk">
    <b>Risico's:</b><br>
    ${risico(f).join("<br>")}
    </div>
    `;

    out.appendChild(div);
  });
}

// ================= PDF EXPORT =================
function exportPDF(){

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  let y = 10;

  fasesGlobaal.forEach(f=>{

    doc.setFontSize(12);
    doc.text(`${f.naam} - ${f.plan}`, 10, y);
    y += 6;

    doc.text(`Periode: ${f.start?.toLocaleDateString()} - ${f.eind?.toLocaleDateString()}`, 10, y);
    y += 6;

    doc.text("Samenvatting:", 10, y);
    y += 6;

    const text = maakSamenvatting(f).split("\n");

    text.forEach(line=>{
      doc.text(line, 10, y);
      y += 5;
    });

    y += 5;

    doc.text("Risico's:", 10, y);
    y += 6;

    risico(f).forEach(r=>{
      doc.text("- " + r, 10, y);
      y += 5;
    });

    y += 10;

    if(y > 270){
      doc.addPage();
      y = 10;
    }
  });

  doc.save("LV_Analyse.pdf");
}

</script>

</body>
</html>
