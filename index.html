<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>LV Analyse Generator</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>
body { font-family: Arial; padding:20px; background:#f4f6f8; }
textarea { width:100%; height:220px; font-family:monospace; }
button { padding:8px 14px; margin:6px; }
.box { background:#fff; padding:15px; margin-bottom:15px; border-radius:6px; }
.plan { background:#eef6ff; border-left:5px solid #2563eb; padding:12px; margin:10px 0; }
.risk { color:#b91c1c; font-weight:bold; }
</style>
</head>

<body>

<h1>LV Analyse (Automatisch)</h1>

<div class="box">
<input type="file" id="file" accept=".pdf">
<button onclick="leesLV()">Lees PDF</button>
<button onclick="analyse()">Analyse</button>
<textarea id="lvText"></textarea>
</div>

<div id="result"></div>

<script>

// ===== PDF =====
async function leesLV(){
  const f = document.getElementById("file").files[0];
  if(!f) return alert("Kies PDF");

  const buffer = await f.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({data:buffer}).promise;

  let text="";
  for(let i=1;i<=pdf.numPages;i++){
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    content.items.forEach(it => text += it.str + " ");
  }

  document.getElementById("lvText").value = text;
}

// ===== CLEAN =====
function clean(t){
  return t.replace(/([A-Za-z])\s([A-Za-z])/g, "$1$2").replace(/\s+/g," ");
}

// ===== MAAND =====
const maanden = {
  "januar":0,"februar":1,"märz":2,"april":3,"mai":4,
  "juni":5,"juli":6,"august":7,"september":8,
  "oktober":9,"november":10,"dezember":11
};

// ===== DATUM PARSER =====
function parseMaand(str){
  const m = str.match(/(januar|februar|märz|april|mai|juni|juli|august|september|oktober|november|dezember)\s+(\d{4})/i);
  if(!m) return null;
  return new Date(parseInt(m[2]), maanden[m[1].toLowerCase()], 1);
}

// ===== SAMENVATTING =====
function samenvatting(){
  return [
    "Aanleg riolering",
    "Aanbrengen kabels en leidingen",
    "Realisatie bouwwegen",
    "Afstemming met nutsbedrijven"
  ];
}

// ===== RISICO =====
function risico(f){
  let r=[];
  if(f.afhankelijk) r.push("Afhankelijk van vorige fase - kans op vertraging");
  if(f.geenParallel) r.push("Geen parallel werk mogelijk");
  return r.length ? r : ["Geen bijzonderheden"];
}

// ===== ANALYSE =====
function analyse(){

  let text = clean(document.getElementById("lvText").value);
  const out = document.getElementById("result");
  out.innerHTML="";

  const regex = /(\d+)\.\s*Bauabschnitt.*?Planstraße\s+([A-Z])/gi;

  let fases=[];
  let m;

  while((m=regex.exec(text))){
    fases.push({
      nr: parseInt(m[1]),
      naam: "Bauabschnitt " + m[1],
      plan: "Planstraße " + m[2],
      start:null,
      eind:null
    });
  }

  // ===== DATUM DETECTIE =====
  fases.forEach(f=>{

    const idx = text.indexOf(f.plan);
    const frag = text.slice(idx, idx+500);

    const start = frag.match(/im\s+[a-zä]+\s+\d{4}/i);
    const eind = frag.match(/bis\s+[a-zä]+\s+\d{4}/i);

    if(start) f.start = parseMaand(start[0]);
    if(eind) f.eind = parseMaand(eind[0]);
  });

  // ===== VOLGORDE =====
  fases.sort((a,b)=>a.nr-b.nr);

  fases.forEach((f,i)=>{
    if(i>0 && !f.start){
      f.start = fases[i-1].eind;
      f.afhankelijk = true;
    }
  });

  // ===== OUTPUT =====
  fases.forEach(f=>{

    const div=document.createElement("div");
    div.className="plan";

    div.innerHTML=`
    <strong>${f.naam}: ${f.plan}</strong><br>

    <b>Periode:</b> 
    ${f.start ? f.start.toLocaleDateString() : "onbekend"} - 
    ${f.eind ? f.eind.toLocaleDateString() : "onbekend"}<br><br>

    <b>Samenvatting:</b>
    <ul>
    ${samenvatting().map(s=>`<li>${s}</li>`).join("")}
    </ul>

    <b>Risico's:</b>
    <ul class="risk">
    ${risico(f).map(r=>`<li>${r}</li>`).join("")}
    </ul>
    `;

    out.appendChild(div);
  });

}
</script>

</body>
</html>
