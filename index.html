<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Werkdagen & Kosten Dashboard</title>

<style>
  body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #eef2f7;
  }

  header {
    background: #0f172a;
    color: #fff;
    padding: 15px;
    font-size: 22px;
  }

  .container {
    padding: 20px;
  }

  .section {
    background: #fff;
    padding: 20px;
    margin-top: 15px;
    border-radius: 10px;
  }

  label {
    display: block;
    margin-top: 10px;
    font-weight: bold;
  }

  input, select {
    width: 100%;
    padding: 8px;
    margin-top: 4px;
  }

  button {
    margin-top: 15px;
    padding: 10px 15px;
    background: #2563eb;
    color: #fff;
    border: none;
    cursor: pointer;
  }

  button:hover {
    background: #1e40af;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 15px;
  }

  th, td {
    border: 1px solid #ccc;
    padding: 8px;
    text-align: center;
  }

  th {
    background: #f1f5f9;
  }

  .kpi {
    display: inline-block;
    margin-right: 20px;
    font-size: 18px;
  }
</style>
</head>

<body>

<header>
  Werkdagen, Kosten & Stuurgegevens
</header>

<div class="container">

  <!-- ================= WORKDAY INPUT ================= -->
  <div class="section">
    <h2>Nieuwe werkdag</h2>

    <label>Datum</label>
    <input type="date" id="date">

    <label>Project</label>
    <input type="text" id="project">

    <label>Begintijd</label>
    <input type="time" id="start">

    <label>Eindtijd</label>
    <input type="time" id="end">

    <label>Stilstand (uren)</label>
    <input type="number" id="downtime" value="0" step="0.25">

    <label>Kosten (€)</label>
    <input type="number" id="cost" value="0" step="0.01">

    <label>Bon upload</label>
    <input type="file" id="receipt">

    <button onclick="saveWorkday()">Opslaan</button>
  </div>

  <!-- ================= DASHBOARD ================= -->
  <div class="section">
    <h2>Stuurgegevens (maand)</h2>
    <div class="kpi" id="kpiDays">Werkdagen: 0</div>
    <div class="kpi" id="kpiHours">Uren: 0</div>
    <div class="kpi" id="kpiCosts">Kosten: €0</div>

    <table>
      <thead>
        <tr>
          <th>Datum</th>
          <th>Project</th>
          <th>Uren</th>
          <th>Stilstand</th>
          <th>Kosten (€)</th>
          <th>Bon</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

</div>

<script>
  let data = JSON.parse(localStorage.getItem("workdays")) || [];

  function calculateHours(start, end, downtime) {
    const s = new Date("1970-01-01T" + start);
    const e = new Date("1970-01-01T" + end);
    return ((e - s) / 3600000) - downtime;
  }

  function saveWorkday() {
    const date = date.value;
    const project = project.value;
    const start = start.value;
    const end = end.value;
    const downtime = parseFloat(downtime.value) || 0;
    const cost = parseFloat(cost.value) || 0;
    const receipt = receipt.files.length > 0 ? receipt.files[0].name : "—";

    if (!date || !start || !end) {
      alert("Datum en tijden zijn verplicht");
      return;
    }

    const hours = calculateHours(start, end, downtime);

    data.push({ date, project, hours, downtime, cost, receipt });
    localStorage.setItem("workdays", JSON.stringify(data));

    render();
  }

  function render() {
    const tbody = document.getElementById("tableBody");
    tbody.innerHTML = "";

    let totalHours = 0;
    let totalCosts = 0;

    data.forEach(d => {
      totalHours += d.hours;
      totalCosts += d.cost;

      tbody.innerHTML += `
        <tr>
          <td>${d.date}</td>
          <td>${d.project}</td>
          <td>${d.hours.toFixed(2)}</td>
          <td>${d.downtime}</td>
          <td>${d.cost.toFixed(2)}</td>
          <td>${d.receipt}</td>
        </tr>
      `;
    });

    document.getElementById("kpiDays").innerText = "Werkdagen: " + data.length;
    document.getElementById("kpiHours").innerText = "Uren: " + totalHours.toFixed(2);
    document.getElementById("kpiCosts").innerText = "Kosten: €" + totalCosts.toFixed(2);
  }

  render();
</script>

</body>
</html>
``
