<script>

// ===== MAANDEN =====
const months = {
  "januar":1,"februar":2,"mûÊrz":3,"april":4,"mai":5,
  "juni":6,"juli":7,"august":8,"september":9
};

// ===== DATUM PARSER =====
function parseDates(text){
  const regex = /(januar|februar|mûÊrz|april|mai|juni|juli|august|september)\s+(20\d{2})/gi;
  let dates=[];
  let m;

  while((m = regex.exec(text))){
    dates.push({
      raw:m[0],
      month:months[m[1]],
      year:parseInt(m[2]),
      value:parseInt(m[2])*12 + months[m[1]]
    });
  }

  return dates;
}

// ===== FASE PARSER =====
function parsePhases(text){

  let phases=[];
  const regex = /(\d\.\s*bauabschnitt).*?planstraûe\s*([a-z])/gi;
  let m;

  while((m = regex.exec(text))){
    phases.push({
      name:`Fase ${m[1][0]} - Planstraat ${m[2].toUpperCase()}`
    });
  }

  return phases;
}

// ===== PLANNING LOGICA =====
function buildPlanning(text){

  let dates = parseDates(text);
  let phases = parsePhases(text);

  // simpele koppeling: fase i ã datum i
  for(let i=0;i<phases.length;i++){

    phases[i].start = dates[i]?.value || dates[0]?.value;
    phases[i].end   = dates[i+1]?.value || dates[dates.length-1]?.value;

    phases[i].duration = phases[i].end - phases[i].start;
  }

  return phases;
}

// ===== TIJDSBALK =====
function renderTimeline(phases){

  if(phases.length === 0) return "<p>Geen planning gevonden</p>";

  let min = Math.min(...phases.map(p=>p.start));
  let max = Math.max(...phases.map(p=>p.end));
  let total = max - min;

  return phases.map(p=>{

    let left = ((p.start - min)/total)*100;
    let width = (p.duration/total)*100;

    let critical = p.duration > 6 ? "critical" : "normal";

    return `
    <div style="margin-bottom:8px;">
      <b>${p.name}</b>
      <div style="background:#ddd;height:20px;border-radius:4px;">
        <div class="${critical}" style="
          margin-left:${left}%;
          width:${width}%;
          height:20px;
          border-radius:4px;">
        </div>
      </div>
    </div>
    `;
  }).join("");
}

// ===== MAIN =====
function analyse(){

  let t = lvText.value.toLowerCase();

  let planning = buildPlanning(t);

  document.getElementById("out").innerHTML = `

  <div class="section">
    <h3>Planning per fase</h3>
    ${planning.map(p=>`
      <div>
        <b>${p.name}</b><br>
        Start: ${p.start}<br>
        Eind: ${p.end}<br>
        Duur: ${p.duration} maanden
      </div><br>
    `).join("")}
  </div>

  <div class="section">
    <h3>Tijdsbalk</h3>
    ${renderTimeline(planning)}
  </div>

  `;
}

</script>
