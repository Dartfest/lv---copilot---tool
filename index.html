<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>LV – Planstraße Uitvoering & Materiaalstaat</title>

<!-- ✅ pdf.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
  "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
</script>

<!-- ✅ jsPDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body { font-family: Arial, sans-serif; background:#f4f6f8; padding:20px; }
.box { background:#fff; padding:16px; border-radius:6px; margin-bottom:20px; }
textarea { width:100%; min-height:160px; font-family:monospace; }
button { padding:6px 12px; margin-right:6px; }

.plan { padding:14px; border-left:8px solid; border-radius:6px; margin-top:16px; }
.pa{background:#f3e8ff;border-color:#9333ea;}
.pb{background:#e0f2fe;border-color:#0284c7;}
.pc{background:#dcfce7;border-color:#16a34a;}
.pd{background:#ffedd5;border-color:#ea580c;}
.px{background:#f3f4f6;border-color:#6b7280;}

.warn { color:#b91c1c; font-weight:bold; }
ul { margin-left:18px; }
h3 { margin-top:0; }
</style>
</head>

<body>

<h1>LV – Uitvoerderssamenvatting per Planstraße</h1>

<div class="box">
  <h2>1. LV‑PDF(s)</h2>
  <input type="file" id="lvFiles" multiple accept=".pdf"><br><br>
  <button onclick="readLV()">Lees LV</button>
  <textarea id="lvText"></textarea>
</div>

<div class="box">
  <h2>2. Analyse</h2>
  <button onclick="analyse()">Analyseer</button>
  <button onclick="exportPDF()">📄 Uitvoerders‑PDF</button>
  <div id="output"></div>
</div>

<script>
/* ================= PDF LEZEN ================= */
async function readPDF(file){
  const buf = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({data:buf}).promise;
  let t = "";
  for(let p=1;p<=pdf.numPages;p++){
    const page = await pdf.getPage(p);
    const c = await page.getTextContent();
    t += c.items.map(i=>i.str).join(" ") + "\n";
  }
  return t;
}

async function readLV(){
  let t="";
  for(const f of lvFiles.files){
    t += await readPDF(f);
  }
  lvText.value = t;
}

/* ================= DATA ================= */
let planData = {};

const PLAN_REGEX = /Planstraße\s+([A-Z])/gi;
const BUIS_REGEX = /(PVC|PE[\s-]?HD|PE\s?100|BETON|STAAL)(?:[^.\n]{0,40}(DN\s?\d+|Ø\s?\d+)(?:[^.\n]{0,20}(SDR\s?\d+|PN\s?\d+))?)?/i;
const QTY_REGEX  = /(\d+[,\.]?\d*)\s?(m|lfm)/i;

/* ================= ANALYSE ================= */
function analyse(){
  planData = {};
  output.innerHTML="";

  const text = lvText.value;
  if(!text.trim()){ alert("LV leeg"); return; }

  let m;
  while((m = PLAN_REGEX.exec(text)) !== null){
    const letter = m[1];
    const key = `Planstraße ${letter}`;
    if(!planData[key]){
      planData[key] = {
        uitvoering:new Set(),
        risico:new Set(),
        materiaal:{} // buistype -> hoeveelheid
      };
    }

    const frag = text.substring(m.index, m.index+800);
    const f = frag.toLowerCase();

    if(f.includes("bauabschnitt")) planData[key].uitvoering.add("Uitvoering in meerdere deelvakken");
    if(f.includes("ohne unterbrechung")) planData[key].uitvoering.add("Zonder onderbreking uitvoeren");
    if(f.includes("abweich")||f.includes("mehr")) planData[key].risico.add("Meerwerk / afwijkingen mogelijk");

    const qtyMatch = frag.match(QTY_REGEX);
    const buisMatch = frag.match(BUIS_REGEX);

    if(qtyMatch && buisMatch){
      const hoeveelheid = parseFloat(qtyMatch[1].replace(",","."));
      const buis = buisMatch[0].replace(/\s+/g," ").trim();
      if(!planData[key].materiaal[buis]) planData[key].materiaal[buis]=0;
      planData[key].materiaal[buis]+=hoeveelheid;
    }
  }

  render();
}

/* ================= RENDER ================= */
function render(){
  Object.keys(planData).sort().forEach(k=>{
    const d=planData[k];
    const letter=k.slice(-1);
    const cls =
      letter==="A"?"pa":
      letter==="B"?"pb":
      letter==="C"?"pc":
      letter==="D"?"pd":"px";

    const types = Object.keys(d.materiaal);
    const multi = types.length>1;

    const el=document.createElement("div");
    el.className=`plan ${cls}`;
    el.innerHTML=`
<h3>${k}</h3>

<strong>Werkvolgorde</strong>
<ul>${d.uitvoering.size?[...d.uitvoering].map(x=>`<li>${x}</li>`).join(""):"<li>Geen specifieke volgorde benoemd</li>"}</ul>

<strong>Materiaalstaat</strong>
<ul>${types.length?types.map(t=>`<li>${d.materiaal[t].toFixed(1)} m – ${t}</li>`).join(""):"<li>Geen buiswerk expliciet benoemd</li>"}</ul>

${multi ? `<p class="warn">⚠ Meerdere buistypen in deze Planstraße</p>`:""}

<strong>Risico’s</strong>
<ul>${d.risico.size?[...d.risico].map(x=>`<li>${x}</li>`).join(""):"<li>Geen expliciete risico’s</li>"}</ul>
`;
    output.appendChild(el);
  });
}

/* ================= PDF ================= */
function exportPDF(){
  const {jsPDF}=window.jspdf;
  const pdf=new jsPDF();
  let y=10;

  pdf.setFontSize(12);
  pdf.text("Uitvoerderssamenvatting per Planstraße",10,y);
  y+=10;
  pdf.setFontSize(10);

  Object.keys(planData).sort().forEach(k=>{
    const d=planData[k];
    const types=Object.keys(d.materiaal);
    const t=`
${k}

Werkvolgorde:
- ${d.uitvoering.size?[...d.uitvoering].join("\n- "):"Geen"}

Materiaalstaat:
- ${types.length?types.map(x=>`${d.materiaal[x].toFixed(1)} m – ${x}`).join("\n- "):"Geen expliciet buismateriaal"}

${types.length>1?"WAARSCHUWING: meerdere buistypen in deze Planstraße":""}

Risico’s:
- ${d.risico.size?[...d.risico].join("\n- "):"Geen"}
`;
    const block=pdf.splitTextToSize(t,180);
    if(y+block.length*5>280){ pdf.addPage(); y=10; }
    pdf.text(block,10,y);
    y+=block.length*5+8;
  });

  pdf.save("uitvoerderssamenvatting-planstrassen.pdf");
}
</script>

</body>
</html>
