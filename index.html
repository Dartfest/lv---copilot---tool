<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>LV AI Contract Expert</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>
body { font-family: Arial; padding:20px; background:#f4f6f8; }
textarea { width:100%; height:180px; }
button { padding:8px 12px; margin:6px; }

.section { background:#fff; padding:15px; margin:10px 0; border-left:5px solid #2563eb; }

.risk { color:#b91c1c; font-weight:bold; }
.fact { color:#111; }
.warn { color:#f59e0b; }
</style>
</head>

<body>

<h1>LV AI Contract Expert</h1>

<input type="file" id="file">
<button onclick="leesLV()">Lees PDF</button>
<button onclick="analyse()">Analyse</button>

<textarea id="lvText"></textarea>

<div id="result"></div>

<script>

// ===== PDF =====
async function leesLV(){
  const f = document.getElementById("file").files[0];
  const buffer = await f.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({data:buffer}).promise;

  let text="";
  for(let i=1;i<=pdf.numPages;i++){
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    content.items.forEach(it => text += it.str + " ");
  }

  document.getElementById("lvText").value = text;
}

// ===== CONTRACT EXPERT =====
function contractExpert(text){

  let feiten=[];
  let interpretaties=[];
  let risico={
    contract:[],
    planning:[],
    uitvoering:[],
    omgeving:[]
  };

  const t = text.toLowerCase();

  // ===== FEITEN =====
  if(t.includes("nicht vergütet")){
    feiten.push("Kosten worden niet apart vergoed.");
    risico.contract.push("Kostenrisico bij aannemer.");
  }

  if(t.includes("ohne unterbrechung")){
    feiten.push("Werk zonder onderbreking uitvoeren.");
    risico.planning.push("Strakke planning vereist.");
  }

  if(t.includes("nicht parallel")){
    feiten.push("Parallel werken uitgesloten.");
    risico.planning.push("Geen overlap mogelijk → langere doorlooptijd.");
  }

  if(t.includes("drittfirmen")){
    feiten.push("Afhankelijk van derden.");
    risico.omgeving.push("Vertraging door derden mogelijk.");
  }

  if(t.includes("abstimmung")){
    feiten.push("Afstemming verplicht.");
    risico.uitvoering.push("Hoge coördinatiedruk.");
  }

  // ===== INTERPRETATIE (regelgebaseerd) =====
  if(t.includes("nicht vergütet") && t.includes("unterbrechung")){
    interpretaties.push("Onderbrekingen en bijkomende kosten lijken voor rekening aannemer.");
  }

  if(t.includes("drittfirmen") && t.includes("koordination")){
    interpretaties.push("Coördinatierisico ligt mogelijk bij aannemer.");
  }

  // ===== ACTIES =====
  let acties=[];

  if(t.includes("drittfirmen"))
    acties.push("Stem planning af met nutsbedrijven.");

  if(t.includes("nicht parallel"))
    acties.push("Plan werkzaamheden strikt sequentieel.");

  if(t.includes("ohne unterbrechung"))
    acties.push("Zorg voor continue inzet personeel/materieel.");

  if(t.includes("nicht vergütet"))
    acties.push("Controleer kosten en neem risico op in begroting.");

  return { feiten, interpretaties, risico, acties };
}

// ===== MAIN =====
function analyse(){

  const text = document.getElementById("lvText").value;

  const res = contractExpert(text);

  document.getElementById("result").innerHTML = `

  <div class="section">
    <h3>📜 Contractanalyse (feiten)</h3>
    <ul class="fact">
      ${res.feiten.map(f=>`<li>${f}</li>`).join("")}
    </ul>
  </div>

  <div class="section">
    <h3>🧠 Interpretatie (regelgebaseerd)</h3>
    <ul class="warn">
      ${res.interpretaties.map(i=>`<li>${i}</li>`).join("")}
    </ul>
  </div>

  <div class="section">
    <h3>⚠️ Risico's per categorie</h3>

    <b>Contract:</b>
    <ul class="risk">${res.risico.contract.map(r=>`<li>${r}</li>`).join("")}</ul>

    <b>Planning:</b>
    <ul class="risk">${res.risico.planning.map(r=>`<li>${r}</li>`).join("")}</ul>

    <b>Uitvoering:</b>
    <ul class="risk">${res.risico.uitvoering.map(r=>`<li>${r}</li>`).join("")}</ul>

    <b>Omgeving:</b>
    <ul class="risk">${res.risico.omgeving.map(r=>`<li>${r}</li>`).join("")}</ul>
  </div>

  <div class="section">
    <h3>🧑‍🔧 Actiepunten uitvoerder</h3>
    <ul>
      ${res.acties.map(a=>`<li>${a}</li>`).join("")}
    </ul>
  </div>
  `;
}

</script>

</body>
</html>
