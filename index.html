<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>LV Intelligence – Pro Phase + Material Engine</title>

<style>
body { font-family: Arial; margin:0; background:#eef2f7; }
.header { background:#0f172a; color:#fff; padding:15px; font-size:22px; }
.container { padding:20px; }

textarea { width:100%; height:120px; margin-bottom:10px; }

button {
  padding:8px 12px;
  background:#2563eb;
  color:#fff;
  border:none;
  cursor:pointer;
}

.card { background:#fff; padding:15px; border-radius:6px; margin-bottom:12px; }

.high { color:#dc2626; }
.mid { color:#f59e0b; }

.section {
  background:#fff;
  padding:15px;
  margin-top:12px;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="header">LV Intelligence – Advanced Analyse Tool</div>

<div class="container">

<input type="file" id="pdfFile" accept=".pdf"><br><br>

<textarea id="lvText" placeholder="Plak LV tekst of upload PDF"></textarea>

<button onclick="analyse()">Analyse</button>

<div id="out"></div>

</div>

<script>

// ===== PDF =====
function loadScript(url){
  return new Promise(res=>{
    let s=document.createElement("script");
    s.src=url;
    s.onload=res;
    document.body.appendChild(s);
  });
}

async function handlePDF(file){
  if(typeof pdfjsLib==="undefined"){
    await loadScript("https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js");
  }

  let reader=new FileReader();

  reader.onload=async function(){
    let pdf=await pdfjsLib.getDocument(new Uint8Array(this.result)).promise;
    let text="";

    for(let i=1;i<=pdf.numPages;i++){
      let page=await pdf.getPage(i);
      let c=await page.getTextContent();
      text+=c.items.map(i=>i.str).join(" ")+"\n";
    }

    lvText.value=text;
  };

  reader.readAsArrayBuffer(file);
}

pdfFile.onchange=e=>{
  if(e.target.files[0]) handlePDF(e.target.files[0]);
};

// ===== PLANSTRASSE DETECTIE =====
function detectPlanstrassen(t){
  let m = t.match(/planstraße\s*[a-z]/gi) || [];
  return [...new Set(m.map(x=>x.toUpperCase()))];
}

// ===== TEKST PER FASE SPLITSEN =====
function splitPerPlan(t, plans){

  let result = {};

  plans.forEach(p=>{
    let regex = new RegExp(p.toLowerCase() + "[\\s\\S]*?(?=planstraße|$)", "gi");
    let match = t.match(regex);

    result[p] = match ? match.join(" ") : t;
  });

  return result;
}

// ===== MATERIAAL HERKENNING =====
function extractMaterials(text){

  let matches = text.match(/(dn\s*\d+).*?(pvc|pe|stahl|guss|rohr|leitung)?/gi) || [];

  let map = {};

  matches.forEach(m=>{

    let dn = (m.match(/dn\s*\d+/i) || [""])[0].toUpperCase();
    let type = (m.match(/pvc|pe|stahl|guss|rohr|leitung/i) || ["Onbekend"])[0];

    let key = dn + " " + type;

    map[key] = (map[key] || 0) + 1;
  });

  return map;
}

// ===== RISICO PER FASE =====
function risicoAnalyse(text){

  let r=[], k=[];

  if(text.includes("nicht parallel")){
    r.push("Geen parallel uitvoering mogelijk");
    k.push("Fases blokkeren elkaar");
  }

  if(text.includes("unterbrechung")){
    r.push("Onderbreking mogelijk");
    k.push("Stilstand tussen werkzaamheden");
  }

  if(text.includes("drittfirmen")){
    r.push("Afhankelijkheid derden");
    k.push("Planning afhankelijk van nutsbedrijven");
  }

  if(text.includes("nicht vergütet")){
    r.push("Niet vergoede werkzaamheden");
    k.push("Kosten liggen bij aannemer");
  }

  return {r,k};
}

// ===== GROTE SAMENVATTING =====
function bigSummary(plan, text){

  return `
  De fase ${plan} vormt een integraal onderdeel van de totale projectuitvoering en is bepalend voor de voortgang van het werk. 
  Binnen deze fase worden essentiële werkzaamheden uitgevoerd die direct aansluiten op voorgaande en opvolgende fases.

  De uitvoering binnen deze fase is sterk afhankelijk van de algemene projectfasering en dient in een logische volgorde plaats te vinden. 
  Door contractuele beperkingen, zoals het ontbreken van parallelle uitvoering, ontstaat een verhoogde druk op de planning en doorlooptijd.

  Daarnaast speelt de afhankelijkheid van externe partijen een belangrijke rol. 
  Werkzaamheden van nutsbedrijven en andere derden kunnen directe invloed hebben op de voortgang en vereisen intensieve coördinatie.

  Vanuit financieel perspectief moet rekening worden gehouden met werkzaamheden die mogelijk niet afzonderlijk worden vergoed. 
  Dit vraagt om een nauwkeurige werkvoorbereiding en kostenbewaking.

  De combinatie van fasering, afhankelijkheden en contractuele bepalingen maakt deze fase kritisch binnen het totale project.

  Conclusie: succesvolle uitvoering van ${plan} vereist een gedetailleerde voorbereiding, strakke planning, 
  continue afstemming en actieve risicobeheersing.
  `;
}

// ===== MAIN =====
function analyse(){

  let t = lvText.value.toLowerCase();
  if(!t) return;

  let plans = detectPlanstrassen(t);
  let split = splitPerPlan(t, plans);

  out.innerHTML = `

  ${plans.map(p=>{

    let txt = split[p];
    let mat = extractMaterials(txt);
    let ris = risicoAnalyse(txt);

    return `
    <div class="section">

      <h2>${p}</h2>

      <p>${bigSummary(p, txt)}</p>

      <h3>Risico’s</h3>
      <ul>${ris.r.map(x=>`<li class="high">${x}</li>`).join("")}</ul>

      <h3>Knelpunten</h3>
      <ul>${ris.k.map(x=>`<li class="mid">${x}</li>`).join("")}</ul>

      <h3>Bestellijst</h3>
      ${Object.entries(mat).map(([k,v])=>`
        <div class="card">${k} → ${v}x</div>
      `).join("")}

    </div>
    `;

  }).join("")}

  `;
}

</script>

</body>
</html>
