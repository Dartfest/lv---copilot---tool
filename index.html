<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>LV Intelligence – Vertaalde Analyse</title>

<style>
body { font-family: Arial; margin:0; background:#eef2f7; }
.header { background:#0f172a; color:#fff; padding:15px; font-size:22px; }
.container { padding:20px; }

textarea { width:100%; height:140px; margin-bottom:10px; }

button {
  padding:10px 15px;
  background:#2563eb;
  color:#fff;
  border:none;
  cursor:pointer;
}

.section { background:#fff; padding:20px; margin-top:15px; border-radius:10px; }

.de { font-weight:bold; }
.nl { color:#374151; margin-bottom:10px; }

.high { color:#dc2626; }
</style>
</head>

<body>

<div class="header">LV Intelligence – Werkzaamheden + Vertaling</div>

<div class="container">

<input type="file" id="pdfFile" accept=".pdf"><br><br>

<textarea id="lvText" placeholder="Plak LV tekst of upload PDF"></textarea>

<button onclick="analyse()">Analyse</button>

<div id="out"></div>

</div>

<script>

// ===== PDF =====
function loadScript(url){
  return new Promise(res=>{
    let s=document.createElement("script");
    s.src=url;
    s.onload=res;
    document.body.appendChild(s);
  });
}

async function handlePDF(file){
  try{
    if(typeof pdfjsLib==="undefined"){
      await loadScript("https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js");
    }

    let reader=new FileReader();

    reader.onload=async function(){
      let pdf=await pdfjsLib.getDocument(new Uint8Array(this.result)).promise;
      let text="";

      for(let i=1;i<=pdf.numPages;i++){
        let page=await pdf.getPage(i);
        let c=await page.getTextContent();
        text+=c.items.map(i=>i.str).join(" ")+"\n";
      }

      lvText.value=text;
    };

    reader.readAsArrayBuffer(file);

  }catch(e){
    alert("PDF fout: "+e);
  }
}

pdfFile.onchange = e=>{
  if(e.target.files[0]) handlePDF(e.target.files[0]);
};

// ===== FASES =====
const fases = [
  {name:"Bauabschnitt 1", plan:"planstraße c"},
  {name:"Bauabschnitt 2", plan:"planstraße e"},
  {name:"Bauabschnitt 3", plan:"planstraße d teil 1"},
  {name:"Bauabschnitt 4", plan:"planstraße d teil 2"}
];

// ===== TEKST PER FASE =====
function getPhaseText(text, plan){
  let idx = text.indexOf(plan);
  if(idx === -1) return "";
  return text.substring(idx, idx + 4000);
}

// ===== SIMPELE VERTALING =====
function translate(sentence){

  let map = {
    "erschließung":"aanleg",
    "kanalbau":"riolering",
    "versorgungsarbeiten":"nutsvoorzieningen",
    "baustraßen":"bouwwegen",
    "ohne unterbrechung":"zonder onderbreking",
    "fertigzustellen":"afronden",
    "arbeiten":"werkzaamheden",
    "beginn":"start",
    "fertiggestellt":"afgerond",
    "nicht parallel":"niet gelijktijdig",
    "bauabschnitt":"fase"
  };

  let nl = sentence;

  for(let k in map){
    let reg = new RegExp(k,"gi");
    nl = nl.replace(reg, map[k]);
  }

  return nl;
}

// ===== ZINNEN SPLITSEN =====
function extractSentences(text){

  if(!text) return [];

  let raw = text.split(/[.\n]/);

  let clean = raw
    .map(s=>s.trim())
    .filter(s=>s.length > 25);

  return clean;
}

// ===== MAIN =====
function analyse(){

  try{

    let text = lvText.value.toLowerCase();

    let html = "";

    fases.forEach(f=>{

      let t = getPhaseText(text, f.plan);
      let sentences = extractSentences(t);

      html += `
      <div class="section">

        <h2>${f.name} – ${f.plan.toUpperCase()}</h2>

        ${sentences.map(s=>`
          <div class="de">${s}</div>
          <div class="nl">${translate(s)}</div>
        `).join("") || "<p>Geen tekst gevonden</p>"}

      </div>
      `;
    });

    out.innerHTML = html;

  }catch(e){
    out.innerHTML = "<div class='section high'>Fout: "+e+"</div>";
  }
}

</script>

</body>
</html>
