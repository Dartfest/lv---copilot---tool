<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>LV Analyse PRO Tool</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body { font-family: Arial; padding:20px; background:#f4f6f8; }
textarea { width:100%; height:160px; }
button { padding:8px 14px; margin:6px; }
.box { background:#fff; padding:15px; margin-bottom:15px; border-radius:6px; }

.section { background:#fff; border-left:5px solid #2563eb; padding:15px; margin:10px 0; }

.risk-high { color:#b91c1c; font-weight:bold; }
.risk-mid { color:#f59e0b; font-weight:bold; }
.risk-low { color:#15803d; font-weight:bold; }

.gantt { margin-top:10px; }
.bar {
  height:20px;
  background:#2563eb;
  margin:6px 0;
  border-radius:4px;
}
</style>
</head>

<body>

<h1>LV Analyse PRO (Hybride Tool)</h1>

<div class="box">
<input type="file" id="file" accept=".pdf">
<button onclick="leesLV()">Lees PDF</button>
<button onclick="analyse()">Analyse</button>
<button onclick="exportPDF()">Export PDF</button>
<textarea id="lvText"></textarea>
</div>

<div id="result"></div>

<script>

// ===== PDF =====
async function leesLV(){
  const f = document.getElementById("file").files[0];
  if(!f) return alert("Kies PDF");

  const buffer = await f.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({data:buffer}).promise;

  let text="";
  for(let i=1;i<=pdf.numPages;i++){
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    content.items.forEach(it => text += it.str + " ");
  }

  document.getElementById("lvText").value = text;
}

// ===== ANALYSE =====
let analyseData = {};

function analyse(){

  const text = document.getElementById("lvText").value.toLowerCase();

  const has = (w) => text.includes(w);

  // ===== FASERING =====
  let fases = [];
  let match;
  const regex = /(\d+)\.\s*bauabschnitt/gi;

  while((match = regex.exec(text))){
    fases.push("Fase " + match[1]);
  }

  if(fases.length === 0) fases = ["Projectfase"];

  // ===== RISICO =====
  let score = 0;
  let risicoLijst = [];

  if(has("nicht parallel")){
    score += 2;
    risicoLijst.push("Geen parallel werk mogelijk");
  }

  if(has("nicht vergütet")){
    score += 2;
    risicoLijst.push("Kosten worden niet vergoed");
  }

  if(has("drittfirmen")){
    score += 2;
    risicoLijst.push("Afhankelijk van derden");
  }

  if(has("ohne unterbrechung")){
    score += 1;
    risicoLijst.push("Continue uitvoering vereist");
  }

  let risiconiveau = "Laag";
  let css = "risk-low";

  if(score >= 5){
    risiconiveau = "Hoog";
    css = "risk-high";
  } else if(score >= 3){
    risiconiveau = "Middel";
    css = "risk-mid";
  }

  // ===== ACTIEPUNTEN =====
  let acties = [];

  if(has("nicht parallel"))
    acties.push("Planning lineair opbouwen (geen overlap)");

  if(has("drittfirmen"))
    acties.push("Afstemming met nutsbedrijven organiseren");

  if(has("nicht vergütet"))
    acties.push("Kosten en risico’s vooraf incalculeren");

  if(has("ohne unterbrechung"))
    acties.push("Continuïteit personeel en materieel waarborgen");

  if(acties.length === 0)
    acties.push("Standaard projectbewaking uitvoeren");

  // ===== GANTT =====
  let ganttHTML = "";
  fases.forEach((f,i)=>{
    const width = 30 + (i*15);
    ganttHTML += `<div>${f}<div class="bar" style="width:${width}%"></div></div>`;
  });

  analyseData = { risiconiveau, acties, risicoLijst };

  // ===== OUTPUT =====
  document.getElementById("result").innerHTML = `
  <div class="section">
    <h3>Risicoscore</h3>
    <p class="${css}">${risiconiveau}</p>
  </div>

  <div class="section">
    <h3>Risico's</h3>
    <ul class="${css}">
    ${risicoLijst.map(r=>`<li>${r}</li>`).join("")}
    </ul>
  </div>

  <div class="section">
    <h3>Actiepunten</h3>
    <ul>
    ${acties.map(a=>`<li>${a}</li>`).join("")}
    </ul>
  </div>

  <div class="section">
    <h3>Planning (Gantt indicatief)</h3>
    <div class="gantt">${ganttHTML}</div>
  </div>
  `;
}

// ===== PDF =====
function exportPDF(){

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  let y=20;

  doc.text("Risicoscore: " + analyseData.risiconiveau,10,y);
  y+=10;

  analyseData.risicoLijst.forEach(r=>{
    doc.text("- "+r,10,y);
    y+=5;
  });

  y+=10;

  analyseData.acties.forEach(a=>{
    doc.text("* "+a,10,y);
    y+=5;
  });

  doc.save("LV_Analyse_PRO.pdf");
}

</script>

</body>
</html>
