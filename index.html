<script>

// ===== PARSE EXACTE STRUCTUUR =====
function parsePhases(t){

  let regex = /(\d)\.\s*bauabschnitt:\s*planstraße\s*([a-z]).*?(teil\s*\d)?/gi;
  let phases = [];
  let m;

  while((m = regex.exec(t))){

    let nr = m[1];
    let plan = m[2].toUpperCase();
    let teil = m[3] ? m[3].toUpperCase() : "";

    let name = `Bauabschnitt ${nr} - Planstraße ${plan} ${teil}`;

    phases.push({
      nr: parseInt(nr),
      plan,
      teil,
      name
    });
  }

  return phases.sort((a,b)=>a.nr - b.nr);
}

// ===== SPLIT TEKST PER FASE =====
function splitPerPhase(t, phases){

  let result = [];

  phases.forEach((p,i)=>{

    let startIndex = t.toLowerCase().indexOf(p.plan.toLowerCase());
    let endIndex = i < phases.length-1 
      ? t.toLowerCase().indexOf(phases[i+1].plan.toLowerCase())
      : t.length;

    let sub = t.substring(startIndex, endIndex);

    result.push({...p, text: sub});
  });

  return result;
}

// ===== MATERIAAL =====
function extractMaterials(text){

  let matches = text.match(/(dn\s*\d+).*?(pvc|pe|stahl|guss|rohr|leitung)?/gi) || [];
  let map = {};

  matches.forEach(m=>{
    let dn = (m.match(/dn\s*\d+/i)||[""])[0].toUpperCase();
    let type = (m.match(/pvc|pe|stahl|guss|rohr|leitung/i)||["Onbekend"])[0];
    let key = dn + " " + type;

    map[key] = (map[key]||0)+1;
  });

  return map;
}

// ===== RISICO =====
function analyseRisico(text){

  let r=[], k=[];

  if(text.includes("nicht parallel")){
    r.push("Geen parallel uitvoering mogelijk");
    k.push("Fases blokkeren elkaar");
  }

  if(text.includes("unterbrechung")){
    r.push("Onderbreking mogelijk");
    k.push("Stilstand tussen fases");
  }

  if(text.includes("drittfirmen")){
    r.push("Afhankelijkheid derden");
    k.push("Planning afhankelijk van nutsbedrijven");
  }

  if(text.includes("nicht vergütet")){
    r.push("Niet vergoede werkzaamheden");
    k.push("Kosten bij aannemer");
  }

  return {r,k};
}

// ===== GROTE SAMENVATTING =====
function bigSummary(p){

  return `
  ${p.name} vormt een essentiële fase binnen het project en bepaalt de voortgang van de totale uitvoering.

  Deze fase is gepositioneerd als stap ${p.nr} binnen de fasering en kan pas starten na afronding van de voorgaande fase.
  Hierdoor ontstaat een kettingreactie waarbij vertraging direct effect heeft op de totale planning.

  Binnen deze fase worden werkzaamheden uitgevoerd aan ${p.plan}, 
  waarbij de uitvoering afhankelijk is van zowel interne planning als externe partijen.

  Contractueel is de uitvoering beperkt door fasering en mogelijk ontbreken van parallelle werkzaamheden, 
  wat leidt tot verhoogde druk op doorlooptijd en uitvoering.

  Indien sprake is van deeluitvoering (${p.teil || "geen opsplitsing"}), 
  vereist dit extra coördinatie binnen dezelfde planstraat.

  Conclusie: deze fase vraagt om strakke planning, goede voorbereiding en actieve sturing op risico’s en uitvoering.
  `;
}

// ===== MAIN =====
function analyse(){

  let t = lvText.value.toLowerCase();
  if(!t) return;

  let phases = parsePhases(t);
  let split = splitPerPhase(t, phases);

  out.innerHTML = split.map(p=>{

    let mat = extractMaterials(p.text);
    let ris = analyseRisico(p.text);

    return `
    <div class="section">

      <h2>${p.name}</h2>

      <p>${bigSummary(p)}</p>

      <h3>Risico’s</h3>
      <ul>${ris.r.map(x=>`<li class="high">${x}</li>`).join("")}</ul>

      <h3>Knelpunten</h3>
      <ul>${ris.k.map(x=>`<li class="mid">${x}</li>`).join("")}</ul>

      <h3>Bestellijst</h3>
      ${Object.entries(mat).map(([k,v])=>`
        <div class="card">${k} → ${v}x</div>
      `).join("")}

    </div>
    `;

  }).join("");
}

</script>
