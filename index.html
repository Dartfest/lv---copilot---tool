<script>

// ===== PDF =====
function loadScript(url){
  return new Promise(res=>{
    let s=document.createElement("script");
    s.src=url;
    s.onload=res;
    document.body.appendChild(s);
  });
}

async function handlePDF(file){
  try{
    if(typeof pdfjsLib==="undefined"){
      await loadScript("https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js");
    }

    let reader=new FileReader();

    reader.onload=async function(){
      let pdf=await pdfjsLib.getDocument(new Uint8Array(this.result)).promise;
      let text="";

      for(let i=1;i<=pdf.numPages;i++){
        let page=await pdf.getPage(i);
        let c=await page.getTextContent();
        text+=c.items.map(i=>i.str).join(" ")+"\n";
      }

      lvText.value=text;
    };

    reader.readAsArrayBuffer(file);

  }catch(e){
    alert("PDF fout: "+e);
  }
}

pdfFile.onchange=e=>{
  if(e.target.files[0]) handlePDF(e.target.files[0]);
};

// ===== OZ DATA =====
let ozData = [];

// ===== OZ EXTRACT (ECHT OP JOUW LV GEBASEERD) =====
function extractOZ(){

  let text = lvText.value;

  // fallback voorbeeld
  if(!text.trim()){
    text = `
1.1.10.
Baustelle einrichten und vorhalten
Verladen, Anfahren, Abladen und Aufstellen aller notwendigen Baubüros...
Die Abrechnung erfolgt prozentual nach Baufortschritt.
1,000 psch
    `;
  }

  let lines = text.split("\n");

  ozData = [];
  let current = null;

  for(let i=0;i<lines.length;i++){

    let line = lines[i].trim();

    // ===== START NIEUW OZ =====
    if(/^\d+(\.\d+)+\.?$/.test(line)){

      if(current) ozData.push(current);

      current = {
        nr: line,
        title: "",
        desc: "",
        qty: ""
      };

      // titel = volgende regel
      current.title = (lines[i+1] || "").trim();
      i++;

      continue;
    }

    if(current){

      // ===== HOEVEELHEID HERKENNEN =====
      if(/[\d,.]+\s*(psch|m²|m2|m|stk|st|kg)/i.test(line)){
        current.qty = line;
      } else {
        current.desc += " " + line;
      }

    }
  }

  if(current) ozData.push(current);

  renderOZ();
}

// ===== RENDER =====
function renderOZ(){

  let html = `<div class="section"><h2>OZ Lijst + Hoeveelheden</h2>`;

  ozData.forEach(item=>{

    html += `
    <div class="oz">

      <h3>${item.nr} – ${item.title}</h3>

      <b>Omschrijving (DE):</b><br>
      ${item.desc || "-"}<br><br>

      <b>Hoeveelheid:</b><br>
      ${item.qty || "Niet gevonden"}<br><br>

      <b>Vertaling (NL):</b><br>
      ${translateOZ(item.desc)}

    </div>
    `;
  });

  html += "</div>";

  ozOut.innerHTML = html;
}

// ===== VERTALING (VERBETERD) =====
function translateOZ(text){

  if(!text) return "";

  let t = text.toLowerCase();

  if(t.includes("baustelle einrichten")){
    return `
Het inrichten en in stand houden van de bouwplaats.

Werkzaamheden omvatten:
- transport, aanvoer en plaatsing van bouwketen en voorzieningen
- sanitaire units en werkplekken
- inzet van machines en materieel
- aansluiting van energie- en nutsvoorzieningen
- aanleg van bouwwegen en verhardingen

Daarnaast:
- onderhoud gedurende de bouwperiode
- terreinhuur door aannemer
- opstellen van bouwplaatsinrichtingsplan

Afrekening vindt plaats op basis van voortgang.
    `;
  }

  return "Werkzaamheden volgens bestektekst.";
}

// ===== EXPORT =====
function exportOZ(){

  if(ozData.length === 0){
    alert("Geen OZ data");
    return;
  }

  let content = ozData.map(item =>
    item.nr + " " + item.title + "\n" +
    item.desc + "\n" +
    "Hoeveelheid: " + item.qty + "\n" +
    "NL: " + translateOZ(item.desc) + "\n\n"
  ).join("");

  let blob = new Blob([content], {type:"text/plain"});
  let a = document.createElement("a");

  a.href = URL.createObjectURL(blob);
  a.download = "OZ_lijst.txt";
  a.click();
}

</script>
