<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>LV Tool Slim</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body { font-family: Arial; padding:20px; background:#f4f6f8; }

input, textarea { width:100%; margin:5px 0; }
button { margin:5px 0; }

.section { background:#fff; padding:12px; margin:10px 0; border-left:5px solid #2563eb; }

.high { color:#dc2626; font-weight:bold; }
.mid { color:#f59e0b; font-weight:bold; }
.low { color:#16a34a; font-weight:bold; }

</style>
</head>

<body>

<h1>LV Tool Slim</h1>

<input id="user" placeholder="Gebruiker">
<button onclick="login()">Start</button>

<div id="app" style="display:none;">

<input id="projectName" placeholder="Project naam">
<textarea id="lvText" placeholder="Plak hier je LV tekst"></textarea>

<button onclick="saveProject()">Opslaan</button>
<button onclick="analyse()">Analyse</button>
<button onclick="exportPDF()">Export PDF</button>

<h3>Projecten</h3>
<div id="projects"></div>

<div id="result"></div>

</div>

<script>

let currentUser="";

// ===== LOGIN =====
function login(){
  currentUser=document.getElementById("user").value;
  document.getElementById("app").style.display="block";
  loadProjects();
}

// ===== SAVE =====
function saveProject(){
  let p=JSON.parse(localStorage.getItem("p")||"[]");

  p.push({
    user:currentUser,
    name:document.getElementById("projectName").value,
    text:document.getElementById("lvText").value
  });

  localStorage.setItem("p",JSON.stringify(p));
  loadProjects();
}

// ===== LOAD =====
function loadProjects(){
  let p=JSON.parse(localStorage.getItem("p")||"[]");

  document.getElementById("projects").innerHTML =
    p.filter(x=>x.user===currentUser).map(x=>`
      <div class="section">
        <b>${x.name}</b>
        <button onclick="openProject(\`${x.text}\`)">Open</button>
      </div>
    `).join("");
}

function openProject(t){
  document.getElementById("lvText").value=t;
}

// ===== VERTALING =====
function vertaal(t){
  return t
    .replace(/nicht/gi,"niet")
    .replace(/arbeiten/gi,"werkzaamheden")
    .replace(/fertigstellung/gi,"afronding")
    .replace(/beginn/gi,"start")
    .replace(/bau/gi,"bouw");
}

// ===== SAMENVATTING =====
function samenvatting(text){
  let regels=text.split(".");
  return regels.filter(r =>
    r.includes("bau") ||
    r.includes("arbeiten") ||
    r.includes("beginn")
  ).slice(0,6);
}

// ===== DATUM =====
const maanden={
  januar:1,februar:2,mûÊrz:3,april:4,mai:5,juni:6,
  juli:7,august:8,september:9,oktober:10,november:11,dezember:12
};

function planning(text){
  let r=/(juni|juli|august|mai|april|mûÊrz)\s+(20\d{2})/gi;
  let m, arr=[];
  while((m=r.exec(text))){
    arr.push(m[1]+" "+m[2]);
  }
  return arr;
}

// ===== RISICO =====
function risico(text){

  let c=[], p=[], u=[];

  if(text.includes("nicht vergû¥tet"))
    c.push("Kosten niet vergoed");

  if(text.includes("nicht parallel"))
    p.push("Geen parallel werk mogelijk");

  if(text.includes("drittfirmen"))
    u.push("Afhankelijkheid derden");

  let score = c.length + p.length + u.length;

  let label = score>=3 ? ["HOOG","high"]
             : score>=2 ? ["MIDDEL","mid"]
             : ["LAAG","low"];

  return {c,p,u,label};
}

// ===== ANALYSE =====
function analyse(){

  let t=document.getElementById("lvText").value.toLowerCase();

  let sam=samenvatting(t);
  let plan=planning(t);
  let r=risico(t);

  let html=`

  <div class="section">
    <h3>Samenvatting</h3>
    <ul>
      ${sam.map(s=>`<li>${vertaal(s)}</li>`).join("")}
    </ul>
  </div>

  <div class="section">
    <h3>Planning</h3>
    <ul>${plan.map(p=>`<li>${p}</li>`).join("")}</ul>
  </div>

  <div class="section">
    <h3>Risico (${r.label[0]})</h3>

    <b>Contract:</b>
    <ul>${r.c.map(x=>`<li class="${r.label[1]}">${x}</li>`).join("")}</ul>

    <b>Planning:</b>
    <ul>${r.p.map(x=>`<li class="${r.label[1]}">${x}</li>`).join("")}</ul>

    <b>Uitvoering:</b>
    <ul>${r.u.map(x=>`<li class="${r.label[1]}">${x}</li>`).join("")}</ul>
  </div>
  `;

  document.getElementById("result").innerHTML=html;
}

// ===== PDF =====
function exportPDF(){
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  doc.text("LV Analyse",10,10);
  doc.text(document.getElementById("result").innerText,10,20);

  doc.save("analyse.pdf");
}

</script>

</body>
</html>
