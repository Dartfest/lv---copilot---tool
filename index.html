<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>LV Intelligence – Directie Analyse</title>

<style>
body { font-family: Arial; margin:0; background:#eef2f7; }
.header { background:#0f172a; color:#fff; padding:15px; font-size:22px; }
.container { padding:20px; }

textarea { width:100%; height:140px; margin-bottom:10px; }

button {
  padding:10px 15px;
  background:#2563eb;
  color:#fff;
  border:none;
  cursor:pointer;
}

.section { background:#fff; padding:20px; margin-top:15px; border-radius:10px; }

.high { color:#dc2626; }
.mid { color:#f59e0b; }

ul { margin-top:5px; }
</style>
</head>

<body>

<div class="header">LV Intelligence – Directie Analyse</div>

<div class="container">

<!-- ✅ UPLOAD KNOP -->
<input type="file" id="pdfFile" accept=".pdf"><br><br>

<textarea id="lvText" placeholder="Plak LV tekst of upload PDF"></textarea>

<button onclick="analyse()">Analyse</button>

<div id="out"></div>

</div>

<script>

// ===== PDF SCRIPT LOADER =====
function loadScript(url){
  return new Promise(res=>{
    let s=document.createElement("script");
    s.src=url;
    s.onload=res;
    document.body.appendChild(s);
  });
}

// ===== PDF INLEZEN =====
async function handlePDF(file){

  try{

    if(typeof pdfjsLib === "undefined"){
      await loadScript("https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js");
    }

    let reader = new FileReader();

    reader.onload = async function(){

      let pdf = await pdfjsLib.getDocument(new Uint8Array(this.result)).promise;
      let text = "";

      for(let i=1;i<=pdf.numPages;i++){
        let page = await pdf.getPage(i);
        let content = await page.getTextContent();
        text += content.items.map(i=>i.str).join(" ") + "\n";
      }

      document.getElementById("lvText").value = text;

    };

    reader.readAsArrayBuffer(file);

  } catch(e){
    alert("PDF laden mislukt: " + e);
  }
}

// ===== UPLOAD EVENT =====
document.getElementById("pdfFile").onchange = function(e){
  if(e.target.files[0]) handlePDF(e.target.files[0]);
};

// ===== FASES =====
const fases = [
  {
    name:"Bauabschnitt 1",
    plan:"Planstraße C",
    periode:"06/2026 → 07/2027"
  },
  {
    name:"Bauabschnitt 2",
    plan:"Planstraße E",
    periode:"aansluitend → 07/2027"
  },
  {
    name:"Bauabschnitt 3",
    plan:"Planstraße D Teil 1",
    periode:"08/2027 → 05/2028"
  },
  {
    name:"Bauabschnitt 4",
    plan:"Planstraße D Teil 2",
    periode:"aansluitend → 05/2028"
  }
];

// ===== SAMENVATTING =====
function summary(f){
return `
<p>
${f.name} (${f.plan}) betreft een volledig uitvoeringsdeel van het project waarbij alle civieltechnische werkzaamheden integraal worden uitgevoerd.
Binnen deze fase worden rioleringssystemen, nutsvoorzieningen en tijdelijke infrastructuur gerealiseerd.
</p>

<p>
De werkzaamheden moeten aaneengesloten worden uitgevoerd zonder onderbreking.
Dit betekent dat personeel, materieel en materiaal continu beschikbaar moeten zijn gedurende de uitvoering.
</p>

<p>
De fase is direct afhankelijk van de voorgaande fase en maakt onderdeel uit van een lineaire planning.
Parallel werken is contractueel uitgesloten, waardoor iedere vertraging directe impact heeft op de totale projectplanning.
</p>

<p class="high">
Conclusie: deze fase ligt op het kritieke pad en vereist strakke planning, continue uitvoering en intensieve coördinatie.
</p>
`;
}

// ===== WERKZAAMHEDEN =====
function werkzaamheden(){
return `
<ul>
<li>Aanleg rioleringssystemen (kanaalbouw)</li>
<li>Uitvoering nutsvoorzieningen (water, elektra, telecom)</li>
<li>Aanleg bouwwegen (Baustraßen)</li>
<li>Grondwerk en sleufwerkzaamheden</li>
<li>Aansluitingen op bestaande netwerken</li>
<li>Afwerking en oplevering</li>
</ul>
`;
}

// ===== RISICO =====
function risico(f){
return `
<ul>
<li class="high">Geen parallel uitvoering mogelijk → volledige afhankelijkheid</li>
<li class="high">Strikte einddatum (${f.periode})</li>
<li class="high">Geen onderbreking toegestaan → hoge uitvoeringsdruk</li>
<li class="mid">Afhankelijkheid van nutsbedrijven</li>
<li class="mid">Logistieke beperkingen</li>
</ul>
`;
}

// ===== KRITIEKE PAD =====
function critical(){
return `
<div class="section">
<h2>Kritieke Pad</h2>

<p><b>BA1 → BA2 → BA3 → BA4</b></p>

<p class="high">
Volledig sequentieel – geen parallel uitvoering mogelijk.
Elke vertraging werkt direct door in het hele project.
</p>
</div>
`;
}

// ===== MAIN =====
function analyse(){

  let html = critical();

  fases.forEach(f=>{

    html += `
    <div class="section">

      <h2>${f.name} – ${f.plan}</h2>

      <h3>Periode</h3>
      <p><b>${f.periode}</b></p>

      ${summary(f)}

      <h3>Werkzaamheden</h3>
      ${werkzaamheden()}

      <h3>Risico’s</h3>
      ${risico(f)}

    </div>
    `;
  });

  document.getElementById("out").innerHTML = html;
}

</script>

</body>
</html>
