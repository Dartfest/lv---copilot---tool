<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kanalbau AI FINAL</title>

<style>
body{font-family:Arial;background:#eef2f7;padding:20px;}

textarea{width:100%;height:150px;padding:10px;}
button{margin-top:10px;padding:10px 20px;background:#2563eb;color:white;border:none;border-radius:6px;cursor:pointer;}

.box{background:white;margin-top:15px;padding:12px;border-radius:8px;}
.green{color:green;font-weight:bold;}
.orange{color:orange;font-weight:bold;}
.red{color:red;font-weight:bold;}
</style>

</head>

<body>

<h2>📧 Email analyseren</h2>

<textarea id="mail"></textarea>
<br>
<button onclick="analyse()">Analyseer</button>

<h2>📊 Resultaten</h2>
<div id="result"></div>

<h2>💾 Opgeslagen projecten</h2>
<div id="saved"></div>

<h2>🔍 Detail</h2>
<div id="detail">Nog niets geselecteerd</div>

<script>

// ===== KEYWORDS =====
let keywords = [
{woord:"kanalbau",score:40},
{woord:"tiefbau",score:30},
{woord:"erschließung",score:25},
{woord:"druckrohr",score:25},
{woord:"schmutzwasser",score:20},
{woord:"regenwasser",score:15},
{woord:"straßenbau",score:15},
{woord:"elektro",score:-60},
{woord:"sanitär",score:-70}
];

// ===== STORAGE =====
let saved = JSON.parse(localStorage.getItem("kanalbau")) || [];

function saveData(){
localStorage.setItem("kanalbau", JSON.stringify(saved));
}

// ===== ANALYSE =====
function checkProject(text){

let score = 0;
let redenen = [];

keywords.forEach(k=>{
if(text.includes(k.woord)){
score += k.score;
redenen.push((k.score>0?"✔ ":"✖ ")+k.woord);
}
});

let status="Niet interessant";
let kleur="red";

if(score>=80){status="🔥 TOP";kleur="green";}
else if(score>=40){status="Interessant";kleur="orange";}

return {score,status,kleur,redenen,text};

}

// ===== MAIN =====
function analyse(){

let input = document.getElementById("mail").value.toLowerCase();

// ✅ SIMPEL & BETROUWBAAR split
let stukken = input.split(/\n|\./);

// fallback
if(stukken.length < 2){
stukken = [input];
}

let html="";
window.current = [];

stukken.forEach((stuk,i)=>{

if(stuk.trim().length < 10) return;

let p = checkProject(stuk);

window.current.push(p);

html += `
<div class="box">
<b>${p.status}</b> | Score ${p.score}<br>
<button onclick="save(${i})">💾 Opslaan</button>
<button onclick="detailCurrent(${i})">🔍 Detail</button>
</div>
`;

});

document.getElementById("result").innerHTML = html || "Geen tekst gevonden";

}

// ===== OPSLAAN =====
function save(i){

let p = window.current[i];

saved.push(p);
saveData();
renderSaved();

alert("✅ Opgeslagen");

}

// ===== SAVED TONEN =====
function renderSaved(){

let html="";

saved.forEach((p,i)=>{
html += `
<div class="box" onclick="detailSaved(${i})">
<b>${p.status}</b> | ${p.score}
</div>
`;
});

document.getElementById("saved").innerHTML =
html || "Nog niets opgeslagen";

}

// ===== DETAIL =====
function detailCurrent(i){
let p = window.current[i];
showDetail(p);
}

function detailSaved(i){
let p = saved[i];
showDetail(p);
}

function showDetail(p){

document.getElementById("detail").innerHTML = `
<b>Status:</b> <span class="${p.kleur}">${p.status}</span><br>
<b>Score:</b> ${p.score}<br><br>
${p.redenen.join("<br>")}
`;

}

// init
renderSaved();

</script>

</body>
</html>
