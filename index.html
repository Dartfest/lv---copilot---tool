<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Excel Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- SheetJS (Excel lezen) -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      padding: 20px;
      margin: 0;
    }

    h1, h2 {
      text-align: center;
    }

    .upload {
      text-align: center;
      margin-bottom: 20px;
    }

    .filters {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    select, input {
      padding: 6px 10px;
      font-size: 14px;
    }

    .dashboard {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,.1);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 6px 8px;
    }

    th {
      background: #e9ecef;
      position: sticky;
      top: 0;
    }

    .table-wrapper {
      max-height: 400px;
      overflow-y: auto;
    }
  </style>
</head>
<body>

<h1>📊 Excel Dashboard</h1>

<div class="upload">
  <input type="file" id="upload" accept=".xlsx,.xls">
</div>

<div class="filters">
  <select id="filterKW"><option value="">Alle weken</option></select>
  <select id="filterKP"><option value="">Alle kostenplaatsen</option></select>
  <select id="filterGA"><option value="">Alle Geräteart</option></select>
  <input id="search" placeholder="Zoeken…">
</div>

<div class="dashboard">
  <div class="card">
    <h2>Uren per kostenplaats</h2>
    <canvas id="kpChart"></canvas>
  </div>
  <div class="card">
    <h2>Uren per Geräteart</h2>
    <canvas id="gaChart"></canvas>
  </div>
</div>

<div class="card">
  <h2>📋 Volledige Excel‑data</h2>
  <div class="table-wrapper">
    <table id="dataTable">
      <thead></thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<script>
let brondata = [];
let kpChart, gaChart;

document.getElementById("upload").addEventListener("change", e => {
  const file = e.target.files[0];
  const reader = new FileReader();

  reader.onload = evt => {
    const workbook = XLSX.read(evt.target.result, { type: "binary" });
    const sheet = workbook.Sheets[workbook.SheetNames[0]];
    brondata = XLSX.utils.sheet_to_json(sheet);
    initFilters(brondata);
    render(brondata);
  };

  reader.readAsBinaryString(file);
});

document.getElementById("search").oninput = applyFilters;
filterKW.onchange = applyFilters;
filterKP.onchange = applyFilters;
filterGA.onchange = applyFilters;

function initFilters(data) {
  fill("filterKW", "Kalenderweek", data);
  fill("filterKP", "Kostenplaats", data);
  fill("filterGA", "Geräteart", data);
}

function fill(id, key, data) {
  const s = document.getElementById(id);
  s.innerHTML = `<option value="">Alle</option>`;
  [...new Set(data.map(d => d[key]))].filter(Boolean).sort()
    .forEach(v => s.innerHTML += `<option>${v}</option>`);
}

function applyFilters() {
  const kw = filterKW.value;
  const kp = filterKP.value;
  const ga = filterGA.value;
  const q  = search.value.toLowerCase();

  const f = brondata.filter(r =>
    (!kw || r.Kalenderweek == kw) &&
    (!kp || r.Kostenplaats == kp) &&
    (!ga || r.Geräteart == ga) &&
    Object.values(r).join(" ").toLowerCase().includes(q)
  );

  render(f);
}

function render(rows) {
  if (!rows.length) return;

  // tabel
  dataTable.tHead.innerHTML =
    "<tr>" + Object.keys(rows[0]).map(h => `<th>${h}</th>`).join("") + "</tr>";

  dataTable.tBodies[0].innerHTML =
    rows.map(r => "<tr>" +
      Object.values(r).map(v => `<td>${v}</td>`).join("") + "</tr>").join("");

  charts(rows);
}

function charts(data) {
  if (kpChart) kpChart.destroy();
  if (gaChart) gaChart.destroy();

  const sum = (k) =>
    Object.entries(data.reduce((a,c)=>{a[c[k]]=(a[c[k]]||0)+Number(c.Tijd||0);return a;},{}));

  const kp = sum("Kostenplaats");
  const ga = sum("Geräteart");

  kpChart = new Chart(kpChartElem = kpChartElem || kpChartElem, {
    type:'bar',
    data:{labels:kp.map(x=>x[0]),datasets:[{label:'Uren',data:kp.map(x=>x[1])}]}
  });

  gaChart = new Chart(gaChartElem = gaChartElem || gaChartElem, {
    type:'bar',
    data:{labels:ga.map(x=>x[0]),datasets:[{label:'Uren',data:ga.map(x=>x[1])}]}
  });
}
</script>

</body>
</html>
