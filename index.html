<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LV Copilot Tool – Werkvoorbereiding</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>
body { font-family: Arial, sans-serif; background:#f5f7fa; padding:20px; }
h1,h2 { margin-top:0 }
textarea { width:100%; min-height:180px; font-family:monospace; padding:10px; }
button { padding:8px 14px; background:#2563eb; color:white; border:none; border-radius:4px; cursor:pointer; margin:4px 0; }
button.secondary { background:#6b7280; }
.box { background:white; padding:16px; border-radius:6px; margin-bottom:20px; }
.chunk { padding:12px; border-radius:6px; margin-bottom:12px; }
.red { background:#fee2e2; border-left:6px solid #dc2626; }
.orange { background:#ffedd5; border-left:6px solid #ea580c; }
.green { background:#dcfce7; border-left:6px solid #16a34a; }
.small { font-size:12px; color:#555; }
</style>
</head>

<body>

<h1>LV Copilot Tool – Werkvoorbereiding Infra</h1>
<p class="small">LV → Copilot‑prompt → risico’s / knelpunten / bestellingen</p>

<div class="box">
<h2>1. LV PDF upload</h2>
<input type="file" id="fileInput" accept=".pdf">
<button class="secondary" onclick="readPDF()">PDF lezen</button>
</div>

<div class="box">
<h2>2. LV‑tekst</h2>
<textarea id="lvtext" placeholder="LV‑tekst verschijnt hier..."></textarea>
<button class="secondary" onclick="splitIntoChunks()">Splits in Copilot‑delen</button>
</div>

<div class="box">
<h2>3. Copilot‑delen</h2>
<div id="chunks"></div>
</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const lvtext = document.getElementById("lvtext");
const chunksDiv = document.getElementById("chunks");

async function readPDF() {
  const file = document.getElementById("fileInput").files[0];
  if (!file) { alert("Geen PDF gekozen"); return; }
  const reader = new FileReader();
  reader.onload = async () => {
    const pdf = await pdfjsLib.getDocument(new Uint8Array(reader.result)).promise;
    let text = "";
    for (let i=1;i<=pdf.numPages;i++){
      const page = await pdf.getPage(i);
      const c = await page.getTextContent();
      text += c.items.map(it=>it.str).join(" ") + "\n";
    }
    lvtext.value = text;
  };
  reader.readAsArrayBuffer(file);
}

function splitIntoChunks(){
  chunksDiv.innerHTML="";
  const MAX=3500;
  const parts = lvtext.value.match(new RegExp("[\\s\\S]{1,"+MAX+"}","g")) || [];

  parts.forEach((part,i)=>{
    const r = analyse(part);

    const prompt =
`ROL
Jij bent mijn ZEER ERVAREN digitale werkvoorbereider voor Duitse en Nederlandse
grond-, weg- en rioleringswerken (Tiefbau / Infra).

Gebruik ALTIJD deze structuur:
1. Betekenis in normaal Nederlands
2. Technische kern
3. Uitvoering (praktijk)
4. Werkvoorbereiding – calculatiefase
5. Werkvoorbereiding – na gunning
6. Risico’s, knelpunten en bestellingen
   6A. Risico’s
   6B. Knelpunten
   6C. Bestellen & vastleggen
7. Uitvoerder‑checklist

REGELS
- Geen aannames
- Faalkosten‑gericht
- Praktisch en uitvoerbaar

LV‑DEEL
${part}`;

    const d=document.createElement("div");
    d.className=`chunk ${r.level}`;
    d.innerHTML=`
<strong>DEEL ${i+1}/${parts.length}</strong><br>
Risico’s: ${r.risico.join(", ")||"–"}<br>
Knelpunten: ${r.knelpunt.join(", ")||"–"}<br>
Bestellen: ${r.bestellen.join(", ")||"–"}<br><br>
<pre style="white-space:pre-wrap">${part}</pre>
<button onclick='navigator.clipboard.writeText(${JSON.stringify(prompt)})'>
Kopieer Copilot‑prompt
</button>`;
    chunksDiv.appendChild(d);
  });
}

function analyse(t){
  t=t.toLowerCase();
  const risico=[], knelpunt=[], bestellen=[];
  let level="green";

  if(t.includes("vertrag")||t.includes("freigabe")) risico.push("Contractueel");
  if(t.includes("meerwerk")||t.includes("abweich")) risico.push("Meerwerk");
  if(t.includes("prüfung")||t.includes("keuring")) knelpunt.push("Kwaliteit");
  if(t.includes("verkehr")||t.includes("umleitung")) knelpunt.push("Logistiek");
  if(t.includes("liefer")||t.includes("material")) bestellen.push("Materiaal");
  if(t.includes("gerät")||t.includes("kran")) bestellen.push("Materieel");

  if(risico.length>0) level="red";
  else if(knelpunt.length>0) level="orange";

  return { risico, knelpunt, bestellen, level };
}
</script>

</body>
</html>
