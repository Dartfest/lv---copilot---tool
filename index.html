<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>LV – Planstraße fasering (stabiel)</title>

<!-- ✅ PDF.js – correcte script tag -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
</script>

<style>
body { font-family: Arial, sans-serif; background:#f4f6f8; padding:20px; }
.box { background:#fff; padding:16px; border-radius:6px; margin-bottom:16px; }
textarea {
  width:100%;
  min-height:260px;
  font-family:monospace;
  white-space:pre-wrap;
}
button { padding:6px 12px; margin-top:6px; margin-right:6px; }
.marked {
  background:#fff7ed;
  border:1px solid #fdba74;
  padding:10px;
  font-family:monospace;
  white-space:pre-wrap;
}
.plan {
  margin-top:12px;
  padding:12px;
  border-left:6px solid #2563eb;
  background:#eff6ff;
}
.status-ok { color:green; font-weight:bold; }
</style>
</head>

<body>

<h1>LV – Planstraße fasering (uit LV)</h1>
<p class="status-ok">✅ pdf.js geladen</p>

<div class="box">
  <h2>1. LV lezen</h2>
  <input type="file" id="file" accept=".pdf"><br>
  <button onclick="leesLV()">Lees LV</button>
  <textarea id="lvText" placeholder="LV‑tekst verschijnt hier..."></textarea>
</div>

<div class="box">
  <h2>2. Planstraßen markeren</h2>
  <button onclick="markeer()">Markeer Planstraßen</button>
  <div id="markedOutput" class="marked"></div>
</div>

<div class="box">
  <h2>3. Samenvatting per Planstraße</h2>
  <button onclick="analyse()">Analyseer</button>
  <div id="summary"></div>
</div>

<script>
/* ===== LV LEZEN ===== */
async function leesLV() {
  const f = document.getElementById("file").files[0];
  if (!f) { alert("Kies eerst een PDF"); return; }

  const buf = await f.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: buf }).promise;

  let text = "";
  for (let i = 1; i <= pdf.numPages; i++) {
    const page = await pdf.getPage(i);
    const c = await page.getTextContent();
    const lijnen = c.items.map(it => it.str).filter(t => t.trim());
    text += c.items.map(it => it.str || " ").join("\n") + "\n\n";
  }
  lvText.value = text;
}

/* ===== MARKEREN ===== */
function markeer() {
  markedOutput.textContent =
    lvText.value.replace(/(Planstraße\s+[A-Z])/g, "➡️ $1 ⬅️");
}

/* ===== ANALYSE PLANSTRASSE + FASE ===== */
function analyse() {
  summary.innerHTML = "";

  const planRegex = /Planstraße\s+([A-Z])/gi;
  const dateRegex =
    /(von\s+\d{1,2}[.\-]\d{1,2}[.\-]\d{4}\s+bis\s+\d{1,2}[.\-]\d{1,2}[.\-]\d{4})|
     (\d{1,2}[.\-]\d{1,2}[.\-]\d{4}\s*(t\/m|bis|-)\s*\d{1,2}[.\-]\d{1,2}[.\-]\d{4})|
     (KW\s*\d+\s*(–|-)\s*\d+)/gi;

  const data = {};
  let m;

  while ((m = planRegex.exec(lvText.value)) !== null) {
    const key = "Planstraße " + m[1];
    if (!data[key]) data[key] = new Set();

    const frag = lvText.value.substring(m.index, m.index + 1000);
    let d;
    while ((d = dateRegex.exec(frag)) !== null) {
      data[key].add(d[0]);
    }
  }

  Object.keys(data).sort().forEach(k => {
    const div = document.createElement("div");
    div.className = "plan";
    div.innerHTML =
      "<strong>" + k + "</strong><ul>" +
      (data[k].size
        ? [...data[k]].map(p => "<li>"+p+"</li>").join("")
        : "<li>Geen faseperiode in LV vermeld</li>") +
      "</ul>";
    summary.appendChild(div);
  });
}
</script>

</body>
</html>
