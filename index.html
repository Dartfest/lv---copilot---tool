<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>LV Analyse PRO</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body { font-family: Arial; padding:20px; background:#f4f6f8; }
textarea { width:100%; height:220px; font-family:monospace; }
button { padding:8px 14px; margin:6px; }
.box { background:#fff; padding:15px; margin-bottom:15px; border-radius:6px; }
.plan { background:#eef6ff; border-left:5px solid #2563eb; padding:12px; margin:10px 0; }
.risk { color:#b91c1c; font-weight:bold; }
</style>
</head>

<body>

<h1>LV Analyse (PRO)</h1>

<div class="box">
<input type="file" id="file" accept=".pdf">
<button onclick="leesLV()">Lees PDF</button>
<button onclick="analyse()">Analyse</button>
<button onclick="exportPDF()">Export PDF</button>
<textarea id="lvText"></textarea>
</div>

<div id="result"></div>

<script>

// ================= PDF =================
async function leesLV(){
  const f = document.getElementById("file").files[0];
  if(!f) return alert("Kies PDF");

  const buffer = await f.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({data:buffer}).promise;

  let text="";
  for(let i=1;i<=pdf.numPages;i++){
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    content.items.forEach(it => text += it.str + " ");
  }

  document.getElementById("lvText").value = text;
}

// ================= SAMENVATTING =================
function samenvatting(f){
  return [
    "Aanleg riolering en drainage",
    "Aanbrengen kabels en leidingen",
    "Realisatie bouwwegen",
    "Afstemming met nutsbedrijven",
    f.afhankelijk ? "Start afhankelijk van vorige fase" : "",
    f.verplichteWacht ? "Onderbreking tussen fases noodzakelijk" : ""
  ].filter(Boolean);
}

// ================= RISICO =================
function risico(f){
  let r=[];
  if(f.afhankelijk) r.push("Afhankelijk van vorige fase - kans op vertraging");
  if(f.geenParallel) r.push("Geen parallel werk mogelijk - kritische planning");
  if(f.verplichteWacht) r.push("Onderbreking - extra kosten en stilstand");
  return r.length ? r : ["Geen bijzonderheden"];
}

// ================= DATA =================
let fasesGlobaal = [];

// ================= ANALYSE =================
function analyse(){

  const out = document.getElementById("result");
  out.innerHTML="";

  fasesGlobaal = [

    {
      naam:"1. Bauabschnitt",
      plan:"Planstraße C",
      start:new Date(2026,5,1),
      eind:new Date(2027,6,31),
      geenParallel:true
    },

    {
      naam:"2. Bauabschnitt",
      plan:"Planstraße E",
      start:new Date(2027,7,1), // NA fase 1
      eind:new Date(2027,8,15), // realistische duur toegevoegd
      afhankelijk:1,
      geenParallel:true
    },

    {
      naam:"3. Bauabschnitt",
      plan:"Planstraße D - Teil 1",
      start:new Date(2027,7,1),
      eind:new Date(2028,3,30),
      verplichteWacht:true,
      geenParallel:true
    },

    {
      naam:"4. Bauabschnitt",
      plan:"Planstraße D - Teil 2",
      start:new Date(2028,4,1),
      eind:new Date(2028,4,31),
      afhankelijk:3,
      geenParallel:true
    }

  ];

  // ===== veiligheidscheck (geen 0 dagen) =====
  fasesGlobaal.forEach(f=>{
    if(f.start && f.eind && f.start.getTime() === f.eind.getTime()){
      f.eind = new Date(f.eind.getTime() + 1000*60*60*24*30);
    }
  });

  // ===== OUTPUT =====
  fasesGlobaal.forEach(f=>{

    const div=document.createElement("div");
    div.className="plan";

    div.innerHTML=`
    <strong>${f.naam}: ${f.plan}</strong><br>

    <b>Periode:</b> ${f.start.toLocaleDateString()} - ${f.eind.toLocaleDateString()}<br><br>

    <b>Samenvatting:</b>
    <ul>
    ${samenvatting(f).map(s=>`<li>${s}</li>`).join("")}
    </ul>

    <b>Risico's:</b>
    <ul class="risk">
    ${risico(f).map(r=>`<li>${r}</li>`).join("")}
    </ul>
    `;

    out.appendChild(div);
  });
}

// ================= PDF EXPORT =================
function exportPDF(){

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  let y = 15;

  doc.setFontSize(16);
  doc.text("LV Analyse Rapport", 10, y);
  y += 10;

  fasesGlobaal.forEach(f=>{

    if(y > 260){
      doc.addPage();
      y = 15;
    }

    doc.setFontSize(12);
    doc.setTextColor(0,0,0);
    doc.text(`${f.naam} - ${f.plan}`, 10, y);
    y += 6;

    doc.setFontSize(10);
    doc.text(
      `Periode: ${f.start.toLocaleDateString()} - ${f.eind.toLocaleDateString()}`,
      10,
      y
    );
    y += 6;

    // SAMENVATTING
    doc.text("Werkzaamheden:", 10, y);
    y += 5;

    samenvatting(f).forEach(s=>{
      const lines = doc.splitTextToSize("- " + s, 180);
      doc.text(lines, 10, y);
      y += lines.length * 5;
    });

    y += 3;

    // RISICO ROOD
    doc.setTextColor(200,0,0);
    doc.text("Risico's:", 10, y);
    y += 5;

    risico(f).forEach(r=>{
      const lines = doc.splitTextToSize("- " + r, 180);
      doc.text(lines, 10, y);
      y += lines.length * 5;
    });

    doc.setTextColor(0,0,0);

    y += 10;

  });

  doc.save("LV_Analyse_Pro.pdf");
}

</script>

</body>
</html>
