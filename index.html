<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>LV → Planstraße → Uitvoering</title>

<!-- ✅ PDF.js CORRECT -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
</script>

<!-- ✅ jsPDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body { font-family: Arial, sans-serif; background:#f4f6f8; padding:20px; }
.box { background:#fff; padding:16px; border-radius:6px; margin-bottom:20px; }
textarea { width:100%; min-height:160px; font-family:monospace; padding:10px; }
button { padding:6px 12px; margin:4px 6px 4px 0; }

.plan { padding:14px; border-left:8px solid; border-radius:6px; margin-top:16px; }
.pa { background:#f3e8ff; border-color:#9333ea; }
.pb { background:#e0f2fe; border-color:#0284c7; }
.pc { background:#dcfce7; border-color:#16a34a; }
.pd { background:#ffedd5; border-color:#ea580c; }
.px { background:#f3f4f6; border-color:#6b7280; }

ul { margin-left:18px; }
</style>
</head>

<body>

<h1>LV – Analyse per Planstraße</h1>

<div class="box">
  <h2>1. LV‑PDF(s)</h2>
  <input type="file" id="lvFiles" multiple accept=".pdf">
  <button onclick="readLV()">Lees LV</button>
  <textarea id="lvText"></textarea>
</div>

<div class="box">
  <h2>2. Analyse per Planstraße</h2>
  <button onclick="analysePlanstrassen()">Analyseer</button>
  <button onclick="exportUitvoerderPDF()">📄 PDF – Uitvoerderssamenvatting</button>
  <div id="output"></div>
</div>

<script>
async function readPDF(file) {
  const buffer = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: buffer }).promise;
  let text = "";
  for (let p = 1; p <= pdf.numPages; p++) {
    const page = await pdf.getPage(p);
    const c = await page.getTextContent();
    text += c.items.map(i => i.str).join(" ") + "\n";
  }
  return text;
}

async function readLV() {
  let t="";
  for (const f of lvFiles.files) t += await readPDF(f);
  lvText.value = t;
}

/* ===== PLANSTRASSE ANALYSE ===== */
let planData = [];

function analysePlanstrassen() {
  planData = [];
  output.innerHTML = "";

  const text = lvText.value;

  // Split alleen op Planstraße
  const parts = text.split(/(Planstraße\s+[A-Z](?:\s*\([^)]+\))?|Plänstraße\s+[A-Z])/i);

  for (let i = 1; i < parts.length; i += 2) {
    const titel = parts[i].trim();
    const inhoud = parts[i+1] || "";
    const t = inhoud.toLowerCase();

    // Kleur bepalen
    let cls = "px";
    if (titel.includes("A")) cls="pa";
    else if (titel.includes("B")) cls="pb";
    else if (titel.includes("C")) cls="pc";
    else if (titel.includes("D")) cls="pd";

    // Risico / aandacht
    const risico = [];
    if (t.includes("abweich") || t.includes("mehr"))
      risico.push("Afwijkingen / meerwerk mogelijk");
    if (t.includes("nicht enthalten") || t.includes("optional"))
      risico.push("Niet volledig opgenomen in contract");
    if (t.includes("hand")) risico.push("Handmatig werk benoemd");

    planData.push({ titel, risico });

    const div = document.createElement("div");
    div.className = `plan ${cls}`;
    div.innerHTML = `
<h3>${titel}</h3>

<strong>Uitvoering – focus voor deze Planstraße:</strong>
<ul>
  <li>Alleen werkzaamheden binnen deze straat uitvoeren</li>
  <li>Productie en planning per straat bewaken</li>
</ul>

<strong>Risico / aandachtspunten vanuit LV:</strong>
${risico.length ? "<ul>"+risico.map(r=>"<li>"+r+"</li>").join("")+"</ul>" : "<p>Geen expliciete risico’s benoemd.</p>"}
`;
    output.appendChild(div);
  }
}

/* ===== UITVOERDERS-PDF ===== */
function exportUitvoerderPDF() {
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF();
  let y = 10;

  pdf.setFontSize(12);
  pdf.text("Uitvoerderssamenvatting per Planstraße",10,y);
  y += 10;
  pdf.setFontSize(10);

  planData.forEach(p => {
    const blok = `
${p.titel}

Uitvoering:
- Werken beperken tot deze Planstraße
- Productie per straat monitoren
- Overgang naar volgende straat expliciet afstemmen

Risico’s:
- ${p.risico.length ? p.risico.join("\n- ") : "Geen expliciete risico’s"}
`;
    const text = pdf.splitTextToSize(blok,180);
    if (y + text.length*5 > 280) {
      pdf.addPage(); y = 10;
    }
    pdf.text(text,10,y);
    y += text.length*5 + 8;
  });

  pdf.save("uitvoerderssamenvatting-planstrassen.pdf");
}
</script>

</body>
</html>
