<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>LV Intelligence – Executive Planning</title>

<style>
body { font-family: Arial; margin:0; background:#eef2f7; }
.header { background:#0f172a; color:#fff; padding:15px; font-size:22px; }
.container { padding:20px; }

textarea { width:100%; height:120px; margin-bottom:10px; }

button {
  padding:8px 12px;
  background:#2563eb;
  color:#fff;
  border:none;
  cursor:pointer;
}

.card { background:#fff; padding:12px; border-radius:6px; margin-bottom:10px; }

.high { color:#dc2626; }
.mid { color:#f59e0b; }

.section {
  background:#fff;
  padding:15px;
  margin-top:12px;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="header">LV Intelligence – Planning Dashboard</div>

<div class="container">

<input type="file" id="pdfFile" accept=".pdf"><br><br>

<textarea id="lvText" placeholder="Plak LV tekst of upload PDF"></textarea>

<button onclick="analyse()">Analyse</button>

<div id="out"></div>

</div>

<script>

// ===== PDF =====
function loadScript(url){
  return new Promise(res=>{
    let s=document.createElement("script");
    s.src=url;
    s.onload=res;
    document.body.appendChild(s);
  });
}

async function handlePDF(file){
  if(typeof pdfjsLib==="undefined"){
    await loadScript("https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js");
  }

  let reader=new FileReader();

  reader.onload=async function(){
    let pdf=await pdfjsLib.getDocument(new Uint8Array(this.result)).promise;
    let text="";

    for(let i=1;i<=pdf.numPages;i++){
      let page=await pdf.getPage(i);
      let c=await page.getTextContent();
      text+=c.items.map(i=>i.str).join(" ")+"\n";
    }

    lvText.value=text;
  };

  reader.readAsArrayBuffer(file);
}

pdfFile.onchange=e=>{
  if(e.target.files[0]) handlePDF(e.target.files[0]);
};

// ===== DATUM =====
const months = {juni:6,juli:7,august:8,mai:5};

function extractDates(t){
  let r=[], m;
  let regex=/(juni|juli|august|mai)\s+(20\d{2})/gi;

  while((m=regex.exec(t))){
    r.push(parseInt(m[2])*12 + months[m[1]]);
  }

  return r;
}

// ===== PLANSTRASSE =====
function detectPlanstrassen(t){
  let matches = t.match(/planstraße\s*[a-z]/gi) || [];
  let unique = [...new Set(matches.map(m=>m.toLowerCase()))];
  return unique.map(p=>p.toUpperCase());
}

// ===== TEIL =====
function detectTeil(t, plan){
  let regex = new RegExp(plan.toLowerCase() + ".*?teil\\s*\\d","gi");
  let match = t.match(regex);

  if(!match) return [plan];

  return match.map((x,i)=>`${plan} - TEIL ${i+1}`);
}

// ===== FASE BOUW =====
function buildPhases(t){

  let plans = detectPlanstrassen(t);
  let phases=[];

  plans.forEach(p=>{
    let delen = detectTeil(t,p);

    delen.forEach(d=>{
      phases.push({ name:d });
    });
  });

  return phases;
}

// ===== DATUM KOPPELING =====
function attachDates(phases,t){

  let dates = extractDates(t);

  return phases.map((p,i)=>{

    let start = dates[i] || dates[0] || 0;
    let end = dates[i+1] || start + 6;

    return {
      ...p,
      start,
      end,
      duur: end - start
    };
  });
}

// ===== RISICO =====
function addRisk(p,t){

  let risico=[];
  let aandacht=[];

  if(t.includes("nicht parallel")){
    risico.push("Gefaseerde uitvoering zonder overlap");
  }

  if(t.includes("unterbrechung")){
    risico.push("Onderbreking tussen fases mogelijk");
  }

  if(t.includes("drittfirmen")){
    risico.push("Afhankelijkheid derden");
    aandacht.push("Afstemming met nutsbedrijven vereist");
  }

  if(t.includes("nicht vergütet")){
    risico.push("Niet vergoede werkzaamheden");
  }

  return {risico,aandacht};
}

// ===== SAMENVATTING =====
function buildSummary(p,t){

  let txt=[];

  txt.push("Deze fase maakt onderdeel uit van de gefaseerde projectuitvoering.");

  txt.push("De voortgang is direct afhankelijk van de afronding van voorgaande fases.");

  if(t.includes("nicht parallel")){
    txt.push("Parallel werken is uitgesloten, waardoor deze fase kritisch is voor de totale doorlooptijd.");
  }

  if(p.risico.length){
    txt.push("Binnen deze fase zijn meerdere risico’s aanwezig die planning en uitvoering beïnvloeden.");
  }

  if(t.includes("drittfirmen")){
    txt.push("Afstemming met derden is essentieel om vertraging te voorkomen.");
  }

  txt.push("Goede voorbereiding en strakke coördinatie zijn noodzakelijk voor succesvolle uitvoering.");

  return txt;
}

// ===== KRITISCH =====
function markCritical(phases){
  return phases.map(p=>{
    let score = p.risico.length + p.duur;
    return {...p, kritisch: score > 8};
  });
}

// ===== DATUM FORMAT =====
function formatDate(v){
  let y = Math.floor(v/12);
  let m = v % 12;
  return `${m}/${y}`;
}

// ===== TIMELINE =====
function buildTimeline(phases){

  let min = Math.min(...phases.map(p=>p.start));
  let max = Math.max(...phases.map(p=>p.end));
  let total = max - min;

  return `
  <div class="section">
    <h3>Planning (Tijdlijn)</h3>

    ${phases.map(p=>{

      let left = ((p.start - min) / total) * 100;
      let width = (p.duur / total) * 100;

      return `
      <div style="margin-bottom:10px;">

        <b>${p.name}</b>
        ${p.kritisch ? '<span class="high"> (Kritiek)</span>' : ''}

        <div style="position:relative; background:#ddd; height:20px; border-radius:4px;">

          <div style="
            position:absolute;
            left:${left}%;
            width:${width}%;
            height:100%;
            background:${p.kritisch ? '#dc2626' : '#2563eb'};
            border-radius:4px;
          "></div>

        </div>

      </div>
      `;
    }).join("")}

  </div>
  `;
}

// ===== MAIN =====
function analyse(){

  let t = lvText.value.toLowerCase();
  if(!t) return;

  let phases = buildPhases(t);
  phases = attachDates(phases,t);

  phases = phases.map(p=>{
    let r = addRisk(p,t);
    return {...p, ...r};
  });

  phases = markCritical(phases);

  out.innerHTML = `

  ${buildTimeline(phases)}

  <div class="section">
    <h3>Fase Analyse</h3>

    ${phases.map(p=>`
      <div class="card">

        <b>${p.name}</b><br>
        Periode: ${formatDate(p.start)} → ${formatDate(p.end)}<br>
        Duur: ${p.duur} mnd

        <br><br>

        <b>Samenvatting</b>
        <ul>
          ${buildSummary(p,t).map(x=>`<li>${x}</li>`).join("")}
        </ul>

        <b>Risico’s</b>
        <ul>
          ${p.risico.map(r=>`<li class="high">${r}</li>`).join("")}
        </ul>

        <b>Aandachtspunten</b>
        <ul>
          ${p.aandacht.map(a=>`<li class="mid">${a}</li>`).join("")}
        </ul>

      </div>
    `).join("")}

  </div>
  `;
}

</script>

</body>
</html>
