<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>LV → Planstraße (WERKENDE BASIS)</title>

<!-- ✅ PDF.js – GOED -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
</script>

<!-- ✅ jsPDF – GOED -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body { font-family: Arial, sans-serif; padding:20px; background:#f4f6f8; }
.box { background:#fff; padding:16px; border-radius:6px; margin-bottom:16px; }
textarea { width:100%; min-height:140px; font-family:monospace; }
button { padding:6px 12px; margin-right:6px; }
.status { font-weight:bold; margin-top:6px; }
.ok { color:green; }
.err { color:red; }
</style>
</head>

<body>

<h1>LV lezen – harde test</h1>

<div class="box">
  <h2>1. Library check</h2>
  <div id="libStatus" class="status"></div>
</div>

<div class="box">
  <h2>2. LV‑PDF</h2>
  <input type="file" id="file" accept=".pdf"><br><br>
  <button onclick="leesLV()">Lees LV</button>
  <div id="lvStatus" class="status"></div>
  <textarea id="lvText" placeholder="LV‑tekst verschijnt hier..."></textarea>
</div>

<script>
/* ===== HARD TEST BIJ LADEN ===== */
window.addEventListener("load", () => {
  const s = document.getElementById("libStatus");
  if (window.pdfjsLib && window.jspdf) {
    s.textContent = "✅ pdf.js en jsPDF zijn geladen";
    s.className = "status ok";
  } else {
    s.textContent = "❌ Libraries NIET geladen (blokkerend probleem)";
    s.className = "status err";
  }
});

/* ===== LV LEZEN ===== */
async function leesLV() {
  const f = document.getElementById("file").files[0];
  const status = document.getElementById("lvStatus");
  const out = document.getElementById("lvText");

  if (!f) {
    alert("Kies eerst een LV‑PDF");
    return;
  }

  try {
    const buf = await f.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: buf }).promise;

    let text = "";
    for (let i = 1; i <= pdf.numPages; i++) {
      const page = await pdf.getPage(i);
      const c = await page.getTextContent();
      text += c.items.map(it => it.str).join(" ") + "\n";
    }

    out.value = text;
    status.textContent = "✅ LV succesvol gelezen";
    status.className = "status ok";
  } catch (e) {
    status.textContent = "❌ Fout bij lezen: " + e.message;
    status.className = "status err";
  }
}
</script>

</body>
</html>
