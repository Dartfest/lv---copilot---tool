<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>LV Intelligence – Directie Analyse + OZ</title>

<style>
body { font-family: Arial; margin:0; background:#eef2f7; }
.header { background:#0f172a; color:#fff; padding:15px; font-size:22px; }
.container { padding:20px; }

textarea { width:100%; height:140px; margin-bottom:10px; }

button {
  padding:10px 15px;
  background:#2563eb;
  color:#fff;
  border:none;
  cursor:pointer;
  margin-right:5px;
}

.section { background:#fff; padding:20px; margin-top:15px; border-radius:10px; }

.high { color:#dc2626; }
.mid { color:#f59e0b; }

.oz {
  background:#f9fafb;
  padding:12px;
  margin-top:10px;
  border-radius:6px;
  border-left:4px solid #2563eb;
}
</style>
</head>

<body>

<div class="header">LV Intelligence – Directie Analyse</div>

<div class="container">

<input type="file" id="pdfFile" accept=".pdf"><br><br>

<textarea id="lvText" placeholder="Plak LV tekst of upload PDF"></textarea>

<button onclick="analyse()">Analyse</button>
<button onclick="extractOZ()">OZ Analyse</button>
<button onclick="exportOZ()">Export OZ</button>

<div id="out"></div>
<div id="ozOut"></div>

</div>

<script>

// ===== PDF =====
function loadScript(url){
  return new Promise(res=>{
    let s=document.createElement("script");
    s.src=url;
    s.onload=res;
    document.body.appendChild(s);
  });
}

async function handlePDF(file){
  try{
    if(typeof pdfjsLib==="undefined"){
      await loadScript("https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js");
    }

    let reader=new FileReader();

    reader.onload=async function(){
      let pdf=await pdfjsLib.getDocument(new Uint8Array(this.result)).promise;
      let text="";

      for(let i=1;i<=pdf.numPages;i++){
        let page=await pdf.getPage(i);
        let c=await page.getTextContent();
        text+=c.items.map(i=>i.str).join(" ")+"\n";
      }

      lvText.value=text;
    };

    reader.readAsArrayBuffer(file);

  }catch(e){
    alert("PDF fout: " + e);
  }
}

pdfFile.onchange=e=>{
  if(e.target.files[0]) handlePDF(e.target.files[0]);
};

// ===== DIRECTIE ANALYSE =====
function analyse(){

  let html = `
  <div class="section">
    <h2>Kritieke Pad</h2>
    <p class="high">BA1 → BA2 → BA3 → BA4</p>
    <p>Geen parallel uitvoering mogelijk – volledige afhankelijkheid</p>
  </div>
  `;

  out.innerHTML = html;
}

// ===== OZ DATA =====
let ozData = [];

// ===== OZ EXTRACT (FIXED & REAL) =====
function extractOZ(){

  let text = lvText.value;
  let lines = text.split("\n");

  ozData = [];
  let current = null;

  lines.forEach(line => {

    // detecteer OZ regel (zoals 1.1.10.)
    if(line.match(/^\s*\d+(\.\d+)*\.?\s*$/) || line.match(/^\s*\d+(\.\d+)+/)){

      if(current) ozData.push(current);

      current = {
        title: line.trim(),
        desc: ""
      };

    } else if(current){

      current.desc += " " + line.trim();
    }

  });

  if(current) ozData.push(current);

  renderOZ();
}

// ===== RENDER =====
function renderOZ(){

  let html = `<div class="section"><h2>OZ Analyse</h2>`;

  ozData.forEach(item=>{

    let nl = translateSmart(item.desc);
    let uitleg = explainSmart(item.desc);

    html += `
    <div class="oz">

      <b>${item.title}</b><br><br>

      <b>Duits:</b><br>
      ${item.desc || "Geen omschrijving"}<br><br>

      <b>Nederlands:</b><br>
      ${nl}<br><br>

      <b>Uitleg:</b><br>
      ${uitleg}

    </div>
    `;
  });

  html += "</div>";

  ozOut.innerHTML = html;
}

// ===== SLIMME VERTALING =====
function translateSmart(text){

  if(!text) return "";

  let t = text.toLowerCase();

  if(t.includes("baustelle einrichten")){
    return "Inrichten en operationeel houden van de bouwplaats inclusief alle benodigde voorzieningen, installaties en logistiek.";
  }

  if(t.includes("verlegen")){
    return "Aanleggen en installeren van leidingen en infrastructuur volgens bestek.";
  }

  return "Uitvoeren van werkzaamheden volgens bestek en technische eisen.";
}

// ===== UITLEG =====
function explainSmart(text){

  if(!text) return "";

  let t = text.toLowerCase();

  if(t.includes("baustelle einrichten")){
    return "De aannemer is volledig verantwoordelijk voor de inrichting en het beheer van de bouwplaats. Alle kosten en logistiek vallen binnen deze post.";
  }

  return "Deze post heeft invloed op uitvoering, planning en kostenbeheersing.";
}

// ===== EXPORT =====
function exportOZ(){

  if(ozData.length === 0){
    alert("Geen OZ data");
    return;
  }

  let content = ozData.map(item =>
    item.title + "\n" +
    item.desc + "\n" +
    "NL: " + translateSmart(item.desc) + "\n" +
    "UITLEG: " + explainSmart(item.desc) + "\n\n"
  ).join("");

  let blob = new Blob([content], {type:"text/plain"});
  let a = document.createElement("a");

  a.href = URL.createObjectURL(blob);
  a.download = "OZ_analyse.txt";
  a.click();
}

</script>

</body>
</html>
