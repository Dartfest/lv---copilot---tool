<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>LV – Planstraße uitvoering & planning</title>

<!-- ✅ pdf.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
  "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
</script>

<!-- ✅ jsPDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body { font-family: Arial, sans-serif; background:#f4f6f8; padding:20px; }
.box { background:#fff; padding:16px; border-radius:6px; margin-bottom:20px; }
textarea { width:100%; min-height:150px; font-family:monospace; }
button { padding:6px 12px; margin-right:6px; }
input[type="date"] { padding:4px; }

.plan { padding:14px; border-left:8px solid; border-radius:6px; margin-top:16px; }
.pa{background:#f3e8ff;border-color:#9333ea;}
.pb{background:#e0f2fe;border-color:#0284c7;}
.pc{background:#dcfce7;border-color:#16a34a;}
.pd{background:#ffedd5;border-color:#ea580c;}
.px{background:#f3f4f6;border-color:#6b7280;}

.warn { color:#b91c1c; font-weight:bold; }
ul { margin-left:18px; }
h3 { margin-top:0; }
</style>
</head>

<body>

<h1>LV – Planstraße uitvoering & planning</h1>

<div class="box">
  <h2>1. Startinstellingen</h2>
  <label>
    Startdatum uitvoering:
    <input type="date" id="startDate">
  </label>
</div>

<div class="box">
  <h2>2. LV‑PDF(s)</h2>
  <input type="file" id="lvFiles" multiple accept=".pdf"><br><br>
  <button onclick="readLV()">Lees LV</button>
  <textarea id="lvText"></textarea>
</div>

<div class="box">
  <h2>3. Analyse & planning</h2>
  <button onclick="analyse()">Analyseer</button>
  <button onclick="exportPDF()">📄 Uitvoerders‑PDF</button>
  <div id="output"></div>
</div>

<script>
/* ================= INSTELBAAR ================= */
const PRODUCTIE_M_PER_DAG = 40;

/* ================= PDF INLEZEN ================= */
async function readPDF(file){
  const buf = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({data:buf}).promise;
  let t="";
  for(let p=1;p<=pdf.numPages;p++){
    const page = await pdf.getPage(p);
    const c = await page.getTextContent();
    t += c.items.map(i=>i.str).join(" ") + "\n";
  }
  return t;
}

async function readLV(){
  let t="";
  for(const f of lvFiles.files){
    t += await readPDF(f);
  }
  lvText.value = t;
}

/* ================= DATA ================= */
let planData = {};
const PLAN_REGEX = /Planstraße\s+([A-Z])/gi;
const BUIS_REGEX = /(PVC|PE[\s-]?HD|PE\s?100|BETON|STAAL)[^.\n]{0,50}(DN\s?\d+|Ø\s?\d+)?[^.\n]{0,20}(SDR\s?\d+|PN\s?\d+)?/i;
const QTY_REGEX  = /(\d+[,\.]?\d*)\s?(m|lfm)/i;

/* ================= ANALYSE ================= */
function analyse(){
  planData = {};
  output.innerHTML = "";

  const text = lvText.value;
  if(!text.trim()){ alert("LV leeg"); return; }

  let m;
  while((m = PLAN_REGEX.exec(text)) !== null){
    const key = `Planstraße ${m[1]}`;
    if(!planData[key]){
      planData[key] = {
        materiaal:{},
        risico:new Set()
      };
    }

    const frag = text.substring(m.index, m.index+800).toLowerCase();

    if(frag.includes("abweich") || frag.includes("mehr")){
      planData[key].risico.add("Meerwerk / afwijkingen mogelijk");
    }

    const qtyMatch = frag.match(QTY_REGEX);
    const buisMatch = frag.match(BUIS_REGEX);

    if(qtyMatch && buisMatch){
      const meters = parseFloat(qtyMatch[1].replace(",","."));
      const type = buisMatch[0].replace(/\s+/g," ").trim();
      if(!planData[key].materiaal[type]) planData[key].materiaal[type]=0;
      planData[key].materiaal[type]+=meters;
    }
  }

  render();
}

/* ================= RENDER MET DATUMLIJN ================= */
function render(){
  const startInput = document.getElementById("startDate").value;
  if(!startInput){ alert("Kies eerst een startdatum"); return; }

  let currentDate = new Date(startInput);

  Object.keys(planData).sort().forEach(k=>{
    const d = planData[k];
    const types = Object.keys(d.materiaal);
    const totaalM = types.reduce((s,t)=>s+d.materiaal[t],0);
    const dagen = Math.max(1, Math.ceil(totaalM / PRODUCTIE_M_PER_DAG));

    const start = new Date(currentDate);
    const einde = new Date(currentDate);
    einde.setDate(einde.getDate() + dagen - 1);
    currentDate.setDate(currentDate.getDate() + dagen);

    const label = dateStr(start) + " t/m " + dateStr(einde);

    const letter = k.slice(-1);
    const cls =
      letter==="A"?"pa":
      letter==="B"?"pb":
      letter==="C"?"pc":
      letter==="D"?"pd":"px";

    const el = document.createElement("div");
    el.className = `plan ${cls}`;
    el.innerHTML = `
<h3>${k}</h3>

<strong>Uitvoering</strong>
<ul>
  <li>Periode: <strong>${label}</strong></li>
  <li>Duur: ${dagen} dag(en)</li>
  <li>Totale lengte: ${totaalM.toFixed(1)} m</li>
</ul>

<strong>Materiaalstaat</strong>
<ul>
${types.length
  ? types.map(t=>`<li>${d.materiaal[t].toFixed(1)} m – ${t}</li>`).join("")
  : "<li>Geen buismateriaal benoemd</li>"}
</ul>

${types.length>1?`<p class="warn">⚠ Meerdere buistypen in deze Planstraße</p>`:""}

<strong>Risico’s</strong>
<ul>${d.risico.size?[...d.risico].map(r=>`<li>${r}</li>`).join(""):"<li>Geen expliciete risico’s</li>"}</ul>
`;
    output.appendChild(el);
  });
}

/* ================= PDF ================= */
function exportPDF(){
  const startInput = document.getElementById("startDate").value;
  if(!startInput){ alert("Kies eerst een startdatum"); return; }

  const {jsPDF} = window.jspdf;
  const pdf = new jsPDF();
  let y = 10;
  let currentDate = new Date(startInput);

  pdf.setFontSize(12);
  pdf.text("Uitvoerdersplanning per Planstraße",10,y);
  y+=10;
  pdf.setFontSize(10);

  Object.keys(planData).sort().forEach(k=>{
    const d = planData[k];
    const types = Object.keys(d.materiaal);
    const totaalM = types.reduce((s,t)=>s+d.materiaal[t],0);
    const dagen = Math.max(1, Math.ceil(totaalM / PRODUCTIE_M_PER_DAG));

    const start = new Date(currentDate);
    const einde = new Date(currentDate);
    einde.setDate(einde.getDate() + dagen - 1);
    currentDate.setDate(currentDate.getDate() + dagen);

    const txt = `
${k}
Uitvoering: ${dateStr(start)} t/m ${dateStr(einde)}
Duur: ${dagen} dag(en)
Totale lengte: ${totaalM.toFixed(1)} m

Materiaal:
- ${types.length?types.map(t=>`${d.materiaal[t].toFixed(1)} m – ${t}`).join("\n- "):"Geen"}

${types.length>1?"WAARSCHUWING: meerdere buistypen in deze straat":""}
`;
    const block = pdf.splitTextToSize(txt,180);
    if(y+block.length*5>280){ pdf.addPage(); y=10; }
    pdf.text(block,10,y);
    y+=block.length*5+8;
  });

  pdf.save("uitvoerdersplanning_planstrassen.pdf");
}

/* ================= HELPERS ================= */
function dateStr(d){
  return d.toLocaleDateString("nl-NL", { day:"2-digit", month:"2-digit", year:"numeric" });
}
</script>

</body>
</html>
``
