<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>LV – Planstraße analyse</title>

  <!-- PDF.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding:20px;
      background:#f4f6f8;
    }

    textarea {
      width:100%;
      height:260px;
      font-family:monospace;
      white-space:pre-wrap;
    }

    button {
      padding:8px 14px;
      margin:8px 0;
      cursor:pointer;
    }

    .box {
      background:#fff;
      padding:16px;
      border-radius:6px;
      margin-bottom:16px;
    }

    .plan {
      border-left:4px solid #2563eb;
      background:#eff6ff;
      padding:12px;
      margin:12px 0;
    }

    .muted {
      color:#666;
      font-size:0.9em;
    }
  </style>
</head>

<body>

<h1>LV – Planstraße analyse</h1>

<div class="box">
  <h2>1. PDF inlezen</h2>
  <input type="file" id="file" accept=".pdf"><br>
  <button onclick="leesLV()">Lees LV</button>
  <textarea id="lvText" placeholder="PDF tekst verschijnt hier..."></textarea>
</div>

<div class="box">
  <h2>2. Analyse</h2>
  <button onclick="analyse()">Analyseer</button>
  <div id="result"></div>
</div>

<script>

// ================= PDF LEZEN =================
async function leesLV() {
  const f = document.getElementById("file").files[0];
  if (!f) {
    alert("Kies eerst een PDF");
    return;
  }

  const buffer = await f.arrayBuffer();

  const pdf = await pdfjsLib.getDocument({
    data: buffer,
    disableWorker: true
  }).promise;

  let text = "";

  for (let i = 1; i <= pdf.numPages; i++) {
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();

    for (const item of content.items) {
      text += item.str + "\n";
    }

    text += "\n";
  }

  document.getElementById("lvText").value = text;
}

// ================= DATUM =================
function parseDate(d) {
  const p = d.split(/[.\-]/);
  if (p.length !== 3) return null;
  return new Date(p[2], p[1] - 1, p[0]);
}

// ================= VERTALING =================
function vertaal(regel) {

  const woordenboek = {
    "herstellung": "aanleg / realisatie",
    "rückbau": "sloop / verwijderen",
    "lieferung": "levering",
    "einbau": "installatie / aanbrengen",
    "arbeiten": "werkzaamheden",
    "maßnahme": "maatregel",
    "asphalt": "asfalt",
    "kanal": "riolering",
    "kabel": "kabels",
    "leitung": "leidingen",
    "bau": "bouw"
  };

  let nl = regel.toLowerCase();

  Object.keys(woordenboek).forEach(k => {
    if (nl.includes(k)) {
      nl = nl.replace(k, woordenboek[k]);
    }
  });

  return nl;
}

// ================= SAMENVATTING =================
function maakSamenvatting(frag) {

  const regels = frag.split("\n");

  const keywords = [
    "bau","herstellung","rückbau","lieferung",
    "einbau","arbeiten","maßnahme",
    "asphalt","kanal","kabel","leitung"
  ];

  let hits = [];

  regels.forEach(r => {
    const lower = r.toLowerCase();

    if (keywords.some(k => lower.includes(k))) {
      hits.push(r.trim());
    }
  });

  return hits.slice(0,5);
}

// ================= RISICO =================
function bepaalRisico(data) {

  let risico = [];

  if (data.tijdvakken.length > 1) {
    risico.push("Meerdere fases mogelijk overlappend");
  }

  if (!data.end) {
    risico.push("Geen einddatum bekend");
  }

  if (data.start && data.end) {
    const dagen = (data.end - data.start) / (1000*60*60*24);

    if (dagen < 5) {
      risico.push("Zeer korte uitvoeringsperiode");
    }
  }

  if (risico.length === 0) {
    risico.push("Geen bijzonderheden");
  }

  return risico;
}

// ================= ANALYSE =================
function analyse() {

  const text = document.getElementById("lvText").value;
  const result = document.getElementById("result");

  result.innerHTML = "";

  const planRegex = /Planstra(ß|ss)e[\s\u00A0]+([A-Z])/gi;

  const dateRegex =
    /(\d{1,2}[.\-]\d{1,2}[.\-]\d{4})\s*(bis|–|-|t\/m)\s*(\d{1,2}[.\-]\d{1,2}[.\-]\d{4})/gi;

  let data = {};
  let match;

  while ((match = planRegex.exec(text)) !== null) {

    const plan = "Planstraße " + match[2];

    if (!data[plan]) {
      data[plan] = {
        tijdvakken: [],
        start: null,
        end: null,
        samenvatting: []
      };
    }

    const fragment = text.slice(match.index, match.index + 1500);

    let d;

    // ---- DATUMS ----
    while ((d = dateRegex.exec(fragment))) {

      const s = parseDate(d[1]);
      const e = parseDate(d[3]);

      if (s && e) {
        data[plan].tijdvakken.push({
          start: s,
          end: e
        });

        if (!data[plan].start || s < data[plan].start)
          data[plan].start = s;

        if (!data[plan].end || e > data[plan].end)
          data[plan].end = e;
      }
    }

    // ---- SAMENVATTING ----
    const sam = maakSamenvatting(fragment);

    sam.forEach(s => {
      if (!data[plan].samenvatting.includes(s)) {
        data[plan].samenvatting.push(s);
      }
    });
  }

  // ================= OUTPUT =================
  Object.entries(data).forEach(([plan, d], i) => {

    d.tijdvakken.sort((a,b) => a.start - b.start);

    const risico = bepaalRisico(d);

    const div = document.createElement("div");
    div.className = "plan";

    div.innerHTML = `
      <strong>${i+1}. ${plan}</strong>

      ${
        d.start && d.end
        ? `<p><strong>Totale periode:</strong> ${d.start.toLocaleDateString()} t/m ${d.end.toLocaleDateString()}</p>`
        : `<p class="muted">Geen volledige periode bekend</p>`
      }

      <p><strong>Tijdlijn:</strong></p>
      <ul>
        ${d.tijdvakken.map(t => `
          <li>${t.start.toLocaleDateString()} → ${t.end.toLocaleDateString()}</li>
        `).join("")}
      </ul>

      <p><strong>Werkzaamheden:</strong></p>
      <ul>
        ${d.samenvatting.map(x => `
          <li>${x}<br><span class="muted">→ ${vertaal(x)}</span></li>
        `).join("")}
      </ul>

      <p><strong>Risico's:</strong></p>
      <ul>
        ${risico.map(r => `<li>${r}</li>`).join("")}
      </ul>
    `;

    result.appendChild(div);
  });
}

</script>

</body>
</html>
