<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>LV Copilot Tool – Stabiele Werkvoorbereiding</title>

<style>
body { font-family: Arial, sans-serif; background:#f5f7fa; padding:20px; }
.box { background:white; padding:16px; border-radius:6px; margin-bottom:20px; }
textarea { width:100%; min-height:220px; font-family:monospace; padding:10px; }
button { padding:8px 14px; background:#2563eb; color:white; border:none; border-radius:4px; cursor:pointer; }
.chunk { padding:12px; border-radius:6px; margin-bottom:12px; }
.red { background:#fee2e2; border-left:6px solid #dc2626; }
.orange { background:#ffedd5; border-left:6px solid #ea580c; }
.green { background:#dcfce7; border-left:6px solid #16a34a; }
</style>
</head>

<body>

<h1>LV Copilot Tool – Betrouwbare Analyse</h1>

<div class="box">
<h2>1. LV‑tekst (plakken uit PDF / Word)</h2>
<p><strong>Plak hier gekopieerde tekst.</strong>  
(Gescanne PDF’s eerst omzetten naar tekst)</p>
<textarea id="lvtext"></textarea>
<button onclick="analyse()">Analyseer</button>
</div>

<div class="box">
<h2>2. Analyse per LV‑deel</h2>
<div id="output"></div>
</div>

<script>
function analyse() {
  output.innerHTML="";
  const parts = lvtext.value.match(/[\s\S]{1,3000}/g) || [];

  parts.forEach((p,i)=>{
    const t=p.toLowerCase();
    const netten=[];
    if(t.includes("gas")) netten.push("Gas");
    if(t.includes("elektra")) netten.push("Elektra");
    if(t.includes("water")) netten.push("Water");
    if(t.includes("telecom")||t.includes("glasvezel")) netten.push("Telecom");

    let cls="green", impact="LAAG";
    if(netttenRisk(nettten=netten)) {cls="red"; impact="HOOG";}
    else if(netten.length>1){cls="orange"; impact="MIDDEL";}

    const d=document.createElement("div");
    d.className=`chunk ${cls}`;
    d.innerHTML=`
<strong>LV‑DEEL ${i+1}</strong><br>
Netten: ${netten.join(", ")||"–"}<br>
Impact: ${impact}<br><br>
<pre>${p}</pre>`;
    output.appendChild(d);
  });
}

function netttenRisk(n){
  return n.includes("Gas")||n.includes("Elektra");
}
</script>

</body>
</html>
