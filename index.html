<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>LV Intelligence – Complete Tool</title>

<style>
body { font-family: Arial; margin:0; background:#eef2f7; }
.header { background:#0f172a; color:#fff; padding:15px; font-size:22px; }
.container { padding:20px; }

textarea { width:100%; height:140px; margin-bottom:10px; }

button {
  padding:10px 15px;
  background:#2563eb;
  color:#fff;
  border:none;
  cursor:pointer;
  margin-top:5px;
}

.section { background:#fff; padding:20px; margin-top:15px; border-radius:10px; }

.high { color:#dc2626; }
.mid { color:#f59e0b; }

ul { margin-top:5px; }

.oz { background:#f9fafb; padding:8px; margin-top:5px; border-radius:6px; }
</style>
</head>

<body>

<div class="header">LV Intelligence – Directie Analyse + OZ Export</div>

<div class="container">

<input type="file" id="pdfFile" accept=".pdf"><br><br>

<textarea id="lvText" placeholder="Plak LV tekst of upload PDF"></textarea>

<button onclick="analyse()">Analyse</button>
<button onclick="extractOZ()">Genereer OZ lijst</button>
<button onclick="exportOZ()">Export OZ (.txt)</button>

<div id="out"></div>
<div id="ozOut"></div>

</div>

<script>

// ===== PDF =====
function loadScript(url){
  return new Promise(res=>{
    let s=document.createElement("script");
    s.src=url;
    s.onload=res;
    document.body.appendChild(s);
  });
}

async function handlePDF(file){
  try{
    if(typeof pdfjsLib==="undefined"){
      await loadScript("https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js");
    }

    let reader=new FileReader();

    reader.onload=async function(){
      let pdf=await pdfjsLib.getDocument(new Uint8Array(this.result)).promise;
      let text="";

      for(let i=1;i<=pdf.numPages;i++){
        let page=await pdf.getPage(i);
        let c=await page.getTextContent();
        text+=c.items.map(i=>i.str).join(" ")+"\n";
      }

      lvText.value=text;
    };

    reader.readAsArrayBuffer(file);

  }catch(e){
    alert("PDF fout: "+e);
  }
}

pdfFile.onchange=e=>{
  if(e.target.files[0]) handlePDF(e.target.files[0]);
};

// ===== FASES =====
const fases = [
  {name:"Bauabschnitt 1", plan:"Planstraße C", periode:"06/2026 → 07/2027"},
  {name:"Bauabschnitt 2", plan:"Planstraße E", periode:"aansluitend → 07/2027"},
  {name:"Bauabschnitt 3", plan:"Planstraße D Teil 1", periode:"08/2027 → 05/2028"},
  {name:"Bauabschnitt 4", plan:"Planstraße D Teil 2", periode:"aansluitend → 05/2028"}
];

// ===== SAMENVATTING =====
function summary(f){
return `
<p>${f.name} (${f.plan}) betreft een volledige uitvoeringsfase inclusief riolering, nuts en infrastructuur.</p>
<p class="high">Kritische fase zonder buffer.</p>
`;
}

// ===== WERKZAAMHEDEN =====
function werkzaamheden(){
return `
<ul>
<li>Riolering (kanaalbouw)</li>
<li>Nutsvoorzieningen</li>
<li>Bouwwegen</li>
<li>Grondwerk</li>
<li>Aansluitingen</li>
</ul>
`;
}

// ===== RISICO =====
function risico(f){
return `
<ul>
<li class="high">Geen parallel uitvoering</li>
<li class="high">Strikte deadline (${f.periode})</li>
<li class="mid">Afhankelijk derden</li>
</ul>
`;
}

// ===== ANALYSE =====
function analyse(){

  let html = `
  <div class="section">
  <h2>Kritieke Pad</h2>
  <p class="high">BA1 → BA2 → BA3 → BA4</p>
  </div>
  `;

  fases.forEach(f=>{
    html += `
    <div class="section">
      <h2>${f.name} – ${f.plan}</h2>
      <p><b>${f.periode}</b></p>
      ${summary(f)}
      <h3>Werkzaamheden</h3>
      ${werkzaamheden()}
      <h3>Risico’s</h3>
      ${risico(f)}
    </div>
    `;
  });

  out.innerHTML = html;
}

// ===== OZ EXTRACT =====
let ozData = [];

function extractOZ(){

  let text = lvText.value;

  let lines = text.split("\n");

  ozData = lines.filter(l => l.match(/oz\s*\d+/i));

  let html = `
  <div class="section">
  <h2>OZ Lijst + Vertaling</h2>
  `;

  ozData.forEach(l=>{

    let nl = l
      .replace(/kanal/gi,"riolering")
      .replace(/leitung/gi,"leiding")
      .replace(/verlegen/gi,"aanleggen")
      .replace(/herstellen/gi,"realiseren");

    html += `
      <div class="oz">
        <b>${l}</b><br>
        ${nl}
      </div>
    `;
  });

  html += "</div>";

  ozOut.innerHTML = html;
}

// ===== EXPORT =====
function exportOZ(){

  if(ozData.length === 0){
    alert("Geen OZ data");
    return;
  }

  let content = ozData.join("\n");

  let blob = new Blob([content], {type:"text/plain"});
  let a = document.createElement("a");

  a.href = URL.createObjectURL(blob);
  a.download = "OZ_lijst.txt";
  a.click();
}

</script>

</body>
</html>
