<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>LV Intelligence – Universal Engine</title>

<style>
body { font-family: Arial; margin:0; background:#eef2f7; }
.header { background:#0f172a; color:#fff; padding:15px; font-size:22px; }
.container { padding:20px; }

textarea { width:100%; height:120px; margin-bottom:10px; }

button {
  padding:8px 12px;
  background:#2563eb;
  color:#fff;
  border:none;
  cursor:pointer;
}

.card { background:#fff; padding:12px; border-radius:6px; margin-bottom:10px; }

.high { color:#dc2626; }
.mid { color:#f59e0b; }

.section {
  background:#fff;
  padding:15px;
  margin-top:12px;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="header">LV Intelligence – Universal Engine</div>

<div class="container">

<input type="file" id="pdfFile" accept=".pdf"><br><br>

<textarea id="lvText" placeholder="Plak LV tekst of upload PDF"></textarea>

<button onclick="analyse()">Analyse</button>

<div id="out"></div>

</div>

<script>

// ===== PDF =====
function loadScript(url){
  return new Promise(res=>{
    let s=document.createElement("script");
    s.src=url;
    s.onload=res;
    document.body.appendChild(s);
  });
}

async function handlePDF(file){
  if(typeof pdfjsLib==="undefined"){
    await loadScript("https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js");
  }

  let reader=new FileReader();

  reader.onload=async function(){
    let pdf=await pdfjsLib.getDocument(new Uint8Array(this.result)).promise;
    let text="";

    for(let i=1;i<=pdf.numPages;i++){
      let page=await pdf.getPage(i);
      let c=await page.getTextContent();
      text+=c.items.map(i=>i.str).join(" ")+"\n";
    }

    lvText.value=text;
  };

  reader.readAsArrayBuffer(file);
}

pdfFile.onchange=e=>{
  if(e.target.files[0]) handlePDF(e.target.files[0]);
};

// ===== DATUM =====
const months = {
  januar:1,februar:2,märz:3,april:4,mai:5,
  juni:6,juli:7,august:8,september:9
};

function extractDates(t){
  let r=[], m;
  let regex=/(januar|februar|märz|april|mai|juni|juli|august|september)\s+(20\d{2})/gi;

  while((m=regex.exec(t))){
    r.push(parseInt(m[2])*12 + months[m[1]]);
  }

  return r;
}

// ===== FASE DETECTIE =====
function detectRawPhases(text){

  let matches = text.match(/(bauabschnitt\s*\d+|planstraße\s*[a-z]|teil\s*\d+|los\s*\d+)/gi) || [];

  return matches.map(m => m.toLowerCase());
}

// ===== FASE BUNDELING =====
function buildPhases(text){

  let raw = detectRawPhases(text);
  let map = {};

  raw.forEach(r=>{

    let key;

    if(r.includes("planstraße")){
      key = r.match(/planstraße\s*[a-z]/)[0];
    }
    else if(r.includes("bauabschnitt")){
      key = r.match(/bauabschnitt\s*\d+/)[0];
    }
    else if(r.includes("los")){
      key = r.match(/los\s*\d+/)[0];
    }
    else{
      key = "overig";
    }

    if(!map[key]){
      map[key] = {
        name: key.toUpperCase(),
        refs:[]
      };
    }

    map[key].refs.push(r);
  });

  return Object.values(map);
}

// ===== DATUM KOPPELEN =====
function attachDates(phases, text){

  let dates = extractDates(text);

  return phases.map((p,i)=>{

    let start = dates[i] || dates[0] || 0;
    let end = dates[i+1] || start + 6;

    return {
      ...p,
      start,
      end,
      duur: end - start
    };
  });
}

// ===== RISICO =====
function addRisk(phases, text){

  return phases.map(p=>{

    let risico=[];
    let aandacht=[];

    if(text.includes("nicht parallel")){
      risico.push("Geen parallel uitvoering mogelijk");
    }

    if(text.includes("unterbrechung")){
      risico.push("Onderbreking mogelijk tussen fases");
    }

    if(text.includes("drittfirmen")){
      risico.push("Afhankelijkheid van derden");
      aandacht.push("Afstemming met nutsbedrijven vereist");
    }

    if(text.includes("nicht vergütet")){
      risico.push("Niet vergoede werkzaamheden");
    }

    return {
      ...p,
      risico,
      aandacht
    };
  });
}

// ===== SAMENVATTING =====
function phaseSummary(p){

  let txt = [];

  txt.push("Werkzaamheden binnen deze fase volgens LV-structuur.");

  if(p.risico.length){
    txt.push("Risico’s aanwezig die planning en uitvoering beïnvloeden.");
  }

  if(p.aandacht.length){
    txt.push("Extra coördinatie en afstemming vereist.");
  }

  return txt;
}

// ===== DATUM FORMAT =====
function formatDate(v){
  let y = Math.floor(v/12);
  let m = v % 12;
  return `${m}/${y}`;
}

// ===== SCORE =====
function calcScore(phases){

  let risico = phases.reduce((a,p)=>a+p.risico.length,0);
  let roi = 100 - (risico * 5);

  let advies="GO", cls="good";

  if(roi<50){advies="NO-GO";cls="high";}
  else if(roi<70){advies="GO MET RISICO";cls="mid";}

  return {risico,roi,advies,cls};
}

// ===== MAIN =====
function analyse(){

  let t = lvText.value.toLowerCase();
  if(!t) return;

  let phases = buildPhases(t);
  phases = attachDates(phases, t);
  phases = addRisk(phases, t);

  let score = calcScore(phases);

  out.innerHTML = `

  <div class="card">
    Risico: <span class="high">${score.risico}</span><br>
    ROI: ${score.roi}%<br>
    Advies: <span class="${score.cls}">${score.advies}</span>
  </div>

  <div class="section">
    <h3>Fase Analyse (Universeel)</h3>

    ${phases.map(p=>`
      <div class="card">

        <b>${p.name}</b><br>
        Periode: ${formatDate(p.start)} → ${formatDate(p.end)}<br>
        Duur: ${p.duur} mnd

        <br><br>

        <b>Samenvatting</b>
        <ul>
          ${phaseSummary(p).map(x=>`<li>${x}</li>`).join("")}
        </ul>

        <b>Risico’s</b>
        <ul>
          ${p.risico.map(r=>`<li class="high">${r}</li>`).join("")}
        </ul>

        <b>Aandachtspunten</b>
        <ul>
          ${p.aandacht.map(a=>`<li class="mid">${a}</li>`).join("")}
        </ul>

      </div>
    `).join("")}

  </div>

  `;
}

</script>

</body>
</html>
