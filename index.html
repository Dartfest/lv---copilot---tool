<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>LV Analyse (Hybride AI Engine)</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body { font-family: Arial; padding:20px; background:#f4f6f8; }
textarea { width:100%; height:180px; margin-bottom:10px; }
button { padding:8px 14px; margin:6px; }
.box { background:#fff; padding:15px; margin-bottom:15px; border-radius:6px; }
.section { background:#fff; border-left:5px solid #2563eb; padding:15px; margin:10px 0; }
.risk { color:#b91c1c; font-weight:bold; }
.fact { color:#111; }
</style>
</head>

<body>

<h1>LV Analyse (Hybride AI + Regelengine)</h1>

<div class="box">
<input type="file" id="file" accept=".pdf">
<button onclick="leesLV()">Lees PDF</button>
<button onclick="analyse()">Analyse</button>
<button onclick="exportPDF()">Export PDF</button>

<br><br>
<label><input type="checkbox" id="useAI"> Gebruik AI (optioneel)</label>

<textarea id="lvText"></textarea>
</div>

<div id="result"></div>

<script>

// ===== PDF =====
async function leesLV(){
  const f = document.getElementById("file").files[0];
  if(!f) return alert("Kies PDF");

  const buffer = await f.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({data:buffer}).promise;

  let text="";
  for(let i=1;i<=pdf.numPages;i++){
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    content.items.forEach(it => text += it.str + " ");
  }

  document.getElementById("lvText").value = text;
}

// ===== REGELENGINE =====
function regelAnalyse(text){

  const t = text.toLowerCase();
  const has = (w) => t.includes(w);

  let feiten = [];
  let risico = [];

  // feiten
  if(has("bauabschnitt"))
    feiten.push("Fasering aanwezig (Bauabschnitt).");

  if(has("nicht parallel")){
    feiten.push("Parallel werken niet toegestaan.");
    risico.push("Geen parallel werk → langere doorlooptijd.");
  }

  if(has("ohne unterbrechung")){
    feiten.push("Werk zonder onderbreking uitvoeren.");
    risico.push("Continue uitvoering vereist strakke planning.");
  }

  if(has("nicht vergütet")){
    feiten.push("Kosten worden niet apart vergoed.");
    risico.push("Kostenrisico ligt bij aannemer.");
  }

  if(has("drittfirmen")){
    feiten.push("Afhankelijkheid van derden.");
    risico.push("Vertraging door derden mogelijk.");
  }

  if(has("abstimmung")){
    feiten.push("Afstemming met partijen vereist.");
  }

  return { feiten, risico };
}

// ===== AI (OPTIONEEL) =====
async function aiAnalyse(text){

  // 👉 placeholder (nu niet actief zonder API)
  return null;
}

// ===== HYBRIDE =====
let analyseData = {};

async function analyse(){

  const text = document.getElementById("lvText").value;
  const useAI = document.getElementById("useAI").checked;

  const regel = regelAnalyse(text);
  let ai = null;

  if(useAI){
    ai = await aiAnalyse(text);
  }

  // ===== COMBINEREN =====
  let samenvatting = "";

  if(ai){
    samenvatting = ai;
  } else {
    samenvatting = regel.feiten.join(" ");
  }

  analyseData = {
    samenvatting,
    feiten: regel.feiten,
    risico: regel.risico
  };

  // ===== OUTPUT =====
  document.getElementById("result").innerHTML = `
  <div class="section">
    <h3>Samenvatting</h3>
    <p>${samenvatting}</p>
  </div>

  <div class="section">
    <h3>Feiten (bron LV)</h3>
    <ul class="fact">
    ${regel.feiten.map(f=>`<li>${f}</li>`).join("")}
    </ul>
  </div>

  <div class="section">
    <h3>Risico's</h3>
    <ul class="risk">
    ${regel.risico.map(r=>`<li>${r}</li>`).join("")}
    </ul>
  </div>
  `;
}

// ===== PDF =====
function exportPDF(){

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  let y=15;

  doc.text("Samenvatting:",10,y); y+=5;
  const lines = doc.splitTextToSize(analyseData.samenvatting,180);
  doc.text(lines,10,y);
  y += lines.length*5 + 10;

  doc.text("Risico's:",10,y); y+=5;
  doc.setTextColor(200,0,0);

  analyseData.risico.forEach(r=>{
    doc.text("- "+r,10,y);
    y+=5;
  });

  doc.save("LV_Analyse_Hybride.pdf");
}

</script>

</body>
</html>
