<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Excel Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- SheetJS: Excel lezen -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

  <!-- Chart.js: grafieken -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 20px;
    }

    h1, h2 {
      text-align: center;
    }

    .upload {
      text-align: center;
      margin-bottom: 20px;
    }

    .filters {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    select, input {
      padding: 6px 10px;
      font-size: 14px;
    }

    .dashboard {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,.1);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 6px 8px;
      text-align: left;
    }

    th {
      background: #e9ecef;
      position: sticky;
      top: 0;
    }

    .table-wrapper {
      max-height: 420px;
      overflow-y: auto;
    }

    footer {
      text-align: center;
      margin-top: 30px;
      font-size: 14px;
      color: #666;
    }
  </style>
</head>

<body>

<h1>📊 Excel Machine‑uren Dashboard</h1>

<div class="upload">
  <input type="file" id="upload" accept=".xlsx,.xls">
</div>

<div class="filters">
  <select id="filterKW"><option value="">Alle weken</option></select>
  <select id="filterKP"><option value="">Alle kostenplaatsen</option></select>
  <select id="filterGA"><option value="">Alle Gerätearten</option></select>
  <input id="search" placeholder="Zoeken…">
</div>

<div class="dashboard">
  <div class="card">
    <h2>Uren per kostenplaats</h2>
    <canvas id="kpChart"></canvas>
  </div>

  <div class="card">
    <h2>Uren per Geräteart</h2>
    <canvas id="gaChart"></canvas>
  </div>
</div>

<div class="card">
  <h2>📋 Volledige Excel‑gegevens</h2>
  <div class="table-wrapper">
    <table id="dataTable">
      <thead></thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<footer>
  Excel wordt lokaal verwerkt – geen upload naar server
</footer>

<script>
let brondata = [];
let kpChart, gaChart;

document.getElementById("upload").addEventListener("change", e => {
  const file = e.target.files[0];
  const reader = new FileReader();

  reader.onload = evt => {
    const workbook = XLSX.read(evt.target.result, { type: "binary" });
    const sheet = workbook.Sheets[workbook.SheetNames[0]];

    // Excel → JSON + normaliseren
    const raw = XLSX.utils.sheet_to_json(sheet, { defval: "" });

    brondata = raw.map(r => ({
      Geräteart: String(r["Geräteart"] || "").trim(),
      Apparaat: String(r["Apparaat"] || "").trim(),
      Kalenderweek: String(r["Kalenderweek"] || "").trim(),
      Kostenplaats: String(r["Kostenplaats"] || "").trim(),
      Tijd: parseFloat(
        String(r["Tijd"] || "0")
          .replace(",", ".")
          .replace(/[^\d.]/g, "")
      ) || 0,
      Kosten: parseFloat(
        String(r["Kosten"] || "0")
          .replace(",", ".")
          .replace(/[^\d.]/g, "")
      ) || 0
    })).filter(r =>
      r.Kostenplaats || r.Geräteart || r.Kalenderweek
    );

    initFilters(brondata);
    applyFilters();
  };

  reader.readAsBinaryString(file);
});

search.oninput = applyFilters;
filterKW.onchange = applyFilters;
filterKP.onchange = applyFilters;
filterGA.onchange = applyFilters;

/* ===== Filters ===== */
function initFilters(data) {
  fill("filterKW", "Kalenderweek", data);
  fill("filterKP", "Kostenplaats", data);
  fill("filterGA", "Geräteart", data);
}

function fill(id, key, data) {
  const sel = document.getElementById(id);
  sel.innerHTML = `<option value="">Alle</option>`;
  [...new Set(data.map(d => d[key]).filter(Boolean))]
    .sort()
    .forEach(v => sel.innerHTML += `<option value="${v}">${v}</option>`);
}

/* ===== Filter toepassen ===== */
function applyFilters() {
  const kw = filterKW.value;
  const kp = filterKP.value;
  const ga = filterGA.value;
  const q  = search.value.toLowerCase();

  const filtered = brondata.filter(r =>
    (!kw || r.Kalenderweek === kw) &&
    (!kp || r.Kostenplaats === kp) &&
    (!ga || r.Geräteart === ga) &&
    Object.values(r).join(" ").toLowerCase().includes(q)
  );

  renderTable(filtered);
  renderCharts(filtered);
}

/* ===== Tabel ===== */
function renderTable(rows) {
  if (!rows.length) return;

  dataTable.tHead.innerHTML =
    "<tr>" + Object.keys(rows[0]).map(h => `<th>${h}</th>`).join("") + "</tr>";

  dataTable.tBodies[0].innerHTML =
    rows.map(r =>
      "<tr>" + Object.values(r).map(v => `<td>${v}</td>`).join("") + "</tr>"
    ).join("");
}

/* ===== Grafieken (correct uitgesplitst) ===== */
function groupSum(data, key) {
  return Object.entries(
    data.reduce((acc, r) => {
      if (!r[key]) return acc;
      acc[r[key]] = (acc[r[key]] || 0) + r.Tijd;
      return acc;
    }, {})
  );
}

function renderCharts(data) {
  if (kpChart) kpChart.destroy();
  if (gaChart) gaChart.destroy();

  const kp = groupSum(data, "Kostenplaats");
  const ga = groupSum(data, "Geräteart");

  kpChart = new Chart(document.getElementById("kpChart"), {
    type: "bar",
    data: {
      labels: kp.map(x => x[0]),
      datasets: [{ label: "Uren", data: kp.map(x => x[1]) }]
    }
  });

  gaChart = new Chart(document.getElementById("gaChart"), {
    type: "bar",
    data: {
      labels: ga.map(x => x[0]),
      datasets: [{ label: "Uren", data: ga.map(x => x[1]) }]
    }
  });
}
</script>

</body>
</html>
