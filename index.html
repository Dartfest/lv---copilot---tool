<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>LV Intelligence – Directie Analyse</title>

<style>
body { font-family: Arial; margin:0; background:#eef2f7; }
.header { background:#0f172a; color:#fff; padding:15px; font-size:22px; }
.container { padding:20px; }
textarea { width:100%; height:140px; margin-bottom:10px; }

button {
  padding:10px 15px;
  background:#2563eb;
  color:#fff;
  border:none;
  cursor:pointer;
}

.section { background:#fff; padding:20px; margin-top:15px; border-radius:10px; }
.high { color:#dc2626; }
.mid { color:#f59e0b; }
</style>
</head>

<body>

<div class="header">LV Intelligence – Directie Analyse</div>

<div class="container">

<input type="file" id="pdfFile" accept=".pdf"><br><br>

<textarea id="lvText"></textarea>

<button onclick="analyse()">Analyse</button>

<div id="out"></div>

</div>

<script>

// ===== PDF =====
function loadScript(url){
  return new Promise(res=>{
    let s=document.createElement("script");
    s.src=url;
    s.onload=res;
    document.body.appendChild(s);
  });
}

async function handlePDF(file){
  try{
    if(typeof pdfjsLib==="undefined"){
      await loadScript("https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js");
    }

    let reader=new FileReader();

    reader.onload=async function(){
      let pdf=await pdfjsLib.getDocument(new Uint8Array(this.result)).promise;
      let text="";

      for(let i=1;i<=pdf.numPages;i++){
        let page=await pdf.getPage(i);
        let c=await page.getTextContent();
        text+=c.items.map(i=>i.str).join(" ")+"\n";
      }

      document.getElementById("lvText").value=text;
    };

    reader.readAsArrayBuffer(file);

  }catch(e){
    alert("PDF fout: "+e);
  }
}

document.getElementById("pdfFile").onchange = e=>{
  if(e.target.files[0]) handlePDF(e.target.files[0]);
};

// ===== PLANNING =====
const fases = [
  {name:"Bauabschnitt 1", plan:"planstraße c", start:"06/2026", end:"07/2027"},
  {name:"Bauabschnitt 2", plan:"planstraße e", start:"na BA1", end:"07/2027"},
  {name:"Bauabschnitt 3", plan:"planstraße d teil 1", start:"08/2027", end:"05/2028"},
  {name:"Bauabschnitt 4", plan:"planstraße d teil 2", start:"na BA3", end:"05/2028"}
];

// ===== TEKST PER FASE =====
function getPhaseText(text, plan){
  let idx = text.indexOf(plan);
  if(idx === -1) return "";
  return text.substring(idx, idx + 3000); // groter bereik
}

// ===== WERKZAAMHEDEN (VERBETERD) =====
function extractWork(text){

  if(!text) return ["Volledige civiele uitvoering (riolering, nuts, bouwwegen)"];

  let sentences = text.split(/[.\n]/);

  let keywords = [
    "kanal","leitung","rohr","verlegen","herstellen","erschließ",
    "versorgung","anschluss","bau","einbau","graben","pflaster",
    "straße","rinne","mulde"
  ];

  let result = [];

  sentences.forEach(s=>{
    let line = s.trim();

    if(line.length < 20) return;

    let match = keywords.some(k=>line.includes(k));

    if(match){
      result.push(line);
    }
  });

  // duplicates verwijderen
  result = [...new Set(result)];

  if(result.length === 0){
    return ["Volledige civiele uitvoering (riolering, nuts, bouwwegen)"];
  }

  return result;
}

// ===== SAMENVATTING (UITGEBREID) =====
function summary(f){

  return `
  <p>
  ${f.name} (${f.plan.toUpperCase()}) betreft een integraal onderdeel van de gebiedsontwikkeling,
  waarbij alle civieltechnische werkzaamheden binnen deze fase worden uitgevoerd.
  </p>

  <p>
  De werkzaamheden omvatten de volledige aanleg van rioleringssystemen,
  nutsvoorzieningen (water, elektra, telecom) en tijdelijke infrastructuur zoals bouwwegen.
  Deze activiteiten moeten in samenhang en zonder onderbreking worden uitgevoerd.
  </p>

  <p>
  De fase is direct gekoppeld aan de voorgaande fase en vormt een schakel in een volledig lineaire planning.
  Parallel werken is contractueel uitgesloten, waardoor elke vertraging directe impact heeft op het totale project.
  </p>

  <p>
  Door de combinatie van technische complexiteit, logistieke beperkingen en afhankelijkheid van derden
  ontstaat een verhoogd uitvoeringsrisico binnen deze fase.
  </p>

  <p class="high">
  Conclusie: ${f.name} ligt op het kritieke pad en vereist strakke planning,
  continue uitvoering en intensieve coördinatie.
  </p>
  `;
}

// ===== RISICO =====
function risico(f){
  return `
  <ul>
    <li class="high">Geen parallel uitvoering mogelijk</li>
    <li class="high">Strikte einddatum (${f.end})</li>
    <li class="high">Afhankelijk van vorige fase</li>
    <li class="mid">Afstemming nutsbedrijven</li>
    <li class="mid">Logistieke beperkingen</li>
  </ul>
  `;
}

// ===== MAIN =====
function analyse(){

  try{

    let text = document.getElementById("lvText").value.toLowerCase();
    let html = `
      <div class="section">
        <h2>Kritieke Pad</h2>
        <p>BA1 → BA2 → BA3 → BA4</p>
        <p class="high">Geen buffer – volledige afhankelijkheid</p>
      </div>
    `;

    fases.forEach(f=>{

      let t = getPhaseText(text, f.plan);
      let works = extractWork(t);

      html += `
      <div class="section">

        <h2>${f.name} – ${f.plan.toUpperCase()}</h2>

        <h3>Periode</h3>
        <p><b>${f.start} → ${f.end}</b></p>

        ${summary(f)}

        <h3>Werkzaamheden</h3>
        <ul>
          ${works.map(w=>`<li>${w}</li>`).join("")}
        </ul>

        <h3>Risico’s</h3>
        ${risico(f)}

      </div>
      `;
    });

    document.getElementById("out").innerHTML = html;

  }catch(e){
    document.getElementById("out").innerHTML = "<div class='section high'>Fout: "+e+"</div>";
  }
}

</script>

</body>
</html>
