<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>LV Intelligence – Executive Report</title>

<style>
body { font-family: Arial; margin:0; background:#eef2f7; }
.header { background:#0f172a; color:#fff; padding:15px; font-size:22px; }
.container { padding:20px; }

textarea { width:100%; height:120px; margin-bottom:10px; }

button {
  padding:8px 12px;
  background:#2563eb;
  color:#fff;
  border:none;
  cursor:pointer;
  margin-right:5px;
}

.card { background:#fff; padding:15px; border-radius:6px; margin-bottom:12px; }

.high { color:#dc2626; }
.mid { color:#f59e0b; }

.section {
  background:#fff;
  padding:15px;
  margin-top:12px;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="header">LV Intelligence – Directie Dashboard</div>

<div class="container">

<input type="file" id="pdfFile" accept=".pdf"><br><br>

<textarea id="lvText" placeholder="Plak LV tekst of upload PDF"></textarea>

<button onclick="analyse()">Analyse</button>
<button onclick="exportPDF()">Export PDF</button>

<div id="out"></div>

</div>

<script>

// ===== PDF INLEZEN =====
function loadScript(url){
  return new Promise(res=>{
    let s=document.createElement("script");
    s.src=url;
    s.onload=res;
    document.body.appendChild(s);
  });
}

async function handlePDF(file){
  if(typeof pdfjsLib==="undefined"){
    await loadScript("https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js");
  }

  let reader=new FileReader();

  reader.onload=async function(){
    let pdf=await pdfjsLib.getDocument(new Uint8Array(this.result)).promise;
    let text="";

    for(let i=1;i<=pdf.numPages;i++){
      let page=await pdf.getPage(i);
      let c=await page.getTextContent();
      text+=c.items.map(i=>i.str).join(" ")+"\n";
    }

    lvText.value=text;
  };

  reader.readAsArrayBuffer(file);
}

pdfFile.onchange=e=>{
  if(e.target.files[0]) handlePDF(e.target.files[0]);
};

// ===== DATUM =====
const months = {juni:6,juli:7,august:8,mai:5};

function extractDates(t){
  let r=[], m;
  let regex=/(juni|juli|august|mai)\s+(20\d{2})/gi;

  while((m=regex.exec(t))){
    r.push(parseInt(m[2])*12 + months[m[1]]);
  }

  return r;
}

// ===== PLANSTRASSE =====
function detectPlanstrassen(t){
  let matches = t.match(/planstraße\s*[a-z]/gi) || [];
  let unique = [...new Set(matches.map(m=>m.toLowerCase()))];
  return unique.map(p=>p.toUpperCase());
}

// ===== TEIL =====
function detectTeil(t, plan){
  let regex = new RegExp(plan.toLowerCase() + ".*?teil\\s*\\d","gi");
  let match = t.match(regex);

  if(!match) return [plan];

  return match.map((x,i)=>`${plan} - TEIL ${i+1}`);
}

// ===== FASES =====
function buildPhases(t){

  let plans = detectPlanstrassen(t);
  let phases=[];

  plans.forEach(p=>{
    let delen = detectTeil(t,p);
    delen.forEach(d=>{
      phases.push({ name:d });
    });
  });

  return phases;
}

// ===== DATUM =====
function attachDates(phases,t){

  let dates = extractDates(t);

  return phases.map((p,i)=>{

    let start = dates[i] || dates[0] || 0;
    let end = dates[i+1] || start + 6;

    return {
      ...p,
      start,
      end,
      duur: end - start
    };
  });
}

// ===== RISICO =====
function addRisk(p,t){

  let risico=[];
  let aandacht=[];

  if(t.includes("nicht parallel")){
    risico.push("Geen parallel uitvoering mogelijk → langere doorlooptijd");
  }

  if(t.includes("unterbrechung")){
    risico.push("Onderbrekingen mogelijk tussen fases");
  }

  if(t.includes("drittfirmen")){
    risico.push("Afhankelijkheid van derden");
    aandacht.push("Afstemming met nutsbedrijven vereist");
  }

  if(t.includes("nicht vergütet")){
    risico.push("Niet vergoede werkzaamheden");
  }

  return {risico,aandacht};
}

// ===== GROTE SAMENVATTING =====
function bigSummary(p,t){

  return `
  Deze fase (${p.name}) vormt een essentieel onderdeel binnen de gefaseerde uitvoering van het project. 
  De werkzaamheden in deze fase zijn direct gekoppeld aan de voortgang van voorgaande fases en bepalen mede de totale projectdoorlooptijd.

  De geplande uitvoeringsperiode loopt van ${formatDate(p.start)} tot ${formatDate(p.end)}, 
  met een geschatte duur van ${p.duur} maanden.

  Binnen deze fase is sprake van ${p.risico.length > 0 ? "meerdere risico’s" : "beperkte risico’s"}, 
  die invloed hebben op zowel planning als uitvoering. 
  ${t.includes("nicht parallel") ? "Parallel werken is niet toegestaan, waardoor vertraging direct effect heeft op opvolgende fases." : ""}

  ${t.includes("drittfirmen") ? "Daarnaast is de uitvoering afhankelijk van derden, wat extra coördinatie en afstemming vereist." : ""}

  Conclusie: deze fase vraagt om een strakke voorbereiding, duidelijke planning en intensieve bewaking tijdens uitvoering.
  `;
}

// ===== FORMAT =====
function formatDate(v){
  let y = Math.floor(v/12);
  let m = v % 12;
  return `${m}/${y}`;
}

// ===== KRITISCH =====
function markCritical(phases){
  return phases.map(p=>{
    let score = p.risico.length + p.duur;
    return {...p, kritisch: score > 8};
  });
}

// ===== TIMELINE =====
function buildTimeline(phases){

  let min = Math.min(...phases.map(p=>p.start));
  let max = Math.max(...phases.map(p=>p.end));
  let total = max - min;

  return `
  <div class="section">
    <h3>Planning</h3>

    ${phases.map(p=>{
      let left = ((p.start - min) / total) * 100;
      let width = (p.duur / total) * 100;

      return `
      <div style="margin-bottom:10px;">
        <b>${p.name}</b> ${p.kritisch ? '<span class="high">(Kritiek)</span>' : ''}

        <div style="background:#ddd;height:20px;position:relative;">
          <div style="
            position:absolute;
            left:${left}%;
            width:${width}%;
            height:100%;
            background:${p.kritisch ? '#dc2626' : '#2563eb'};
          "></div>
        </div>
      </div>
      `;
    }).join("")}

  </div>
  `;
}

// ===== PDF EXPORT =====
function exportPDF(){

  let w = window.open("");
  w.document.write("<html><head><title>Rapport</title></head><body>");
  w.document.write(out.innerHTML);
  w.document.write("</body></html>");
  w.document.close();
  w.print();
}

// ===== MAIN =====
function analyse(){

  let t = lvText.value.toLowerCase();
  if(!t) return;

  let phases = buildPhases(t);
  phases = attachDates(phases,t);

  phases = phases.map(p=>{
    let r = addRisk(p,t);
    return {...p, ...r};
  });

  phases = markCritical(phases);

  out.innerHTML = `

  ${buildTimeline(phases)}

  <div class="section">
    <h3>Analyse per Planstraße</h3>

    ${phases.map(p=>`
      <div class="card">

        <h3>${p.name}</h3>

        <p>${bigSummary(p,t)}</p>

        <b>Risico’s</b>
        <ul>
          ${p.risico.map(r=>`<li class="high">${r}</li>`).join("")}
        </ul>

        <b>Aandachtspunten</b>
        <ul>
          ${p.aandacht.map(a=>`<li class="mid">${a}</li>`).join("")}
        </ul>

      </div>
    `).join("")}

  </div>
  `;
}

</script>

</body>
</html>
