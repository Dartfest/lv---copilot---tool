<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>LV Intelligence – Complete Tool</title>

<style>
body { font-family: Arial; margin:0; background:#eef2f7; }
.header { background:#0f172a; color:#fff; padding:15px; font-size:22px; }
.container { padding:20px; }

textarea { width:100%; height:140px; margin-bottom:10px; }

button {
  padding:10px 15px;
  background:#2563eb;
  color:#fff;
  border:none;
  cursor:pointer;
  margin-right:5px;
  margin-top:5px;
}

.section { background:#fff; padding:20px; margin-top:15px; border-radius:10px; }

.high { color:#dc2626; }
.mid { color:#f59e0b; }

.oz { background:#f9fafb; padding:12px; margin-top:10px; border-radius:6px; border-left:4px solid #2563eb; }
</style>
</head>

<body>

<div class="header">LV Intelligence – Directie Analyse + OZ Export</div>

<div class="container">

<input type="file" id="pdfFile" accept=".pdf"><br><br>

<textarea id="lvText" placeholder="Plak LV tekst of upload PDF"></textarea>

<button onclick="analyse()">Analyse</button>
<button onclick="extractOZ()">Genereer OZ lijst</button>
<button onclick="exportOZ()">Export OZ (.txt)</button>

<div id="out"></div>
<div id="ozOut"></div>

</div>

<script>

// ===== PDF =====
function loadScript(url){
  return new Promise(res=>{
    let s=document.createElement("script");
    s.src=url;
    s.onload=res;
    document.body.appendChild(s);
  });
}

async function handlePDF(file){
  try{
    if(typeof pdfjsLib==="undefined"){
      await loadScript("https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js");
    }

    let reader=new FileReader();

    reader.onload=async function(){
      let pdf=await pdfjsLib.getDocument(new Uint8Array(this.result)).promise;
      let text="";

      for(let i=1;i<=pdf.numPages;i++){
        let page=await pdf.getPage(i);
        let c=await page.getTextContent();
        text+=c.items.map(i=>i.str).join(" ")+"\n";
      }

      lvText.value=text;
    };

    reader.readAsArrayBuffer(file);

  }catch(e){
    alert("PDF fout: "+e);
  }
}

pdfFile.onchange=e=>{
  if(e.target.files[0]) handlePDF(e.target.files[0]);
};

// ===== ANALYSE =====
function analyse(){

  let html = `
  <div class="section">
    <h2>Kritieke Pad</h2>
    <p class="high">BA1 → BA2 → BA3 → BA4</p>
    <p>Geen parallel uitvoering mogelijk – volledige afhankelijkheid</p>
  </div>
  `;

  out.innerHTML = html;
}

// ===== OZ DATA =====
let ozData = [];

// ===== OZ EXTRACT (ECHTE FIX) =====
function extractOZ(){

  let text = lvText.value;
  let lines = text.split("\n");

  ozData = [];
  let current = null;

  lines.forEach(line => {

    // detecteert nummers zoals 1.1.10.
    if(line.trim().match(/^\d+(\.\d+)+\.?$/)){

      if(current) ozData.push(current);

      current = {
        title: line.trim(),
        desc: ""
      };

    } else if(current){
      current.desc += " " + line.trim();
    }

  });

  if(current) ozData.push(current);

  renderOZ();
}

// ===== RENDER =====
function renderOZ(){

  let html = `<div class="section"><h2>OZ Lijst + Vertaling</h2>`;

  ozData.forEach(item=>{

    let nl = translateSmart(item.desc);

    html += `
    <div class="oz">
      <b>${item.title}</b><br><br>

      <b>Duits:</b><br>
      ${item.desc || "Geen omschrijving gevonden"}<br><br>

      <b>Nederlands:</b><br>
      ${nl}
    </div>
    `;
  });

  html += "</div>";

  ozOut.innerHTML = html;
}

// ===== SLIMME VERTALING =====
function translateSmart(text){

  if(!text) return "";

  let t = text.toLowerCase();

  // jouw voorbeeld correct vertaald
  if(t.includes("baustelle einrichten")){
    return `
Inrichten en operationeel houden van de bouwplaats, inclusief het aan- en afvoeren,
plaatsen en onderhouden van bouwketen, sanitaire voorzieningen, machines en installaties.

Daarnaast omvat dit het realiseren van energievoorzieningen, aan- en afvoer van materialen,
het geschikt maken van het terrein en het onderhouden van toegangswegen gedurende de volledige bouwperiode.

De kosten worden doorgaans verrekend op basis van de voortgang van het project.
    `;
  }

  if(t.includes("kanal")){
    return "Aanleg en realisatie van rioleringssystemen inclusief alle bijbehorende werkzaamheden.";
  }

  if(t.includes("leitung")){
    return "Aanleggen en installeren van leidingen en nutsvoorzieningen volgens bestek.";
  }

  // fallback
  return "Uitvoering van werkzaamheden volgens bestek en technische omschrijving.";
}

// ===== EXPORT =====
function exportOZ(){

  if(ozData.length === 0){
    alert("Geen OZ data");
    return;
  }

  let content = ozData.map(item =>
    item.title + "\n\n" +
    "DUITS:\n" + item.desc + "\n\n" +
    "NL:\n" + translateSmart(item.desc) + "\n\n-----------------\n"
  ).join("");

  let blob = new Blob([content], {type:"text/plain"});
  let a = document.createElement("a");

  a.href = URL.createObjectURL(blob);
  a.download = "OZ_lijst.txt";
  a.click();
}

</script>

</body>
</html>
