<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>LV Analyse Engine PRO</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body { font-family: Arial; padding:20px; background:#f4f6f8; }
textarea { width:100%; height:200px; font-family:monospace; }
button { padding:8px 14px; margin:6px; }
.box { background:#fff; padding:15px; margin-bottom:15px; border-radius:6px; }
.section { background:#fff; border-left:5px solid #2563eb; padding:15px; margin:10px 0; }
.risk { color:#b91c1c; font-weight:bold; }
</style>
</head>

<body>

<h1>LV Analyse Engine (PRO)</h1>

<div class="box">
<input type="file" id="file" accept=".pdf">
<button onclick="leesLV()">Lees PDF</button>
<button onclick="analyse()">Analyse</button>
<button onclick="exportPDF()">Export PDF</button>
<textarea id="lvText"></textarea>
</div>

<div id="result"></div>

<script>

// ================= PDF =================
async function leesLV(){
  const f = document.getElementById("file").files[0];
  if(!f) return alert("Kies PDF");

  const buffer = await f.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({data:buffer}).promise;

  let text="";
  for(let i=1;i<=pdf.numPages;i++){
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    content.items.forEach(it => text += it.str + " ");
  }

  document.getElementById("lvText").value = text;
}

// ================= ENGINE =================
let analyseData = {};

function analyse(){

  const raw = document.getElementById("lvText").value;
  const text = raw.toLowerCase();

  const out = document.getElementById("result");
  out.innerHTML="";

  // ===== WERKZAAMHEDEN =====
  let werk = [];
  if(text.includes("kanal")) werk.push("Aanleg riolering");
  if(text.includes("kabel") || text.includes("leitung")) werk.push("Kabels en leidingen");
  if(text.includes("straße")) werk.push("Aanleg infrastructuur / bouwwegen");
  if(text.includes("versorgung")) werk.push("Nutsvoorzieningen");

  // ===== PLANNING =====
  let planning = [];
  const maanden = text.match(/(januar|februar|märz|april|mai|juni|juli|august|september|oktober|november|dezember)\s+\d{4}/gi);
  if(maanden) planning = maanden;

  // ===== FASES =====
  let fases = [];
  const faseRegex = /(\d+)\.\s*bauabschnitt.*?planstraße\s+([a-z])/gi;
  let m;
  while((m=faseRegex.exec(text))){
    fases.push(`Fase ${m[1]} - Planstraße ${m[2].toUpperCase()}`);
  }

  // ===== BEPERKINGEN =====
  let beperkingen = [];
  if(text.includes("nicht parallel")) beperkingen.push("Geen parallel werk toegestaan");
  if(text.includes("ohne unterbrechung")) beperkingen.push("Werkzaamheden zonder onderbreking uitvoeren");
  if(text.includes("zeitvorgaben")) beperkingen.push("Strikte tijdseisen");

  // ===== AFHANKELIJKHEDEN =====
  let afhankelijk = [];
  if(text.includes("drittfirmen") || text.includes("versorgung"))
    afhankelijk.push("Afhankelijk van derden (nutsbedrijven)");

  // ===== RISICO =====
  let risico = [];

  if(beperkingen.length)
    risico.push("Beperkingen in uitvoering verhogen planningsdruk");

  if(afhankelijk.length)
    risico.push("Afhankelijkheden van derden kunnen vertraging veroorzaken");

  if(text.includes("unterbrechung"))
    risico.push("Onderbrekingen leiden tot inefficiëntie en kosten");

  if(fases.length && text.includes("nicht parallel"))
    risico.push("Fasering zonder overlap verlengt doorlooptijd");

  if(risico.length === 0)
    risico.push("Algemene uitvoeringsrisico's aanwezig");

  // ===== SAMENVATTING (ECHTE TEKST) =====
  let samenvatting = `
  Het project omvat ${werk.join(", ")}.
  `;

  if(fases.length){
    samenvatting += `De uitvoering is opgedeeld in ${fases.length} fases (${fases.join(", ")}). `;
  }

  if(planning.length){
    samenvatting += `De planning loopt over de periode ${planning.join(", ")}. `;
  }

  if(afhankelijk.length){
    samenvatting += `De uitvoering is afhankelijk van derden. `;
  }

  if(beperkingen.length){
    samenvatting += `Er gelden belangrijke beperkingen zoals ${beperkingen.join(", ")}. `;
  }

  samenvatting += `Dit vraagt om een strakke planning en intensieve coördinatie.`;

  analyseData = {
    werk, planning, fases, beperkingen, afhankelijk, risico, samenvatting
  };

  // ===== OUTPUT =====
  out.innerHTML = `

  <div class="section">
    <h3>Samenvatting</h3>
    <p>${samenvatting}</p>
  </div>

  <div class="section">
    <h3>Werkzaamheden</h3>
    <ul>${werk.map(w=>`<li>${w}</li>`).join("")}</ul>
  </div>

  <div class="section">
    <h3>Fasering</h3>
    <ul>${fases.length ? fases.map(f=>`<li>${f}</li>`).join("") : "<li>Niet expliciet benoemd</li>"}</ul>
  </div>

  <div class="section">
    <h3>Planning</h3>
    <ul>${planning.length ? planning.map(p=>`<li>${p}</li>`).join("") : "<li>Niet duidelijk gespecificeerd</li>"}</ul>
  </div>

  <div class="section">
    <h3>Beperkingen</h3>
    <ul>${beperkingen.length ? beperkingen.map(b=>`<li>${b}</li>`).join("") : "<li>Geen specifieke beperkingen gevonden</li>"}</ul>
  </div>

  <div class="section">
    <h3>Risico's</h3>
    <ul class="risk">${risico.map(r=>`<li>${r}</li>`).join("")}</ul>
  </div>

  `;
}

// ================= PDF =================
function exportPDF(){

  if(!analyseData.samenvatting){
    alert("Eerst analyseren");
    return;
  }

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  let y=15;

  doc.setFontSize(16);
  doc.text("LV Analyse Rapport",10,y);
  y+=10;

  doc.setFontSize(12);
  doc.text("Samenvatting",10,y);
  y+=6;

  const sam = doc.splitTextToSize(analyseData.samenvatting,180);
  doc.text(sam,10,y);
  y += sam.length*5 + 5;

  doc.setTextColor(200,0,0);
  doc.text("Risico's",10,y);
  y+=6;

  analyseData.risico.forEach(r=>{
    doc.text("- "+r,10,y);
    y+=5;
  });

  doc.save("LV_Analyse_Pro.pdf");
}

</script>

</body>
</html>
