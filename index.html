<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>LV test – alleen lezen</title>

<!-- ✅ ENIGE LIBRARY -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
  "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
</script>

<style>
body { font-family: Arial, sans-serif; padding:20px; }
textarea { width:100%; min-height:300px; font-family:monospace; }
button { padding:6px 12px; margin-top:8px; }
.status { margin-top:8px; font-weight:bold; }
.ok { color:green; }
.err { color:red; }
</style>
</head>

<body>

<h1>LV‑PDF lezen (basischeck)</h1>

<input type="file" id="file" accept=".pdf"><br>
<button onclick="lees()">Lees LV</button>

<div id="status" class="status"></div>

<textarea id="out" placeholder="LV‑tekst verschijnt hier..."></textarea>

<script>
async function lees() {
  const f = document.getElementById("file").files[0];
  const status = document.getElementById("status");
  const out = document.getElementById("out");

  if (!f) {
    alert("Kies eerst een PDF");
    return;
  }

  try {
    const buf = await f.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: buf }).promise;

    let text = "";
    for (let i = 1; i <= pdf.numPages; i++) {
      const page = await pdf.getPage(i);
      const c = await page.getTextContent();
      text += c.items.map(it => it.str).join(" ") + "\n";
    }

    out.value = text;
    status.textContent = "✅ LV succesvol gelezen";
    status.className = "status ok";

  } catch (e) {
    status.textContent = "❌ Fout: " + e.message;
    status.className = "status err";
    console.error(e);
  }
}
</script>

</body>
</html>
