<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kanalbau AI v2.0</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body{background:#eef2f7;display:flex;height:100vh;}

.sidebar{
width:250px;
background:#0f172a;
color:white;
padding:20px;
}

.logo{
font-size:26px;
font-weight:bold;
text-align:center;
margin-bottom:30px;
}

.menu button{
width:100%;
padding:14px;
margin-bottom:10px;
border:none;
background:#1e293b;
color:white;
border-radius:8px;
cursor:pointer;
}

.menu button:hover{background:#2563eb;}

.main{flex:1;padding:25px;}

.cards{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin-bottom:25px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 3px 10px rgba(0,0,0,.1);
}

.panel{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 3px 10px rgba(0,0,0,.1);
}

textarea{
width:100%;
height:200px;
padding:10px;
}

button{
margin-top:10px;
padding:12px 20px;
background:#2563eb;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

.result{
margin-top:15px;
padding:15px;
background:#f8fafc;
border-radius:10px;
}

.green{color:green;font-weight:bold;}
.red{color:red;font-weight:bold;}
.orange{color:orange;font-weight:bold;}
</style>

</head>

<body>

<div class="sidebar">
<div class="logo">KANALBAU AI</div>

<div class="menu">
<button>Dashboard</button>
<button>Inbox</button>
<button>Projecten</button>
</div>
</div>

<div class="main">

<div class="cards">
<div class="card">
<h2 id="mailCount">0</h2>
<p>Mails</p>
</div>

<div class="card">
<h2 id="topCount">0</h2>
<p>TOP projecten</p>
</div>

<div class="card">
<h2>100km</h2>
<p>Werkgebied</p>
</div>

<div class="card">
<h2>NRW</h2>
<p>Regio</p>
</div>
</div>

<div class="panel">
<h2>Plak email</h2><br>

<textarea id="mail"></textarea><br>

<button onclick="analyseMail()">Analyseer</button>

<div class="result" id="result">Nog geen analyse</div>
</div>

</div>

<script>

// keywords
let keywords = [
{ woord:"kanalbau", score:40 },
{ woord:"tiefbau", score:30 },
{ woord:"erschließung", score:25 },
{ woord:"druckrohr", score:25 },
{ woord:"schmutzwasser", score:20 },
{ woord:"regenwasser", score:15 },
{ woord:"straßenbau", score:15 },
{ woord:"sanitär", score:-70 },
{ woord:"elektro", score:-60 },
{ woord:"dach", score:-60 }
];

// plaatsen
let plaatsen = ["Dülmen","Ahaus","Münster","Bocholt","Borken"];

function zoekPlaats(text){
for(let p of plaatsen){
if(text.includes(p.toLowerCase())){
return p;
}
}
return "Onbekend";
}

function analyseMail(){

let tekst = document.getElementById("mail").value.toLowerCase();

let score = 0;
let redenen = [];

// analyse
keywords.forEach(k=>{
if(tekst.includes(k.woord)){
score += k.score;
redenen.push((k.score>0?"✔ ":"✖ ") + k.woord);
}
});

// beoordeling
let status="Niet interessant";
let kleur="red";

if(score >= 80){status="TOP PROJECT"; kleur="green";}
else if(score >= 60){status="Interessant"; kleur="green";}
else if(score >= 40){status="Misschien"; kleur="orange";}

let plaats = zoekPlaats(tekst);

// tellers
document.getElementById("mailCount").innerHTML++;
if(score >= 80){
document.getElementById("topCount").innerHTML++;
}

// resultaat
document.getElementById("result").innerHTML =
"<b>Plaats:</b> "+plaats+"<br><br>"+
"<b>Score:</b> "+score+"<br>"+
"<b>Status:</b> <span class='"+kleur+"'>"+status+"</span><br><br>"+
redenen.join("<br>");

}

</script>

</body>
</html>
``
