<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>LV Analyse PRO+</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body { font-family: Arial; padding:20px; background:#f4f6f8; }
textarea { width:100%; height:200px; font-family:monospace; }
button { padding:8px 14px; margin:6px; }
.box { background:#fff; padding:15px; margin-bottom:15px; border-radius:6px; }
.report { background:#eef6ff; border-left:5px solid #2563eb; padding:15px; }
.risk { color:#b91c1c; font-weight:bold; }
</style>
</head>

<body>

<h1>LV Analyse PRO+</h1>

<div class="box">
<input type="file" id="file" accept=".pdf">
<button onclick="leesLV()">Lees PDF</button>
<button onclick="analyse()">Analyse</button>
<button onclick="exportPDF()">Export PDF</button>
<textarea id="lvText"></textarea>
</div>

<div id="result"></div>

<script>

// ===== PDF LEZEN =====
async function leesLV(){
  const f = document.getElementById("file").files[0];
  if(!f) return alert("Kies PDF");

  const buffer = await f.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({data:buffer}).promise;

  let text="";
  for(let i=1;i<=pdf.numPages;i++){
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    content.items.forEach(it => text += it.str + " ");
  }

  document.getElementById("lvText").value = text;
}

// ===== ANALYSE ENGINE =====
let analyseData = {};

function analyse(){

  const text = document.getElementById("lvText").value.toLowerCase();
  const out = document.getElementById("result");
  out.innerHTML="";

  // ===== DETECTIES =====
  const afhankelijk = text.match(/drittfirmen|versorgung|koord|abstimmung/gi);
  const geenParallel = text.match(/nicht parallel/gi);
  const onderbreking = text.match(/unterbrechung/gi);
  const strakkePlanning = text.match(/ohne unterbrechung|zeitvorgaben/gi);

  // ===== SAMENVATTING =====
  let samenvatting = `
  Dit project betreft civieltechnische werkzaamheden waaronder riolering, kabels en leidingen en de aanleg van bouwwegen. 
  De uitvoering is gefaseerd en kent duidelijke afhankelijkheden tussen werkzaamheden en betrokken partijen.
  `;

  if(strakkePlanning){
    samenvatting += `
    De planning is strak opgezet waarbij werkzaamheden zonder onderbreking moeten worden uitgevoerd.`;
  }

  if(afhankelijk){
    samenvatting += `
    Er is sprake van afhankelijkheid van derden zoals nutsbedrijven, wat invloed heeft op de voortgang.`;
  }

  if(geenParallel){
    samenvatting += `
    Parallel werken tussen fases is niet toegestaan, waardoor de doorlooptijd kritisch wordt.`;
  }

  if(onderbreking){
    samenvatting += `
    Mogelijke onderbrekingen tussen fases moeten worden ingecalculeerd en worden niet extra vergoed.`;
  }

  // ===== RISICO =====
  let risico = [];

  if(strakkePlanning)
    risico.push("Strakke planning zonder uitloopmogelijkheden");

  if(afhankelijk)
    risico.push("Afhankelijkheid van derden (nutsbedrijven)");

  if(geenParallel)
    risico.push("Geen parallel werk mogelijk - verhoogde doorlooptijd");

  if(onderbreking)
    risico.push("Onderbrekingen leiden tot extra kosten en inefficiëntie");

  if(risico.length === 0)
    risico.push("Algemeen uitvoeringsrisico - afstemming en planning essentieel");

  analyseData = { samenvatting, risico };

  // ===== OUTPUT =====
  out.innerHTML = `
  <div class="report">

  <h3>Samenvatting LV</h3>
  <p>${samenvatting}</p>

  <h3>Belangrijkste risico's</h3>
  <ul class="risk">
  ${risico.map(r=>`<li>${r}</li>`).join("")}
  </ul>

  </div>
  `;
}

// ===== PDF =====
function exportPDF(){

  if(!analyseData.samenvatting){
    alert("Eerst analyseren");
    return;
  }

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  let y=15;

  doc.setFontSize(16);
  doc.text("LV Analyse Rapport",10,y);
  y+=10;

  doc.setFontSize(12);
  doc.text("Samenvatting",10,y);
  y+=6;

  doc.setFontSize(10);
  const sam = doc.splitTextToSize(analyseData.samenvatting,180);
  doc.text(sam,10,y);
  y += sam.length*5 + 5;

  doc.setTextColor(200,0,0);
  doc.setFontSize(12);
  doc.text("Risico's",10,y);
  y+=6;

  doc.setFontSize(10);
  analyseData.risico.forEach(r=>{
    doc.text("- "+r,10,y);
    y+=5;
  });

  doc.save("LV_Analyse_Pro.pdf");
}

</script>

</body>
</html>
