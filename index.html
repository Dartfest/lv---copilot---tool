<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>LV Intelligence – Smart Engine</title>

<style>
body { font-family: Arial; margin:0; background:#eef2f7; }
.header { background:#0f172a; color:#fff; padding:15px; font-size:22px; }
.container { padding:20px; }

textarea { width:100%; height:120px; margin-bottom:10px; }

button {
  padding:8px 12px;
  background:#2563eb;
  color:#fff;
  border:none;
  cursor:pointer;
  margin:3px;
}

.card { background:#fff; padding:10px; border-radius:6px; margin-bottom:8px; }

.high { color:#dc2626; }
.mid { color:#f59e0b; }
.good { color:#16a34a; }

.section {
  background:#fff;
  padding:15px;
  margin-top:12px;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="header">LV Intelligence – Smart Analysis</div>

<div class="container">

<input type="file" id="pdfFile" accept=".pdf">
<br><br>

<input type="text" id="projectName" placeholder="Project naam">

<textarea id="lvText" placeholder="Plak LV tekst of upload PDF"></textarea>

<button onclick="analyse()">Analyse</button>
<button onclick="saveProject()">Opslaan</button>

<div id="out"></div>

<div class="section">
  <h3>Projecten</h3>
  <div id="projectList"></div>
</div>

<div class="section">
  <h3>Vergelijking</h3>
  <div id="compare"></div>
</div>

</div>

<script>

// ===== SCRIPT LOADER =====
function loadScript(url){
  return new Promise((res,rej)=>{
    let s=document.createElement("script");
    s.src=url;
    s.onload=res;
    s.onerror=rej;
    document.body.appendChild(s);
  });
}

// ===== PDF =====
async function handlePDF(file){
  try{
    if(typeof pdfjsLib === "undefined"){
      await loadScript("https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js");
    }

    const reader = new FileReader();

    reader.onload = async function(){
      const pdf = await pdfjsLib.getDocument(new Uint8Array(this.result)).promise;
      let text="";

      for(let i=1;i<=pdf.numPages;i++){
        let page = await pdf.getPage(i);
        let content = await page.getTextContent();
        text += content.items.map(i=>i.str).join(" ") + "\n";
      }

      lvText.value = text;
    };

    reader.readAsArrayBuffer(file);

  } catch(e){
    alert("PDF lezen mislukt");
  }
}

pdfFile.addEventListener("change", e=>{
  if(e.target.files[0]) handlePDF(e.target.files[0]);
});


// ===== SECTIE HERKENNING =====
function detectSections(text){

  return {
    planning: text.match(/bauablauf|bauzeit|erschließung/gi) || [],
    contract: text.match(/vergütet|vergütung|kosten/gi) || [],
    risico: text.match(/unterbrechung|nicht|verzug/gi) || [],
    derden: text.match(/drittfirmen|versorgung/gi) || []
  };
}


// ===== ANALYSE CORE =====
function analyseCore(text){

  let sections = detectSections(text);

  let risicoScore =
    sections.risico.length +
    sections.contract.length +
    sections.derden.length;

  let fases = (text.match(/bauabschnitt/gi) || []).length;

  let roi = 100 - (risicoScore * 5);

  let advies="GO", cls="good";

  if(roi < 50){ advies="NO-GO"; cls="high"; }
  else if(roi < 70){ advies="GO MET RISICO"; cls="mid"; }

  return {
    fases,
    risico: risicoScore,
    roi,
    advies,
    cls,
    sections
  };
}


// ===== UI =====
let lastAnalysis = null;

function analyse(){

  let text = lvText.value.toLowerCase();
  if(!text) return;

  let res = analyseCore(text);
  lastAnalysis = res;

  out.innerHTML = `

  <div class="card">
    Fases: ${res.fases}<br>
    Risico score: <span class="high">${res.risico}</span><br>
    ROI: ${res.roi}%<br>
    Advies: <span class="${res.cls}">${res.advies}</span>
  </div>

  <div class="section">
    <h3>Gedetecteerde Secties</h3>

    <b>Planning (${res.sections.planning.length})</b><br>
    <b>Contract (${res.sections.contract.length})</b><br>
    <b>Risico (${res.sections.risico.length})</b><br>
    <b>Derden (${res.sections.derden.length})</b>

  </div>

  `;
}


// ===== STORAGE =====
function getProjects(){
  return JSON.parse(localStorage.getItem("projects") || "[]");
}

function saveProjects(p){
  localStorage.setItem("projects", JSON.stringify(p));
}


// ===== OPSLAAN =====
function saveProject(){

  if(!lastAnalysis){
    alert("Eerst analyseren");
    return;
  }

  let name = projectName.value || "Project";

  let projects = getProjects();

  projects.push({
    name,
    ...lastAnalysis
  });

  saveProjects(projects);
  renderProjects();
}


// ===== LIJST =====
function renderProjects(){

  let projects = getProjects();

  projectList.innerHTML = projects.map((p,i)=>`
    <div class="card">
      <b>${p.name}</b><br>
      ROI: ${p.roi}% |
      <span class="${p.cls}">${p.advies}</span>
      <br>
      <button onclick="addCompare(${i})">Vergelijk</button>
    </div>
  `).join("");
}


// ===== VERGELIJK =====
let compareList=[];

function addCompare(i){
  compareList.push(getProjects()[i]);
  renderCompare();
}

function renderCompare(){

  if(compareList.length===0){
    compare.innerHTML="Geen selectie";
    return;
  }

  compare.innerHTML=`
  <table border="1" cellpadding="5">
    <tr>
      <th>Project</th>
      <th>Fases</th>
      <th>Risico</th>
      <th>ROI</th>
      <th>Advies</th>
    </tr>

    ${compareList.map(p=>`
      <tr>
        <td>${p.name}</td>
        <td>${p.fases}</td>
        <td class="high">${p.risico}</td>
        <td>${p.roi}%</td>
        <td class="${p.cls}">${p.advies}</td>
      </tr>
    `).join("")}

  </table>
  `;
}


// INIT
renderProjects();

</script>

</body>
</html>
