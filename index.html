<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>LV Intelligence – Executive AI Demo</title>

<style>
body { font-family: Arial; margin:0; background:#eef2f7; }
.header { background:#0f172a; color:#fff; padding:15px; font-size:22px; }
.container { padding:20px; }

textarea { width:100%; height:140px; margin-bottom:10px; }

button {
  padding:10px 14px;
  background:#2563eb;
  color:#fff;
  border:none;
  cursor:pointer;
}

.grid {
  display:grid;
  grid-template-columns: repeat(4,1fr);
  gap:10px;
  margin-top:10px;
}

.card { background:#fff; padding:15px; border-radius:8px; }
.big { font-size:22px; font-weight:bold; }

.high { color:#dc2626; }
.mid { color:#f59e0b; }
.good { color:#16a34a; }

.section {
  background:#fff;
  padding:15px;
  margin-top:12px;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="header">LV Intelligence – Executive Dashboard</div>

<div class="container">

<textarea id="lvText" placeholder="Plak hier LV tekst"></textarea>
<button onclick="analyse()">Analyse</button>

<div id="out"></div>

</div>

<script>

// ===== DATUM =====
const monthMap = {
  "juni":6,"juli":7,"august":8,"mai":5
};

function extractDates(text){
  let r=[], regex=/(juni|juli|august|mai)\s+(20\d{2})/gi, m;
  while((m=regex.exec(text))){
    r.push({
      label:m[0],
      value:parseInt(m[2])*12 + monthMap[m[1]],
      month:monthMap[m[1]],
      year:parseInt(m[2])
    });
  }
  return r;
}

// ===== FASES =====
function extractPhases(text){
  let valid=["c","d","e"];
  let r=[], regex=/(\d)\.\s*bauabschnitt.*?planstraße\s*([a-z])/gi, m;

  while((m=regex.exec(text))){
    if(valid.includes(m[2].toLowerCase())){
      r.push({
        id:parseInt(m[1]),
        name:`Fase ${m[1]} - Planstraat ${m[2].toUpperCase()}`
      });
    }
  }
  return r;
}

// ===== PLANNING =====
function buildPlanning(text){
  let dates=extractDates(text);
  let phases=extractPhases(text);

  phases.forEach((p,i)=>{
    p.start=dates[i];
    p.end=dates[i+1] || dates[dates.length-1];
    p.duration=p.end.value - p.start.value;
  });

  return phases;
}

// ===== RISICO =====
function analyseRisico(text){

  let r={
    contract:[],
    planning:[],
    uitvoering:[],
    financieel:[],
    coordinatie:[]
  };

  if(text.includes("nicht vergütet")){
    r.contract.push("Niet vergoede werkzaamheden");
    r.financieel.push("Kosten voor aannemer");
  }

  if(text.includes("unterbrechung")){
    r.planning.push("Onderbreking zonder vergoeding");
    r.financieel.push("Stilstand kosten");
  }

  if(text.includes("nicht parallel")){
    r.planning.push("Geen parallel uitvoering");
  }

  if(text.includes("drittfirmen")){
    r.uitvoering.push("Afhankelijkheid derden");
    r.coordinatie.push("Afstemming nutsbedrijven");
  }

  return r;
}

// ===== ROI =====
function calculateROI(r){

  let model = {
    contract:{impact:50000,kans:0.6},
    planning:{impact:30000,kans:0.5},
    uitvoering:{impact:20000,kans:0.4},
    financieel:{impact:40000,kans:0.6},
    coordinatie:{impact:15000,kans:0.5}
  };

  let totaal=0;

  for(let k in r){
    let count=r[k].length;
    if(model[k]){
      totaal += count * model[k].impact * model[k].kans;
    }
  }

  let besparing = totaal * 0.4;
  let investering = 10000;
  let roi = ((besparing - investering)/investering)*100;

  return {
    risicoKosten: Math.round(totaal),
    besparing: Math.round(besparing),
    investering,
    roi: Math.round(roi)
  };
}

// ===== TOP RISICO =====
function topRisico(r){

  let lijst = [];

  Object.entries(r).forEach(([type,items])=>{
    items.forEach(i=>{
      lijst.push({tekst:i,type});
    });
  });

  return lijst.slice(0,3);
}

// ===== GO / NO GO =====
function goNoGo(risico, roi){

  let total = Object.values(risico).flat().length;

  if(total > 5 || roi.roi < 0){
    return {advies:"NO-GO", class:"high"};
  }

  if(total > 3){
    return {advies:"GO MET RISICO", class:"mid"};
  }

  return {advies:"GO", class:"good"};
}

// ===== MAIN =====
function analyse(){

  let t = lvText.value.toLowerCase();
  if(!t) return;

  let planning = buildPlanning(t);
  let risico = analyseRisico(t);
  let roi = calculateROI(risico);
  let top = topRisico(risico);
  let advies = goNoGo(risico, roi);

  out.innerHTML = `

  <div class="grid">
    <div class="card"><div>Fases</div><div class="big">${planning.length}</div></div>
    <div class="card"><div>Risico’s</div><div class="big high">${Object.values(risico).flat().length}</div></div>
    <div class="card"><div>ROI</div><div class="big">${roi.roi}%</div></div>
    <div class="card"><div>Advies</div><div class="big ${advies.class}">${advies.advies}</div></div>
  </div>

  <div class="section">
    <h3>Executive Samenvatting</h3>
    <p>
    Project met gefaseerde uitvoering en duidelijke afhankelijkheden.
    Belangrijkste risico’s zitten in contract en externe partijen.
    Besluitvorming vereist focus op risicobeheersing.
    </p>
  </div>

  <div class="section">
    <h3>Top Risico’s</h3>
    <ul>
      ${top.map(r=>`<li class="high">${r.tekst}</li>`).join("")}
    </ul>
  </div>

  <div class="section">
    <h3>Financiële Impact</h3>
    <p>Risico waarde: <b class="high">€ ${roi.risicoKosten.toLocaleString()}</b></p>
    <p>Besparing: € ${roi.besparing.toLocaleString()}</p>
    <p>Investering: € ${roi.investering.toLocaleString()}</p>
  </div>

  `;
}

</script>

</body>
</html>
