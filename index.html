<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>PDF.js test</title>

<!-- ✅ ENIGE JUISTE MANIER -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
  window.addEventListener("load", () => {
    if (!window.pdfjsLib) {
      document.body.innerHTML =
        "<h2 style='color:red'>pdf.js NIET geladen</h2>" +
        "<p>CDN geblokkeerd of script niet geladen.</p>";
    } else {
      pdfjsLib.GlobalWorkerOptions.workerSrc =
        "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
    }
  });
</script>

<style>
body { font-family: Arial, sans-serif; padding: 20px; background:#f4f6f8; }
textarea { width:100%; min-height:220px; font-family:monospace; }
button { margin-top:8px; }
</style>
</head>

<body>

<h2>PDF‑lees test (fundering)</h2>

<input type="file" id="file" accept=".pdf"><br>
<button onclick="lees()">Lees PDF</button>

<p id="status"></p>
<textarea id="out" placeholder="Tekst verschijnt hier..."></textarea>

<script>
async function lees() {
  const f = document.getElementById("file").files[0];
  const status = document.getElementById("status");
  const out = document.getElementById("out");

  if (!f) {
    alert("Geen PDF gekozen");
    return;
  }

  try {
    const buf = await f.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: buf }).promise;

    let text = "";
    for (let i = 1; i <= pdf.numPages; i++) {
      const page = await pdf.getPage(i);
      const content = await page.getTextContent();

      if (content.items.length === 0) {
        status.innerText = "❌ PDF heeft geen tekstlaag (gescand)";
        return;
      }

      text += content.items.map(it => it.str).join(" ") + "\n\n";
    }

    out.value = text;
    status.innerText = "✅ PDF succesvol gelezen";

  } catch (e) {
    status.innerText = "❌ Fout: " + e.message;
    console.error(e);
  }
}
</script>

</body>
</html>
