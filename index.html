<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>LV Analyse – Fixed</title>

<style>
body { font-family: Arial; margin:0; background:#eef2f7; }
.header { background:#0f172a; color:#fff; padding:15px; font-size:22px; }
.container { padding:20px; }

textarea { width:100%; height:150px; margin-bottom:10px; }

button {
  padding:8px 12px;
  background:#2563eb;
  color:#fff;
  border:none;
  cursor:pointer;
}

.section { background:#fff; padding:15px; margin-top:12px; border-radius:8px; }
.card { background:#f9fafb; padding:10px; margin-top:8px; border-radius:6px; }

.high { color:#dc2626; }
.mid { color:#f59e0b; }
</style>
</head>

<body>

<div class="header">LV Intelligence – Werkende Versie</div>

<div class="container">

<textarea id="lvText">

1. Bauabschnitt: Planstraße C (Else- Scheuer - Weg )
2. Bauabschnitt: Planstraße E (Else- Scheuer - Weg und Elfriede- Meyer - Weg ( bis Henriette- Herz -Weg ))
3. Bauabschnitt: Planstraße D (Else- Scheuer - Weg ) - Teil 1
4. Bauabschnitt: Planstraße D (Else- Scheuer - Weg ) - Teil 2

</textarea>

<button onclick="analyse()">Analyse</button>

<div id="out"></div>

</div>

<script>

// ===== ROBUUSTE PARSER =====
function parsePhases(t){

  let lines = t.split("\n");
  let phases = [];

  lines.forEach(line => {

    let m = line.match(/(\d+)\.\s*bauabschnitt.*?planstraße\s*([a-z]).*?(teil\s*\d)?/i);

    if(m){

      phases.push({
        nr: parseInt(m[1]),
        plan: m[2].toUpperCase(),
        teil: m[3] ? m[3].toUpperCase() : "",
        name: `Bauabschnitt ${m[1]} - Planstraße ${m[2].toUpperCase()} ${m[3] ? m[3].toUpperCase() : ""}`,
        raw: line
      });

    }

  });

  // fallback als niets gevonden
  if(phases.length === 0){
    return [{
      nr:1,
      plan:"?",
      teil:"",
      name:"Geen fases gevonden (controleer tekst)",
      raw:t
    }];
  }

  return phases.sort((a,b)=>a.nr-b.nr);
}

// ===== MATERIAAL =====
function extractMaterials(text){

  let matches = text.match(/(dn\s*\d+).*?(pvc|pe|stahl|guss|rohr|leitung)?/gi) || [];
  let map = {};

  matches.forEach(m=>{
    let dn = (m.match(/dn\s*\d+/i)||[""])[0].toUpperCase();
    let type = (m.match(/pvc|pe|stahl|guss|rohr|leitung/i)||["Onbekend"])[0];
    let key = dn + " " + type;

    map[key] = (map[key]||0)+1;
  });

  return map;
}

// ===== RISICO =====
function analyseRisico(text){

  let r=[], k=[];

  if(text.includes("nicht parallel")){
    r.push("Geen parallel uitvoering mogelijk");
    k.push("Fases blokkeren elkaar");
  }

  if(text.includes("unterbrechung")){
    r.push("Onderbreking mogelijk");
    k.push("Stilstand tussen fases");
  }

  if(text.includes("drittfirmen")){
    r.push("Afhankelijkheid derden");
    k.push("Planning afhankelijk van nutsbedrijven");
  }

  if(text.includes("nicht vergütet")){
    r.push("Niet vergoede werkzaamheden");
    k.push("Kosten bij aannemer");
  }

  return {r,k};
}

// ===== GROTE SAMENVATTING =====
function bigSummary(p){

  return `
  ${p.name} is een afzonderlijke uitvoeringsfase binnen het project en vormt een schakel in de totale fasering.

  Deze fase volgt op de voorgaande werkzaamheden en heeft directe invloed op de voortgang van het project. 
  Door de gefaseerde opbouw kunnen werkzaamheden niet willekeurig worden uitgevoerd en is volgordelijkheid bepalend.

  Binnen deze fase worden werkzaamheden uitgevoerd aan de betreffende planstraat (${p.plan}), 
  waarbij logistiek, bereikbaarheid en afstemming met andere partijen een belangrijke rol spelen.

  Indien deze fase is opgesplitst (${p.teil || "geen opsplitsing"}), 
  betekent dit dat de uitvoering verder gefaseerd is en extra coördinatie vereist.

  Eventuele vertragingen binnen deze fase hebben direct impact op opvolgende fases, 
  waardoor strakke planning en voorbereiding essentieel zijn.

  Conclusie: ${p.name} is een kritische schakel binnen het project en vereist actieve sturing op uitvoering en planning.
  `;
}

// ===== MAIN =====
function analyse(){

  try {

    let t = lvText.value.toLowerCase();
    let phases = parsePhases(t);

    out.innerHTML = phases.map(p=>{

      let mat = extractMaterials(p.raw);
      let ris = analyseRisico(p.raw);

      return `
      <div class="section">

        <h2>${p.name}</h2>

        <p>${bigSummary(p)}</p>

        <h3>Risico’s</h3>
        <ul>${ris.r.map(x=>`<li class="high">${x}</li>`).join("")}</ul>

        <h3>Knelpunten</h3>
        <ul>${ris.k.map(x=>`<li class="mid">${x}</li>`).join("")}</ul>

        <h3>Bestellijst</h3>
        ${Object.entries(mat).map(([k,v])=>`
          <div class="card">${k} → ${v}x</div>
        `).join("")}

      </div>
      `;

    }).join("");

  } catch(e){

    out.innerHTML = `<div class="section high">Fout in analyse: ${e}</div>`;

  }

}

</script>

</body>
</html>
