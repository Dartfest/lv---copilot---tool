<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>LV Analyse PRO</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>
body { font-family: Arial; padding:20px; background:#f4f6f8; }
textarea { width:100%; height:220px; font-family:monospace; }
button { padding:8px 14px; margin:8px 0; }
.box { background:#fff; padding:15px; margin-bottom:15px; border-radius:6px; }
.plan { background:#eef6ff; border-left:5px solid #2563eb; padding:12px; margin:12px 0; border-radius:6px; }
.risk { background:#ffe4e6; padding:8px; margin-top:8px; border-radius:4px; }
.timeline { background:#f1f5f9; padding:8px; margin-top:6px; border-radius:4px; }
.muted { color:#666; font-size:0.9em; }
</style>
</head>

<body>

<h1>LV Analyse (PRO planning + NL)</h1>

<div class="box">
<input type="file" id="file" accept=".pdf">
<button onclick="leesLV()">Lees PDF</button>
<textarea id="lvText"></textarea>
</div>

<div class="box">
<button onclick="analyse()">Analyse</button>
<div id="result"></div>
</div>

<script>

// ================= PDF =================
async function leesLV(){
  const f = document.getElementById("file").files[0];
  if(!f) return alert("Kies PDF");

  const buffer = await f.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({data:buffer, disableWorker:true}).promise;

  let text="";
  for(let i=1;i<=pdf.numPages;i++){
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    content.items.forEach(it => text += it.str + " ");
  }

  document.getElementById("lvText").value = text;
}

// ================= CLEAN =================
function cleanText(t){
  return t
    .replace(/([A-Za-z])\s([A-Za-z])/g, "$1$2")
    .replace(/\s+/g, " ")
    .trim();
}

// ================= VERTALING =================
const cache = {};

async function vertaal(t){

  if(cache[t]) return cache[t];

  try{
    const res = await fetch("https://api.mymemory.translated.net/get?q=" 
      + encodeURIComponent(t) + "&langpair=de|nl");

    const data = await res.json();

    if(data.responseData?.translatedText){
      return cache[t] = data.responseData.translatedText;
    }

  }catch(e){}

  return cache[t] = t;
}

// ================= RISICO ENGINE =================
function bepaalRisico(f){

  let r=[];

  if(f.afhankelijk){
    r.push("Afhankelijk van vorige fase → risico op vertraging");
  }

  if(f.verplichteWacht){
    r.push("Verplichte onderbreking → kosten en inefficiëntie");
  }

  if(f.geenParallel){
    r.push("Geen parallel werk toegestaan → kritische planning");
  }

  if(f.externeFactor){
    r.push("Afhankelijk van derden (kabels/leidingen) → coördinatierisico");
  }

  if(!f.start || !f.eind){
    r.push("Onvolledige planning → uitvoeringsonzekerheid");
  }

  return r;
}

// ================= ANALYSE =================
async function analyse(){

  let text = document.getElementById("lvText").value;
  text = cleanText(text);

  const out = document.getElementById("result");
  out.innerHTML="";

  // ================= FASERING (slim geïnterpreteerd) =================

  const fases = [

    {
      naam: "1. Bauabschnitt",
      plan: "Planstraße C",
      start: new Date(2026,5,1),
      eind: null,
      afhankelijk: null,
      geenParallel: true,
      externeFactor: true
    },

    {
      naam: "2. Bauabschnitt",
      plan: "Planstraße E",
      start: null,
      eind: new Date(2027,6,31),
      afhankelijk: 1,
      geenParallel: true,
      externeFactor: true
    },

    {
      naam: "3. Bauabschnitt",
      plan: "Planstraße D - Teil 1",
      start: new Date(2027,7,1),
      eind: null,
      afhankelijk: null,
      verplichteWacht: true,
      geenParallel: true,
      externeFactor: true
    },

    {
      naam: "4. Bauabschnitt",
      plan: "Planstraße D - Teil 2",
      start: null,
      eind: new Date(2028,4,31),
      afhankelijk: 3,
      geenParallel: true,
      externeFactor: true
    }

  ];

  // ================= AFHANKELIJKHEDEN =================

  fases.forEach((f,i)=>{

    if(f.afhankelijk){
      const prev = fases[f.afhankelijk-1];
      f.start = prev.eind;
    }

    if(!f.eind && i < fases.length-1){
      f.eind = fases[i+1].start;
    }

  });

  // ================= OUTPUT =================

  for(const f of fases){

    const div = document.createElement("div");
    div.className = "plan";

    const vertaling = await vertaal(f.plan);

    div.innerHTML = `
      <strong>${f.naam}: ${f.plan}</strong>
      <div class="muted">${vertaling}</div>

      <div class="timeline">
        <b>Periode:</b><br>
        ${f.start ? f.start.toLocaleDateString() : "onbekend"}
        →
        ${f.eind ? f.eind.toLocaleDateString() : "onbekend"}
      </div>

      <div class="risk">
        <b>Uitvoeringsrisico's:</b><br>
        ${bepaalRisico(f).map(x=>"• "+x).join("<br>")}
      </div>
    `;

    out.appendChild(div);
  }
}

</script>

</body>
</html>
