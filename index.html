<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Offline AI LV Analyse Tool</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body { font-family: Arial; padding:20px; background:#f4f6f8; }
textarea { width:100%; height:180px; font-family:monospace; margin-bottom:10px; }
button { padding:8px 14px; margin:6px 0; }
.box { background:#fff; padding:15px; margin-bottom:15px; border-radius:6px; }
.section { background:#fff; border-left:5px solid #2563eb; padding:15px; margin:10px 0; }
.risk { color:#b91c1c; font-weight:bold; }
</style>
</head>

<body>

<h1>Offline AI Tender Tool (LV Analyse)</h1>

<div class="box">
<h3>1. LV inladen</h3>
<input type="file" id="file" accept=".pdf">
<button onclick="leesLV()">Lees PDF</button>
<textarea id="lvText" placeholder="LV tekst komt hier..."></textarea>
</div>

<div class="box">
<h3>2. Prompt genereren (voor ChatGPT)</h3>
<button onclick="genPrompt()">Genereer AI Prompt</button>
<textarea id="prompt"></textarea>
</div>

<div class="box">
<h3>3. Plak ChatGPT resultaat</h3>
<textarea id="aiResult" placeholder="Plak hier de AI analyse..."></textarea>
<button onclick="verwerk()">Verwerk Analyse</button>
<button onclick="exportPDF()">Export PDF</button>
</div>

<div id="result"></div>

<script>

// ===== PDF LEZEN =====
async function leesLV(){
  const f = document.getElementById("file").files[0];
  if(!f) return alert("Kies PDF");

  const buffer = await f.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({data:buffer}).promise;

  let text="";
  for(let i=1;i<=pdf.numPages;i++){
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    content.items.forEach(it => text += it.str + " ");
  }

  document.getElementById("lvText").value = text;
}

// ===== PROMPT =====
function genPrompt(){

  const lv = document.getElementById("lvText").value;

  const prompt = `
Analyseer dit LV als senior werkvoorbereider en tender engineer.

Geef een professioneel rapport met de volgende structuur:

1. Uitgebreide samenvatting (minimaal 3 alinea's)
2. Scope van werkzaamheden
3. Fasering en volgorde
4. Planning en mijlpalen
5. Contractanalyse:
   - kostenverdeling
   - risicoverdeling
   - verplichtingen aannemer
6. Afhankelijkheden en coördinatie
7. Risicoanalyse (duidelijk gestructureerd):
   - Planning
   - Contract
   - Uitvoering
   - Omgeving

Schrijf concreet, professioneel en uitvoerbaar.

LV:
${lv}
  `;

  document.getElementById("prompt").value = prompt;
}

// ===== VERWERKEN =====
let rapportTekst = "";

function verwerk(){

  const ai = document.getElementById("aiResult").value;

  if(!ai) return alert("Plak eerst AI analyse");

  rapportTekst = ai;

  document.getElementById("result").innerHTML = `
  <div class="section">
    <h3>Analyse Rapport</h3>
    <pre style="white-space:pre-wrap;">${ai}</pre>
  </div>
  `;
}

// ===== PDF =====
function exportPDF(){

  if(!rapportTekst){
    alert("Geen analyse beschikbaar");
    return;
  }

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  let y=15;
  const lines = doc.splitTextToSize(rapportTekst,180);

  lines.forEach(line=>{
    if(y > 280){
      doc.addPage();
      y=15;
    }
    doc.text(line,10,y);
    y+=5;
  });

  doc.save("LV_AI_Rapport.pdf");
}

</script>

</body>
</html>
