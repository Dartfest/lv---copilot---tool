<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>LV LEEST ZEKER</title>

<!-- ✅ PDF.js – CORRECTE SCRIPT TAG -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
  // Worker expliciet instellen
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
</script>

<style>
body { font-family: Arial, sans-serif; padding:20px; }
textarea { width:100%; min-height:300px; font-family:monospace; }
button { padding:6px 12px; margin-top:8px; }
.status-ok { color:green; font-weight:bold; }
.status-err { color:red; font-weight:bold; }
</style>
</head>

<body>

<h1>LV lezen – definitieve controle</h1>

<p id="libStatus"></p>

<input type="file" id="file" accept=".pdf"><br>
<button onclick="leesLV()">Lees LV</button>

<p id="status"></p>

<textarea id="output" placeholder="LV‑tekst verschijnt hier..."></textarea>

<script>
// ✅ HARD CHECK BIJ LADEN
window.addEventListener("load", () => {
  const s = document.getElementById("libStatus");
  if (window.pdfjsLib) {
    s.textContent = "✅ pdf.js is correct geladen";
    s.className = "status-ok";
  } else {
    s.textContent = "❌ pdf.js IS NIET GELADEN";
    s.className = "status-err";
  }
});

// ✅ LV LEZEN
async function leesLV() {
  const f = document.getElementById("file").files[0];
  const status = document.getElementById("status");
  const out = document.getElementById("output");

  if (!f) {
    alert("Kies eerst een PDF");
    return;
  }

  try {
    const buf = await f.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: buf }).promise;

    let text = "";
    for (let i = 1; i <= pdf.numPages; i++) {
      const page = await pdf.getPage(i);
      const content = await page.getTextContent();
      text += content.items.map(it => it.str).join(" ") + "\n";
    }

    out.value = text;
    status.textContent = "✅ LV succesvol gelezen";
    status.className = "status-ok";

  } catch (e) {
    console.error(e);
    status.textContent = "❌ Fout bij lezen: " + e.message;
    status.className = "status-err";
  }
}
</script>

</body>
</html>
