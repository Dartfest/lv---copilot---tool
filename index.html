<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>LV Intelligence – Directie Analyse</title>

<style>
body { font-family: Arial; margin:0; background:#eef2f7; }
.header { background:#0f172a; color:#fff; padding:15px; font-size:22px; }
.container { padding:20px; }

textarea { width:100%; height:140px; margin-bottom:10px; }

button {
  padding:10px 15px;
  background:#2563eb;
  color:#fff;
  border:none;
  cursor:pointer;
}

.section { background:#fff; padding:20px; margin-top:15px; border-radius:10px; }

.high { color:#dc2626; }
.mid { color:#f59e0b; }

.card { background:#f9fafb; padding:10px; margin-top:8px; border-radius:6px; }
</style>
</head>

<body>

<div class="header">LV Intelligence – Directie Analyse</div>

<div class="container">

<input type="file" id="pdfFile" accept=".pdf"><br><br>

<textarea id="lvText" placeholder="Plak LV tekst of upload PDF"></textarea>

<button onclick="analyse()">Analyse</button>

<div id="out"></div>

</div>

<script>

// ===== PDF =====
function loadScript(url){
  return new Promise(res=>{
    let s=document.createElement("script");
    s.src=url;
    s.onload=res;
    document.body.appendChild(s);
  });
}

async function handlePDF(file){

  if(typeof pdfjsLib==="undefined"){
    await loadScript("https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js");
  }

  let reader=new FileReader();

  reader.onload=async function(){
    let pdf=await pdfjsLib.getDocument(new Uint8Array(this.result)).promise;
    let text="";

    for(let i=1;i<=pdf.numPages;i++){
      let page=await pdf.getPage(i);
      let c=await page.getTextContent();
      text+=c.items.map(i=>i.str).join(" ")+"\n";
    }

    lvText.value=text;
  };

  reader.readAsArrayBuffer(file);
}

pdfFile.onchange=e=>{
  if(e.target.files[0]) handlePDF(e.target.files[0]);
};

// ===== JOUW STRUCTUUR =====
const fases = [
  {id:1, name:"Bauabschnitt 1", plan:"Planstraße C"},
  {id:2, name:"Bauabschnitt 2", plan:"Planstraße E"},
  {id:3, name:"Bauabschnitt 3", plan:"Planstraße D Teil 1"},
  {id:4, name:"Bauabschnitt 4", plan:"Planstraße D Teil 2"}
];

// ===== FILTER TEKST PER FASE =====
function getPhaseText(text, fase){

  let start = text.indexOf(fase.plan.toLowerCase());
  if(start === -1) return "";

  return text.substring(start, start + 1500); // context
}

// ===== BESTELLIJST =====
function extractMaterials(text){

  let results = {};

  let regex = /(\d+)\s*(m2|m¹|m)?[^a-zA-Z0-9]*(dn\s*\d+)[^a-zA-Z0-9]*(stahl|pvc|pe)?/gi;

  let m;
  while((m = regex.exec(text))){

    let hoeveelheid = m[1];
    let unit = m[2] || "st";
    let dn = m[3].toUpperCase();
    let mat = (m[4] || "onbekend");

    let key = `${dn} ${mat}`;

    results[key] = results[key] || {qty:0, unit};
    results[key].qty += parseInt(hoeveelheid);
  }

  return results;
}

// ===== RISICO =====
function risico(text){

  return `
  <ul>
    <li class="high">Planning: fasering dwingt sequentiële uitvoering → geen buffer</li>
    <li class="high">Uitvoering: afhankelijkheid derden (nutsbedrijven)</li>
    <li class="mid">Contract: mogelijk niet vergoede werkzaamheden</li>
    <li class="mid">Technisch: kans op onderbrekingen en afstemming issues</li>
  </ul>
  `;
}

// ===== GROTE SAMENVATTING =====
function summary(f){

  return `
  <p>
  ${f.name} (${f.plan}) vormt een cruciale fase binnen het project en bepaalt direct de voortgang van de totale uitvoering.
  Binnen deze fase worden werkzaamheden uitgevoerd die niet los gezien kunnen worden van voorgaande en opvolgende fases.
  </p>

  <p>
  De uitvoering is volledig afhankelijk van een gefaseerde aanpak, waarbij werkzaamheden in volgorde moeten plaatsvinden.
  Hierdoor ontstaat een kritieke keten zonder flexibiliteit, wat betekent dat elke vertraging directe impact heeft op de totale planning.
  </p>

  <p>
  Binnen deze fase spelen logistiek, bereikbaarheid en coördinatie met derden een belangrijke rol.
  Werkzaamheden moeten nauwkeurig worden afgestemd met externe partijen zoals nutsbedrijven.
  </p>

  <p>
  Contractueel gezien kunnen beperkingen zoals niet-parallel werken en mogelijke niet-vergoede werkzaamheden leiden tot financiële risico’s.
  </p>

  <p class="high">
  Conclusie: deze fase is kritisch en vereist strakke voorbereiding, continue monitoring en actieve sturing.
  </p>
  `;
}

// ===== MAIN =====
function analyse(){

  let text = lvText.value.toLowerCase();

  out.innerHTML = fases.map(f=>{

    let t = getPhaseText(text, f);
    let mat = extractMaterials(t);

    return `
    <div class="section">

      <h2>${f.name} – ${f.plan}</h2>

      ${summary(f)}

      <h3>Risico’s</h3>
      ${risico(t)}

      <h3>Bestellijst</h3>

      ${Object.entries(mat).map(([k,v])=>`
        <div class="card">${k} → ${v.qty} ${v.unit}</div>
      `).join("") || "Geen materiaal gedetecteerd"}

    </div>
    `;
  }).join("");
}

</script>

</body>
</html>
