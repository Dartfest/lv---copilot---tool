<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>LV – Planstraße analyse</title>

  <!-- ✅ pdf.js (zonder worker, stabiel op GitHub Pages) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      padding: 20px;
    }
    textarea {
      width: 100%;
      min-height: 240px;
      font-family: monospace;
      white-space: pre-wrap;
    }
    button {
      padding: 6px 12px;
      margin: 6px 0;
    }
    .box {
      background: #ffffff;
      padding: 16px;
      border-radius: 6px;
      margin-bottom: 16px;
    }
    .plan {
      border-left: 4px solid #2563eb;
      background: #eff6ff;
      padding: 10px;
      margin: 10px 0;
    }
  </style>
</head>

<body>

<h1>LV – Planstraße analyse</h1>

<div class="box">
  <input type="file" id="file" accept=".pdf"><br>
  <button onclick="leesLV()">Lees LV</button>
  <textarea id="lvText" placeholder="LV-tekst verschijnt hier..."></textarea>
</div>

<div class="box">
  <button onclick="analyse()">Analyseer Planstraßen</button>
  <div id="result"></div>
</div>

<script>
async function leesLV() {
  const f = document.getElementById("file").files[0];
  if (!f) {
    alert("Kies eerst een PDF");
    return;
  }

  const buf = await f.arrayBuffer();

  const pdf = await pdfjsLib.getDocument({
    data: buf,
    disableWorker: true   // 🔴 DE CRUCIALE FIX
  }).promise;

  let text = "";

  for (let p = 1; p <= pdf.numPages; p++) {
    const page = await pdf.getPage(p);
    const content = await page.getTextContent();
    for (const item of content.items) {
      text += item.str + "\n";
    }
    text += "\n";
  }

  document.getElementById("lvText").value =
    text || "[PDF bevat geen leesbare tekst]";
}

function analyse() {
  const text = document.getElementById("lvText").value;
  const out = document.getElementById("result");
  out.innerHTML = "";

  if (!text.trim()) {
    out.textContent = "Geen LV-tekst beschikbaar.";
    return;
  }

  const planRegex = /Planstra(ß|ss)e[\s\u00A0]+([A-Z])/gi;
  const data = new Set();
  let m;

  while ((m = planRegex.exec(text)) !== null) {
    data.add("Planstraße " + m[2]);
  }

  if (!data.size) {
    out.textContent = "Geen Planstraßen gevonden.";
    return;
  }

  [...data].forEach((p, i) => {
    const div = document.createElement("div");
    div.className = "plan";
    div.textContent = `${i + 1}. ${p}`;
    out.appendChild(div);
  });
}
</script>

</body>
</html>
