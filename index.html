<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>AI Tender Engine (LV Analyse)</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body { font-family: Arial; padding:20px; background:#f4f6f8; }
textarea { width:100%; height:220px; font-family:monospace; }
button { padding:8px 14px; margin:6px; }
.box { background:#fff; padding:15px; margin-bottom:15px; border-radius:6px; }
.section { background:#fff; border-left:5px solid #2563eb; padding:15px; margin:10px 0; }
.risk { color:#b91c1c; font-weight:bold; }
</style>
</head>

<body>

<h1>AI Tender Engine</h1>

<div class="box">
<input type="file" id="file" accept=".pdf">
<button onclick="leesLV()">Lees PDF</button>
<button onclick="analyse()">AI Analyse</button>
<button onclick="exportPDF()">Export PDF</button>
<textarea id="lvText"></textarea>
</div>

<div id="result"></div>

<script>

// ===== API KEY =====
const OPENAI_API_KEY = "PLAATS_HIER_JE_API_KEY";

// ===== PDF INLEZEN =====
async function leesLV(){
  const f = document.getElementById("file").files[0];
  if(!f) return alert("Kies PDF");

  const buffer = await f.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({data:buffer}).promise;

  let text="";
  for(let i=1;i<=pdf.numPages;i++){
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    content.items.forEach(it => text += it.str + " ");
  }

  document.getElementById("lvText").value = text;
}

// ===== AI CALL =====
async function aiAnalyse(text){

  const res = await fetch("https://api.openai.com/v1/chat/completions",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer " + OPENAI_API_KEY
    },
    body:JSON.stringify({
      model:"gpt-4o-mini",
      messages:[
        {
          role:"system",
          content:`
Je bent een senior werkvoorbereider / tender engineer.

Analyseer een LV (bestek) en geef een professioneel rapport.

Structuur:

1. Samenvatting (uitgebreid, meerdere alinea’s)
2. Scope werkzaamheden
3. Fasering & planning
4. Contractanalyse
5. Afhankelijkheden
6. Risicoanalyse (onderverdeeld in):
   - Planning
   - Contract
   - Uitvoering
   - Omgeving

Schrijf in helder Nederlands, professioneel en concreet.
`
        },
        {
          role:"user",
          content:text
        }
      ]
    })
  });

  const json = await res.json();
  return json.choices[0].message.content;
}

// ===== ANALYSE =====
let rapportTekst = "";

async function analyse(){

  const text = document.getElementById("lvText").value;

  if(!OPENAI_API_KEY || OPENAI_API_KEY === "PLAATS_HIER_JE_API_KEY"){
    alert("Vul eerst je API key in");
    return;
  }

  const out = document.getElementById("result");
  out.innerHTML = "AI analyse bezig...";

  try{
    const result = await aiAnalyse(text);
    rapportTekst = result;

    out.innerHTML = `
    <div class="section">
      <h3>AI Analyse Rapport</h3>
      <pre style="white-space:pre-wrap;">${result}</pre>
    </div>
    `;

  }catch(e){
    out.innerHTML = "Fout bij AI analyse";
  }
}

// ===== PDF =====
function exportPDF(){

  if(!rapportTekst){
    alert("Eerst analyseren");
    return;
  }

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  const lines = doc.splitTextToSize(rapportTekst,180);

  let y=15;

  doc.setFontSize(12);

  lines.forEach(line=>{
    if(y > 280){
      doc.addPage();
      y=15;
    }
    doc.text(line,10,y);
    y+=5;
  });

  doc.save("AI_LV_Analyse.pdf");
}

</script>

</body>
</html>
