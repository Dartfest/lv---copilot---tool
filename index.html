<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>LV Intelligence – Final Pro</title>

<style>
body { font-family: Arial; margin:0; background:#eef2f7; }
.header { background:#0f172a; color:#fff; padding:15px; font-size:22px; }
.container { padding:20px; }

textarea { width:100%; height:120px; margin-bottom:10px; }

button {
  padding:8px 12px;
  background:#2563eb;
  color:#fff;
  border:none;
  cursor:pointer;
  margin:3px;
}

.card { background:#fff; padding:12px; border-radius:6px; margin-bottom:10px; }

.high { color:#dc2626; }
.mid { color:#f59e0b; }
.good { color:#16a34a; }

.section {
  background:#fff;
  padding:15px;
  margin-top:12px;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="header">LV Intelligence – Final Engine</div>

<div class="container">

<input type="file" id="pdfFile" accept=".pdf"><br><br>

<input type="text" id="projectName" placeholder="Project naam">

<textarea id="lvText" placeholder="Plak LV tekst of upload PDF"></textarea>

<button onclick="analyse()">Analyse</button>

<div id="out"></div>

</div>

<script>

// ===== PDF =====
function loadScript(url){
  return new Promise(res=>{
    let s=document.createElement("script");
    s.src=url;
    s.onload=res;
    document.body.appendChild(s);
  });
}

async function handlePDF(file){
  if(typeof pdfjsLib==="undefined"){
    await loadScript("https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js");
  }

  let reader=new FileReader();
  reader.onload=async function(){
    let pdf=await pdfjsLib.getDocument(new Uint8Array(this.result)).promise;
    let text="";

    for(let i=1;i<=pdf.numPages;i++){
      let page=await pdf.getPage(i);
      let c=await page.getTextContent();
      text+=c.items.map(i=>i.str).join(" ")+"\n";
    }

    lvText.value=text;
  };

  reader.readAsArrayBuffer(file);
}

pdfFile.onchange=e=>{
  if(e.target.files[0]) handlePDF(e.target.files[0]);
};

// ===== DATUM =====
const months = {juni:6,juli:7,august:8,mai:5};

function extractDates(t){
  let r=[], m;
  let regex=/(juni|juli|august|mai)\s+(20\d{2})/gi;

  while((m=regex.exec(t))){
    r.push(parseInt(m[2])*12 + months[m[1]]);
  }

  return r;
}

// ===== FASE STRUCTUUR =====
function buildRealPhases(t){

  let dates = extractDates(t);

  let phases = [
    { name:"Planstraße C" },
    { name:"Planstraße E" },
    { name:"Planstraße D – Teil 1" },
    { name:"Planstraße D – Teil 2" }
  ];

  return phases.map((p,i)=>{

    let start = dates[i] || dates[0] || 0;
    let end = dates[i+1] || (start + 6);

    let risico=[];
    let aandacht=[];

    if(t.includes("nicht parallel")){
      risico.push("Geen parallel uitvoering mogelijk");
    }

    if(t.includes("unterbrechung")){
      risico.push("Onderbreking tussen fases mogelijk");
    }

    if(t.includes("drittfirmen")){
      risico.push("Afhankelijkheid van nutsbedrijven");
      aandacht.push("Afstemming met derden noodzakelijk");
    }

    if(t.includes("nicht vergütet")){
      risico.push("Niet vergoede werkzaamheden binnen deze fase");
    }

    // fase-specifiek
    if(p.name.includes("D – Teil 2")){
      aandacht.push("Afrondende fase met verhoogde coördinatie");
    }

    return {
      ...p,
      start,
      end,
      duur: end - start,
      risico,
      aandacht
    };

  });
}

// ===== DATUM FORMAT =====
function formatDate(v){
  let y = Math.floor(v/12);
  let m = v % 12;
  return `${m}/${y}`;
}

// ===== SAMENVATTING PER FASE =====
function faseSamenvatting(f){

  let txt = [];

  txt.push("Uitvoering binnen deze fase volgens LV-fasering.");

  if(f.risico.length > 0){
    txt.push("Aanwezige risico’s beïnvloeden planning en uitvoering.");
  }

  if(f.aandacht.length > 0){
    txt.push("Extra aandacht vereist voor afstemming en uitvoering.");
  }

  if(f.naam?.includes("D")){
    txt.push("Gefaseerde uitvoering binnen dezelfde planstraat.");
  }

  return txt;
}

// ===== SCORE =====
function calcScore(phases){
  let risico = phases.reduce((a,p)=>a+p.risico.length,0);
  let roi = 100 - (risico * 5);

  let advies="GO", cls="good";
  if(roi<50){advies="NO-GO";cls="high";}
  else if(roi<70){advies="GO MET RISICO";cls="mid";}

  return {risico,roi,advies,cls};
}

// ===== MAIN =====
function analyse(){

  let t = lvText.value.toLowerCase();
  if(!t) return;

  let phases = buildRealPhases(t);
  let score = calcScore(phases);

  out.innerHTML = `

  <div class="card">
    Risico: <span class="high">${score.risico}</span><br>
    ROI: ${score.roi}%<br>
    Advies: <span class="${score.cls}">${score.advies}</span>
  </div>

  <div class="section">
    <h3>Fase Analyse (Realistisch)</h3>

    ${phases.map(f=>`
      <div class="card">

        <b>${f.name}</b><br>
        Periode: ${formatDate(f.start)} → ${formatDate(f.end)}<br>
        Duur: ${f.duur} mnd

        <br><br>

        <b>Samenvatting</b>
        <ul>
          ${faseSamenvatting(f).map(x=>`<li>${x}</li>`).join("")}
        </ul>

        <b>Risico’s</b>
        <ul>
          ${f.risico.map(r=>`<li class="high">${r}</li>`).join("")}
        </ul>

        <b>Aandachtspunten</b>
        <ul>
          ${f.aandacht.map(a=>`<li class="mid">${a}</li>`).join("")}
        </ul>

      </div>
    `).join("")}

  </div>

  `;
}

</script>

</body>
</html>
