<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>LV – Planstraße fasering</title>

<!-- ✅ PDF.js – CORRECTE SCRIPT TAG -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
</script>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f4f6f8;
  padding: 20px;
}
textarea {
  width: 100%;
  min-height: 260px;
  font-family: monospace;
  white-space: pre-wrap;
}
button {
  padding: 6px 12px;
  margin-top: 6px;
}
.section {
  background: #ffffff;
  padding: 16px;
  border-radius: 6px;
  margin-bottom: 16px;
}
.plan {
  border-left: 4px solid #2563eb;
  background: #eff6ff;
  padding: 8px;
  margin: 8px 0;
}
.ok {
  color: green;
  font-weight: bold;
}
</style>
</head>

<body>

<h1>LV – Planstraße fasering (uit LV)</h1>
<p class="ok">✅ pdf.js geladen</p>

<div class="section">
  <h2>1. LV lezen</h2>
  <input type="file" id="file" accept=".pdf"><br>
  <button onclick="leesLV()">Lees LV</button>
  <textarea id="lvText" placeholder="LV‑tekst verschijnt hier..."></textarea>
</div>

<div class="section">
  <h2>2. Analyse Planstraßen</h2>
  <button onclick="analyse()">Analyseer Planstraßen</button>
  <div id="resultaat"></div>
</div>

<script>
// ===== LV LEZEN (GEEN FILTERS, NOOIT LEEG) =====
async function leesLV() {
  const f = document.getElementById("file").files[0];
  if (!f) {
    alert("Kies eerst een PDF");
    return;
  }

  const buf = await f.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: buf }).promise;

  let text = "";
  for (let p = 1; p <= pdf.numPages; p++) {
    const page = await pdf.getPage(p);
    const content = await page.getTextContent();
    for (const item of content.items) {
      text += item.str + "\n";
    }
    text += "\n";
  }

  document.getElementById("lvText").value = text;
}

// ===== ANALYSE PLANSTRASSE + FASE =====
function analyse() {
  const text = document.getElementById("lvText").value;
  const out = document.getElementById("resultaat");
  out.innerHTML = "";

  if (!text.trim()) {
    out.textContent = "Geen LV‑tekst beschikbaar.";
    return;
  }

  // ROBUUST: ondersteunt normale spatie + PDF non-breaking space
  const planRegex = /Planstra(ß|ss)e[\s\u00A0]+([A-Z])/gi;

  const dateRegex =
    /(von\s+\d{1,2}[.\-]\d{1,2}[.\-]\d{4}\s+bis\s+\d{1,2}[.\-]\d{1,2}[.\-]\d{4})|
     (\d{1,2}[.\-]\d{1,2}[.\-]\d{4}\s*(t\/m|bis|-)\s*\d{1,2}[.\-]\d{1,2}[.\-]\d{4})|
     (KW\s*\d+\s*(–|-)\s*\d+)/gi;

  const data = {};
  let m;

  while ((m = planRegex.exec(text)) !== null) {
    const key = "Planstraße " + m[2];
    if (!data[key]) data[key] = new Set();

    const fragment = text.substring(m.index, m.index + 1200);
    let d;
    while ((d = dateRegex.exec(fragment)) !== null) {
      data[key].add(d[0]);
    }
  }

  const keys = Object.keys(data).sort();
  if (!keys.length) {
    out.textContent = "Geen Planstraßen gevonden in LV.";
    return;
  }

  keys.forEach(k => {
    const div = document.createElement("div");
    div.className = "plan";

    const items = data[k].size
      ? [...data[k]].map(p => `<li>${p}</li>`).join("")
      : "<li>Geen faseperiode in LV vermeld</li>";

    div.innerHTML = `<strong>${k}</strong><ul>${items}</ul>`;
    out.appendChild(div);
  });
}
</script>

</body>
</html>
