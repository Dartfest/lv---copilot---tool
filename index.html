<!DOCTYPE html><html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Je Moet Douchen</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      font-family: Arial, sans-serif;
      overflow: hidden;
    }.card {
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(10px);
  padding: 40px;
  border-radius: 25px;
  text-align: center;
  color: white;
  box-shadow: 0 8px 25px rgba(0,0,0,0.25);
  animation: float 3s ease-in-out infinite;
}

h1 {
  font-size: 3rem;
  margin-bottom: 15px;
}

p {
  font-size: 1.2rem;
  opacity: 0.9;
}

button {
  margin-top: 20px;
  padding: 14px 28px;
  border: none;
  border-radius: 12px;
  background: white;
  color: #00a2ff;
  font-size: 1rem;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
  background: #f1f1f1;
}

@keyframes float {
  0%, 100% {
    transform: translateY(0px);
  }
  50% {
    transform: translateY(-10px);
  }
}

  </style>
</head>
<body>
  <div class="card">
    <h1>🚿 Je moet douchen!</h1>
    <p>En daar word ik een hele grote blij van 😄</p>
    <p>Fris, schoon en helemaal top ✨</p>
    <button onclick="showMessage()">
      Ik ga douchen 😅
    </button><p id="extraMessage" style="margin-top:20px;font-weight:bold;"></p>

  </div>
  <script>
    function showMessage() {
      document.getElementById('extraMessage').innerText = 'Yesss 😍 Daar word ik echt super blij van! 🚿✨';
    }
  </script>
</body>
</html>
