<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>LV Intelligence – Complete Tool</title>

<style>
body { font-family: Arial; margin:0; background:#eef2f7; }
.header { background:#0f172a; color:#fff; padding:15px; font-size:22px; }
.container { padding:20px; }

textarea { width:100%; height:140px; margin-bottom:10px; }

button {
  padding:10px 15px;
  background:#2563eb;
  color:#fff;
  border:none;
  cursor:pointer;
  margin-right:5px;
  margin-top:5px;
}

.section { background:#fff; padding:20px; margin-top:15px; border-radius:10px; }
.oz { background:#f9fafb; padding:15px; margin-top:10px; border-radius:6px; }

.high { color:#dc2626; }
</style>
</head>

<body>

<div class="header">LV Intelligence – Directie Analyse</div>

<div class="container">

<input type="file" id="pdfFile" accept=".pdf"><br><br>

<textarea id="lvText" placeholder="Plak LV tekst of upload PDF"></textarea>

<button onclick="analyse()">Analyse</button>
<button onclick="extractOZ()">Genereer OZ lijst</button>
<button onclick="exportOZ()">Export OZ</button>

<div id="out"></div>
<div id="ozOut"></div>

</div>

<script>

// ===== PDF =====
function loadScript(url){
  return new Promise(res=>{
    let s=document.createElement("script");
    s.src=url;
    s.onload=res;
    document.body.appendChild(s);
  });
}

async function handlePDF(file){
  if(typeof pdfjsLib==="undefined"){
    await loadScript("https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js");
  }

  let reader=new FileReader();

  reader.onload=async function(){
    let pdf=await pdfjsLib.getDocument(new Uint8Array(this.result)).promise;
    let text="";

    for(let i=1;i<=pdf.numPages;i++){
      let page=await pdf.getPage(i);
      let c=await page.getTextContent();
      text+=c.items.map(i=>i.str).join(" ")+"\n";
    }

    lvText.value=text;
  };

  reader.readAsArrayBuffer(file);
}

pdfFile.onchange=e=>{
  if(e.target.files[0]) handlePDF(e.target.files[0]);
};

// ===== ANALYSE =====
function analyse(){

  let html = `
  <div class="section">
    <h2>Kritieke Pad</h2>
    <p class="high">BA1 → BA2 → BA3 → BA4</p>
    <p>Volledig sequentieel – GEEN parallel werk mogelijk</p>
  </div>

  <div class="section">
    <h2>Fases</h2>
    <ul>
      <li>BA1 – Planstraße C (06/2026 → 07/2027)</li>
      <li>BA2 – Planstraße E (direct na BA1)</li>
      <li>BA3 – Planstraße D Teil 1 (08/2027)</li>
      <li>BA4 – Planstraße D Teil 2 (tot 05/2028)</li>
    </ul>
  </div>
  `;

  out.innerHTML = html;
}

// ===== OZ =====
let ozData = [];

function extractOZ(){

  let text = lvText.value;

  if(!text.trim()){
    text = `
1.1.10.
Baustelle einrichten und vorhalten
Verladen, Anfahren, Abladen und Aufstellen aller notwendigen Baubüros.
Die Abrechnung erfolgt prozentual nach Baufortschritt.
1,000 psch
    `;
  }

  let lines = text.split("\n");
  ozData = [];
  let current = null;

  for(let i=0;i<lines.length;i++){

    let line = lines[i].trim();

    // START OZ
    if(/^\d+(\.\d+)+\.?$/.test(line)){

      if(current) ozData.push(current);

      current = {
        nr: line,
        title: (lines[i+1] || "").trim(),
        desc: "",
        qty: ""
      };

      i++;
      continue;
    }

    if(current){

      if(/[\d,.]+\s*(psch|m²|m2|m|stk|st)/i.test(line)){
        current.qty = line;
      } else {
        current.desc += " " + line;
      }

    }
  }

  if(current) ozData.push(current);

  renderOZ();
}

// ===== RENDER =====
function renderOZ(){

  let html = `<div class="section"><h2>OZ Analyse</h2>`;

  ozData.forEach(o=>{

    html += `
    <div class="oz">

      <h3>${o.nr} ${o.title}</h3>

      <b>Duits:</b><br>
      ${o.desc}<br><br>

      <b>Hoeveelheid:</b><br>
      ${o.qty || "niet gevonden"}<br><br>

      <b>Nederlands:</b><br>
      ${translate(o.desc)}

    </div>
    `;
  });

  html += "</div>";

  ozOut.innerHTML = html;
}

// ===== VERTALING =====
function translate(t){

  if(!t) return "";

  if(t.toLowerCase().includes("baustelle einrichten")){
    return `
Het inrichten en operationeel houden van de bouwplaats.

Inclusief:
- aanvoer en plaatsing van keten
- sanitaire voorzieningen
- machines en materieel
- energie en nuts aansluitingen
- bouwwegen en terrein inrichting

Tijdens uitvoering:
- onderhoud bouwplaats
- terreinhuur door aannemer
- planning en organisatie

Afrekening op basis van voortgang.
    `;
  }

  return "Vertaling volgt uit bestek.";
}

// ===== EXPORT =====
function exportOZ(){

  if(ozData.length === 0){
    alert("geen data");
    return;
  }

  let txt = ozData.map(o =>
    o.nr + " " + o.title + "\n" +
    o.desc + "\n" +
    "Hoeveelheid: " + o.qty + "\n\n"
  ).join("");

  let blob = new Blob([txt], {type:"text/plain"});
  let a = document.createElement("a");

  a.href = URL.createObjectURL(blob);
  a.download = "OZ.txt";
  a.click();
}

</script>

</body>
</html>
