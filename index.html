<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>LV Copilot Tool – Integrale Werkvoorbereiding Infra</title>

<!-- PDF.js -->
<script src=".cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js</script>
<!-- jsPDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body { font-family: Arial, sans-serif; background:#f5f7fa; padding:20px; }
.box { background:white; padding:16px; border-radius:6px; margin-bottom:20px; }
textarea { width:100%; min-height:200px; font-family:monospace; padding:10px; }
button { padding:8px 14px; background:#2563eb; color:white; border:none; border-radius:4px; cursor:pointer; }
button.secondary { background:#6b7280; }
.chunk { padding:12px; border-radius:6px; margin-bottom:12px; }
.red { background:#fee2e2; border-left:6px solid #dc2626; }
.orange { background:#ffedd5; border-left:6px solid #ea580c; }
.green { background:#dcfce7; border-left:6px solid #16a34a; }
.small { font-size:12px; color:#555; }
</style>
</head>

<body>

<h1>LV Copilot Tool – Integrale Werkvoorbereiding Infra</h1>

<div class="box">
<h2>1. LV + bijlagen (meerdere PDF’s)</h2>
<input type="file" id="lvFiles" multiple accept=".pdf">
<button class="secondary" onclick="readLVFiles()">Lees LV</button>
</div>

<div class="box">
<h2>2. Samengevoegde LV‑tekst</h2>
<textarea id="lvtext"></textarea>
<button class="secondary" onclick="splitIntoChunks()">Analyseer LV</button>
</div>

<div class="box">
<h2>3. Kabels & Leidingen (PDF / TXT)</h2>
<input type="file" id="klFiles" multiple>
<button class="secondary" onclick="readKLFiles()">Lees K&L</button>
<div id="klData" class="small"></div>
</div>

<div class="box">
<h2>4. LV‑delen met K&L‑koppeling</h2>
<div id="chunks"></div>
<button onclick="exportPDF()">Export uitvoerder‑PDF</button>
</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

let KL_TEXT = "";

async function readPDFFile(file) {
  const reader = new FileReader();
  return new Promise(resolve => {
    reader.onload = async () => {
      const pdf = await pdfjsLib.getDocument(new Uint8Array(reader.result)).promise;
      let t = "";
      for (let p = 1; p <= pdf.numPages; p++) {
        const page = await pdf.getPage(p);
        const c = await page.getTextContent();
        t += c.items.map(i => i.str).join(" ") + "\n";
      }
      resolve(t);
    };
    reader.readAsArrayBuffer(file);
  });
}

/* ===== LV ===== */
async function readLVFiles(){
  const files = lvFiles.files;
  if(!files.length){ alert("Geen LV bestanden"); return; }
  let txt="";
  for(const f of files){
    txt += await readPDFFile(f);
  }
  lvtext.value = txt;
}

/* ===== K&L ===== */
async function readKLFiles(){
  const files = klFiles.files;
  if(!files.length){ alert("Geen K&L bestanden"); return; }
  let txt="";
  for(const f of files){
    if(f.type === "application/pdf"){
      txt += await readPDFFile(f);
    } else {
      txt += await f.text();
    }
  }
  KL_TEXT = txt.toLowerCase();
  klData.innerText = "K&L bestanden ingelezen";
}

/* ===== Analyse ===== */
function splitIntoChunks(){
  chunks.innerHTML="";
  const parts = lvtext.value.match(/[\s\S]{1,3000}/g) || [];
  parts.forEach((p,i)=>{
    const nets = ["gas","elektra","water","riool","telecom","warmte"]
      .filter(n => (p+KL_TEXT).toLowerCase().includes(n));

    let impact = "green", label="LAAG";
    if(nets.includes("gas") || nets.includes("elektra")){ impact="red"; label="HOOG"; }
    else if(nets.length>1){ impact="orange"; label="MIDDEL"; }

    const d=document.createElement("div");
    d.className=`chunk ${impact}`;
    d.innerHTML=`
<strong>DEEL ${i+1}</strong><br>
Kabels & leidingen: ${nets.join(", ")||"–"}<br>
Impact: <strong>${label}</strong><br><br>
<pre>${p}</pre>`;
    chunks.appendChild(d);
  });
}

/* ===== PDF Export ===== */
function exportPDF(){
  const { jsPDF } = window.jspdf;
  const pdf=new jsPDF();
  let y=10;
  pdf.text("Uitvoerdersoverzicht LV",10,y);
  y+=10;
  document.querySelectorAll(".chunk").forEach(c=>{
    pdf.text(c.innerText,10,y);
    y+=60;
  });
  pdf.save("uitvoerder-overzicht.pdf");
}
</script>

</body>
</html>
