<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>LV Intelligence – Complete Tool</title>

<style>
body { font-family: Arial; margin:0; background:#eef2f7; }
.header { background:#0f172a; color:#fff; padding:15px; font-size:22px; }
.container { padding:20px; }

textarea { width:100%; height:140px; margin-bottom:10px; }

button {
  padding:10px 15px;
  background:#2563eb;
  color:#fff;
  border:none;
  cursor:pointer;
  margin-right:5px;
  margin-top:5px;
}

.section { background:#fff; padding:20px; margin-top:15px; border-radius:10px; }

.high { color:#dc2626; }
.mid { color:#f59e0b; }

.oz { background:#f9fafb; padding:10px; margin-top:10px; border-radius:6px; }
</style>
</head>

<body>

<div class="header">LV Intelligence – Directie Analyse + OZ Export</div>

<div class="container">

<input type="file" id="pdfFile" accept=".pdf"><br><br>

<textarea id="lvText" placeholder="Plak LV tekst of upload PDF"></textarea>

<button onclick="analyse()">Analyse</button>
<button onclick="extractOZ()">Genereer OZ lijst</button>
<button onclick="exportOZ()">Export OZ (.txt)</button>

<div id="out"></div>
<div id="ozOut"></div>

</div>

<script>

// ===== PDF =====
function loadScript(url){
  return new Promise(res=>{
    let s=document.createElement("script");
    s.src=url;
    s.onload=res;
    document.body.appendChild(s);
  });
}

async function handlePDF(file){
  try{
    if(typeof pdfjsLib==="undefined"){
      await loadScript("https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js");
    }

    let reader=new FileReader();

    reader.onload=async function(){
      let pdf=await pdfjsLib.getDocument(new Uint8Array(this.result)).promise;
      let text="";

      for(let i=1;i<=pdf.numPages;i++){
        let page=await pdf.getPage(i);
        let c=await page.getTextContent();
        text+=c.items.map(i=>i.str).join(" ")+"\n";
      }

      lvText.value=text;
    };

    reader.readAsArrayBuffer(file);

  }catch(e){
    alert("PDF fout: "+e);
  }
}

pdfFile.onchange=e=>{
  if(e.target.files[0]) handlePDF(e.target.files[0]);
};

// ===== FASES =====
const fases = [
  {name:"Bauabschnitt 1", plan:"Planstraße C", periode:"06/2026 → 07/2027"},
  {name:"Bauabschnitt 2", plan:"Planstraße E", periode:"aansluitend → 07/2027"},
  {name:"Bauabschnitt 3", plan:"Planstraße D Teil 1", periode:"08/2027 → 05/2028"},
  {name:"Bauabschnitt 4", plan:"Planstraße D Teil 2", periode:"aansluitend → 05/2028"}
];

// ===== ANALYSE =====
function analyse(){

  let html = `
  <div class="section">
    <h2>Kritieke Pad</h2>
    <p class="high">BA1 → BA2 → BA3 → BA4</p>
    <p>Geen parallel uitvoering mogelijk – volledige afhankelijkheid</p>
  </div>
  `;

  fases.forEach(f=>{
    html += `
    <div class="section">
      <h2>${f.name} – ${f.plan}</h2>
      <p><b>${f.periode}</b></p>

      <p>
      Deze fase omvat alle civieltechnische werkzaamheden zoals riolering,
      nutsvoorzieningen en infrastructuur.
      De uitvoering moet aaneengesloten plaatsvinden zonder onderbreking.
      </p>

      <p class="high">
      Kritische fase zonder buffer – vertraging werkt direct door.
      </p>

      <h3>Werkzaamheden</h3>
      <ul>
        <li>Riolering (kanaalbouw)</li>
        <li>Nutsvoorzieningen</li>
        <li>Bouwwegen</li>
        <li>Grondwerk</li>
        <li>Aansluitingen</li>
      </ul>

      <h3>Risico’s</h3>
      <ul>
        <li class="high">Geen parallel uitvoering</li>
        <li class="high">Strikte deadline</li>
        <li class="mid">Afhankelijk derden</li>
      </ul>
    </div>
    `;
  });

  out.innerHTML = html;
}

// ===== OZ DATA =====
let ozData = [];

// ===== OZ EXTRACT (VERBETERD, incl. Leistungsbeschreibung en aantal) =====
function extractOZ(){

  let text = lvText.value;
  let lines = text.split("\n");

  ozData = [];
  let current = null;

  lines.forEach(line => {

    if(line.match(/oz\s*\d+/i)){

      if(current) ozData.push(current);

      current = {
        title: line.trim(),
        desc: "",
        leistungsbeschreibung: "",
        amount: ""
      };

    } else if(current){
      current.desc += " " + line.trim();

      // Zoek een mogelijke Leistungsbeschreibung (voorbeeld: zoek na "Leistungsbeschreibung:" of "Beschrijving:")
      let lbMatch = line.match(/Leistungsbeschreibung[:\s]*(.*)/i) || line.match(/Beschrijving[:\s]*(.*)/i);
      if(lbMatch){
        current.leistungsbeschreibung = lbMatch[1].trim();
      }

      // Zoek mogelijke hoeveelheden (voorbeeld: '100 m2', '50 psch', etc.)
      let amountMatch = line.match(/(\d+(\.\d+)?\s*(m2|psch|st|kg|m3))/i);
      if(amountMatch){
        current.amount = amountMatch[1];
      }
    }

  });

  if(current) ozData.push(current);

  let html = `<div class="section"><h2>OZ Lijst + Vertaling</h2>`;

  ozData.forEach(item=>{

    let nl = translateOZ(item.desc);

    html += `
    <div class="oz">
      <b>${item.title}</b><br><br>
      <div><b>Leistungsbeschreibung:</b> ${item.leistungsbeschreibung || "Niet gevonden"}</div>
      <div><b>Aantal:</b> ${item.amount || "Niet gevonden"}</div>
      <br>
      <div>${item.desc || "Geen omschrijving gevonden"}</div>
      <br>
      <div style="color:#374151;"><i>${nl}</i></div>
    </div>
    `;
  });

  html += "</div>";

  ozOut.innerHTML = html;
}

// ===== VERTALING =====
function translateOZ(text){

  if(!text) return "";

  let t = text;

  const map = {
    "Kanal":"riolering",
    "Leitung":"leiding",
    "verlegen":"aanleggen",
    "herstellen":"realiseren",
    "Erschließung":"aanleg",
    "Versorgung":"nutsvoorziening",
    "Bauarbeiten":"bouwwerkzaamheden"
  };

  for(let k in map){
    let reg = new RegExp(k,"gi");
    t = t.replace(reg, map[k]);
  }

  return t;
}

// ===== EXPORT =====
function exportOZ(){

  if(ozData.length === 0){
    alert("Geen OZ data");
    return;
  }

  let content = ozData.map(item =>
    item.title + "\n" +
    "Leistungsbeschreibung: " + (item.leistungsbeschreibung || "") + "\n" +
    "Aantal: " + (item.amount || "") + "\n" +
    item.desc + "\n" +
    "NL: " + translateOZ(item.desc) + "\n\n"
  ).join("");

  let blob = new Blob([content], {type:"text/plain"});
  let a = document.createElement("a");

  a.href = URL.createObjectURL(blob);
  a.download = "OZ_lijst.txt";
  a.click();
}

</script>

</body>
</html>
