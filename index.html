<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>LV Analyse (Future Proof)</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body { font-family: Arial; padding:20px; background:#f4f6f8; }
textarea { width:100%; height:160px; margin-bottom:10px; }
button { padding:6px 10px; margin:4px; }
.box { background:#fff; padding:15px; margin-bottom:15px; border-radius:6px; }
.section { background:#fff; border-left:5px solid #2563eb; padding:15px; margin:10px 0; }
.risk { color:#b91c1c; font-weight:bold; }
</style>
</head>

<body>

<h1>LV Analyse Tool (Future Proof)</h1>

<div class="box">
<input type="file" id="file" accept=".pdf">
<button onclick="leesLV()">Lees PDF</button>
<button onclick="analyse()">Analyse</button>
<button onclick="exportPDF()">Export PDF</button>
<textarea id="lvText"></textarea>
</div>

<div class="box">
<h3>ChatGPT (gratis workflow)</h3>
<button onclick="splitLV()">Split LV</button>
<div id="chunks"></div>
</div>

<div id="result"></div>

<script>

// ===== CONFIG =====
const USE_AI = false; // 👉 later TRUE zetten

// ===== PDF =====
async function leesLV(){
  const f = document.getElementById("file").files[0];
  if(!f) return alert("Kies PDF");

  const buffer = await f.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({data:buffer}).promise;

  let text="";
  for(let i=1;i<=pdf.numPages;i++){
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    content.items.forEach(it => text += it.str + " ");
  }

  document.getElementById("lvText").value = text;
}

// ===== AI HOOK (NU UIT) =====
async function analyseMetAI(text){

  // 👉 hier komt later:
  // fetch naar OpenAI / lokale AI

  return null;
}

// ===== FALLBACK (WAARHEIDSGEBONDEN) =====
function analyseZonderAI(text){

  const t = text.toLowerCase();

  // alleen wat écht in tekst zit
  const bevat = (w) => t.includes(w);

  let feiten = [];

  if(bevat("bauabschnitt"))
    feiten.push("Het document benoemt faseringen (Bauabschnitt).");

  if(bevat("nicht parallel"))
    feiten.push("Parallel werken is expliciet uitgesloten.");

  if(bevat("ohne unterbrechung"))
    feiten.push("Werkzaamheden moeten zonder onderbreking worden uitgevoerd.");

  if(bevat("nicht vergütet"))
    feiten.push("Bepaalde kosten worden niet apart vergoed.");

  if(bevat("drittfirmen"))
    feiten.push("Er is afhankelijkheid van derden.");

  // ===== RISICO (alleen op basis van tekst) =====
  let risico = [];

  if(bevat("nicht parallel"))
    risico.push("Geen parallelle uitvoering kan planning verlengen.");

  if(bevat("nicht vergütet"))
    risico.push("Kostenrisico ligt bij aannemer.");

  if(bevat("drittfirmen"))
    risico.push("Afhankelijkheid van derden kan vertraging veroorzaken.");

  if(bevat("ohne unterbrechung"))
    risico.push("Continue uitvoering vereist strakke planning.");

  return {
    samenvatting: feiten.join(" "),
    risico: risico
  };
}

// ===== MAIN ANALYSE =====
let analyseData = {};

async function analyse(){

  const text = document.getElementById("lvText").value;

  let result;

  if(USE_AI){
    result = await analyseMetAI(text);
  }

  if(!result){
    result = analyseZonderAI(text);
  }

  analyseData = result;

  document.getElementById("result").innerHTML = `
  <div class="section">
    <h3>Samenvatting</h3>
    <p>${result.samenvatting || "Geen expliciete samenvatting mogelijk."}</p>
  </div>

  <div class="section">
    <h3>Risico's</h3>
    <ul class="risk">
      ${result.risico.map(r=>`<li>${r}</li>`).join("")}
    </ul>
  </div>
  `;
}

// ===== SPLIT (GRATIS CHATGPT) =====
function splitLV(){

  const text = document.getElementById("lvText").value;
  const size = 2500;

  let parts=[];
  for(let i=0;i<text.length;i+=size){
    parts.push(text.substring(i,i+size));
  }

  const div = document.getElementById("chunks");
  div.innerHTML="";

  parts.forEach((p,i)=>{

    const prompt = `
Analyseer dit LV strikt feitelijk.
Geen aannames maken.

- samenvatting
- risico's (alleen wat in tekst staat)

${p}
`;

    div.innerHTML += `
    <div>
      <b>Deel ${i+1}</b>
      <textarea>${prompt}</textarea>
    </div>`;
  });
}

// ===== PDF =====
function exportPDF(){

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  let y=15;

  const lines = doc.splitTextToSize(analyseData.samenvatting || "",180);
  doc.text(lines,10,y);
  y += lines.length*5 + 10;

  doc.setTextColor(200,0,0);
  (analyseData.risico || []).forEach(r=>{
    doc.text("- "+r,10,y);
    y+=5;
  });

  doc.save("LV_Analyse.pdf");
}

</script>

</body>
</html>
