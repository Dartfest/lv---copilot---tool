<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>LV Intelligence – OZ Correct</title>

<style>
body { font-family: Arial; margin:0; background:#eef2f7; }
.header { background:#0f172a; color:#fff; padding:15px; font-size:22px; }
.container { padding:20px; }

textarea { width:100%; height:140px; margin-bottom:10px; }

button {
  padding:10px 15px;
  background:#2563eb;
  color:#fff;
  border:none;
  cursor:pointer;
  margin:5px;
}

.section { background:#fff; padding:20px; margin-top:15px; border-radius:10px; }

.oz {
  background:#f9fafb;
  padding:15px;
  margin-top:12px;
  border-radius:6px;
  border-left:5px solid #2563eb;
}
</style>
</head>

<body>

<div class="header">LV Intelligence – OZ Analyse (Correct)</div>

<div class="container">

<textarea id="lvText" placeholder="Plak LV tekst"></textarea>

<button onclick="extractOZ()">Analyse OZ</button>

<div id="out"></div>

</div>

<script>

let ozData = [];

function extractOZ(){

  let text = lvText.value;
  let lines = text.split("\n");

  ozData = [];
  let current = null;

  for(let i=0;i<lines.length;i++){

    let line = lines[i].trim();

    // START OZ (zoals 1.1.10.)
    if(line.match(/^\d+(\.\d+)+\.$/)){

      if(current) ozData.push(current);

      let title = lines[i+1] ? lines[i+1].trim() : "";

      current = {
        nr: line,
        title: title,
        desc: ""
      };

      i++; // skip titel regel

    } else if(current){

      // stop bij nieuwe OZ
      if(line.match(/^\d+(\.\d+)+\.$/)){
        continue;
      }

      current.desc += " " + line;
    }
  }

  if(current) ozData.push(current);

  render();
}

function render(){

  let html = `<div class="section"><h2>OZ Analyse</h2>`;

  ozData.forEach(o=>{

    html += `
    <div class="oz">

      <h3>${o.nr} – ${o.title}</h3>

      <b>Duits:</b><br>
      ${o.desc}<br><br>

      <b>Nederlands:</b><br>
      ${translate(o)}

    </div>
    `;
  });

  html += "</div>";

  out.innerHTML = html;
}

// ===== SLIMME VERTALING =====
function translate(o){

  let t = o.desc.toLowerCase();

  if(t.includes("baustelle einrichten")){
    return `
Inrichten en operationeel houden van de bouwplaats, inclusief het aanvoeren,
plaatsen en onderhouden van bouwketen, sanitaire voorzieningen, machines en installaties.

Daarnaast omvat dit het realiseren van energievoorzieningen, het inrichten van het terrein,
toegangswegen en het onderhouden van alle voorzieningen gedurende de volledige bouwperiode.

De kosten worden verrekend op basis van de voortgang van het project.
    `;
  }

  return `
Uitvoering van werkzaamheden conform bestek, inclusief levering,
aanleg en afwerking van alle benodigde onderdelen.
  `;
}

</script>

</body>
</html>
