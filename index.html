<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>LV Analyse Tool (ChatGPT Workflow)</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>
body { font-family: Arial; padding:20px; background:#f4f6f8; }
textarea { width:100%; height:140px; margin-bottom:10px; }
button { padding:6px 10px; margin:4px; cursor:pointer; }
.box { background:#fff; padding:15px; margin-bottom:15px; border-radius:6px; }
.chunk { border:1px solid #ddd; padding:10px; margin-bottom:10px; border-radius:6px; }
h3 { margin-top:0; }
</style>
</head>

<body>

<h1>LV Analyse Tool (Gratis ChatGPT workflow)</h1>

<div class="box">
<h3>1. LV laden</h3>
<input type="file" id="file" accept=".pdf">
<button onclick="leesLV()">Lees PDF</button>
<textarea id="lvText" placeholder="LV tekst verschijnt hier..."></textarea>
</div>

<div class="box">
<h3>2. LV splitsen (voor ChatGPT limiet)</h3>
<button onclick="splitLV()">Split LV</button>
<div id="chunks"></div>
</div>

<div class="box">
<h3>3. Eindanalyse</h3>
<button onclick="genFinal()">Genereer eindprompt</button>
<button onclick="copyFinal()">Kopieer eindprompt</button>
<button onclick="openChatGPT()">Open ChatGPT</button>
<textarea id="finalPrompt"></textarea>
</div>

<script>

// ===== OPEN CHATGPT =====
function openChatGPT(){
  window.open("https://chat.openai.com", "_blank");
}

// ===== PDF =====
async function leesLV(){
  const f = document.getElementById("file").files[0];
  if(!f) return alert("Kies PDF");

  const buffer = await f.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({data:buffer}).promise;

  let text="";
  for(let i=1;i<=pdf.numPages;i++){
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    content.items.forEach(it => text += it.str + " ");
  }

  document.getElementById("lvText").value = text;
}

// ===== SPLIT =====
let parts = [];

function splitLV(){

  const text = document.getElementById("lvText").value;
  const size = 2500;

  parts = [];
  for(let i=0;i<text.length;i+=size){
    parts.push(text.substring(i,i+size));
  }

  const container = document.getElementById("chunks");
  container.innerHTML = "";

  parts.forEach((p,i)=>{

    const prompt = `
Analyseer dit deel van een LV als senior werkvoorbereider:

- samenvatting
- werkzaamheden
- planning
- risico's

${p}
    `;

    const encoded = encodeURIComponent(prompt);
    const link = "https://chat.openai.com/?q=" + encoded;

    container.innerHTML += `
    <div class="chunk">
      <b>Deel ${i+1}</b><br>

      <button onclick="copyChunk(${i})">Kopieer</button>
      <button onclick="openChunk(${i})">Open in ChatGPT</button>

      <textarea id="chunk${i}">${prompt}</textarea>
    </div>`;
  });
}

// ===== COPY =====
function copyChunk(i){
  const t = document.getElementById("chunk"+i);
  t.select();
  document.execCommand("copy");
  alert("Gekopieerd!");
}

// ===== OPEN DIRECT =====
function openChunk(i){
  const text = document.getElementById("chunk"+i).value;
  const encoded = encodeURIComponent(text);
  const url = "https://chat.openai.com/?q=" + encoded;
  window.open(url, "_blank");
}

// ===== FINAL PROMPT =====
function genFinal(){

  const prompt = `
Gebruik onderstaande deelanalyses en maak één complete professionele LV analyse.

Structuur:

1. Uitgebreide samenvatting (minimaal 3 alinea's)
2. Scope werkzaamheden
3. Fasering
4. Planning totaal
5. Contractanalyse:
   - kostenverdeling
   - risicoverdeling
   - verplichtingen aannemer
6. Afhankelijkheden
7. Risico's:
   - planning
   - contract
   - uitvoering
   - omgeving

Plak hieronder alle deelanalyses:
`;

  document.getElementById("finalPrompt").value = prompt;
}

// ===== COPY FINAL =====
function copyFinal(){
  const t = document.getElementById("finalPrompt");
  t.select();
  document.execCommand("copy");
  alert("Eindprompt gekopieerd!");
}

</script>

</body>
</html>
