<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>LV Intelligence – OZ Analyse + PDF</title>

<style>
body { font-family: Arial; margin:0; background:#eef2f7; }
.header { background:#0f172a; color:#fff; padding:15px; font-size:22px; }
.container { padding:20px; }

textarea { width:100%; height:140px; margin-bottom:10px; }

button {
  padding:10px 15px;
  background:#2563eb;
  color:#fff;
  border:none;
  cursor:pointer;
  margin:5px;
}

.section { background:#fff; padding:20px; margin-top:15px; border-radius:10px; }

.oz {
  background:#f9fafb;
  padding:15px;
  margin-top:12px;
  border-radius:6px;
  border-left:5px solid #2563eb;
}
</style>
</head>

<body>

<div class="header">LV Intelligence – OZ Analyse + PDF</div>

<div class="container">

<input type="file" id="pdfFile" accept=".pdf"><br><br>

<textarea id="lvText" placeholder="Plak LV tekst of upload PDF"></textarea>

<button onclick="extractOZ()">Analyse OZ</button>

<div id="out"></div>

</div>

<script>

// ===== PDF LOADER =====
function loadScript(url){
  return new Promise(res=>{
    let s=document.createElement("script");
    s.src=url;
    s.onload=res;
    document.body.appendChild(s);
  });
}

async function handlePDF(file){
  try{
    if(typeof pdfjsLib==="undefined"){
      await loadScript("https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js");
    }

    let reader=new FileReader();

    reader.onload=async function(){
      let pdf=await pdfjsLib.getDocument(new Uint8Array(this.result)).promise;
      let text="";

      for(let i=1;i<=pdf.numPages;i++){
        let page=await pdf.getPage(i);
        let c=await page.getTextContent();
        text+=c.items.map(i=>i.str).join(" ")+"\n";
      }

      lvText.value=text;
    };

    reader.readAsArrayBuffer(file);

  }catch(e){
    alert("PDF fout: " + e);
  }
}

pdfFile.onchange=e=>{
  if(e.target.files[0]) handlePDF(e.target.files[0]);
};

// ===== OZ DATA =====
let ozData = [];

// ===== OZ EXTRACT =====
function extractOZ(){

  let text = lvText.value;
  let lines = text.split("\n");

  ozData = [];
  let current = null;

  for(let i=0;i<lines.length;i++){

    let line = lines[i].trim();

    // detecteer OZ nummer (1.1.10.)
    if(line.match(/^\d+(\.\d+)+\.$/)){

      if(current) ozData.push(current);

      let title = lines[i+1] ? lines[i+1].trim() : "";

      current = {
        nr: line,
        title: title,
        desc: ""
      };

      i++; // skip titel regel

    } else if(current){
      current.desc += " " + line;
    }
  }

  if(current) ozData.push(current);

  render();
}

// ===== RENDER =====
function render(){

  let html = `<div class="section"><h2>OZ Analyse</h2>`;

  ozData.forEach(o=>{

    html += `
    <div class="oz">

      <h3>${o.nr} – ${o.title}</h3>

      <b>Duits:</b><br>
      ${o.desc}<br><br>

      <b>Nederlands:</b><br>
      ${translate(o)}

    </div>
    `;
  });

  html += "</div>";

  out.innerHTML = html;
}

// ===== SLIMME VERTALING =====
function translate(o){

  let t = o.desc.toLowerCase();

  if(t.includes("baustelle einrichten")){
    return `
Inrichten en operationeel houden van de bouwplaats, inclusief het aanvoeren,
plaatsen en onderhouden van bouwketen, sanitaire voorzieningen, machines en installaties.

Daarnaast omvat dit het realiseren van energievoorzieningen, het inrichten van het terrein,
toegangswegen en het onderhouden van alle voorzieningen gedurende de volledige bouwperiode.

De kosten worden verrekend op basis van de voortgang van het project.
    `;
  }

  if(t.includes("kanal")){
    return "Aanleg van rioleringssystemen inclusief alle bijbehorende werkzaamheden.";
  }

  if(t.includes("leitung")){
    return "Aanleggen van leidingen en nutsvoorzieningen volgens bestek.";
  }

  return "Uitvoering van werkzaamheden conform bestek en technische eisen.";
}

</script>

</body>
</html>
