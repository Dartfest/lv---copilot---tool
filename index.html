<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>LV PDF Lezer – Werkend</title>

<!-- PDF.js – CORRECT -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
</script>

<style>
body { font-family: Arial, sans-serif; padding: 20px; background:#f4f6f8; }
.box { background:#fff; padding:16px; border-radius:6px; }
textarea { width:100%; min-height:220px; font-family:monospace; }
.status { margin-top:6px; font-size:13px; }
button { padding:6px 12px; margin-top:6px; }
</style>
</head>

<body>

<h2>LV‑PDF lezen (test)</h2>

<div class="box">
  <input type="file" id="lvFile" accept=".pdf">
  <br>
  <button onclick="readLV()">Lees LV</button>
  <div id="status" class="status"></div>
