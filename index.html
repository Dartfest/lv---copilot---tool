<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>LV werkt nu</title>

<!-- ✅ CORRECTE SCRIPT TAG -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
</script>

<style>
body { font-family: Arial, sans-serif; padding:20px; }
textarea { width:100%; min-height:300px; font-family:monospace; white-space:pre-wrap; }
button { padding:6px 12px; margin-top:8px; }
.status { margin:8px 0; font-weight:bold; }
.ok { color: green; }
.err { color: red; }
</style>
</head>

<body>

<h1>LV lezen</h1>

<div id="libStatus" class="status"></div>

<input type="file" id="file" accept=".pdf"><br>
<button onclick="leesLV()">Lees LV</button>

<div id="status" class="status"></div>

<textarea id="output" placeholder="LV-tekst verschijnt hier..."></textarea>

<script>
/* ✅ CHECK BIJ LADEN */
window.onload = function () {
  const s = document.getElementById("libStatus");
  if (window.pdfjsLib) {
    s.textContent = "✅ pdf.js correct geladen";
    s.className = "status ok";
  } else {
    s.textContent = "❌ pdf.js NIET geladen";
    s.className = "status err";
  }
};

/* ✅ LV LEZEN */
async function leesLV() {
  const f = document.getElementById("file").files[0];
  const status = document.getElementById("status");
  const out = document.getElementById("output");

  if (!f) {
    alert("Kies eerst een PDF");
    return;
  }

  try {
    const buf = await f.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: buf }).promise;

    let text = "";
    for (let i = 1; i <= pdf.numPages; i++) {
      const page = await pdf.getPage(i);
      const c = await page.getTextContent();
      text += c.items.map(it => it.str).join("\n") + "\n\n";
    }

    out.value = text;
    status.textContent = "✅ LV succesvol gelezen";
    status.className = "status ok";
  } catch (e) {
    console.error(e);
    status.textContent = "❌ Fout: " + e.message;
    status.className = "status err";
  }
}
</script>

</body>
</html>
