<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>LV Analyse Tool PRO</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf"></script>

<style>
body { font-family: Arial; padding:20px; background:#f4f6f8; }
textarea { width:100%; height:250px; font-family:monospace; }
button { padding:8px 14px; margin:8px 5px 8px 0; }
.box { background:#fff; padding:15px; margin-bottom:15px; border-radius:6px; }
.plan { background:#eef6ff; border-left:4px solid #2563eb; padding:10px; margin:10px 0; }

.gantt { margin-top:10px; }
.bar {
  height:20px;
  background:#2563eb;
  margin:4px 0;
  border-radius:4px;
  position:relative;
}
.bar span {
  position:absolute;
  left:5px;
  top:2px;
  font-size:12px;
  color:white;
}
</style>
</head>

<body>

<h1>LV Analyse PRO</h1>

<div class="box">
<input type="file" id="file" accept=".pdf">
<button onclick="leesLV()">Lees PDF</button>
<textarea id="lvText"></textarea>
</div>

<div class="box">
<button onclick="analyse()">Analyse</button>
<button onclick="exportPDF()">Export PDF</button>
<div id="result"></div>
</div>

<script>

// ================= PDF LEZEN =================
async function leesLV(){
  const f = document.getElementById("file").files[0];
  if(!f) return alert("Kies PDF");

  const buffer = await f.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({data:buffer, disableWorker:true}).promise;

  let text="";
  for(let i=1;i<=pdf.numPages;i++){
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    content.items.forEach(it => text += it.str + "\n");
  }

  document.getElementById("lvText").value = text;
}

// ================= DATUM =================
function parseDate(d){
  const p = d.split(/[.\-]/);
  return new Date(p[2], p[1]-1, p[0]);
}

// ================= MAANDEN =================
const maandMap = {
  "januar":0,"februar":1,"märz":2,"april":3,"mai":4,
  "juni":5,"juli":6,"august":7,"september":8,
  "oktober":9,"november":10,"dezember":11
};

// ================= ECHTE VERTALING =================
function vertaal(t){
  const dict = {
    "herstellung":"aanleg",
    "rückbau":"sloop",
    "abbruch":"sloop",
    "arbeiten":"werkzaamheden",
    "kanal":"riolering",
    "kabel":"kabels",
    "leitung":"leidingen",
    "bau":"bouw",
    "straße":"straat",
    "erschließung":"bouwrijp maken",
    "versorgung":"voorzieningen",
    "entwässerung":"afwatering"
  };

  let r = t.toLowerCase();

  Object.keys(dict).forEach(k=>{
    r = r.replaceAll(k, dict[k]);
  });

  return r;
}

// ================= MERGE =================
function mergeTijd(tijd){
  tijd.sort((a,b)=>a.start-b.start);
  let out=[];

  tijd.forEach(t=>{
    if(!out.length) return out.push(t);

    let last=out[out.length-1];

    if(t.start <= last.end){
      last.end = new Date(Math.max(last.end, t.end));
    } else {
      out.push(t);
    }
  });

  return out;
}

// ================= GANTT =================
function maakGantt(tijd){

  if(!tijd.length) return "";

  const min = Math.min(...tijd.map(t=>t.start));
  const max = Math.max(...tijd.map(t=>t.end));
  const total = max - min;

  return `
    <div class="gantt">
      ${tijd.map((t,i)=>{
        const left = ((t.start - min)/total)*100;
        const width = ((t.end - t.start)/total)*100;

        return `
          <div class="bar" style="margin-left:${left}%; width:${width}%;">
            <span>Fase ${i+1}</span>
          </div>
        `;
      }).join("")}
    </div>
  `;
}

// ================= ANALYSE =================
function analyse(){

  const text = document.getElementById("lvText").value;
  const out = document.getElementById("result");
  out.innerHTML="";

  const planRegex = /Planstra(ß|ss)e[\s]+([A-Z])/gi;
  const exactRegex = /(\d{1,2}[.\-]\d{1,2}[.\-]\d{4}).*?(\d{1,2}[.\-]\d{1,2}[.\-]\d{4})/gi;

  let data={};
  let m;

  while((m=planRegex.exec(text))!==null){

    const plan="Planstraße "+m[2];
    if(!data[plan]) data[plan]={tijd:[], sam:[]};

    const frag = text.slice(m.index, m.index+2000);

    let d;

    while((d=exactRegex.exec(frag))){
      data[plan].tijd.push({
        start:parseDate(d[1]),
        end:parseDate(d[2])
      });
    }

    data[plan].sam.push(...frag.split("\n").slice(0,5));
  }

  // ================= OUTPUT =================
  Object.entries(data).forEach(([plan,d],i)=>{

    d.tijd = mergeTijd(d.tijd);

    const div=document.createElement("div");
    div.className="plan";

    div.innerHTML=`
    <strong>${plan}</strong>

    <b>Fasen:</b>
    ${d.tijd.map((t,i)=>`
      <div>
        Fase ${i+1}: ${t.start.toLocaleDateString()} → ${t.end.toLocaleDateString()}
      </div>
    `).join("")}

    <b>Gantt:</b>
    ${maakGantt(d.tijd)}

    <b>Werkzaamheden:</b>
    <ul>
    ${d.sam.map(s=>`
      <li>${vertaal(s)}</li>
    `).join("")}
    </ul>
    `;

    out.appendChild(div);
  });

}

// ================= PDF EXPORT =================
function exportPDF(){

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  const text = document.getElementById("result").innerText;

  doc.text(text, 10, 10);
  doc.save("analyse.pdf");
}

</script>

</body>
</html>
