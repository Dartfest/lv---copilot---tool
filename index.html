<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>LV – Planstraße samenvatting</title>

  <!-- pdf.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #f4f6f8;
    }
    textarea {
      width: 100%;
      height: 260px;
      font-family: monospace;
      white-space: pre-wrap;
    }
    button {
      padding: 6px 12px;
      margin: 6px 0;
    }
    .box {
      background: #fff;
      padding: 16px;
      border-radius: 6px;
      margin-bottom: 16px;
    }
    .plan {
      border-left: 4px solid #2563eb;
      background: #eff6ff;
      padding: 10px;
      margin: 10px 0;
    }
    .muted {
      color: #555;
      font-size: 0.9em;
    }
  </style>
</head>

<body>

<h1>LV – Planstraße samenvatting & tijdvakken</h1>

<div class="box">
  <h2>1. LV lezen</h2>
  <input type="file" id="file" accept=".pdf"><br>
  <button onclick="leesLV()">Lees LV</button>
  <textarea id="lvText" placeholder="LV-tekst verschijnt hier…"></textarea>
</div>

<div class="box">
  <h2>2. Analyse</h2>
  <button onclick="analyse()">Analyseer Planstraßen</button>
  <div id="result"></div>
</div>

<script>
async function leesLV() {
  const f = document.getElementById("file").files[0];
  if (!f) {
    alert("Kies eerst een PDF");
    return;
  }

  const buffer = await f.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({
    data: buffer,
    disableWorker: true
  }).promise;

  let text = "";
  for (let i = 1; i <= pdf.numPages; i++) {
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    for (const item of content.items) {
      text += item.str + "\n";
    }
    text += "\n";
  }

  document.getElementById("lvText").value = text;
}

function parseDate(d) {
  const p = d.split(/[.\-]/);
  if (p.length !== 3) return null;
  return new Date(p[2], p[1] - 1, p[0]);
}

function analyse() {
  const text = document.getElementById("lvText").value;
  const out = document.getElementById("result");
  out.innerHTML = "";

  const planRegex = /Planstra(ß|ss)e[\s\u00A0]+([A-Z])/gi;
  const exactRegex =
    /(\d{1,2}[.\-]\d{1,2}[.\-]\d{4})\s*(bis|–|-|t\/m)\s*(\d{1,2}[.\-]\d{1,2}[.\-]\d{4})/gi;
  const tekstRegex =
    /(vom\s+\d{1,2}[.\-]\d{1,2}[.\-]\d{4}\s+bis\s+\d{1,2}[.\-]\d{1,2}[.\-]\d{4}|ab\s+\d{1,2}[.\-]\d{1,2}[.\-]\d{4}|bis\s+\d{1,2}[.\-]\d{1,2}[.\-]\d{4}|KW\s*\d+\s*(–|-)\s*\d+)/gi;

  const data = {};
  let m;

  while ((m = planRegex.exec(text)) !== null) {
    const plan = "Planstraße " + m[2];
    if (!data[plan]) {
      data[plan] = { periodes: [], start: null, end: null };
    }

    const fragment = text.slice(m.index, m.index + 1500);
    let p;

    while ((p = exactRegex.exec(fragment)) !== null) {
      data[plan].periodes.push(p[0]);
      const s = parseDate(p[1]);
      const e = parseDate(p[3]);
      if (s && (!data[plan].start || s < data[plan].start)) data[plan].start = s;
      if (e && (!data[plan].end || e > data[plan].end)) data[plan].end = e;
    }

    while ((p = tekstRegex.exec(fragment)) !== null) {
      if (!data[plan].periodes.includes(p[0])) {
        data[plan].periodes.push(p[0]);
      }
    }
  }

  let index = 1;
  for (const [plan, d] of Object.entries(data)) {
    const div = document.createElement("div");
    div.className = "plan";

    let periodeBlok;
    let samenvatting;

    if (d.start && d.end) {
      periodeBlok = `<p><strong>Periode:</strong> ${d.start.toLocaleDateString()} t/m ${d.end.toLocaleDateString()}</p>`;
      samenvatting = `
        <p>
          <strong>Samenvatting:</strong><br>
          ${plan} wordt uitgevoerd in de periode van
          ${d.start.toLocaleDateString()} tot en met
          ${d.end.toLocaleDateString()}.
          De onderstaande tijdvakken zijn letterlijk overgenomen uit het LV.
        </p>`;
    } else {
      periodeBlok = `<p class="muted">Geen exact datum‑tijdvak in LV vermeld</p>`;
      samenvatting = `
        <p>
          <strong>Samenvatting:</strong><br>
          Voor ${plan} is in het LV geen exact start‑ en eindmoment opgenomen.
          De uitvoering is gekoppeld aan globale of indicatieve periodes zoals hieronder vermeld.
        </p>`;
    }

    div.innerHTML = `
      <strong>${index}. ${plan}</strong>
      ${periodeBlok}
      ${samenvatting}
      <ul>${d.periodes.map(x => `<li>${x}</li>`).join("")}</ul>
    `;

    out.appendChild(div);
    index++;
  }
}
</script>

</body>
</html>
