<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>LV Analyse Tool</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>
body { font-family: Arial; padding:20px; background:#f4f6f8; }
textarea { width:100%; height:250px; font-family:monospace; }
button { padding:8px 14px; margin:8px 0; }
.box { background:#fff; padding:15px; margin-bottom:15px; border-radius:6px; }
.plan { background:#eef6ff; border-left:4px solid #2563eb; padding:10px; margin:10px 0; }
.muted { color:#666; font-size:0.9em; }
.fase { background:#f1f5f9; padding:8px; margin:6px 0; border-radius:4px; }
.gap { background:#fff4e5; padding:6px; margin:4px 0; border-radius:4px; }
</style>
</head>

<body>

<h1>LV Analyse (Planstraûen + tijd)</h1>

<div class="box">
<input type="file" id="file" accept=".pdf">
<button onclick="leesLV()">Lees PDF</button>
<textarea id="lvText"></textarea>
</div>

<div class="box">
<button onclick="analyse()">Analyse</button>
<div id="result"></div>
</div>

<script>

// ================= PDF =================
async function leesLV(){
  const f = document.getElementById("file").files[0];
  if(!f) return alert("Kies PDF");

  const buffer = await f.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({data:buffer, disableWorker:true}).promise;

  let text="";
  for(let i=1;i<=pdf.numPages;i++){
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    content.items.forEach(it => text += it.str + "\n");
  }

  document.getElementById("lvText").value = text;
}

// ================= DATUM =================
function parseDate(d){
  const p = d.split(/[.\-]/);
  if(p.length!==3) return null;
  return new Date(p[2], p[1]-1, p[0]);
}

// ================= MAANDEN =================
const maandMap = {
  "januar":0,"februar":1,"mûÊrz":2,"april":3,"mai":4,
  "juni":5,"juli":6,"august":7,"september":8,
  "oktober":9,"november":10,"dezember":11
};

// ================= VERTALING =================
function vertaal(t){
  const dict = {
    "herstellung":"aanleg",
    "rû¥ckbau":"sloop",
    "arbeiten":"werkzaamheden",
    "kanal":"riolering",
    "kabel":"kabels",
    "leitung":"leidingen"
  };

  let r = t.toLowerCase();
  Object.keys(dict).forEach(k=>{
    if(r.includes(k)) r = r.replace(k, dict[k]);
  });

  return r;
}

// ================= SAMENVATTING =================
function samenvatting(frag){
  const regels = frag.split("\n");
  const keys = ["bau","arbeiten","kanal","kabel","leitung"];
  return regels.filter(r => keys.some(k => r.toLowerCase().includes(k))).slice(0,5);
}

// ================= RISICO =================
function risico(d){
  let r=[];

  if(d.tijd.length>1) r.push("Meerdere fasen (let op overlap)");
  if(!d.end) r.push("Geen einddatum");

  if(d.start && d.end){
    let days=(d.end-d.start)/(1000*60*60*24);
    if(days<7) r.push("Zeer korte periode");
  }

  return r.length? r:["Geen bijzonderheden"];
}

// ================= MERGE =================
function mergeTijd(tijd){
  if(!tijd.length) return [];

  tijd.sort((a,b)=>a.start-b.start);
  let merged=[tijd[0]];

  for(let i=1;i<tijd.length;i++){
    let last=merged[merged.length-1];
    let cur=tijd[i];

    if(cur.start <= last.end){
      last.end = new Date(Math.max(last.end, cur.end));
    } else {
      merged.push(cur);
    }
  }

  return merged;
}

// ================= GAPS =================
function berekenGaten(tijd){
  let gaps=[];
  for(let i=1;i<tijd.length;i++){
    const prev=tijd[i-1];
    const cur=tijd[i];

    if(cur.start > prev.end){
      gaps.push({
        start: prev.end,
        end: cur.start
      });
    }
  }
  return gaps;
}

// ================= ANALYSE =================
function analyse(){

  const text = document.getElementById("lvText").value;
  const out = document.getElementById("result");
  out.innerHTML="";

  const planRegex = /Planstra(û|ss)e[\s]+([A-Z])/gi;
  const exactRegex = /(\d{1,2}[.\-]\d{1,2}[.\-]\d{4}).*?(\d{1,2}[.\-]\d{1,2}[.\-]\d{4})/gi;
  const maandRegex = /(im|bis)\s+(januar|februar|mûÊrz|april|mai|juni|juli|august|september|oktober|november|dezember)\s+(\d{4})/gi;

  let data={};
  let m;

  while((m=planRegex.exec(text))!==null){

    const plan="Planstraûe "+m[2];

    if(!data[plan]) data[plan]={tijd:[], start:null, end:null, sam:[]};

    const frag = text.slice(m.index, m.index+2000);

    let d;

    // exacte datums
    while((d=exactRegex.exec(frag))){
      const s=parseDate(d[1]);
      const e=parseDate(d[2]);

      if(s&&e){
        data[plan].tijd.push({start:s,end:e});

        if(!data[plan].start || s<data[plan].start) data[plan].start=s;
        if(!data[plan].end || e>data[plan].end) data[plan].end=e;
      }
    }

    // maand datums
    let mm;
    let tempStart=null;

    while((mm=maandRegex.exec(frag))){
      const type=mm[1];
      const maand=maandMap[mm[2].toLowerCase()];
      const jaar=parseInt(mm[3]);

      if(type==="im"){
        tempStart = new Date(jaar, maand, 1);
      }

      if(type==="bis" && tempStart){
        const eind = new Date(jaar, maand+1, 0);

        data[plan].tijd.push({start:tempStart, end:eind});

        if(!data[plan].start || tempStart<data[plan].start) data[plan].start=tempStart;
        if(!data[plan].end || eind>data[plan].end) data[plan].end=eind;

        tempStart=null;
      }
    }

    // samenvatting
    samenvatting(frag).forEach(s=>{
      if(!data[plan].sam.includes(s)) data[plan].sam.push(s);
    });
  }

  // ================= OUTPUT =================
  Object.entries(data).forEach(([plan,d],i)=>{

    d.tijd = mergeTijd(d.tijd);
    const gaps = berekenGaten(d.tijd);

    const div=document.createElement("div");
    div.className="plan";

    div.innerHTML=`
    <strong>${i+1}. ${plan}</strong>

    ${
      d.start && d.end
      ? `<p><b>Periode:</b> ${d.start.toLocaleDateString()} ã ${d.end.toLocaleDateString()}</p>`
      : `<p class="muted">Geen volledige periode</p>`
    }

    <b>Fasen:</b>
    ${d.tijd.map((t,i)=>`
      <div class="fase">
        <b>Fase ${i+1}</b><br>
        ${t.start.toLocaleDateString()} ã ${t.end.toLocaleDateString()}
      </div>
    `).join("")}

    <b>Onderbrekingen:</b>
    ${
      gaps.length
      ? gaps.map(g=>`
        <div class="gap">
          ${g.start.toLocaleDateString()} ã ${g.end.toLocaleDateString()}
        </div>
      `).join("")
      : `<div class="muted">Geen</div>`
    }

    <b>Werkzaamheden:</b>
    <ul>
    ${d.sam.map(s=>`<li>${s}<br><span class="muted">ã ${vertaal(s)}</span></li>`).join("")}
    </ul>

    <b>Risico's:</b>
    <ul>
    ${risico(d).map(r=>`<li>${r}</li>`).join("")}
    </ul>
    `;

    out.appendChild(div);
  });

}

</script>

</body>
</html>
