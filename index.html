<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>LV Intelligence Offline Pro</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body { font-family: Arial; margin:0; background:#f1f5f9; }
.header { background:#0f172a; color:#fff; padding:15px; font-size:22px; }
.container { padding:20px; }

textarea { width:100%; height:140px; margin-bottom:10px; }

button {
  padding:10px;
  background:#2563eb;
  color:#fff;
  border:none;
  margin-right:5px;
  cursor:pointer;
}

.grid {
  display:grid;
  grid-template-columns: repeat(4,1fr);
  gap:10px;
}

.card {
  background:#fff;
  padding:12px;
  border-radius:6px;
}

.big { font-size:20px; font-weight:bold; }

.high { color:#dc2626; }
.mid { color:#f59e0b; }
.low { color:#16a34a; }

.section {
  background:#fff;
  padding:12px;
  margin-top:10px;
  border-radius:6px;
}
</style>
</head>

<body>

<div class="header">LV Intelligence – Offline Pro</div>

<div class="container">

<textarea id="lvText" placeholder="Plak hier je LV tekst"></textarea>

<button onclick="analyse()">Analyse</button>
<button onclick="exportPDF()">Export PDF</button>

<div id="out"></div>

</div>

<script>

// ===== HULP =====
function contains(t, words){
  return words.some(w=>t.includes(w));
}

// ===== ANALYSE =====
function analyse(){

  let t=document.getElementById("lvText").value.toLowerCase();

  // ===== RISICO =====
  let score=0;

  if(contains(t,["nicht vergütet","nicht gesondert"])) score+=2;
  if(contains(t,["drittfirmen","versorgung"])) score+=2;
  if(contains(t,["unterbrechung"])) score+=1;
  if(contains(t,["nicht parallel"])) score+=1;

  let risico = score>=4 ? ["HOOG","high"]
              : score>=2 ? ["MIDDEL","mid"]
              : ["LAAG","low"];

  let kosten = score>=4 ? "€50k - €150k"
              : score>=2 ? "€10k - €50k"
              : "< €10k";

  // ===== FASERING =====
  let fases=[];
  if(t.includes("1. bauabschnitt")) fases.push("Fase 1");
  if(t.includes("2. bauabschnitt")) fases.push("Fase 2");
  if(t.includes("3. bauabschnitt")) fases.push("Fase 3");

  // ===== RISICO DETAILS =====
  let risicoLijst=[];
  if(t.includes("nicht vergütet")) risicoLijst.push("Kosten worden niet vergoed");
  if(t.includes("drittfirmen")) risicoLijst.push("Afhankelijkheid derden");
  if(t.includes("nicht parallel")) risicoLijst.push("Geen parallel werken mogelijk");

  // ===== CONTRACT =====
  let contract=[];
  if(t.includes("nicht vergütet")) contract.push("Meerwerk risico");
  if(t.includes("unterbrechung")) contract.push("Onderbreking niet vergoed");

  // ===== ACTIES =====
  let acties=[];
  if(t.includes("drittfirmen")) acties.push("Afstemming nutsbedrijven");
  if(t.includes("nicht parallel")) acties.push("Planning strak faseren");

  // ===== SAMENVATTING =====
  let samenvatting = `
Dit project bevat meerdere fasen met afhankelijkheden van derden.
De uitvoering vereist strakke planning zonder parallelle werkzaamheden.
Belangrijkste risico’s liggen bij kostenverdeling en externe partijen.
  `;

  // ===== OUTPUT =====
  document.getElementById("out").innerHTML=`

  <div class="grid">

    <div class="card">
      <div>Risico</div>
      <div class="big ${risico[1]}">${risico[0]}</div>
    </div>

    <div class="card">
      <div>Kostenimpact</div>
      <div class="big">${kosten}</div>
    </div>

    <div class="card">
      <div>Fases</div>
      <div class="big">${fases.length}</div>
    </div>

    <div class="card">
      <div>Advies</div>
      <div class="big ${risico[1]}">
        ${score>=4?"Let op":"Beheersbaar"}
      </div>
    </div>

  </div>

  <div class="section">
    <h3>Samenvatting</h3>
    <p>${samenvatting}</p>
  </div>

  <div class="section">
    <h3>Fasering</h3>
    <ul>${fases.map(f=>`<li>${f}</li>`).join("")}</ul>
  </div>

  <div class="section">
    <h3>Risico’s</h3>
    <ul>${risicoLijst.map(r=>`<li class="${risico[1]}">${r}</li>`).join("")}</ul>
  </div>

  <div class="section">
    <h3>Contractanalyse</h3>
    <ul>${contract.map(c=>`<li>${c}</li>`).join("")}</ul>
  </div>

  <div class="section">
    <h3>Acties uitvoering</h3>
    <ul>${acties.map(a=>`<li>${a}</li>`).join("")}</ul>
  </div>

  `;
}

// ===== PDF =====
function exportPDF(){
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  doc.text("LV Analyse",10,10);
  doc.text(document.getElementById("out").innerText,10,20);

  doc.save("analyse.pdf");
}

</script>

</body>
</html>
