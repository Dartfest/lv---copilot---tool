<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>LV Analyse (Chunk AI)</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>
body { font-family: Arial; padding:20px; background:#f4f6f8; }
textarea { width:100%; height:160px; margin-bottom:10px; }
button { padding:8px 14px; margin:5px 0; }
.box { background:#fff; padding:15px; margin-bottom:15px; border-radius:6px; }
</style>
</head>

<body>

<h1>LV Analyse (Slim opdelen)</h1>

<div class="box">
<input type="file" id="file" accept=".pdf">
<button onclick="leesLV()">Lees PDF</button>
<textarea id="lvText"></textarea>
</div>

<div class="box">
<button onclick="splitLV()">Split LV</button>
<div id="chunks"></div>
</div>

<div class="box">
<h3>Eindprompt</h3>
<button onclick="eindPrompt()">Genereer eindanalyse</button>
<textarea id="finalPrompt"></textarea>
</div>

<script>

// ===== PDF =====
async function leesLV(){
  const f = document.getElementById("file").files[0];
  if(!f) return alert("Kies PDF");

  const buffer = await f.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({data:buffer}).promise;

  let text="";
  for(let i=1;i<=pdf.numPages;i++){
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    content.items.forEach(it => text += it.str + " ");
  }

  document.getElementById("lvText").value = text;
}

// ===== SPLIT =====
let parts=[];

function splitLV(){

  const text = document.getElementById("lvText").value;
  const max = 3000; // veilige chunk grootte

  parts = [];
  for(let i=0;i<text.length;i+=max){
    parts.push(text.substring(i,i+max));
  }

  const div = document.getElementById("chunks");
  div.innerHTML="";

  parts.forEach((p,i)=>{
    div.innerHTML += `
    <div>
      <b>Deel ${i+1}</b>
      <textarea>
Analyseer dit deel van een LV:
- samenvatting
- werkzaamheden
- planning
- risico's

${p}
      </textarea>
    </div>`;
  });
}

// ===== EINDPROMPT =====
function eindPrompt(){

  const prompt = `
Gebruik onderstaande deelanalyses en maak één complete LV analyse:

- uitgebreide samenvatting
- fasering
- planning totaal
- contractanalyse
- risico's per categorie

Plak hier alle antwoorden van ChatGPT onder elkaar.
`;

  document.getElementById("finalPrompt").value = prompt;
}

</script>

</body>
</html>
