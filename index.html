<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kanalbau AI v4 PRO</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body{display:flex;height:100vh;background:#eef2f7;}

.sidebar{
width:240px;
background:#0f172a;
color:white;
padding:20px;
}

.logo{text-align:center;font-size:24px;font-weight:bold;margin-bottom:30px;}

.main{flex:1;padding:20px;overflow:auto;}

textarea{width:100%;height:120px;padding:10px;}

button{
margin-top:10px;
padding:10px 20px;
background:#2563eb;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

.project{
background:white;
padding:15px;
margin-top:10px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,.1);
cursor:pointer;
}

.green{color:green;font-weight:bold;}
.orange{color:orange;font-weight:bold;}
.red{color:red;font-weight:bold;}

.section{margin-top:20px;}
</style>
</head>

<body>

<div class="sidebar">
<div class="logo">KANALBAU AI</div>
<p>Dashboard</p>
</div>

<div class="main">

<h2>📧 Email analyseren</h2>
<textarea id="mail"></textarea>
<button onclick="runAnalyse()">Analyseer</button>

<div class="section">
<h2>📊 Analyse resultaten</h2>
<div id="resultaten"></div>
</div>

<div class="section">
<h2>💾 Opgeslagen projecten</h2>
<div id="opslag"></div>
</div>

<div class="section">
<h2>🔍 Detail</h2>
<div id="detail">Nog niets geselecteerd</div>
</div>

</div>

<script>

// ===== DATA =====

let keywords = [
{ woord:"kanalbau", score:40 },
{ woord:"tiefbau", score:30 },
{ woord:"erschließung", score:25 },
{ woord:"druckrohr", score:25 },
{ woord:"schmutzwasser", score:20 },
{ woord:"regenwasser", score:15 },
{ woord:"straßenbau", score:15 },
{ woord:"sanitär", score:-70 },
{ woord:"elektro", score:-60 },
{ woord:"dach", score:-60 }
];

// ===== STORAGE =====

let opgeslagen = JSON.parse(localStorage.getItem("projecten")) || [];

function saveStorage(){
localStorage.setItem("projecten", JSON.stringify(opgeslagen));
}

// ===== HULP FUNCTIES =====

function splitProjecten(text){
return text.split(/(?=projekt|maßnahme|ausschreibung)/gi);
}

function telWoord(text, woord){
let regex = new RegExp(woord, "gi");
let m = text.match(regex);
return m ? m.length : 0;
}

function analyseTekst(text){

let score = 0;
let redenen = [];

keywords.forEach(k=>{
let count = telWoord(text, k.woord);

if(count>0){
score += count * k.score;
redenen.push((k.score>0?"✔ ":"✖ ") + k.woord + " ("+count+"x)");
}
});

let status="Niet interessant";
let kleur="red";

if(score>=80){status="🔥 TOP PROJECT"; kleur="green";}
else if(score>=60){status="Zeer interessant"; kleur="green";}
else if(score>=40){status="Mogelijk"; kleur="orange";}

return {score,redenen,status,kleur,text};
}

// ===== ANALYSE =====

function runAnalyse(){

let input = document.getElementById("mail").value;

let delen = splitProjecten(input);

let resultaten = [];

delen.forEach(d=>{
let a = analyseTekst(d.toLowerCase());
if(a.score !== 0){
resultaten.push(a);
}
});

// sorteer
resultaten.sort((a,b)=>b.score-a.score);

// tonen
let html="";
resultaten.forEach((r,i)=>{
html += `
<div class="project">
<b>${r.status}</b> | Score: ${r.score}
<br>
<button onclick="event.stopPropagation();opslaanProject(${i})">💾 Opslaan</button>
<button onclick="event.stopPropagation();toonDetailAnalyse(${i})">🔍 Detail</button>
</div>
`;
});

document.getElementById("resultaten").innerHTML =
resultaten.length ? html : "Geen projecten gevonden";

window.currentAnalyse = resultaten;

}

// ===== OPSLAAN =====

function opslaanProject(i){

let p = window.currentAnalyse[i];

opgeslagen.push(p);
saveStorage();
toonOpslag();

alert("✅ Project opgeslagen!");

}

// ===== OPSLAG TONEN =====

function toonOpslag(){

let html="";

opgeslagen.forEach((p,i)=>{
html += `
<div class="project" onclick="toonDetailOpslag(${i})">
<b>${p.status}</b> | Score: ${p.score}
</div>
`;
});

document.getElementById("opslag").innerHTML =
opgeslagen.length ? html : "Nog geen opgeslagen projecten";

}

// ===== DETAIL =====

function toonDetailAnalyse(i){
let p = window.currentAnalyse[i];
toonDetail(p);
}

function toonDetailOpslag(i){
let p = opgeslagen[i];
toonDetail(p);
}

function toonDetail(p){

document.getElementById("detail").innerHTML = `
<b>Status:</b> <span class="${p.kleur}">${p.status}</span><br>
<b>Score:</b> ${p.score}<br><br>

<b>Waarom:</b><br>
${p.redenen.join("<br>")}
`;

}

// ===== INIT =====
toonOpslag();

</script>

</body>
</html>
``
