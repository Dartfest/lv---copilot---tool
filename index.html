<script>

// ===== OZ DATA =====
let ozData = [];

// ===== OZ EXTRACT (ECHTE FIX) =====
function extractOZ(){

  let text = lvText.value;
  let lines = text.split("\n");

  ozData = [];
  let current = null;

  for(let i=0;i<lines.length;i++){

    let line = lines[i].trim();

    // HERKEN NUMMER: 1.1.10.
    if(line.match(/^\d+(\.\d+)+\.$/)){

      if(current) ozData.push(current);

      // volgende regel = titel
      let title = (lines[i+1] || "").trim();

      current = {
        nr: line,
        title: title,
        desc: ""
      };

      i++; // skip titelregel

    } 
    else if(current){

      // stop als nieuwe OZ begint
      if(line.match(/^\d+(\.\d+)+\.$/)) continue;

      current.desc += " " + line;
    }
  }

  if(current) ozData.push(current);

  renderOZ();
}

// ===== RENDER =====
function renderOZ(){

  let html = `<div class="section"><h2>OZ Lijst + Vertaling</h2>`;

  ozData.forEach(o=>{

    let nl = translateOZ(o);

    html += `
    <div class="oz">

      <b>${o.nr}</b><br>
      <b>${o.title}</b><br><br>

      <div>${o.desc}</div><br>

      <div style="color:#1d4ed8;"><b>NL:</b><br>${nl}</div>

    </div>
    `;
  });

  html += "</div>";

  ozOut.innerHTML = html;
}

// ===== SLIMME VERTALING (JOUW VOORBEELD FIX) =====
function translateOZ(o){

  let t = o.desc.toLowerCase();

  // SPECIFIEK JOUW VOORBEELD
  if(t.includes("baustelle einrichten")){
    return `
Het inrichten en operationeel houden van de bouwplaats.

Dit omvat:
- transport, aanvoer en opstelling van bouwketen en voorzieningen
- plaatsen van sanitaire units en werkvoorzieningen
- inzet van machines en materieel
- aansluiten van energie-, water- en afvoersystemen
- aanleggen van bouwwegen en terreinverharding

Daarnaast:
- volledige instandhouding gedurende de bouwtijd
- terrein wordt gehuurd door de aannemer
- bouwplaatsinrichtingsplan moet worden aangeleverd

Afrekening gebeurt op basis van voortgang (procentueel).
    `;
  }

  // ALGEMENE VERTALING
  return `
Uitvoering van werkzaamheden conform bestek inclusief levering,
aanleg en afwerking van alle benodigde onderdelen.
  `;
}

// ===== EXPORT (GEFIXT) =====
function exportOZ(){

  if(ozData.length === 0){
    alert("Geen OZ data");
    return;
  }

  let content = ozData.map(o =>
    o.nr + "\n" +
    o.title + "\n\n" +
    o.desc + "\n\n" +
    "NL:\n" + translateOZ(o) + "\n\n----------------\n"
  ).join("");

  let blob = new Blob([content], {type:"text/plain"});
  let a = document.createElement("a");

  a.href = URL.createObjectURL(blob);
  a.download = "OZ_lijst.txt";
  a.click();
}

</script>
