<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>LV → Planstraße → Uitvoerderssamenvatting</title>

<!-- PDF.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
  "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
</script>

<!-- jsPDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body { font-family: Arial, sans-serif; background:#f4f6f8; padding:20px; }
.box { background:#fff; padding:16px; border-radius:6px; margin-bottom:20px; }
textarea { width:100%; min-height:160px; font-family:monospace; padding:10px; }
button { padding:6px 12px; margin:4px 6px 4px 0; }

.plan {
  padding:14px;
  border-left:8px solid;
  border-radius:6px;
  margin-top:16px;
}

.pa { background:#f3e8ff; border-color:#9333ea; }
.pb { background:#e0f2fe; border-color:#0284c7; }
.pc { background:#dcfce7; border-color:#16a34a; }
.pd { background:#ffedd5; border-color:#ea580c; }
.px { background:#f3f4f6; border-color:#6b7280; }

ul { margin-left:18px; }
</style>
</head>

<body>

<h1>LV – Uitvoerderssamenvatting per Planstraße</h1>

<div class="box">
  <h2>1. LV‑PDF(s)</h2>
  <input type="file" id="lvFiles" multiple accept=".pdf">
  <button onclick="readLV()">Lees LV</button>
  <textarea id="lvText"></textarea>
</div>

<div class="box">
  <h2>2. Analyse per Planstraße</h2>
  <button onclick="analysePlanstrassen()">Analyseer</button>
  <button onclick="exportUitvoerderPDF()">📄 PDF – Uitvoerderssamenvatting</button>
  <div id="output"></div>
</div>

<script>
async function readPDF(file) {
  const buffer = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: buffer }).promise;
  let text = "";
  for (let p = 1; p <= pdf.numPages; p++) {
    const page = await pdf.getPage(p);
    const c = await page.getTextContent();
    text += c.items.map(i => i.str).join(" ") + "\n";
  }
  return text;
}

async function readLV() {
  let t="";
  for (const f of lvFiles.files) t += await readPDF(f);
  lvText.value = t;
}

/* ===== CORE LOGICA ===== */

let planSummary = {};

function analysePlanstrassen() {
  planSummary = {};
  output.innerHTML = "";

  const text = lvText.value;
  const regex = /(Planstraße\s+[A-Z][^,\n]*)/gi;
  let match;

  while ((match = regex.exec(text)) !== null) {
    const plan = match[1].trim();
    const start = match.index;
    const end = regex.lastIndex;
    const fragment = text.substring(start, start + 600);

    if (!planSummary[plan]) {
      planSummary[plan] = {
        fragments: [],
        risks: new Set()
      };
    }

    const t = fragment.toLowerCase();
    if (t.includes("abweich") || t.includes("mehr")) planSummary[plan].risks.add("Afwijkingen / meerwerk mogelijk");
    if (t.includes("hand")) planSummary[plan].risks.add("Handmatig werk te verwachten");
    if (t.includes("nicht enthalten") || t.includes("optional")) planSummary[plan].risks.add("Niet volledig in contract opgenomen");

    planSummary[plan].fragments.push(fragment);
  }

  Object.keys(planSummary).forEach(plan => {
    const kleur =
      plan.includes("A") ? "pa" :
      plan.includes("B") ? "pb" :
      plan.includes("C") ? "pc" :
      plan.includes("D") ? "pd" : "px";

    const risico = [...planSummary[plan].risks];

    const div = document.createElement("div");
    div.className = `plan ${kleur}`;
    div.innerHTML = `
<h3>${plan}</h3>

<strong>Context</strong>
<p>
Werkzaamheden binnen deze Planstraße vormen één aaneengesloten werkvak.
Uitvoering en planning moeten hier als geheel worden gestuurd.
</p>

<strong>Uitvoering – wat is hier cruciaal</strong>
<ul>
  <li>Werkzaamheden uitsluitend binnen dit straattracé uitvoeren</li>
  <li>Werkvolgorde en productie per straat bewaken</li>
  <li>Overgang naar volgende Planstraße expliciet afstemmen</li>
</ul>

<strong>Risico’s & faalkosten</strong>
${risico.length ? "<ul>" + risico.map(r => "<li>"+r+"</li>").join("") + "</ul>" : "<p>Geen expliciete risico’s genoemd in LV.</p>"}
`;
    output.appendChild(div);
  });
}

/* ===== UITVOERDERS-PDF ===== */

function exportUitvoerderPDF() {
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF();
  let y = 10;

  pdf.setFontSize(12);
  pdf.text("Uitvoerderssamenvatting per Planstraße",10,y);
  y += 10;
  pdf.setFontSize(10);

  Object.keys(planSummary).forEach(plan => {
    const risks = [...planSummary[plan].risks];
    const textBlock = `
${plan}

Context:
Dit straatvak wordt als één samenhangend geheel uitgevoerd.

Belangrijk voor uitvoering:
- Werk beperken tot dit tracé
- Productie en werkvolgorde per straat sturen
- Overgang naar andere straten expliciet plannen

Risico’s:
- ${risks.length ? risks.join("\n- ") : "Geen expliciete risico’s benoemd"}
`;
    const txt = pdf.splitTextToSize(textBlock,180);
    if (y + txt.length * 5 > 280) {
      pdf.addPage(); y = 10;
    }
    pdf.text(txt,10,y);
    y += txt.length * 5 + 8;
  });

  pdf.save("uitvoerderssamenvatting-planstrassen.pdf");
}
</script>

</body>
</html>
