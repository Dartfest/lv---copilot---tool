<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>LV Tool (Simple Pro)</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body { font-family: Arial; padding:20px; background:#f4f6f8; }
input, textarea { width:100%; margin:5px 0; }
button { margin:5px 0; }

.section { background:#fff; padding:10px; margin:10px 0; }
.bar { height:16px; border-radius:4px; }
.critical { background:red; }
.normal { background:blue; }
</style>
</head>

<body>

<h1>LV Tool</h1>

<div id="login">
<h3>Login</h3>
<input id="user" placeholder="gebruikersnaam">
<button onclick="login()">Start</button>
</div>

<div id="app" style="display:none;">

<h3>Nieuw project</h3>
<input id="projectName" placeholder="Project naam">
<textarea id="lvText" placeholder="Plak hier je LV tekst"></textarea>
<button onclick="saveProject()">Opslaan</button>
<button onclick="analyse()">Analyse</button>
<button onclick="exportPDF()">Export PDF</button>

<h3>Projecten</h3>
<div id="projects"></div>

<div id="result"></div>

</div>

<script>

let currentUser="";

// ===== LOGIN =====
function login(){
  currentUser=document.getElementById("user").value;
  localStorage.setItem("user",currentUser);

  document.getElementById("login").style.display="none";
  document.getElementById("app").style.display="block";

  loadProjects();
}

// ===== SAVE =====
function saveProject(){

  let projects = JSON.parse(localStorage.getItem("projects")||"[]");

  projects.push({
    user:currentUser,
    name:document.getElementById("projectName").value,
    text:document.getElementById("lvText").value
  });

  localStorage.setItem("projects",JSON.stringify(projects));
  loadProjects();
}

// ===== LOAD =====
function loadProjects(){

  let projects = JSON.parse(localStorage.getItem("projects")||"[]");

  document.getElementById("projects").innerHTML =
    projects.filter(p=>p.user===currentUser).map(p=>`
      <div class="section">
        <b>${p.name}</b>
        <button onclick="openProject('${p.text}')">Open</button>
      </div>
    `).join("");
}

function openProject(text){
  document.getElementById("lvText").value=text;
}

// ===== ANALYSE =====
function analyse(){

  let t=document.getElementById("lvText").value.toLowerCase();

  let risico=[];
  let claims=[];
  let acties=[];

  if(t.includes("drittfirmen")){
    risico.push("Afhankelijkheid derden");
    claims.push("Vertraging derden → claimbaar");
    acties.push("Afstemmen met nutsbedrijven");
  }

  if(t.includes("nicht vergütet")){
    risico.push("Kosten niet vergoed");
    claims.push("Meerwerk mogelijk");
  }

  if(t.includes("nicht parallel")){
    risico.push("Geen parallel werk");
    acties.push("Strikte fasering");
  }

  let html=`
  <div class="section">
    <h3>Risico's</h3>
    <ul>${risico.map(r=>`<li>${r}</li>`).join("")}</ul>
  </div>

  <div class="section">
    <h3>Claims</h3>
    <ul>${claims.map(c=>`<li>${c}</li>`).join("")}</ul>
  </div>

  <div class="section">
    <h3>Acties</h3>
    <ul>${acties.map(a=>`<li>${a}</li>`).join("")}</ul>
  </div>
  `;

  document.getElementById("result").innerHTML=html;
}

// ===== PDF =====
function exportPDF(){

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  doc.text("LV Analyse",10,10);
  doc.text(document.getElementById("result").innerText,10,20);

  doc.save("analyse.pdf");
}

</script>

</body>
</html>
