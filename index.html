<script>

// ===== PARSE =====
function parsePhases(t){

  let lines = t.split("\n");
  let phases = [];

  lines.forEach(line => {

    let m = line.match(/(\d+)\.\s*bauabschnitt.*?planstraße\s*([a-z]).*?(teil\s*\d)?/i);

    if(m){
      phases.push({
        nr: parseInt(m[1]),
        plan: m[2].toUpperCase(),
        teil: m[3] ? m[3].toUpperCase() : "",
        name: `Bauabschnitt ${m[1]} - Planstraße ${m[2].toUpperCase()} ${m[3] ? m[3].toUpperCase() : ""}`,
      });
    }

  });

  return phases.sort((a,b)=>a.nr-b.nr);
}

// ===== CPM PLANNING =====
function buildPlanning(phases){

  let current = 0;

  return phases.map(p=>{

    let duur = 6; // standaard 6 maanden (aanpasbaar)

    let start = current;
    let end = start + duur;

    current = end;

    return {
      ...p,
      start,
      end,
      duur,
      kritisch: true // alles in serie = kritisch
    };

  });
}

// ===== TIJD FORMAT =====
function format(v){
  let y = Math.floor(v/12);
  let m = v % 12;
  return `${m}/${y}`;
}

// ===== GANTT =====
function buildGantt(phases){

  let max = Math.max(...phases.map(p=>p.end));

  return `
  <div class="section">
    <h2>Planning + Kritieke Pad</h2>

    ${phases.map(p=>{

      let left = (p.start / max) * 100;
      let width = (p.duur / max) * 100;

      return `
      <div style="margin-bottom:12px">

        <b>${p.name}</b> 
        <span class="high">(Kritiek)</span><br>
        ${format(p.start)} → ${format(p.end)} (${p.duur} mnd)

        <div style="background:#ddd;height:20px;position:relative;border-radius:4px;">

          <div style="
            position:absolute;
            left:${left}%;
            width:${width}%;
            height:100%;
            background:#dc2626;
            border-radius:4px;
          "></div>

        </div>

      </div>
      `;
    }).join("")}

  </div>
  `;
}

// ===== MAIN =====
function analyse(){

  let t = lvText.value.toLowerCase();
  if(!t) return;

  let phases = parsePhases(t);
  let planning = buildPlanning(phases);

  out.innerHTML = `

    ${buildGantt(planning)}

    <div class="section">
      <h2>Kritieke Pad Analyse</h2>

      <p>
      Alle fases zijn onderling afhankelijk en worden sequentieel uitgevoerd. 
      Dit betekent dat er geen parallelle uitvoering mogelijk is en dat elke fase 
      direct invloed heeft op de totale projectduur.
      </p>

      <p>
      Het kritieke pad loopt van Bauabschnitt 1 t/m Bauabschnitt ${phases.length}. 
      Vertraging in één van deze fases leidt direct tot vertraging van het gehele project.
      </p>

      <p class="high">
      Conclusie: volledige planning is kritisch – geen buffer aanwezig.
      </p>

    </div>
  `;
}

</script>
