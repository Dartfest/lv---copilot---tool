<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>LV‑fasen → Uitvoerderssamenvatting</title>

<!-- PDF.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
  "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
</script>

<!-- jsPDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body { font-family: Arial, sans-serif; background:#f4f6f8; padding:20px; }
.box { background:#fff; padding:16px; border-radius:6px; margin-bottom:20px; }
textarea { width:100%; min-height:160px; font-family:monospace; padding:10px; }
button { padding:6px 12px; margin:4px 6px 4px 0; }

.phase { padding:14px; border-left:8px solid; border-radius:6px; margin-top:16px; }
.phase1 { background:#f3e8ff; border-color:#9333ea; } /* paars */
.phase2 { background:#e0f2fe; border-color:#0284c7; } /* blauw */
.phase3 { background:#dcfce7; border-color:#16a34a; } /* groen */
.phase4 { background:#ffedd5; border-color:#ea580c; } /* oranje */
.phaseX { background:#f3f4f6; border-color:#6b7280; } /* grijs */

ul { margin-left:18px; }
</style>
</head>

<body>

<h1>LV‑fasen → Uitvoerderssamenvatting</h1>

<div class="box">
  <h2>1. LV‑PDF(s)</h2>
  <input type="file" id="lvFiles" multiple accept=".pdf">
  <button onclick="readLV()">Lees LV</button>
  <textarea id="lvText" placeholder="LV‑tekst verschijnt hier..."></textarea>
</div>

<div class="box">
  <h2>2. Analyse per LV‑fase</h2>
  <button onclick="analyseFasen()">Analyseer LV‑fasen</button>
  <button onclick="exportUitvoerderPDF()">📄 PDF – Uitvoerderssamenvatting</button>
  <div id="output"></div>
</div>

<script>
async function readPDF(file) {
  const buffer = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: buffer }).promise;
  let text = "";
  for (let p = 1; p <= pdf.numPages; p++) {
    const page = await pdf.getPage(p);
    const c = await page.getTextContent();
    text += c.items.map(i => i.str).join(" ") + "\n";
  }
  return text;
}

async function readLV() {
  let t="";
  for (const f of lvFiles.files) t += await readPDF(f);
  lvText.value = t;
}

/* ===== LV-FASEN ANALYSE ===== */
let faseData = [];

function analyseFasen() {
  faseData = [];
  output.innerHTML = "";

  const text = lvText.value;
  const chunks = text.split(/(Fase\s+\d+|Bauabschnitt\s+\w+|Abschnitt\s+\w+)/i);

  for (let i = 1; i < chunks.length; i += 2) {
    const titel = chunks[i].trim();
    const inhoud = chunks[i + 1] || "";

    const t = inhoud.toLowerCase();
    const risico = [];
    if (t.includes("abweich") || t.includes("meerwerk"))
      risico.push("Afwijkingen / meerwerk genoemd");
    if (t.includes("nach maßgabe") || t.includes("gemäß"))
      risico.push("Uitvoering strikt volgens voorwaarden");
    if (t.includes("optional") || t.includes("wenn erforderlich"))
      risico.push("Onzeker scope‑element");

    let kleur = "phaseX";
    if (titel.match(/1/)) kleur = "phase1";
    else if (titel.match(/2/)) kleur = "phase2";
    else if (titel.match(/3/)) kleur = "phase3";
    else if (titel.match(/4/)) kleur = "phase4";

    faseData.push({ titel, risico });

    const d = document.createElement("div");
    d.className = `phase ${kleur}`;
    d.innerHTML = `
<h3>${titel}</h3>

<strong>Belangrijk voor uitvoering:</strong>
<ul>
  <li>Werkzaamheden uitsluitend binnen deze fasegrenzen</li>
  <li>Afstemming planning met overige fasen</li>
</ul>

<strong>Risico’s / aandachtspunten:</strong>
${risico.length ? "<ul>" + risico.map(r => "<li>"+r+"</li>").join("") + "</ul>" : "<p>Geen expliciete risico’s benoemd.</p>"}
`;
    output.appendChild(d);
  }
}

/* ===== UITVOERDERS-PDF ===== */
function exportUitvoerderPDF() {
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF();
  let y = 10;

  pdf.setFontSize(12);
  pdf.text("Uitvoerderssamenvatting – LV‑fasen", 10, y);
  y += 10;
  pdf.setFontSize(10);

  faseData.forEach(f => {
    const blok = `
${f.titel}

Uitvoering:
- Werk uitvoeren binnen fase-afbakening
- Afstemmen met aangrenzende fasen
- Planning kritisch volgen

Risico’s:
- ${f.risico.length ? f.risico.join("\n- ") : "Geen expliciete risico’s"}
`;
    const text = pdf.splitTextToSize(blok, 180);
    if (y + text.length * 5 > 280) {
      pdf.addPage();
      y = 10;
    }
    pdf.text(text, 10, y);
    y += text.length * 5 + 8;
  });

  pdf.save("uitvoerderssamenvatting-LV-fasen.pdf");
}
</script>

</body>
</html>
