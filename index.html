<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>LV Analyse Tool (compleet)</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>
body { font-family: Arial; padding:20px; background:#f4f6f8; }
textarea { width:100%; height:250px; font-family:monospace; }
button { padding:8px 14px; margin:8px 0; }
.box { background:#fff; padding:15px; margin-bottom:15px; border-radius:6px; }
.plan { background:#eef6ff; border-left:4px solid #2563eb; padding:10px; margin:10px 0; }
.muted { color:#666; font-size:0.9em; }
.fase { background:#f1f5f9; padding:8px; margin:6px 0; border-radius:4px; }
.gap { background:#fff4e5; padding:6px; margin:4px 0; border-radius:4px; }
.risk { background:#ffe4e6; padding:6px; margin:4px 0; border-radius:4px; }
</style>
</head>

<body>

<h1>LV Analyse (tijdlijn + risico + NL)</h1>

<div class="box">
<input type="file" id="file" accept=".pdf">
<button onclick="leesLV()">Lees PDF</button>
<textarea id="lvText"></textarea>
</div>

<div class="box">
<button onclick="analyse()">Analyse</button>
<div id="result"></div>
</div>

<script>

// ================= CACHE =================
const cache = {};

// ================= VERTALING =================
async function vertaal(t){

  if(cache[t]) return cache[t];

  await new Promise(r => setTimeout(r, 150));

  // LibreTranslate
  try{
    const res = await fetch("https://libretranslate.de/translate", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ q: t, source: "de", target: "nl" })
    });
    const data = await res.json();
    if(data.translatedText) return cache[t] = data.translatedText;
  }catch(e){}

  // MyMemory fallback
  try{
    const res2 = await fetch(
      "https://api.mymemory.translated.net/get?q=" 
      + encodeURIComponent(t) + "&langpair=de|nl"
    );
    const data2 = await res2.json();
    if(data2.responseData?.translatedText){
      return cache[t] = data2.responseData.translatedText;
    }
  }catch(e){}

  // basis fallback
  let r = t.toLowerCase();
  const dict = {
    "arbeiten":"werkzaamheden","bau":"bouw","kanal":"riolering",
    "leitung":"leiding","kabel":"kabel","herstellung":"aanleg",
    "rückbau":"sloop","müssen":"moeten","werden":"worden",
    "abgestimmt":"afgestemd"
  };
  Object.keys(dict).forEach(k=> r = r.replaceAll(k, dict[k]));

  return cache[t] = r;
}

// ================= PDF =================
async function leesLV(){
  const f = document.getElementById("file").files[0];
  if(!f) return alert("Kies PDF");

  const buffer = await f.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({data:buffer, disableWorker:true}).promise;

  let text="";
  for(let i=1;i<=pdf.numPages;i++){
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    content.items.forEach(it => text += it.str + "\n");
  }

  document.getElementById("lvText").value = text;
}

// ================= DATUM =================
function parseDate(d){
  const p = d.split(/[.\-]/);
  if(p.length!==3) return null;
  return new Date(p[2], p[1]-1, p[0]);
}

// ================= SAMENVATTING =================
function samenvatting(frag){
  const regels = frag.split("\n");
  const keys = ["bau","arbeiten","kanal","kabel","leitung"];
  return regels.filter(r => keys.some(k => r.toLowerCase().includes(k))).slice(0,5);
}

// ================= MERGE =================
function mergeTijd(tijd){
  if(!tijd.length) return [];
  tijd.sort((a,b)=>a.start-b.start);

  let merged=[tijd[0]];

  for(let i=1;i<tijd.length;i++){
    let last=merged[merged.length-1];
    let cur=tijd[i];

    if(cur.start <= last.end){
      last.end = new Date(Math.max(last.end, cur.end));
    } else {
      merged.push(cur);
    }
  }
  return merged;
}

// ================= GAPS =================
function berekenGaten(tijd){
  let gaps=[];
  for(let i=1;i<tijd.length;i++){
    if(tijd[i].start > tijd[i-1].end){
      gaps.push({start:tijd[i-1].end,end:tijd[i].start});
    }
  }
  return gaps;
}

// ================= TOTAAL PERIODE =================
function totaalPeriode(tijd){

  if(!tijd.length) return null;

  let start = tijd[0].start;
  let end = tijd[0].end;

  tijd.forEach(t=>{
    if(t.start < start) start = t.start;
    if(t.end > end) end = t.end;
  });

  return {start, end};
}

// ================= RISICO =================
function risico(d, gaps){

  let r=[];

  if(d.tijd.length > 1){
    r.push("Gefaseerde uitvoering → extra afstemming nodig");
  }

  if(gaps.length){
    r.push("Onderbrekingen in planning → kans op stilstand");
  }

  d.tijd.forEach(t=>{
    let days = (t.end - t.start)/(1000*60*60*24);
    if(days < 7){
      r.push("Zeer korte fase → hoge werkdruk / faalkans");
    }
  });

  if(!d.tijd.length){
    r.push("Geen duidelijke planning → uitvoeringsrisico");
  }

  return r.length ? r : ["Geen directe risico’s zichtbaar"];
}

// ================= ANALYSE =================
async function analyse(){

  const text = document.getElementById("lvText").value;
  const out = document.getElementById("result");
  out.innerHTML="";

  const planRegex = /Planstra(ß|ss)e[\s]+([A-Z])/gi;
  const exactRegex = /(\d{1,2}[.\-]\d{1,2}[.\-]\d{4}).*?(\d{1,2}[.\-]\d{1,2}[.\-]\d{4})/gi;

  let data={}, m;

  while((m=planRegex.exec(text))!==null){

    const plan="Planstraße "+m[2];
    if(!data[plan]) data[plan]={tijd:[], sam:[]};

    const frag = text.slice(m.index, m.index+2000);

    let d;
    while((d=exactRegex.exec(frag))){
      const s=parseDate(d[1]);
      const e=parseDate(d[2]);
      if(s&&e) data[plan].tijd.push({start:s,end:e});
    }

    samenvatting(frag).forEach(s=>{
      if(!data[plan].sam.includes(s)) data[plan].sam.push(s);
    });
  }

  // OUTPUT
  for(const [plan,d] of Object.entries(data)){

    d.tijd = mergeTijd(d.tijd);
    const gaps = berekenGaten(d.tijd);
    const totaal = totaalPeriode(d.tijd);

    const div=document.createElement("div");
    div.className="plan";

    div.innerHTML=`
    <strong>${plan}</strong>

    ${
      totaal
      ? `<p><b>Periode totaal:</b> ${totaal.start.toLocaleDateString()} → ${totaal.end.toLocaleDateString()}</p>`
      : `<p class="muted">Geen totale periode</p>`
    }

    <b>Fasen:</b>
    ${d.tijd.map((t,i)=>`
      <div class="fase">
        Fase ${i+1}: ${t.start.toLocaleDateString()} → ${t.end.toLocaleDateString()}
      </div>`).join("")}

    <b>Onderbrekingen:</b>
    ${gaps.length
      ? gaps.map(g=>`<div class="gap">${g.start.toLocaleDateString()} → ${g.end.toLocaleDateString()}</div>`).join("")
      : `<div class="muted">Geen</div>`}

    <b>Risico's:</b>
    ${risico(d,gaps).map(r=>`<div class="risk">${r}</div>`).join("")}

    <b>Werkzaamheden:</b>
    <ul class="werk"></ul>
    `;

    out.appendChild(div);

    const lijst = div.querySelector(".werk");

    for(const s of d.sam){
      const li = document.createElement("li");
      li.innerHTML = `${s}<br><span class="muted">→ vertalen...</span>`;
      lijst.appendChild(li);

      const v = await vertaal(s);
      li.innerHTML = `${s}<br><span class="muted">→ ${v}</span>`;
    }
  }
}

</script>

</body>
</html>
