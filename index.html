<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>LV Intelligence – Directie Analyse</title>

<style>
body { font-family: Arial; margin:0; background:#eef2f7; }
.header { background:#0f172a; color:#fff; padding:15px; font-size:22px; }
.container { padding:20px; }

textarea { width:100%; height:140px; margin-bottom:10px; }

button {
  padding:10px 15px;
  background:#2563eb;
  color:#fff;
  border:none;
  cursor:pointer;
}

.section { background:#fff; padding:20px; margin-top:15px; border-radius:10px; }

.high { color:#dc2626; }
.mid { color:#f59e0b; }

.card { background:#f9fafb; padding:10px; margin-top:8px; border-radius:6px; }
</style>
</head>

<body>

<div class="header">LV Intelligence – Directie Analyse</div>

<div class="container">

<input type="file" id="pdfFile" accept=".pdf"><br><br>

<textarea id="lvText" placeholder="Plak LV tekst of upload PDF"></textarea>

<button onclick="analyse()">Analyse</button>

<div id="out"></div>

</div>

<script>

// ===== PDF =====
function loadScript(url){
  return new Promise(res=>{
    let s=document.createElement("script");
    s.src=url;
    s.onload=res;
    document.body.appendChild(s);
  });
}

async function handlePDF(file){

  if(typeof pdfjsLib==="undefined"){
    await loadScript("https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js");
  }

  let reader=new FileReader();

  reader.onload=async function(){
    let pdf=await pdfjsLib.getDocument(new Uint8Array(this.result)).promise;
    let text="";

    for(let i=1;i<=pdf.numPages;i++){
      let page=await pdf.getPage(i);
      let c=await page.getTextContent();
      text+=c.items.map(i=>i.str).join(" ")+"\n";
    }

    lvText.value=text;
  };

  reader.readAsArrayBuffer(file);
}

pdfFile.onchange=e=>{
  if(e.target.files[0]) handlePDF(e.target.files[0]);
};

// ===== STRUCTUUR =====
const fases = [
  {id:1, name:"Bauabschnitt 1", plan:"planstraße c"},
  {id:2, name:"Bauabschnitt 2", plan:"planstraße e"},
  {id:3, name:"Bauabschnitt 3", plan:"planstraße d teil 1"},
  {id:4, name:"Bauabschnitt 4", plan:"planstraße d teil 2"}
];

// ===== PLANNING =====
function buildPlanning(){

  let startYear = 2025;
  let startMonth = 1;

  return fases.map((f,i)=>{

    let start = startMonth + (i*6);
    let end = start + 5;

    let sY = startYear + Math.floor((start-1)/12);
    let sM = ((start-1)%12)+1;

    let eY = startYear + Math.floor((end-1)/12);
    let eM = ((end-1)%12)+1;

    return {
      ...f,
      periode: `${sM}/${sY} → ${eM}/${eY}`
    };
  });
}

// ===== TEKST PER FASE =====
function getPhaseText(text, fase){

  let idx = text.indexOf(fase.plan);
  if(idx === -1) return "";

  return text.substring(idx, idx + 2000);
}

// ===== WERKZAAMHEDEN =====
function extractWork(text){

  let lines = text.split(".");
  
  return lines
    .filter(l => 
      l.includes("bau") || 
      l.includes("verlegen") || 
      l.includes("herstellen") || 
      l.includes("einbau") ||
      l.includes("anschluss")
    )
    .slice(0,6)
    .map(l => `<li>${l.trim()}</li>`)
    .join("");
}

// ===== RISICO =====
function risico(){

  return `
  <ul>
    <li class="high">Volledig sequentiële uitvoering → geen buffer in planning</li>
    <li class="high">Afhankelijkheid derden (nutsbedrijven / vergunningen)</li>
    <li class="mid">Logistieke beperkingen binnen werkgebied</li>
    <li class="mid">Contractuele risico’s (niet-vergoede werkzaamheden)</li>
  </ul>
  `;
}

// ===== SAMENVATTING =====
function summary(f){

  return `
  <p>
  ${f.name} (${f.plan}) vormt een essentiële fase binnen het project en bepaalt direct de voortgang van de uitvoering.
  Binnen deze fase worden werkzaamheden uitgevoerd die sterk afhankelijk zijn van voorgaande fases.
  </p>

  <p>
  De uitvoering is gefaseerd en laat geen parallelle werkzaamheden toe, waardoor een kritieke keten ontstaat zonder speling.
  Eventuele vertraging leidt direct tot projectvertraging.
  </p>

  <p>
  Logistiek, bereikbaarheid en afstemming met derden spelen een cruciale rol in deze fase.
  Daarnaast brengen contractuele voorwaarden extra risico’s met zich mee.
  </p>

  <p class="high">
  Conclusie: deze fase is kritisch voor planning, uitvoering en kostenbeheersing.
  </p>
  `;
}

// ===== MAIN =====
function analyse(){

  let text = lvText.value.toLowerCase();
  let planning = buildPlanning();

  out.innerHTML = planning.map(f=>{

    let t = getPhaseText(text, f);
    let work = extractWork(t);

    return `
    <div class="section">

      <h2>${f.name} – ${f.plan.toUpperCase()}</h2>

      <h3>Periode</h3>
      <p><b>${f.periode}</b></p>

      ${summary(f)}

      <h3>Werkzaamheden</h3>
      <ul>${work || "<li>Geen specifieke werkzaamheden gedetecteerd</li>"}</ul>

      <h3>Risico’s</h3>
      ${risico()}

    </div>
    `;
  }).join("");
}

</script>

</body>
</html>
