<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>LV Analyse (No API AI Tool)</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>
body { font-family: Arial; padding:20px; background:#f4f6f8; }
textarea { width:100%; height:140px; margin-bottom:10px; }
button { padding:6px 10px; margin:4px; }
.box { background:#fff; padding:15px; margin-bottom:15px; border-radius:6px; }
.chunk { border:1px solid #ddd; padding:10px; margin-bottom:10px; }
</style>
</head>

<body>

<h1>LV Analyse Tool (Zonder API)</h1>

<div class="box">
<input type="file" id="file" accept=".pdf">
<button onclick="leesLV()">Lees PDF</button>
<button onclick="openChatGPT()">Open ChatGPT</button>
<textarea id="lvText"></textarea>
</div>

<div class="box">
<button onclick="splitLV()">Split LV</button>
<div id="chunks"></div>
</div>

<div class="box">
<h3>Eindanalyse prompt</h3>
<button onclick="genFinal()">Genereer</button>
<button onclick="copyFinal()">Kopieer</button>
<textarea id="finalPrompt"></textarea>
</div>

<script>

// ===== OPEN CHATGPT =====
function openChatGPT(){
  window.open("https://chat.openai.com", "_blank");
}

// ===== PDF =====
async function leesLV(){
  const f = document.getElementById("file").files[0];
  if(!f) return alert("Kies PDF");

  const buffer = await f.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({data:buffer}).promise;

  let text="";
  for(let i=1;i<=pdf.numPages;i++){
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    content.items.forEach(it => text += it.str + " ");
  }

  document.getElementById("lvText").value = text;
}

// ===== SPLIT =====
let parts=[];

function splitLV(){

  const text = document.getElementById("lvText").value;
  const size = 2500;

  parts = [];
  for(let i=0;i<text.length;i+=size){
    parts.push(text.substring(i,i+size));
  }

  const div = document.getElementById("chunks");
  div.innerHTML="";

  parts.forEach((p,i)=>{

    const prompt = `
Analyseer dit deel van een LV als werkvoorbereider:

- samenvatting
- werkzaamheden
- planning
- risico's

${p}
    `;

    div.innerHTML += `
    <div class="chunk">
      <b>Deel ${i+1}</b><br>
      <button onclick="copyText(${i})">Kopieer</button>
      <textarea id="chunk${i}">${prompt}</textarea>
    </div>`;
  });
}

// ===== COPY =====
function copyText(i){
  const t = document.getElementById("chunk"+i);
  t.select();
  document.execCommand("copy");
  alert("Gekopieerd!");
}

// ===== FINAL PROMPT =====
function genFinal(){

  const prompt = `
Maak een volledige LV analyse op basis van onderstaande deelanalyses.

Structuur:

1. Uitgebreide samenvatting
2. Scope werkzaamheden
3. Fasering
4. Planning totaal
5. Contractanalyse
6. Risico's:
   - planning
   - contract
   - uitvoering
   - omgeving

Plak hieronder alle deelanalyses:
`;

  document.getElementById("finalPrompt").value = prompt;
}

function copyFinal(){
  const t = document.getElementById("finalPrompt");
  t.select();
  document.execCommand("copy");
  alert("Eindprompt gekopieerd!");
}

</script>

</body>
</html>
