<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>LV – Planstraße analyse</title>

  <!-- ✅ PDF.js CORRECT GELADEN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
  </script>

  <style>
    body { font-family: Arial, sans-serif; padding:20px; background:#f4f6f8; }
    textarea { width:100%; min-height:260px; font-family:monospace; white-space:pre-wrap; }
    button { padding:6px 12px; margin-top:6px; }
    .box { background:#fff; padding:16px; border-radius:6px; margin-bottom:16px; }
    .plan { border-left:4px solid #2563eb; background:#eff6ff; padding:8px; margin:8px 0; }
    .ok { color:green; font-weight:bold; }
  </style>
</head>

<body>

<h1>LV – Planstraße analyse</h1>
<p class="ok">✅ pdf.js correct geladen</p>

<div class="box">
  <h2>1. LV lezen</h2>
  <input type="file" id="file" accept=".pdf"><br>
  <button onclick="leesLV()">Lees LV</button>
  <textarea id="lvText" placeholder="LV‑tekst verschijnt hier..."></textarea>
</div>

<div class="box">
  <h2>2. Analyse Planstraßen</h2>
  <button onclick="analyse()">Analyseer</button>
  <div id="result"></div>
</div>

<script>
/* ===== LV LEZEN (NOOIT FILTEREN) ===== */
async function leesLV() {
  const f = document.getElementById("file").files[0];
  if (!f) {
    alert("Kies eerst een PDF");
    return;
  }

  const buf = await f.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: buf }).promise;

  let text = "";
  for (let p = 1; p <= pdf.numPages; p++) {
    const page = await pdf.getPage(p);
    const content = await page.getTextContent();
    for (const item of content.items) {
      text += item.str + "\n";
    }
    text += "\n";
  }

  document.getElementById("lvText").value = text;
}

/* ===== ANALYSE PLANSTRASSE ===== */
function analyse() {
  const text = document.getElementById("lvText").value;
  const out = document.getElementById("result");
  out.innerHTML = "";

  if (!text.trim()) {
    out.textContent = "Geen LV‑tekst beschikbaar.";
    return;
  }

  // Ondersteunt Planstraße en Planstrasse + PDF‑spaties
  const planRegex = /Planstra(ß|ss)e[\s\u00A0]+([A-Z])/gi;
  const data = new Set();
  let m;

  while ((m = planRegex.exec(text)) !== null) {
    data.add("Planstraße " + m[2]);
  }

  if (!data.size) {
    out.textContent = "Geen Planstraßen gevonden.";
    return;
  }

  data.forEach(p => {
    const div = document.createElement("div");
    div.className = "plan";
    div.textContent = p;
    out.appendChild(div);
  });
}
</script>

</body>
</html>
