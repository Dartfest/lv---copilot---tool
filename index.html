<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Dashboard + Inbox</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  display: flex;
}

.sidebar {
  width: 200px;
  background: #222;
  color: white;
  height: 100vh;
  padding: 20px;
}

.sidebar a {
  color: white;
  display: block;
  margin-bottom: 10px;
  text-decoration: none;
  cursor: pointer;
}

.content {
  flex: 1;
  padding: 20px;
}

.item {
  border: 1px solid #ccc;
  margin-bottom: 10px;
  padding: 10px;
  border-radius: 5px;
}

.top {
  display: flex;
  justify-content: space-between;
}

.hidden {
  display: none;
}
</style>

<script>
function showPage(page) {
  document.getElementById("dashboard").classList.add("hidden");
  document.getElementById("inbox").classList.add("hidden");

  document.getElementById(page).classList.remove("hidden");
}
</script>

</head>

<body>

<div class="sidebar">
  <h2>Menu</h2>

  <a onclick="showPage('dashboard')">Dashboard</a>
  <a onclick="showPage('inbox')">Inbox</a>

</div>

<div class="content">

  <!-- DASHBOARD -->
  <div id="dashboard">
    <h1>Dashboard</h1>
    <p>Welkom bij je tool 👍</p>
  </div>

  <!-- INBOX -->
  <div id="inbox" class="hidden">
    <h1>Inbox</h1>

    <div class="item">
      <div class="top">
        <strong>Kanalbau Dortmund</strong>
        ⭐
      </div>
      <div>Dortmund • Stadt Dortmund</div>
      <div>📅 01-07-2026 | 🟢 Score: 75</div>
    </div>

    <div class="item">
      <div class="top">
        <strong>Tiefbau Essen</strong>
        ⭐
      </div>
      <div>Essen • Stadt Essen</div>
      <div>📅 15-07-2026 | 🟡 Score: 65</div>
    </div>

    <div class="item">
      <div class="top">
        <strong>Erschließung Bochum</strong>
        ⭐
      </div>
      <div>Bochum • Stadt Bochum</div>
      <div>📅 20-07-2026 | 🔴 Score: 45</div>
    </div>

  </div>

</div>

</body>
</html>
