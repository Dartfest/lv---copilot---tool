<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>LV – Tijdvakken per Planstraße</title>

  <!-- ✅ pdf.js CORRECT -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdftyle>
    body { font-family: Arial, sans-serif; padding: 20px; background:#f4f6f8; }
    textarea { width:100%; height:260px; font-family:monospace; white-space:pre-wrap; }
    button { padding:6px 12px; margin:6px 0; }
    .box { background:#fff; padding:16px; border-radius:6px; margin-bottom:16px; }
    .plan {
      border-left:4px solid #2563eb;
      background:#eff6ff;
      padding:10px;
      margin:10px 0;
    }
    .muted { color:#666; font-size:0.9em; }
  </style>
</head>

<body>

<h1>LV – Tijdvakken per Planstraße</h1>

<div class="box">
  <h2>1. LV lezen</h2>
  <input type="file" id="file" accept=".pdf"><br>
  <button onclick="leesLV()">Lees LV</button>
  <textarea id="lvText" placeholder="LV-tekst verschijnt hier..."></textarea>
</div>

<div class="box">
  <h2>2. Tijdvakken uit LV</h2>
  <button onclick="toonTijdvakken()">Toon LV‑tijdvakken</button>
  <div id="result"></div>
</div>

<script>
async function leesLV() {
  const f = document.getElementById("file").files[0];
  if (!f) return alert("Kies eerst een PDF");

  const buffer = await f.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({
    data: buffer,
    disableWorker: true
  }).promise;

  let text = "";
  for (let i = 1; i <= pdf.numPages; i++) {
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    for (const item of content.items) {
      text += item.str + "\n";
    }
    text += "\n";
  }

  document.getElementById("lvText").value = text;
}

function toonTijdvakken() {
  const text = document.getElementById("lvText").value;
  const out = document.getElementById("result");
  out.innerHTML = "";

  if (!text.trim()) {
    out.textContent = "Geen LV‑tekst beschikbaar.";
    return;
  }

  const planRegex = /Planstra(ß|ss)e[\s\u00A0]+([A-Z])/gi;
  const tijdRegex =
    /(vom\s+\d{1,2}[.\-]\d{1,2}[.\-]\d{4}\s+bis\s+\d{1,2}[.\-]\d{1,2}[.\-]\d{4}|
      \d{1,2}[.\-]\d{1,2}[.\-]\d{4}\s*(–|-|bis|t\/m)\s*\d{1,2}[.\-]\d{1,2}[.\-]\d{4}|
      ab\s+\d{1,2}[.\-]\d{1,2}[.\-]\d{4}|
      bis\s+\d{1,2}[.\-]\d{1,2}[.\-]\d{4}|
      KW\s*\d+\s*(–|-)\s*\d+)/gi;

  const data = {};
  let m;

  while ((m = planRegex.exec(text)) !== null) {
    const plan = "Planstraße " + m[2];
    if (!data[plan]) data[plan] = [];

    const frag = text.substring(m.index, m.index + 1500);
    let t;
    while ((t = tijdRegex.exec(frag)) !== null) {
      if (!data[plan].includes(t[0])) {
        data[plan].push(t[0]);
      }
    }
  }

  let i = 1;
  Object.entries(data).forEach(([plan, tijden]) => {
    const div = document.createElement("div");
    div.className = "plan";
    div.innerHTML = `
      <strong>${i}. ${plan}</strong>
      ${tijden.length
        ? `<ul>${tijden.map(x => `<li>${x}</li>`).join("")}</ul>`
        : `<p class="muted">Geen tijdvakken gevonden</p>`}
    `;
    out.appendChild(div);
    i++;
  });
}
</script>

</body>
</html>
