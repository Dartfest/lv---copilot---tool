<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kanalbau AI v2.0</title>

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,Helvetica,sans-serif;}

body{background:#eef2f7;display:flex;height:100vh;}

.sidebar{
width:250px;
background:#0f172a;
color:white;
padding:20px;
}

.logo{
font-size:26px;
font-weight:bold;
text-align:center;
margin-bottom:30px;
}

.menu button{
width:100%;
padding:14px;
margin-bottom:10px;
border:none;
background:#1e293b;
color:white;
border-radius:8px;
cursor:pointer;
}

.menu button:hover{background:#2563eb;}

.main{flex:1;padding:25px;overflow:auto;}

.cards{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin-bottom:25px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 3px 10px rgba(0,0,0,.1);
}

.card h2{color:#2563eb;font-size:28px;}

.panel{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 3px 10px rgba(0,0,0,.1);
margin-bottom:20px;
}

textarea{
width:100%;
height:200px;
padding:15px;
border-radius:8px;
border:1px solid #ccc;
}

button.analyse{
margin-top:15px;
padding:14px 25px;
background:#2563eb;
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

.result{
margin-top:20px;
padding:20px;
background:#f8fafc;
border-radius:10px;
}

.green{color:green;font-weight:bold;}
.red{color:red;font-weight:bold;}
.orange{color:orange;font-weight:bold;}

</style>
</head>

<body>

<div class="sidebar">
<div class="logo">KANALBAU AI</div>

<div class="menu">
<button>🏠 Dashboard</button>
<button>📧 Inbox</button>
<button>📁 Projecten</button>
<button>⭐ Favorieten</button>
</div>
</div>

<div class="main">

<div class="cards">
<div class="card">
<h2 id="mailCount">0</h2>
<p>Mails</p>
</div>

<div class="card">
<h2 id="topCount">0</h2>
<p>TOP projecten</p>
</div>

<div class="card">
<h2>100km</h2>
<p>Werkgebied</p>
</div>

<div class="card">
<h2>NRW</h2>
<p>Regio</p>
</div>
</div>

<div class="panel">
<h2>📧 Plak email</h2><br>

<textarea id="mail"></textarea><br>

<button class="analyse" onclick="analyseMail()">Analyseer</button>

<div class="result" id="result">Nog geen analyse</div>
</div>

</div>

<script>

// ===== DATA =====

let keywords = [
{ woord:"kanalbau", score:40 },
{ woord:"tiefbau", score:30 },
{ woord:"erschließung", score:25 },
{ woord:"druckrohr", score:25 },
{ woord:"schmutzwasser", score:20 },
{ woord:"regenwasser", score:15 },
{ woord:"straßenbau", score:15 },
{ woord:"sanitär", score:-70 },
{ woord:"elektro", score:-60 },
{ woord:"dach", score:-60 }
];

let plaatsen = [
"Dülmen","Ahaus","Münster","Bocholt","Borken",
"Vreden","Coesfeld","Gescher","Ibbenbüren"
];

// ===== FUNCTIES =====

function zoekPlaatsen(tekst){
let gevonden=[];

plaatsen.forEach(p=>{
if(tekst.toLowerCase().includes(p.toLowerCase())){
gevonden.push(p);
}
});

return gevonden.length ? gevonden.join(", ") : "Onbekend";
}

function zoekDeadline(tekst){

let regex1 = /\d{1,2}[.-]\d{1,2}[.-]\d{2,4}/g;
let regex2 = /\d{1,2}\s(januari|februari|maart|april|mei|juni|juli|augustus|september|oktober|november|december)\s\d{4}/gi;

let m1 = tekst.match(regex1);
let m2 = tekst.match(regex2);

if(m1) return m1[0];
if(m2) return m2[0];

return "Niet gevonden";
}

function zoekOpdrachtgever(t){

if(t.includes("stadt")) return "Stadt";
if(t.includes("gemeinde")) return "Gemeinde";
if(t.includes("kreis")) return "Kreis";
if(t.includes("gmbh")) return "Bedrijf";

return "Onbekend";
}

let projecten = JSON.parse(localStorage.getItem("projecten")) || [];

function opslaan(p){
projecten.push(p);
localStorage.setItem("projecten", JSON.stringify(projecten));
}

// ===== HOOFDFUNCTIE =====

function analyseMail(){

let originele = document.getElementById("mail").value;
let text = originele.toLowerCase();

let score = 0;
let redenen = [];

// keyword analyse
keywords.forEach(k=>{
if(text.includes(k.woord)){
score += k.score;
redenen.push((k.score>0?"✔ ":"✖ ")+k.woord);
}
});

// extra data
let plaats = zoekPlaatsen(originele);
let deadline = zoekDeadline(originele);
let opdrachtgever = zoekOpdrachtgever(text);

// beoordeling
let status="Niet interessant";
let kleur="red";

if(score>=80){ status="🔥 TOP PROJECT"; kleur="green"; }
else if(score>=60){ status="ZEER INTERESSANT"; kleur="green"; }
else if(score>=40){ status="MOGELIJK INTERESSANT"; kleur="orange"; }

// tellers
document.getElementById("mailCount").innerHTML++;

if(score>=80){
document.getElementById("topCount").innerHTML++;
}

// opslaan
opslaan({plaats,deadline,opdrachtgever,score,status});

// output
document.getElementById("result").innerHTML = `
<h2>Analyse</h2><hr><br>

<b>📍 Plaats:</b> ${plaats}<br>
<b>📅 Deadline:</b> ${deadline}<br>
<b>🏢 Opdrachtgever:</b> ${opdrachtgever}<br><br>

<b>⭐ Score:</b> ${score}/100<br>
<b>Status:</b> <span class="${kleur}">${status}</span><br><br>

<b>Waarom:</b><br><br>
${redenen.join("<br>")}
`;

}

</script>

</body>
</html>
