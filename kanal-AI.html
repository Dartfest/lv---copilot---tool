<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kanalbau AI v1.0</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#eef2f7;
display:flex;
height:100vh;
overflow:hidden;
}

.sidebar{
width:250px;
background:#0f172a;
color:white;
padding:20px;
}

.logo{
font-size:28px;
font-weight:bold;
margin-bottom:30px;
text-align:center;
}

.menu button{
width:100%;
padding:15px;
margin-bottom:10px;
border:none;
background:#1e293b;
color:white;
cursor:pointer;
border-radius:8px;
font-size:16px;
}

.menu button:hover{
background:#2563eb;
}

.main{
flex:1;
padding:25px;
overflow:auto;
}

.cards{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin-bottom:25px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 3px 10px rgba(0,0,0,.1);
}

.card h2{
color:#2563eb;
font-size:34px;
}

.card p{
margin-top:8px;
color:#666;
}

.panel{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 3px 10px rgba(0,0,0,.1);
margin-bottom:20px;
}

textarea{
width:100%;
height:220px;
padding:15px;
font-size:15px;
border-radius:8px;
border:1px solid #ccc;
resize:vertical;
}

button.analyse{
margin-top:15px;
padding:14px 30px;
background:#2563eb;
color:white;
border:none;
border-radius:8px;
font-size:18px;
cursor:pointer;
}

button.analyse:hover{
background:#1d4ed8;
}

.result{
margin-top:20px;
padding:20px;
background:#f8fafc;
border-radius:10px;
line-height:2;
}

.green{color:green;font-weight:bold;}
.red{color:red;font-weight:bold;}

</style>

</head>

<body>

<div class="sidebar">

<div class="logo">
KANALBAU AI
</div>

<div class="menu">

<button>🏠 Dashboard</button>
<button>📧 Inbox</button>
<button>📁 Projecten</button>
<button>⭐ Favorieten</button>
<button>⚙ Instellingen</button>

</div>

</div>

<div class="main">

<div class="cards">

<div class="card">
<h2 id="mailCount">0</h2>
<p>Geanalyseerde mails</p>
</div>

<div class="card">
<h2 id="interesting">0</h2>
<p>Interessante projecten</p>
</div>

<div class="card">
<h2>100 km</h2>
<p>Werkgebied</p>
</div>

<div class="card">
<h2>NRW</h2>
<p>Regio</p>
</div>

</div>

<div class="panel">

<h2>📧 Plak hier de Vergabemarktplatz e-mail</h2>

<br>

<textarea id="mail"></textarea>

<br>

<button class="analyse" onclick="analyseMail()">

Analyseer Project

</button>

<div class="result" id="result">

Nog geen analyse uitgevoerd.

</div>

</div>

</div>

<script>

function analyseMail(){

let text=document.getElementById("mail").value.toLowerCase();

let score=0;

let redenen=[];

if(text.includes("kanalbau")){
score+=40;
redenen.push("✔ Kanalbau");
}

if(text.includes("tiefbau")){
score+=30;
redenen.push("✔ Tiefbau");
}

if(text.includes("erschließung")){
score+=25;
redenen.push("✔ Erschließung");
}

if(text.includes("druckrohr")){
score+=25;
redenen.push("✔ Druckrohrleitung");
}

if(text.includes("schmutzwasser")){
score+=20;
redenen.push("✔ Schmutzwasser");
}

if(text.includes("regenwasser")){
score+=15;
redenen.push("✔ Regenwasser");
}

if(text.includes("straßenbau")){
score+=15;
redenen.push("✔ Straßenbau");
}

if(text.includes("sanitär")){
score-=70;
redenen.push("✖ Sanitair");
}

if(text.includes("elektro")){
score-=60;
redenen.push("✖ Elektro");
}

if(text.includes("dach")){
score-=60;
redenen.push("✖ Dakwerk");
}

let beoordeling="Niet interessant";

let kleur="red";

if(score>=60){

beoordeling="ZEER INTERESSANT";

kleur="green";

document.getElementById("interesting").innerHTML=Number(document.getElementById("interesting").innerHTML)+1;

}

document.getElementById("mailCount").innerHTML=Number(document.getElementById("mailCount").innerHTML)+1;

document.getElementById("result").innerHTML=
"<h2>Analyse</h2><br>"+
"<b>Score:</b> "+score+"<br>"+
"<b>Status:</b> <span class='"+kleur+"'>"+beoordeling+"</span><br><br>"+
redenen.join("<br>");

}
// ===== DEEL 1B =====

let plaatsen = [
"Dülmen",
"Ahaus",
"Münster",
"Coesfeld",
"Bocholt",
"Borken",
"Stadtlohn",
"Vreden",
"Gescher",
"Ibbenbüren"
];

function zoekPlaats(tekst){

for(let plaats of plaatsen){

if(tekst.toLowerCase().includes(plaats.toLowerCase())){

return plaats;

}

}

return "Onbekend";

}

function zoekDeadline(tekst){

let regex = /\d{1,2}[.-]\d{1,2}[.-]\d{2,4}/g;

let gevonden = tekst.match(regex);

if(gevonden){

return gevonden[0];

}

return "Niet gevonden";

}

function zoekOpdrachtgever(tekst){

if(tekst.includes("stadt")){

return "Stadt";

}

if(tekst.includes("gemeinde")){

return "Gemeinde";

}

if(tekst.includes("kreis")){

return "Kreis";

}

return "Onbekend";

}

// oude functie vervangen

function analyseMail(){

let origineleTekst = document.getElementById("mail").value;

let text = origineleTekst.toLowerCase();

let score = 0;

let redenen = [];

if(text.includes("kanalbau")){
score += 40;
redenen.push("✔ Kanalbau");
}

if(text.includes("tiefbau")){
score += 30;
redenen.push("✔ Tiefbau");
}

if(text.includes("erschließung")){
score += 25;
redenen.push("✔ Erschließung");
}

if(text.includes("druckrohr")){
score += 25;
redenen.push("✔ Druckrohrleitung");
}

if(text.includes("schmutzwasser")){
score += 20;
redenen.push("✔ Schmutzwasser");
}

if(text.includes("regenwasser")){
score += 15;
redenen.push("✔ Regenwasser");
}

if(text.includes("straßenbau")){
score += 15;
redenen.push("✔ Straßenbau");
}

if(text.includes("sanitär")){
score -= 70;
redenen.push("✖ Sanitair");
}

if(text.includes("elektro")){
score -= 60;
redenen.push("✖ Elektro");
}

if(text.includes("dach")){
score -= 60;
redenen.push("✖ Dakwerk");
}

let plaats = zoekPlaats(origineleTekst);

let deadline = zoekDeadline(origineleTekst);

let opdrachtgever = zoekOpdrachtgever(text);

let beoordeling = "Niet interessant";
let kleur = "red";

if(score >= 60){

beoordeling = "ZEER INTERESSANT";
kleur = "green";

}

document.getElementById("mailCount").innerHTML =
Number(document.getElementById("mailCount").innerHTML) + 1;

document.getElementById("result").innerHTML =

"<h2>Project Analyse</h2><hr><br>" +

"<b>📍 Plaats:</b> " + plaats + "<br>" +

"<b>📅 Deadline:</b> " + deadline + "<br>" +

"<b>🏢 Opdrachtgever:</b> " + opdrachtgever + "<br>" +

"<b>⭐ Score:</b> " + score + "/100<br>" +

"<b>Status:</b> <span class='"+kleur+"'>" + beoordeling + "</span><br><br>" +

"<b>Waarom interessant:</b><br><br>" +

redenen.join("<br>");

}
</script>

</body>
</html>
